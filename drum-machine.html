<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Drum Machine">
    <meta name="theme-color" content="#0d0d0d">
    <meta name="description" content="A circular step sequencer inspired by the Dato Drum. Build beats with 4 voices, swappable samples, effects and BPM/swing control.">
    <title>Drum Machine</title>
    <link rel="manifest" href="/drum-machine-manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/img/favicon.ico">
    <link rel="apple-touch-icon" href="/img/favicon.ico">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0d;
            --surface: #181818;
            --surface2: #242424;
            --surface3: #2e2e2e;
            --text: #f0f0f0;
            --text-dim: #555;
            --text-mid: #888;
            --kick:      #FF4757;
            --snare:     #FFA502;
            --hihat:     #2ED573;
            --clap:      #A29BFE;
            --kick-dim:  rgba(255,71,87,0.18);
            --snare-dim: rgba(255,165,2,0.18);
            --hihat-dim: rgba(46,213,115,0.18);
            --clap-dim:  rgba(162,155,254,0.18);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            height: 100%;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding:
                max(env(safe-area-inset-top, 0px), 10px)
                max(env(safe-area-inset-right, 0px), 14px)
                max(env(safe-area-inset-bottom, 0px), 10px)
                max(env(safe-area-inset-left, 0px), 14px);
        }

        /* ── Header ─────────────────────────────────────── */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        #header h1 {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        #tempo-display {
            font-size: 0.7rem;
            color: var(--text-mid);
            letter-spacing: 0.08em;
        }

        /* ── Sample selectors ────────────────────────────── */
        #sample-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }
        .sample-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 4px;
            background: var(--surface);
            border: 1.5px solid var(--surface3);
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .sample-btn:active { transform: scale(0.95); }
        .sample-btn[data-voice="0"] { border-color: var(--kick-dim); }
        .sample-btn[data-voice="1"] { border-color: var(--snare-dim); }
        .sample-btn[data-voice="2"] { border-color: var(--hihat-dim); }
        .sample-btn[data-voice="3"] { border-color: var(--clap-dim); }
        .sample-btn[data-voice="0"]:active { border-color: var(--kick); }
        .sample-btn[data-voice="1"]:active { border-color: var(--snare); }
        .sample-btn[data-voice="2"]:active { border-color: var(--hihat); }
        .sample-btn[data-voice="3"]:active { border-color: var(--clap); }
        .sample-voice { font-size: 0.6rem; font-weight: 800; letter-spacing: 0.08em; }
        .sample-btn[data-voice="0"] .sample-voice { color: var(--kick); }
        .sample-btn[data-voice="1"] .sample-voice { color: var(--snare); }
        .sample-btn[data-voice="2"] .sample-voice { color: var(--hihat); }
        .sample-btn[data-voice="3"] .sample-voice { color: var(--clap); }
        .sample-name  { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; color: var(--text); }
        .sample-hint  { font-size: 0.5rem; color: var(--text-dim); letter-spacing: 0.05em; }

        /* ── Sequencer ───────────────────────────────────── */
        #sequencer-wrap {
            position: relative;
            width: min(88vw, 340px);
            aspect-ratio: 1;
            flex-shrink: 0;
        }
        #sequencer-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
            touch-action: none;
        }
        .step-node, .voice-pad, .effect-btn { cursor: pointer; }

        /* ── Sliders ─────────────────────────────────────── */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .slider-label {
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
            min-width: 36px;
        }
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 3px;
            background: var(--surface3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: var(--text);
            cursor: pointer;
            box-shadow: 0 0 6px rgba(255,255,255,0.2);
        }
        input[type=range]::-moz-range-thumb {
            width: 18px; height: 18px;
            border: none; border-radius: 50%;
            background: var(--text); cursor: pointer;
        }
        .slider-value {
            font-size: 0.8rem; font-weight: 700;
            min-width: 38px; text-align: right;
        }

        /* ── Tune row ────────────────────────────────────── */
        #pitch-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        #pitch-label {
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
            min-width: 36px;
        }
        .pitch-group {
            display: flex; flex-direction: column;
            align-items: center; flex: 1; gap: 3px;
        }
        .pitch-badge {
            font-size: 0.55rem; font-weight: 800;
            padding: 1px 5px; border-radius: 3px; color: #000;
        }
        .pitch-badge.kick  { background: var(--kick); }
        .pitch-badge.snare { background: var(--snare); }
        .pitch-badge.hihat { background: var(--hihat); }
        .pitch-badge.clap  { background: var(--clap); }
        .pitch-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 3px;
            border-radius: 2px; outline: none; cursor: pointer;
        }
        .pitch-slider.kick  { background: linear-gradient(to right, var(--surface3), var(--kick)); }
        .pitch-slider.snare { background: linear-gradient(to right, var(--surface3), var(--snare)); }
        .pitch-slider.hihat { background: linear-gradient(to right, var(--surface3), var(--hihat)); }
        .pitch-slider.clap  { background: linear-gradient(to right, var(--surface3), var(--clap)); }
        .pitch-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%; background: var(--text); cursor: pointer;
        }
        .pitch-slider::-moz-range-thumb {
            width: 16px; height: 16px;
            border: none; border-radius: 50%; background: var(--text);
        }

        /* ── Update banner ───────────────────────────────── */
        #update-banner {
            display: none;
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: #333; border: 1px solid #555;
            border-radius: 10px; padding: 10px 20px;
            font-size: 0.8rem; gap: 12px;
            align-items: center; z-index: 100; white-space: nowrap;
        }
        #update-banner.show { display: flex; }
        #update-banner button {
            background: var(--text); color: var(--bg);
            border: none; border-radius: 6px;
            padding: 4px 12px; font-size: 0.8rem;
            font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>
<div id="app">

    <!-- Header -->
    <div id="header">
        <h1>Drum Machine</h1>
        <span id="tempo-display">♩ 120 · swing 0%</span>
    </div>

    <!-- Sample selectors -->
    <div id="sample-row">
        <button class="sample-btn" data-voice="0">
            <span class="sample-voice">K</span>
            <span class="sample-name" id="sample-name-0">KICK</span>
            <span class="sample-hint">tap to swap</span>
        </button>
        <button class="sample-btn" data-voice="1">
            <span class="sample-voice">S</span>
            <span class="sample-name" id="sample-name-1">SNARE</span>
            <span class="sample-hint">tap to swap</span>
        </button>
        <button class="sample-btn" data-voice="2">
            <span class="sample-voice">H</span>
            <span class="sample-name" id="sample-name-2">CHH</span>
            <span class="sample-hint">tap to swap</span>
        </button>
        <button class="sample-btn" data-voice="3">
            <span class="sample-voice">C</span>
            <span class="sample-name" id="sample-name-3">CLAP</span>
            <span class="sample-hint">tap to swap</span>
        </button>
    </div>

    <!-- Circular Sequencer -->
    <div id="sequencer-wrap">
        <svg id="sequencer-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="bg-gradient" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#1c1c1c"/>
                    <stop offset="100%" stop-color="#0a0a0a"/>
                </radialGradient>
            </defs>

            <!-- Octagonal body -->
            <polygon points="272.7,24.5 375.5,127.3 375.5,272.7 272.7,375.5 127.3,375.5 24.5,272.7 24.5,127.3 127.3,24.5"
                     fill="url(#bg-gradient)" stroke="#0d4a44" stroke-width="5" stroke-linejoin="round"/>

            <!-- Ring track -->
            <circle cx="200" cy="200" r="120" fill="none" stroke="#181818" stroke-width="24"/>

            <!-- Voice arc backgrounds (dim colour segments on the ring) -->
            <!-- Kick  top:    -125° → -55° -->
            <path d="M 131.2 101.7 A 120 120 0 0 1 268.8 101.7"
                  fill="none" stroke="rgba(255,71,87,0.09)" stroke-width="24"/>
            <!-- Snare right:  -35° → +35° -->
            <path d="M 298.3 131.2 A 120 120 0 0 1 298.3 268.8"
                  fill="none" stroke="rgba(255,165,2,0.09)" stroke-width="24"/>
            <!-- HiHat bottom: +55° → +125° -->
            <path d="M 268.8 298.3 A 120 120 0 0 1 131.2 298.3"
                  fill="none" stroke="rgba(46,213,115,0.09)" stroke-width="24"/>
            <!-- Clap  left:  +145° → +215° -->
            <path d="M 101.7 268.8 A 120 120 0 0 1 101.7 131.2"
                  fill="none" stroke="rgba(162,155,254,0.09)" stroke-width="24"/>

            <!-- Step nodes — built by JS -->
            <g id="steps-group"></g>

            <!-- Playhead rings — built by JS -->
            <g id="playhead-group"></g>

            <!-- Voice labels (inside the ring) -->
            <text x="200" y="150" text-anchor="middle" dominant-baseline="middle"
                  font-size="10" font-weight="800" letter-spacing="0.1em"
                  fill="rgba(255,71,87,0.45)">KICK</text>
            <text x="253" y="200" text-anchor="middle" dominant-baseline="middle"
                  font-size="10" font-weight="800" letter-spacing="0.1em"
                  fill="rgba(255,165,2,0.45)">SN</text>
            <text x="200" y="253" text-anchor="middle" dominant-baseline="middle"
                  font-size="10" font-weight="800" letter-spacing="0.1em"
                  fill="rgba(46,213,115,0.45)">HH</text>
            <text x="147" y="200" text-anchor="middle" dominant-baseline="middle"
                  font-size="10" font-weight="800" letter-spacing="0.1em"
                  fill="rgba(162,155,254,0.45)">CLAP</text>

            <!-- ── Voice pads — diamonds at cardinal positions, r=158 ── -->
            <!-- V0 Kick — top (200, 42) -->
            <g class="voice-pad" data-voice="0">
                <circle cx="200" cy="42" r="20" fill="transparent"/>
                <polygon points="200,28 214,42 200,56 186,42"
                         fill="rgba(255,71,87,0.18)" stroke="#FF4757" stroke-width="1.5"
                         stroke-linejoin="round" id="pad-poly-0"/>
                <text x="200" y="43" text-anchor="middle" dominant-baseline="middle"
                      font-size="8" font-weight="900" fill="#FF4757"
                      pointer-events="none">K</text>
            </g>
            <!-- V1 Snare — right (358, 200) -->
            <g class="voice-pad" data-voice="1">
                <circle cx="358" cy="200" r="20" fill="transparent"/>
                <polygon points="358,186 372,200 358,214 344,200"
                         fill="rgba(255,165,2,0.18)" stroke="#FFA502" stroke-width="1.5"
                         stroke-linejoin="round" id="pad-poly-1"/>
                <text x="358" y="201" text-anchor="middle" dominant-baseline="middle"
                      font-size="8" font-weight="900" fill="#FFA502"
                      pointer-events="none">S</text>
            </g>
            <!-- V2 HiHat — bottom (200, 358) -->
            <g class="voice-pad" data-voice="2">
                <circle cx="200" cy="358" r="20" fill="transparent"/>
                <polygon points="200,344 214,358 200,372 186,358"
                         fill="rgba(46,213,115,0.18)" stroke="#2ED573" stroke-width="1.5"
                         stroke-linejoin="round" id="pad-poly-2"/>
                <text x="200" y="359" text-anchor="middle" dominant-baseline="middle"
                      font-size="8" font-weight="900" fill="#2ED573"
                      pointer-events="none">H</text>
            </g>
            <!-- V3 Clap — left (42, 200) -->
            <g class="voice-pad" data-voice="3">
                <circle cx="42" cy="200" r="20" fill="transparent"/>
                <polygon points="42,186 56,200 42,214 28,200"
                         fill="rgba(162,155,254,0.18)" stroke="#A29BFE" stroke-width="1.5"
                         stroke-linejoin="round" id="pad-poly-3"/>
                <text x="42" y="201" text-anchor="middle" dominant-baseline="middle"
                      font-size="8" font-weight="900" fill="#A29BFE"
                      pointer-events="none">C</text>
            </g>

            <!-- ── Effect buttons — large circles at diagonal positions, r=158 ── -->
            <!-- REPEAT — top-right (312, 88), angle -45° -->
            <g class="effect-btn" data-fx="repeat">
                <circle cx="312" cy="88" r="23" fill="rgba(255,71,87,0.1)"
                        stroke="#FF4757" stroke-width="1.5" id="fx-c-repeat"/>
                <text x="312" y="89" text-anchor="middle" dominant-baseline="middle"
                      font-size="6" font-weight="800" fill="#FF4757" letter-spacing="0.06em"
                      pointer-events="none">REPEAT</text>
            </g>
            <!-- FILTER — bottom-right (312, 312), angle +45° -->
            <g class="effect-btn" data-fx="filter">
                <circle cx="312" cy="312" r="23" fill="rgba(46,213,115,0.1)"
                        stroke="#2ED573" stroke-width="1.5" id="fx-c-filter"/>
                <text x="312" y="313" text-anchor="middle" dominant-baseline="middle"
                      font-size="6" font-weight="800" fill="#2ED573" letter-spacing="0.06em"
                      pointer-events="none">FILTER</text>
            </g>
            <!-- RANDOM — bottom-left (88, 312), angle +135° -->
            <g class="effect-btn" data-fx="random">
                <circle cx="88" cy="312" r="23" fill="rgba(255,165,2,0.1)"
                        stroke="#FFA502" stroke-width="1.5" id="fx-c-random"/>
                <text x="88" y="313" text-anchor="middle" dominant-baseline="middle"
                      font-size="6" font-weight="800" fill="#FFA502" letter-spacing="0.06em"
                      pointer-events="none">RANDOM</text>
            </g>
            <!-- DISTORT — top-left (88, 88), angle -135° -->
            <g class="effect-btn" data-fx="distortion">
                <circle cx="88" cy="88" r="23" fill="rgba(91,138,255,0.1)"
                        stroke="#5B8AFF" stroke-width="1.5" id="fx-c-distortion"/>
                <text x="88" y="89" text-anchor="middle" dominant-baseline="middle"
                      font-size="6" font-weight="800" fill="#5B8AFF" letter-spacing="0.06em"
                      pointer-events="none">DISTORT</text>
            </g>

            <!-- Center play button -->
            <circle cx="200" cy="200" r="26" fill="#141414" stroke="#252525"
                    stroke-width="1.5" id="play-bg"/>
            <text id="play-icon" x="200" y="201" text-anchor="middle" dominant-baseline="middle"
                  font-size="18" fill="#f0f0f0" style="cursor:pointer">▶</text>
            <circle cx="200" cy="200" r="26" fill="transparent" id="play-hit"
                    style="cursor:pointer"/>

            <!-- DATO badge -->
            <text x="200" y="219" text-anchor="middle" font-size="5.5" fill="#282828"
                  font-weight="900" letter-spacing="0.22em" font-family="monospace">DATO</text>
        </svg>
    </div>

    <!-- SPEED -->
    <div class="slider-row">
        <span class="slider-label">SPEED</span>
        <input type="range" id="bpm-slider" min="60" max="200" value="120" step="1">
        <span class="slider-value" id="bpm-value">120</span>
    </div>

    <!-- SWING -->
    <div class="slider-row">
        <span class="slider-label">SWING</span>
        <input type="range" id="swing-slider" min="0" max="100" value="0" step="1">
        <span class="slider-value" id="swing-value">0%</span>
    </div>

    <!-- TUNE -->
    <div id="pitch-row">
        <span id="pitch-label">TUNE</span>
        <div class="pitch-group">
            <span class="pitch-badge kick">K</span>
            <input type="range" class="pitch-slider kick" data-voice="0" min="-12" max="12" value="0" step="1">
        </div>
        <div class="pitch-group">
            <span class="pitch-badge snare">S</span>
            <input type="range" class="pitch-slider snare" data-voice="1" min="-12" max="12" value="0" step="1">
        </div>
        <div class="pitch-group">
            <span class="pitch-badge hihat">H</span>
            <input type="range" class="pitch-slider hihat" data-voice="2" min="-12" max="12" value="0" step="1">
        </div>
        <div class="pitch-group">
            <span class="pitch-badge clap">C</span>
            <input type="range" class="pitch-slider clap" data-voice="3" min="-12" max="12" value="0" step="1">
        </div>
    </div>

</div>

<div id="update-banner">
    <span>Update available</span>
    <button id="update-btn">Reload</button>
</div>

<script>
(function () {
'use strict';

// ─── Constants ───────────────────────────────────────────────────────────────
const STEPS   = 8;
const VOICES  = 4;
const CX = 200, CY = 200;
const RING_R  = 120;
const COLORS      = ['#FF4757', '#FFA502', '#2ED573', '#A29BFE'];
const COLORS_DIM  = ['rgba(255,71,87,0.15)','rgba(255,165,2,0.15)',
                     'rgba(46,213,115,0.15)','rgba(162,155,254,0.15)'];
const PAD_FILL    = ['rgba(255,71,87,0.18)','rgba(255,165,2,0.18)',
                     'rgba(46,213,115,0.18)','rgba(162,155,254,0.18)'];
const FX_ACTIVE   = { repeat:'rgba(255,71,87,0.55)',    filter:'rgba(46,213,115,0.55)',
                       random:'rgba(255,165,2,0.55)',    distortion:'rgba(91,138,255,0.55)' };
const FX_DIM      = { repeat:'rgba(255,71,87,0.1)',      filter:'rgba(46,213,115,0.1)',
                       random:'rgba(255,165,2,0.1)',      distortion:'rgba(91,138,255,0.1)' };
const NODE_R      = 11;
const LOOKAHEAD   = 25.0;   // ms
const SCHED_AHEAD = 0.1;    // s

// ─── State ────────────────────────────────────────────────────────────────────
let grid           = Array.from({length: VOICES}, () => Array(STEPS).fill(false));
let pitches        = [0, 0, 0, 0];
let selectedSamples = [0, 0, 0, 0];
let bpm            = 120;
let swing          = 0;
let isPlaying      = false;
let currentStep    = 0;
let nextStepTime   = 0;
let schedulerTimer = null;
let visualStep     = -1;
let fx = { repeat: false, random: false, filter: false, distortion: false };

// ─── Audio ────────────────────────────────────────────────────────────────────
let audioCtx, masterGain, filterNode, distortionNode;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.8;

    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = 'lowpass';
    filterNode.frequency.value = 20000;
    filterNode.Q.value = 1.2;

    distortionNode = audioCtx.createWaveShaper();
    distortionNode.curve = makeDistCurve(0);
    distortionNode.oversample = '2x';

    masterGain.connect(filterNode);
    filterNode.connect(distortionNode);
    distortionNode.connect(audioCtx.destination);
}

function makeDistCurve(amount) {
    const n = 512, curve = new Float32Array(n), deg = Math.PI / 180;
    for (let i = 0; i < n; i++) {
        const x = (i * 2) / n - 1;
        curve[i] = amount === 0
            ? x
            : ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
}

function semitonesToRate(s) { return Math.pow(2, s / 12); }

// ─── Synthesis ────────────────────────────────────────────────────────────────
function playKick(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150 * r, time);
    osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.5);
    g.gain.setValueAtTime(1.0, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.5);
}
function play808(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(80 * r, time);
    osc.frequency.exponentialRampToValueAtTime(20 * r, time + 1.0);
    g.gain.setValueAtTime(1.4, time); g.gain.exponentialRampToValueAtTime(0.001, time + 1.0);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 1.0);
}
function playPunch(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(240 * r, time);
    osc.frequency.exponentialRampToValueAtTime(40 * r, time + 0.15);
    g.gain.setValueAtTime(1.6, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.15);
}
function playSub(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(55 * r, time);
    osc.frequency.exponentialRampToValueAtTime(18 * r, time + 0.9);
    g.gain.setValueAtTime(1.3, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.9);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.9);
}
function playSnare(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.2), ns = audioCtx.createBufferSource(); ns.buffer = nb;
    const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
    bpf.frequency.value = 1000 * r; bpf.Q.value = 0.5;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(1.0, time); ng.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
    ns.connect(bpf); bpf.connect(ng); ng.connect(masterGain); ns.start(time); ns.stop(time + 0.2);
    const osc = audioCtx.createOscillator(); osc.type = 'triangle';
    osc.frequency.value = 185 * r;
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.6, time); og.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    osc.connect(og); og.connect(masterGain); osc.start(time); osc.stop(time + 0.1);
}
function playRim(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.05), src = audioCtx.createBufferSource(); src.buffer = nb;
    const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
    bpf.frequency.value = 2800 * r; bpf.Q.value = 3;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(2.0, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    src.connect(bpf); bpf.connect(g); g.connect(masterGain); src.start(time); src.stop(time + 0.05);
}
function playTom(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180 * r, time);
    osc.frequency.exponentialRampToValueAtTime(60 * r, time + 0.35);
    g.gain.setValueAtTime(1.1, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.35);
}
function playStick(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.018), src = audioCtx.createBufferSource(); src.buffer = nb;
    const hpf = audioCtx.createBiquadFilter(); hpf.type = 'highpass';
    hpf.frequency.value = 4500 * r;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(2.2, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.018);
    src.connect(hpf); hpf.connect(g); g.connect(masterGain); src.start(time); src.stop(time + 0.018);
}
function playClosedHH(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.08), src = audioCtx.createBufferSource(); src.buffer = nb;
    const hpf = audioCtx.createBiquadFilter(); hpf.type = 'highpass';
    hpf.frequency.value = 7000 * r;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.6, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
    src.connect(hpf); hpf.connect(g); g.connect(masterGain); src.start(time); src.stop(time + 0.08);
}
function playOpenHH(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.5), src = audioCtx.createBufferSource(); src.buffer = nb;
    const hpf = audioCtx.createBiquadFilter(); hpf.type = 'highpass';
    hpf.frequency.value = 6000 * r;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.45, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.45);
    src.connect(hpf); hpf.connect(g); g.connect(masterGain); src.start(time); src.stop(time + 0.5);
}
function playCrash(time, pitch) {
    const r = semitonesToRate(pitch);
    [1, 1.34, 1.78, 2.4, 3.1].forEach((ratio, i) => {
        const nb = noiseBuffer(1.8), src = audioCtx.createBufferSource(); src.buffer = nb;
        const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
        bpf.frequency.value = 3000 * ratio * r; bpf.Q.value = 2.5;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.2 / (i + 1), time);
        g.gain.exponentialRampToValueAtTime(0.001, time + 1.8);
        src.connect(bpf); bpf.connect(g); g.connect(masterGain);
        src.start(time); src.stop(time + 1.8);
    });
}
function playShaker(time, pitch) {
    const r = semitonesToRate(pitch);
    for (let i = 0; i < 10; i++) {
        const t = time + i * 0.009;
        const nb = noiseBuffer(0.009), src = audioCtx.createBufferSource(); src.buffer = nb;
        const hpf = audioCtx.createBiquadFilter(); hpf.type = 'highpass';
        hpf.frequency.value = 9000 * r;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.009);
        src.connect(hpf); hpf.connect(g); g.connect(masterGain);
        src.start(t); src.stop(t + 0.009);
    }
}
function playClap(time, pitch) {
    const r = semitonesToRate(pitch);
    for (let b = 0; b < 3; b++) {
        const t = time + b * 0.012;
        const nb = noiseBuffer(0.05), src = audioCtx.createBufferSource(); src.buffer = nb;
        const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
        bpf.frequency.value = 1200 * r; bpf.Q.value = 0.8;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(b === 0 ? 0.55 : 0.35, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        src.connect(bpf); bpf.connect(g); g.connect(masterGain); src.start(t); src.stop(t + 0.12);
    }
}
function playCowbell(time, pitch) {
    const r = semitonesToRate(pitch);
    [562, 845].forEach(freq => {
        const osc = audioCtx.createOscillator(); osc.type = 'square';
        osc.frequency.value = freq * r;
        const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
        bpf.frequency.value = freq * r; bpf.Q.value = 6;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.35, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
        osc.connect(bpf); bpf.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.5);
    });
}
function playConga(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(310 * r, time);
    osc.frequency.exponentialRampToValueAtTime(160 * r, time + 0.2);
    g.gain.setValueAtTime(1.1, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.22);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.22);
}
function playWoodblock(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(); osc.type = 'square';
    osc.frequency.value = 820 * r;
    const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
    bpf.frequency.value = 820 * r; bpf.Q.value = 10;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.9, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.075);
    osc.connect(bpf); bpf.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.075);
}

function noiseBuffer(dur) {
    const size = Math.ceil(audioCtx.sampleRate * dur);
    const buf  = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
    return buf;
}

// ─── Sample banks ─────────────────────────────────────────────────────────────
const SAMPLE_BANKS = [
    [{ name:'KICK', play:playKick }, { name:'808',   play:play808   },
     { name:'PUNCH',play:playPunch }, { name:'SUB',  play:playSub   }],
    [{ name:'SNARE',play:playSnare }, { name:'RIM',  play:playRim   },
     { name:'TOM',  play:playTom   }, { name:'STICK',play:playStick }],
    [{ name:'CHH',  play:playClosedHH }, { name:'OHH', play:playOpenHH },
     { name:'CRASH',play:playCrash   }, { name:'SHAKE',play:playShaker }],
    [{ name:'CLAP', play:playClap   }, { name:'COWBL',play:playCowbell },
     { name:'CONGA',play:playConga  }, { name:'WOOD', play:playWoodblock }],
];

function triggerVoice(voice, time) {
    SAMPLE_BANKS[voice][selectedSamples[voice]].play(time, pitches[voice]);
}

// ─── Sequencer ────────────────────────────────────────────────────────────────
function stepDuration() { return (60 / bpm) / 2; }

function swingOffset(step) {
    return (step % 2 === 1) ? stepDuration() * (swing * 0.33) : 0;
}

function scheduleStep(step, baseTime) {
    const time = baseTime + swingOffset(step);
    const dur  = stepDuration();
    for (let v = 0; v < VOICES; v++) {
        const fire = fx.random ? (Math.random() > 0.5) : grid[v][step];
        if (!fire) continue;
        if (fx.repeat) {
            triggerVoice(v, time);
            triggerVoice(v, time + dur / 2);
        } else {
            triggerVoice(v, time);
        }
    }
}

function scheduler() {
    while (nextStepTime < audioCtx.currentTime + SCHED_AHEAD) {
        const step = currentStep;
        const t    = nextStepTime;
        scheduleStep(step, t);
        nextStepTime += stepDuration();
        currentStep = (currentStep + 1) % STEPS;
        const delay = Math.max(0, (t - audioCtx.currentTime) * 1000);
        setTimeout(() => { visualStep = step; }, delay);
    }
    schedulerTimer = setTimeout(scheduler, LOOKAHEAD);
}

function startPlayback() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentStep  = 0;
    nextStepTime = audioCtx.currentTime + 0.05;
    isPlaying    = true;
    scheduler();
    updatePlayIcon();
}

function stopPlayback() {
    isPlaying = false;
    if (schedulerTimer) clearTimeout(schedulerTimer);
    visualStep = -1;
    renderSteps();
    updatePlayhead();
    updatePlayIcon();
}

function togglePlay() { isPlaying ? stopPlayback() : startPlayback(); }

function updatePlayIcon() {
    document.getElementById('play-icon').textContent = isPlaying ? '■' : '▶';
    document.getElementById('play-bg').style.fill = isPlaying ? '#222' : '#141414';
}

// ─── SVG ──────────────────────────────────────────────────────────────────────
function stepPos(voice, step) {
    // Voice centers: V0=top(-90°), V1=right(0°), V2=bottom(90°), V3=left(180°)
    const CENTER = [-Math.PI / 2, 0, Math.PI / 2, Math.PI][voice];
    const angle  = CENTER + (step - 3.5) * (10 * Math.PI / 180); // 10° per step
    return { x: CX + RING_R * Math.cos(angle), y: CY + RING_R * Math.sin(angle) };
}

function buildStepsSVG() {
    const g = document.getElementById('steps-group');
    g.innerHTML = '';
    for (let v = 0; v < VOICES; v++) {
        for (let s = 0; s < STEPS; s++) {
            const pos   = stepPos(v, s);
            const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            group.setAttribute('class', 'step-node');
            group.dataset.voice = v;
            group.dataset.step  = s;

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', pos.x);
            circle.setAttribute('cy', pos.y);
            circle.setAttribute('r',  NODE_R);
            circle.setAttribute('fill', COLORS_DIM[v]);

            group.appendChild(circle);
            g.appendChild(group);

            group.addEventListener('click', () => toggleStep(v, s));
            group.addEventListener('touchend', e => { e.preventDefault(); toggleStep(v, s); });
        }
    }
}

let lastVisualStep = -2;

function renderSteps() {
    document.querySelectorAll('.step-node').forEach(node => {
        const v = +node.dataset.voice;
        const s = +node.dataset.step;
        const c = node.querySelector('circle');
        const active  = grid[v][s];
        const playing = s === visualStep;

        c.setAttribute('fill', active ? COLORS[v] : COLORS_DIM[v]);
        c.setAttribute('opacity', active ? '1' : '0.6');

        if (playing) {
            c.setAttribute('r', NODE_R + 3);
            c.setAttribute('filter', `drop-shadow(0 0 7px ${COLORS[v]})`);
        } else {
            c.setAttribute('r', NODE_R);
            c.setAttribute('filter', 'none');
        }
    });
}

function updatePlayhead() {
    const g = document.getElementById('playhead-group');
    g.innerHTML = '';
    if (!isPlaying || visualStep < 0) return;

    for (let v = 0; v < VOICES; v++) {
        const pos = stepPos(v, visualStep);
        const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        ring.setAttribute('cx', pos.x);
        ring.setAttribute('cy', pos.y);
        ring.setAttribute('r',  NODE_R + 7);
        ring.setAttribute('fill', 'none');
        ring.setAttribute('stroke', COLORS[v]);
        ring.setAttribute('stroke-width', '1.5');
        ring.setAttribute('opacity', '0.45');
        g.appendChild(ring);
    }
}

function animLoop() {
    if (visualStep !== lastVisualStep) {
        lastVisualStep = visualStep;
        renderSteps();
        updatePlayhead();
    }
    requestAnimationFrame(animLoop);
}

// ─── Step toggle ──────────────────────────────────────────────────────────────
function toggleStep(voice, step) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    grid[voice][step] = !grid[voice][step];
    if (grid[voice][step]) triggerVoice(voice, audioCtx.currentTime);
    renderSteps();
}

// ─── Effects ──────────────────────────────────────────────────────────────────
function applyEffect(name, on) {
    if (!audioCtx) return;
    if (name === 'filter') {
        filterNode.frequency.setTargetAtTime(on ? 450 : 20000, audioCtx.currentTime, 0.06);
    }
    if (name === 'distortion') {
        distortionNode.curve = makeDistCurve(on ? 400 : 0);
    }
}

// ─── Voice pads ───────────────────────────────────────────────────────────────
document.querySelectorAll('.voice-pad').forEach(pad => {
    const v    = +pad.dataset.voice;
    const poly = document.getElementById(`pad-poly-${v}`);

    pad.addEventListener('pointerdown', e => {
        e.preventDefault();
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        triggerVoice(v, audioCtx.currentTime);
        poly.setAttribute('fill', COLORS[v]);
        setTimeout(() => poly.setAttribute('fill', PAD_FILL[v]), 130);
    });
});

// ─── Effect buttons ───────────────────────────────────────────────────────────
document.querySelectorAll('.effect-btn').forEach(btn => {
    const name   = btn.dataset.fx;
    const circle = document.getElementById(`fx-c-${name}`);

    function activate(e) {
        e.preventDefault();
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        fx[name] = true;
        circle.setAttribute('fill', FX_ACTIVE[name]);
        circle.setAttribute('stroke-width', '2.5');
        applyEffect(name, true);
    }
    function deactivate() {
        fx[name] = false;
        circle.setAttribute('fill', FX_DIM[name]);
        circle.setAttribute('stroke-width', '1.5');
        applyEffect(name, false);
    }

    btn.addEventListener('pointerdown', activate);
    btn.addEventListener('pointerup',   deactivate);
    btn.addEventListener('pointerleave',deactivate);
    btn.addEventListener('pointercancel', deactivate);
});

// ─── Controls wiring ──────────────────────────────────────────────────────────
document.getElementById('play-hit').addEventListener('click', togglePlay);
document.getElementById('play-icon').addEventListener('click', togglePlay);

const bpmSlider    = document.getElementById('bpm-slider');
const bpmValueEl   = document.getElementById('bpm-value');
const tempoDisplay = document.getElementById('tempo-display');

function updateTempoDisplay() {
    tempoDisplay.textContent = `♩ ${bpm} · swing ${Math.round(swing * 100)}%`;
}

bpmSlider.addEventListener('input', () => {
    bpm = +bpmSlider.value;
    bpmValueEl.textContent = bpm;
    updateTempoDisplay();
});

const swingSlider  = document.getElementById('swing-slider');
const swingValueEl = document.getElementById('swing-value');

swingSlider.addEventListener('input', () => {
    swing = +swingSlider.value / 100;
    swingValueEl.textContent = `${swingSlider.value}%`;
    updateTempoDisplay();
});

document.querySelectorAll('.pitch-slider').forEach(el => {
    el.addEventListener('input', () => { pitches[+el.dataset.voice] = +el.value; });
});

document.querySelectorAll('.sample-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const v = +btn.dataset.voice;
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        selectedSamples[v] = (selectedSamples[v] + 1) % SAMPLE_BANKS[v].length;
        document.getElementById(`sample-name-${v}`).textContent = SAMPLE_BANKS[v][selectedSamples[v]].name;
        triggerVoice(v, audioCtx.currentTime);
    });
});

// ─── Default pattern ──────────────────────────────────────────────────────────
function loadDefault() {
    grid[0][0] = true; grid[0][4] = true;
    grid[1][2] = true; grid[1][6] = true;
    grid[2][0] = true; grid[2][2] = true; grid[2][4] = true; grid[2][6] = true;
    grid[3][3] = true; grid[3][7] = true;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildStepsSVG();
loadDefault();
renderSteps();
animLoop();

// ─── Service Worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
    const SW_VERSION = 'v2';
    navigator.serviceWorker.register(
        `/drum-machine-sw.js?v=${encodeURIComponent(SW_VERSION)}`,
        { scope: '/drum-machine/' }
    ).then(reg => {
        reg.addEventListener('updatefound', () => {
            const w = reg.installing;
            w.addEventListener('statechange', () => {
                if (w.state === 'installed' && navigator.serviceWorker.controller) {
                    document.getElementById('update-banner').classList.add('show');
                }
            });
        });
    }).catch(() => {});

    document.getElementById('update-btn').addEventListener('click', () => {
        navigator.serviceWorker.getRegistration('/drum-machine/').then(reg => {
            if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        });
        window.location.reload();
    });

    navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
}

})();
</script>
