<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#70c5ce">
    <meta name="description" content="Classic Flappy Bird game as a Progressive Web App">
    
    <title>Flappy Bird PWA</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/flappy-manifest.json">
    
    <!-- iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Flappy Bird">
    
    <!-- Favicon -->
    <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="game-container">
        <canvas id="canvas" width="288" height="512"></canvas>
        <div class="instructions">
            <p>Tap or press Space to fly!</p>
            <p>Avoid the pipes and get the highest score!</p>
            <p id="flappy-version" style="font-size:11px;opacity:0.6;margin-top:4px"></p>
        </div>
    </div>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #70c5ce 0%, #4fb3d9 100%);
            font-family: Arial, sans-serif;
            touch-action: manipulation;
        }

        canvas {
            border: 2px solid #333;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 100vw;
            max-height: 100vh;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .instructions {
            color: white;
            text-align: center;
            font-size: 14px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 320px) {
            canvas {
                width: 280px;
                height: 498px;
            }
        }

        @media (max-height: 600px) {
            .instructions {
                font-size: 12px;
            }
        }
    </style>
    
    <script>
        const SW_VERSION = '2603220405';
        document.getElementById('flappy-version').textContent = 'v' + SW_VERSION;

        // Register service worker with opt-in update flow
        if ('serviceWorker' in navigator) {
            let hasRefreshedForUpdate = false;

            const askToUpdate = (registration) => {
                if (document.getElementById('sw-update-banner')) return;
                const banner = document.createElement('div');
                banner.id = 'sw-update-banner';
                banner.style.cssText = [
                    'position:fixed', 'bottom:0', 'left:0', 'right:0',
                    'background:#1a3a3f', 'color:#fff', 'padding:12px 16px',
                    'display:flex', 'align-items:center', 'justify-content:space-between',
                    'z-index:9999', 'font-family:inherit', 'font-size:14px',
                    'border-top:2px solid #70c5ce'
                ].join(';');
                banner.innerHTML = [
                    '<span>A new version is available.</span>',
                    '<button style="background:#70c5ce;color:#1a3a3f;border:none;padding:6px 14px;',
                    'border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold">Refresh</button>'
                ].join('');
                banner.querySelector('button').addEventListener('click', function() {
                    if (registration.waiting) {
                        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
                    }
                });
                document.body.appendChild(banner);
            };

            window.addEventListener('load', async function() {
                try {
                    const registration = await navigator.serviceWorker.register(`/flappy-sw.js?v=${encodeURIComponent(SW_VERSION)}`, {
                        scope: '/flappy/'
                    });

                    if (registration.waiting) {
                        askToUpdate(registration);
                    }

                    registration.addEventListener('updatefound', function() {
                        const newWorker = registration.installing;
                        if (!newWorker) return;

                        newWorker.addEventListener('statechange', function() {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                askToUpdate(registration);
                            }
                        });
                    });

                    navigator.serviceWorker.addEventListener('controllerchange', function() {
                        if (hasRefreshedForUpdate) return;
                        hasRefreshedForUpdate = true;
                        window.location.reload();
                    });

                    window.addEventListener('focus', function() { registration.update(); });
                    setInterval(function() { registration.update(); }, 60 * 60 * 1000);
                } catch (error) {
                    console.log('Flappy Bird SW registration failed: ', error);
                }
            });
        }
    </script>
    
    <script src="/flappyBird.js"></script>
</body>

</html>
