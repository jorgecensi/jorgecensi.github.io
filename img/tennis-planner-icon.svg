<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="#0d9488"/>

  <!-- Tennis racket head (oval frame) -->
  <ellipse cx="240" cy="195" rx="115" ry="135" fill="none" stroke="white" stroke-width="22"/>

  <!-- Racket strings: horizontal -->
  <line x1="130" y1="145" x2="350" y2="145" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="126" y1="180" x2="354" y2="180" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="126" y1="215" x2="354" y2="215" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="130" y1="250" x2="350" y2="250" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- Racket strings: vertical -->
  <line x1="185" y1="62" x2="185" y2="328" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="220" y1="60" x2="220" y2="330" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="260" y1="60" x2="260" y2="330" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="295" y1="62" x2="295" y2="328" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- Racket handle -->
  <rect x="222" y="328" width="36" height="110" rx="18" fill="white"/>
  <rect x="204" y="418" width="72" height="20" rx="10" fill="rgba(255,255,255,0.6)"/>

  <!-- Calendar icon (bottom right) -->
  <rect x="330" y="340" width="140" height="130" rx="16" fill="white"/>
  <rect x="330" y="340" width="140" height="40" rx="16" fill="#0d9488"/>
  <rect x="330" y="360" width="140" height="20" fill="#0d9488"/>
  <!-- Calendar pegs -->
  <rect x="358" y="328" width="14" height="28" rx="7" fill="white"/>
  <rect x="442" y="328" width="14" height="28" rx="7" fill="white"/>
  <!-- Calendar dots -->
  <rect x="350" y="402" width="14" height="14" rx="4" fill="#0d9488"/>
  <rect x="378" y="402" width="14" height="14" rx="4" fill="#0d9488"/>
  <rect x="406" y="402" width="14" height="14" rx="4" fill="#10b981"/>
  <rect x="434" y="402" width="14" height="14" rx="4" fill="#0d9488"/>
  <rect x="350" y="428" width="14" height="14" rx="4" fill="#0d9488"/>
  <rect x="378" y="428" width="14" height="14" rx="4" fill="#10b981"/>
  <rect x="406" y="428" width="14" height="14" rx="4" fill="#0d9488"/>
  <rect x="434" y="428" width="14" height="14" rx="4" fill="#10b981"/>
</svg>
