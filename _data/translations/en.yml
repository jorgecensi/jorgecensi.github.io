about:
  title: "About Jorge Censi"
  greeting: "Hey, I'm Jorge!"
  intro: "I'm a software engineer who loves building things that work. I've been at it since 2010 — from desktop apps to web products to whatever comes next."
  short_version_title: "The short version"
  short_version_p1: "I've been building software since 2010. Started with desktop apps and the Microsoft stack, moved to the web, and kept learning along the way. AI is one of the things I've picked up and actually use day-to-day — but it's a tool, not the job."
  short_version_p2: "I care about software that ships, code that's maintainable, and products that people actually want to use. I'll reach for AI when it helps. I'll skip it when it doesn't."
  what_i_do_title: "What I actually do"
  what_i_do_p1: "Think of me as the engineer you call when you need something built properly — a product, a feature, an integration, or a fix for something that's been broken too long."
  what_i_do_p2: "Whether it's a web app, a backend service, a tricky integration, or a product that needs AI features done right — I've built it and I know how to make it work."
  beyond_code_title: "Beyond the code"
  beyond_code_p: "When I'm not writing code or reading docs, you'll find me watching movies, making BBQ (I take it very seriously), or enjoying a good craft beer. I believe the best tech is built by people who have a life outside of tech."
  buy_coffee: "Buy me a coffee"

