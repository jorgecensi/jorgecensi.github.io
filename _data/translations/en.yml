about:
  title: "About Jorge Censi"
  greeting: "Hey, I'm Jorge!"
  intro: "I'm a software engineer who fell in love with AI. Now I help businesses figure out how to actually use it — not just talk about it."
  short_version_title: "The short version"
  short_version_p1: "I've been building software since 2010. Started with desktop apps and the Microsoft stack, moved to the web, and then AI came along and changed everything. I saw teams drowning in buzzwords and expensive tools that nobody knew how to use. So I decided to be the person who bridges that gap."
  short_version_p2: "I take the complex AI stuff — large language models, automation, intelligent workflows — and turn it into things that actually help real people do their jobs better. No jargon. No hype. Just practical integration that works."
  what_i_do_title: "What I actually do"
  what_i_do_p1: "Think of me as the person you call when you know AI could help your business, but you're not sure where to start. I'll sit down with your team, understand your workflows, and build integrations that feel natural — not like you bolted a robot onto your process."
  what_i_do_p2: "Whether it's automating repetitive tasks, building smart document processing, creating AI-powered features for your product, or setting up copilot-style assistants for your team — I've done it and I love doing it."
  beyond_code_title: "Beyond the code"
  beyond_code_p: "When I'm not wrangling APIs or fine-tuning prompts, you'll find me watching movies, making BBQ (I take it very seriously), or enjoying a good craft beer. I believe the best tech is built by people who have a life outside of tech."
  buy_coffee: "Buy me a coffee"

