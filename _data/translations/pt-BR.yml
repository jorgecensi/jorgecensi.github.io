about:
  title: "Sobre Jorge Censi"
  greeting: "Oi, eu sou o Jorge!"
  intro: "Sou um engenheiro de software que ama construir coisas que funcionam. Estou nisso desde 2010 — de aplicativos desktop a produtos web e o que vier depois."
  short_version_title: "Resumindo"
  short_version_p1: "Desenvolvo software desde 2010. Comecei com aplicativos desktop e a stack Microsoft, migrei para a web e continuei aprendendo no caminho. IA é uma das coisas que aprendi e uso no dia a dia — mas é uma ferramenta, não o trabalho."
  short_version_p2: "Me importo com software que vai pra produção, código que se mantém, e produtos que as pessoas realmente querem usar. Uso IA quando ajuda. Dispenso quando não ajuda."
  what_i_do_title: "O que eu faço"
  what_i_do_p1: "Pense em mim como o engenheiro que você chama quando precisa de algo construído direitinho — um produto, uma funcionalidade, uma integração, ou a correção de algo que está quebrado há tempo demais."
  what_i_do_p2: "Seja um app web, um serviço de backend, uma integração complicada, ou um produto que precisa de funcionalidades de IA feitas do jeito certo — eu já construí e sei como fazer funcionar."
  beyond_code_title: "Além do código"
  beyond_code_p: "Quando não estou escrevendo código ou lendo docs, você me encontra assistindo filmes, fazendo churrasco (levo muito a sério), ou curtindo uma boa cerveja artesanal. Acredito que a melhor tecnologia é feita por pessoas que têm uma vida fora da tecnologia."
  buy_coffee: "Me pague um café"

