about:
  title: "Sobre Jorge Censi"
  greeting: "Oi, eu sou o Jorge!"
  intro: "Sou um engenheiro de software que se apaixonou por IA. Agora eu ajudo empresas a descobrir como realmente usá-la — não só falar sobre isso."
  short_version_title: "Resumindo"
  short_version_p1: "Desenvolvo software desde 2010. Comecei com aplicativos desktop e a stack Microsoft, migrei para a web, e então a IA chegou e mudou tudo. Vi equipes se afogando em buzzwords e ferramentas caras que ninguém sabia usar. Então decidi ser a pessoa que faz essa ponte."
  short_version_p2: "Eu pego as coisas complexas de IA — modelos de linguagem, automação, fluxos inteligentes — e transformo em coisas que realmente ajudam pessoas reais a fazer seu trabalho melhor. Sem jargão. Sem hype. Apenas integração prática que funciona."
  what_i_do_title: "O que eu faço"
  what_i_do_p1: "Pense em mim como a pessoa que você chama quando sabe que a IA pode ajudar seu negócio, mas não sabe por onde começar. Eu sento com sua equipe, entendo seus processos e construo integrações que parecem naturais — não como se você tivesse parafusado um robô no seu processo."
  what_i_do_p2: "Seja automatizando tarefas repetitivas, construindo processamento inteligente de documentos, criando funcionalidades com IA para seu produto, ou configurando assistentes estilo copiloto para sua equipe — eu já fiz e adoro fazer."
  beyond_code_title: "Além do código"
  beyond_code_p: "Quando não estou mexendo com APIs ou ajustando prompts, você me encontra assistindo filmes, fazendo churrasco (levo muito a sério), ou curtindo uma boa cerveja artesanal. Acredito que a melhor tecnologia é feita por pessoas que têm uma vida fora da tecnologia."
  buy_coffee: "Me pague um café"

