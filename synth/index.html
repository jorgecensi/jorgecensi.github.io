<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Synth</title>
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Synth">
  <link rel="manifest" href="/synth/manifest.json">
  <link rel="apple-touch-icon" href="/img/synth-icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/img/synth-icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --panel: #1a1a2e;
      --panel2: #16213e;
      --border: #2a2a4a;
      --text: #e0e0ff;
      --text-dim: #6060a0;
      --accent: #7c3aed;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 13px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-height: 100dvh;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ─── Header ─────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }
    #install-btn {
      display: none;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    #install-btn.visible { display: block; }

    /* ─── Controls panel ──────────────────────────────── */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px 10px;
      background: var(--panel2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .controls-row {
      display: flex;
      gap: 6px;
      width: 100%;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex: 1;
    }
    .ctrl-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    /* Wave selector — buttons fill group width */
    .wave-btns {
      display: flex;
      gap: 4px;
    }
    .wave-btn {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 0;
      height: 36px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .wave-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Sliders */
    .ctrl-slider {
      display: flex;
      align-items: center;
      gap: 6px;
      height: 36px;
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }
    .ctrl-value {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 26px;
      text-align: right;
    }

    /* Toggle buttons */
    .toggle-btn {
      flex: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 0;
      height: 36px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ─── Sequencer ───────────────────────────────────── */
    .sequencer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 8px 10px;
      gap: 10px;
      overflow: hidden;
    }

    /* One row (label + steps) */
    .seq-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      width: 100%;
    }

    .row-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-dim);
      width: 26px;
      flex-shrink: 0;
      text-align: right;
      padding-top: 10px; /* align with button center roughly */
      letter-spacing: 0.5px;
    }

    .steps-container {
      display: flex;
      align-items: flex-start;
      gap: 4px;
      flex-wrap: nowrap;
      flex: 1;
      min-width: 0;
      padding-bottom: 2px;
    }

    /* Group spacer for 16th note grouping */
    .group-gap {
      width: 5px;
      flex-shrink: 0;
    }

    /* Step wrapper: button + note label */
    .step-wrap {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 2px;
      flex: 1;
      min-width: 0;
      position: relative;
    }

    /* Step buttons — base */
    .step-btn {
      position: relative;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      user-select: none;
      -webkit-user-select: none;
    }
    /* Quarter (1/4) — flex fill, square */
    .step-btn-lg {
      flex: 1;
      aspect-ratio: 1;
      min-width: 0;
      height: auto;
      font-size: 13px;
    }
    /* 8th (1/8) — flex fill */
    .step-btn-md {
      flex: 1;
      aspect-ratio: 1;
      min-width: 0;
      height: auto;
      font-size: 10px;
    }
    /* 16th (1/16) — flex fill */
    .step-btn-sm {
      flex: 1;
      aspect-ratio: 1;
      min-width: 0;
      height: auto;
      font-size: 8px;
    }

    .step-btn.off {
      opacity: 0.22;
      filter: grayscale(0.5);
    }
    .step-btn.current {
      transform: scale(1.2);
      box-shadow: 0 0 14px 3px currentColor;
    }
    .step-btn.selected {
      border-color: #fff;
    }
    /* Chained step: slightly transparent with chain icon overlay */
    .step-btn.chained {
      opacity: 0.7;
    }
    /* Chain connector line between chained step and the one before */
    .chain-connector {
      position: absolute;
      top: 30%;
      left: -4px;
      width: 4px;
      height: 40%;
      background: rgba(255,255,255,0.4);
      border-radius: 1px;
      pointer-events: none;
      z-index: 3;
    }
    /* Chain icon inside chained button */
    .chain-icon {
      font-size: 0.85em;
      pointer-events: none;
    }

    .step-note {
      font-size: 7px;
      color: var(--text-dim);
      text-align: center;
      font-weight: 600;
      line-height: 1;
    }

    /* ─── Note select hint ────────────────────────────── */
    .hint {
      font-size: 9px;
      color: var(--text-dim);
      text-align: center;
      letter-spacing: 0.5px;
      padding: 2px 0;
      flex-shrink: 0;
      width: 100%;
    }
    .hint span {
      color: #fff;
      font-weight: 700;
    }

    /* Row mute strip (below sequencer, above hint) */
    .row-mutes {
      display: flex;
      gap: 8px;
      width: 100%;
      justify-content: stretch;
      align-items: center;
      padding: 6px 0 2px;
      flex-shrink: 0;
    }
    .row-mute-btn {
      flex: 1;
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 6px;
      padding: 8px 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .row-mute-btn.muted {
      background: rgba(255, 71, 87, 0.2);
      border-color: #ff4757;
      color: #ff8a94;
    }
    .row-mute-btn:active { transform: scale(0.97); }

    /* ─── Transport ───────────────────────────────────── */
    .transport {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 14px;
      background: var(--panel2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .bpm-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .bpm-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    #bpm-range { width: 80px; }
    #bpm-display {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      min-width: 30px;
    }

    .transport-btns { display: flex; gap: 8px; }

    .play-btn {
      background: #2ed573;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      color: #0f0f1a;
      transition: transform 0.1s, background 0.15s;
    }
    .play-btn.playing { background: #ff4757; }
    .play-btn:active { transform: scale(0.92); }

    .random-btn {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .random-btn:hover { background: var(--border); }
    .random-btn:active { transform: scale(0.95); }

    /* ─── Piano ───────────────────────────────────────── */
    .piano-wrap {
      flex-shrink: 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 6px 8px 8px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      -webkit-overflow-scrolling: touch;
    }

    .piano {
      display: flex;
      position: relative;
      height: 72px;
      width: max-content;
      margin: 0 auto;
      gap: 2px;
    }

    .key {
      position: relative;
      border-radius: 0 0 6px 6px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: filter 0.08s, transform 0.08s;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 4px;
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .key.white {
      width: 32px;
      height: 72px;
      border: 1px solid rgba(0,0,0,0.5);
      z-index: 1;
      color: rgba(0,0,0,0.5);
    }
    .key.black {
      width: 20px;
      height: 44px;
      margin-left: -10px;
      margin-right: -10px;
      z-index: 2;
      color: rgba(255,255,255,0.4);
    }
    .key:active, .key.pressed {
      filter: brightness(1.4);
      transform: scaleY(0.96);
    }

    .key[data-note="C4"]  { background: #ff4757; }
    .key[data-note="Cs4"] { background: #cc2233; }
    .key[data-note="D4"]  { background: #ff6b35; }
    .key[data-note="Ds4"] { background: #cc4410; }
    .key[data-note="E4"]  { background: #ffd32a; }
    .key[data-note="F4"]  { background: #2ed573; }
    .key[data-note="Fs4"] { background: #1aaa50; }
    .key[data-note="G4"]  { background: #1e90ff; }
    .key[data-note="Gs4"] { background: #0060cc; }
    .key[data-note="A4"]  { background: #7c3aed; }
    .key[data-note="As4"] { background: #5020bb; }
    .key[data-note="B4"]  { background: #ff6b81; }
    .key[data-note="C5"]  { background: #ff4757; }
    .key[data-note="Cs5"] { background: #cc2233; }
    .key[data-note="D5"]  { background: #ff6b35; }
    .key[data-note="Ds5"] { background: #cc4410; }
    .key[data-note="E5"]  { background: #ffd32a; }
  </style>

        <div class="wave-btns">
          <button class="wave-btn active" data-wave="sawtooth">SAW</button>
          <button class="wave-btn" data-wave="square">SQR</button>
          <button class="wave-btn" data-wave="triangle">TRI</button>

      </div>
      <div class="ctrl-group" style="flex:1">
        <div class="ctrl-label">Fx</div>
        <div class="wave-btns">

        </div>
      </div>

    <div class="controls-row">
      <div class="ctrl-group">
        <div class="ctrl-label">Filter</div>

          <span class="ctrl-value" id="filter-val">3k</span>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">Release</div>
        <div class="ctrl-slider">
          <input type="range" id="release-range" min="0.05" max="2" value="0.4" step="0.05">

      </div>

  <!-- Sequencer rows -->
  <div class="sequencer" id="sequencer">
    <div id="seq-rows" style="display:flex;flex-direction:column;gap:18px;width:100%"></div>
    <div class="row-mutes" id="row-mutes" aria-label="Mute rows"></div>
    <div class="hint" id="hint"></div>

  <!-- Transport -->
  <div class="transport">
    <div class="bpm-group">

<script>
// ─── Note utilities ────────────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTE_IDS   = ['C','Cs','D','Ds','E','F','Fs','G','Gs','A','As','B'];

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}
function midiToName(midi) {
  return NOTE_NAMES[midi % 12] + Math.floor(midi / 12 - 1);
}
function midiToId(midi) {
  return NOTE_IDS[midi % 12] + Math.floor(midi / 12 - 1);
}

const PITCH_COLORS = [
  '#ff4757','#cc2233','#ff6b35','#cc4410','#ffd32a',
  '#2ed573','#1aaa50','#1e90ff','#0060cc','#7c3aed','#5020bb','#ff6b81'
];
function noteColor(midi) { return PITCH_COLORS[midi % 12]; }

// ─── Synth ─────────────────────────────────────────────────────────────────
class Synth {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.delayNode = null;
    this.delayFeedback = null;
    this.delayWet = null;
    this.waveform = 'sawtooth';
    this.filterFreq = 3000;
    this.release = 0.4;
    this.delayOn = true;
    this.glideOn = false;
    this.lastMidi = null;
  }

  _init() {
    if (this.ctx) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();

    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.65;

    this.delayNode = this.ctx.createDelay(1.0);
    this.delayNode.delayTime.value = 0.25;
    this.delayFeedback = this.ctx.createGain();
    this.delayFeedback.gain.value = 0.35;
    this.delayWet = this.ctx.createGain();
    this.delayWet.gain.value = 0.45; // delay on by default

    this.delayNode.connect(this.delayFeedback);
    this.delayFeedback.connect(this.delayNode);
    this.delayNode.connect(this.delayWet);
    this.delayWet.connect(this.masterGain);
    this.masterGain.connect(this.ctx.destination);
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }

  play(midi, stepDur) {
    this._init();
    this.resume();

    const now = this.ctx.currentTime;
    const dur = stepDur || 0.25;
    const freq = midiToFreq(midi);

    const osc = this.ctx.createOscillator();
    const filter = this.ctx.createBiquadFilter();
    const env = this.ctx.createGain();

    osc.type = this.waveform;

    if (this.glideOn && this.lastMidi !== null) {
      osc.frequency.setValueAtTime(midiToFreq(this.lastMidi), now);
      osc.frequency.linearRampToValueAtTime(freq, now + Math.min(0.12, dur * 0.4));
    } else {
      osc.frequency.setValueAtTime(freq, now);
    }
    this.lastMidi = midi;

    filter.type = 'lowpass';
    filter.frequency.value = this.filterFreq;
    filter.Q.value = 3;

    const rel = Math.min(this.release, dur * 0.5);
    env.gain.setValueAtTime(0.001, now);
    env.gain.exponentialRampToValueAtTime(0.55, now + 0.01);
    const hold = Math.max(0.01, dur - rel);
    env.gain.setValueAtTime(0.55, now + hold);
    env.gain.exponentialRampToValueAtTime(0.001, now + dur);

    osc.connect(filter);
    filter.connect(env);
    env.connect(this.masterGain);
    if (this.delayOn) env.connect(this.delayNode);

    osc.start(now);
    osc.stop(now + dur + 0.05);
  }

  setDelay(on) {
    this.delayOn = on;
    if (this.delayWet) this.delayWet.gain.value = on ? 0.45 : 0;
  }
}

// ─── Default song data ("Aurora" — A minor pentatonic, 128 BPM) ───────────
function makeDefaultRows() {
  // Quarter notes: A4, C5, G4, E5 (all active, extend on)
  const quarterNotes = [69, 72, 67, 76];
  const quarterRow = {
    label: '1/4', division: 4,
    btnClass: 'step-btn-lg', barClass: 'extend-bar-lg',
    steps: quarterNotes.map(midi => ({ active: true, midi, chain: false }))
  };

  // 8th notes
  const eighthData = [
    { midi: 69, active: true  }, // A4
    { midi: 72, active: true  }, // C5
    { midi: 76, active: true  }, // E5
    { midi: 74, active: false }, // D5
    { midi: 72, active: true  }, // C5
    { midi: 69, active: true  }, // A4
    { midi: 67, active: true  }, // G4
    { midi: 76, active: true  }, // E5
  ];
  const eighthRow = {
    label: '1/8', division: 2,
    btnClass: 'step-btn-md', barClass: 'extend-bar-md',
    steps: eighthData.map(d => ({ ...d, chain: false }))
  };

  // 16th notes
  const sixteenthData = [
    { midi: 76, active: true  }, // E5
    { midi: 74, active: false }, // D5
    { midi: 76, active: true  }, // E5
    { midi: 72, active: true  }, // C5
    { midi: 69, active: true  }, // A4
    { midi: 72, active: true  }, // C5
    { midi: 74, active: true  }, // D5
    { midi: 76, active: false }, // E5
    { midi: 74, active: true  }, // D5
    { midi: 72, active: true  }, // C5
    { midi: 69, active: true  }, // A4
    { midi: 67, active: true  }, // G4
    { midi: 69, active: true  }, // A4
    { midi: 72, active: true  }, // C5
    { midi: 74, active: false }, // D5
    { midi: 76, active: true  }, // E5
  ];
  const sixteenthRow = {
    label: '1/16', division: 1,
    btnClass: 'step-btn-sm', barClass: 'extend-bar-sm',
    steps: sixteenthData.map(d => ({ ...d, chain: false }))
  };

  return [quarterRow, eighthRow, sixteenthRow];
}

// ─── Sequencer ────────────────────────────────────────────────────────────
class Sequencer {
  constructor(synth) {
    this.synth = synth;
    this.rows = makeDefaultRows();
    this.bpm = 128;
    this.tickCount = 0;
    this.rowCurrentStep = [-1, -1, -1];
    this.rowMuted = [false, false, false];
    this.playing = false;
    this._timeout = null;
    this.selectedStep = null; // { rowIndex, stepIndex } | null
    this.onStepChange = null;
  }

  sixteenthMs() { return (60 / this.bpm) * 1000 / 4; }

  start() {
    this.playing = true;
    this.tickCount = 0;
    this.rowCurrentStep = [-1, -1, -1];
    this._tick();
  }

  stop() {
    this.playing = false;
    clearTimeout(this._timeout);
    this.tickCount = 0;
    this.rowCurrentStep = [-1, -1, -1];
    this.onStepChange && this.onStepChange([-1, -1, -1]);
  }

  _tick() {
    if (!this.playing) return;
    this.rows.forEach((row, ri) => {
      if (this.tickCount % row.division === 0) {
        const idx = Math.floor(this.tickCount / row.division) % row.steps.length;
        this.rowCurrentStep[ri] = idx;
        const step = row.steps[idx];
        // Skip chained steps — covered by the previous note's extended duration
        if (!step.chain && step.active && !this.rowMuted[ri]) {
          // Count consecutive chained steps ahead to extend note duration
          let chainLen = 1;
          for (let k = 1; k < row.steps.length; k++) {
            const nextIdx = (idx + k) % row.steps.length;
            if (row.steps[nextIdx].chain) chainLen++;
            else break;
          }
          const stepDur = (this.sixteenthMs() * row.division) / 1000;
          this.synth.play(step.midi, stepDur * chainLen * 0.98);
        }
      }
    });
    this.onStepChange && this.onStepChange([...this.rowCurrentStep]);
    this.tickCount++;
    this._timeout = setTimeout(() => this._tick(), this.sixteenthMs());
  }

  randomize() {
    const scale = [60, 62, 64, 65, 67, 69, 71, 72, 74, 76];
    this.rows.forEach(row => {
      row.steps.forEach(s => {
        s.active = Math.random() > 0.25;
        s.midi = scale[Math.floor(Math.random() * scale.length)];
        s.chain = false;
      });
    });
  }
}

// ─── UI ────────────────────────────────────────────────────────────────────
const synth = new Synth();
const seq   = new Sequencer(synth);

// ─── Drag-to-chain state ───────────────────────────────────────────────────
const dragState = { active: false, rowIndex: null, fromStep: null, chainingOn: null };
let dragMoved = false;

function copyStepMidiFromTo(ri, fromSi, toSi) {
  if (fromSi === toSi) return;
  const row = seq.rows[ri];
  const srcMidi = row.steps[fromSi].midi;
  row.steps[toSi].midi = srcMidi;
  const btn = document.querySelector(`.step-btn[data-row="${ri}"][data-step="${toSi}"]`);
  const label = document.querySelector(`.step-note[data-row="${ri}"][data-step="${toSi}"]`);
  const c = noteColor(srcMidi);
  if (btn) {
    btn.style.background = c;
    btn.style.color = c;
  }
  if (label) label.textContent = midiToName(srcMidi);
}

function applyChainVisual(btn, step) {
  btn.classList.toggle('chained', !!step.chain);
  // Show chain icon or step number
  if (step.chain) {
    btn.innerHTML = '<span class="chain-icon">⛓</span>';
  } else {
    btn.textContent = parseInt(btn.dataset.step) + 1;
  }
  // Chain connector line (left edge of chained step)
  let connector = btn.parentElement.querySelector('.chain-connector');
  if (step.chain) {
    if (!connector) {
      connector = document.createElement('div');
      connector.className = 'chain-connector';
      btn.parentElement.appendChild(connector);
    }
  } else {
    connector?.remove();
  }
}

function setStepChain(ri, si, value) {
  const step = seq.rows[ri].steps[si];
  step.chain = value;
  const btn = document.querySelector(`.step-btn[data-row="${ri}"][data-step="${si}"]`);
  if (btn) applyChainVisual(btn, step);
}

document.addEventListener('pointermove', (e) => {
  if (!dragState.active) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  const target = el?.closest?.('.step-btn');
  if (!target) return;
  const rIdx = parseInt(target.dataset.row);
  const sIdx = parseInt(target.dataset.step);
  if (rIdx !== dragState.rowIndex) return;
  if (sIdx === dragState.fromStep) return;
  dragMoved = true;
  copyStepMidiFromTo(rIdx, dragState.fromStep, sIdx);
  setStepChain(rIdx, sIdx, dragState.chainingOn);
});

document.addEventListener('pointerup', () => {
  dragState.active = false;
});

function buildRows() {
  const container = document.getElementById('seq-rows');
  container.innerHTML = '';

  seq.rows.forEach((row, ri) => {
    // 1/16 row: split into two visual halves (steps 0–7 and 8–15)
    const halves = row.division === 1
      ? [[0, 7], [8, row.steps.length - 1]]
      : [[0, row.steps.length - 1]];

    halves.forEach(([from, to], halfIdx) => {
      const rowEl = document.createElement('div');
      rowEl.className = 'seq-row';

      const labelEl = document.createElement('div');
      labelEl.className = 'row-label';
      labelEl.textContent = halfIdx === 0 ? row.label : '';
      rowEl.appendChild(labelEl);

      const stepsContainer = document.createElement('div');
      stepsContainer.className = 'steps-container';

      for (let si = from; si <= to; si++) {
        const step = row.steps[si];

        const wrap = document.createElement('div');
        wrap.className = 'step-wrap';

        const btn = document.createElement('button');
        btn.className = `step-btn ${row.btnClass}`;
        btn.dataset.row = ri;
        btn.dataset.step = si;
        const c = noteColor(step.midi);
        btn.style.background = c;
        btn.style.color = c;
        if (!step.active) btn.classList.add('off');
        const sel = seq.selectedStep;
        if (sel && sel.rowIndex === ri && sel.stepIndex === si) btn.classList.add('selected');

        const noteLabel = document.createElement('div');
        noteLabel.className = 'step-note';
        noteLabel.dataset.row = ri;
        noteLabel.dataset.step = si;
        noteLabel.textContent = row.btnClass === 'step-btn-sm' ? '' : midiToName(step.midi);

        let pressTimer;
        btn.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          // Release implicit capture so pointermove can reach other elements
          btn.releasePointerCapture(e.pointerId);
          const rIdx = parseInt(btn.dataset.row);
          const sIdx = parseInt(btn.dataset.step);

          dragMoved = false;
          dragState.active = true;
          dragState.rowIndex = rIdx;
          dragState.fromStep = sIdx;
          // Toggle mode: if next step is chained, dragging will unchain; otherwise chain
          const nextSi = (sIdx + 1) % seq.rows[rIdx].steps.length;
          dragState.chainingOn = !seq.rows[rIdx].steps[nextSi].chain;

          pressTimer = setTimeout(() => {
            // Long press: toggle active
            seq.rows[rIdx].steps[sIdx].active = !seq.rows[rIdx].steps[sIdx].active;
            btn.classList.toggle('off', !seq.rows[rIdx].steps[sIdx].active);
          }, 500);
        });

        btn.addEventListener('pointerup', (e) => {
          clearTimeout(pressTimer);
          const rIdx = parseInt(btn.dataset.row);
          const sIdx = parseInt(btn.dataset.step);
          // No drag: toggle selection for note assignment
          if (!dragMoved && dragState.active && sIdx === dragState.fromStep) {
            const cur = seq.selectedStep;
            if (cur && cur.rowIndex === rIdx && cur.stepIndex === sIdx) {
              seq.selectedStep = null;
              btn.classList.remove('selected');
            } else {
              document.querySelectorAll('.step-btn').forEach(b => b.classList.remove('selected'));
              seq.selectedStep = { rowIndex: rIdx, stepIndex: sIdx };
              btn.classList.add('selected');
            }
            updateHint();
          }
        });
        btn.addEventListener('pointercancel', () => clearTimeout(pressTimer));

        wrap.appendChild(btn);
        wrap.appendChild(noteLabel);
        stepsContainer.appendChild(wrap);
        applyChainVisual(btn, step); // after append so btn.parentElement is valid
      }

      rowEl.appendChild(stepsContainer);
      container.appendChild(rowEl);
    });
  });
}

function buildRowMutes() {
  const el = document.getElementById('row-mutes');
  el.innerHTML = '';
  ['1/4', '1/8', '1/16'].forEach((label, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'row-mute-btn';
    btn.textContent = label;
    btn.classList.toggle('muted', seq.rowMuted[i]);
    btn.title = seq.rowMuted[i] ? 'Unmute row' : 'Mute row (audio only)';
    btn.addEventListener('click', () => {
      seq.rowMuted[i] = !seq.rowMuted[i];
      btn.classList.toggle('muted', seq.rowMuted[i]);
      btn.title = seq.rowMuted[i] ? 'Unmute row' : 'Mute row (audio only)';
    });
    el.appendChild(btn);
  });
}

function updateHint() {
  const hint = document.getElementById('hint');
  const sel = seq.selectedStep;
  if (sel !== null) {
    const rowLabel = seq.rows[sel.rowIndex].label;
    hint.innerHTML = `Row <span>${rowLabel}</span> step <span>${sel.stepIndex + 1}</span> — tap a key to assign note`;
  } else {
    hint.innerHTML = 'Tap to select · Long-press to toggle · Drag across steps to chain ⛓ · Drag copies pitch';
  }
}

// Step change callback
seq.onStepChange = (currentSteps) => {
  seq.rows.forEach((row, ri) => {
    row.steps.forEach((_, si) => {
      const btn = document.querySelector(`.step-btn[data-row="${ri}"][data-step="${si}"]`);
      if (btn) btn.classList.toggle('current', si === currentSteps[ri]);
    });
  });
};

// ─── Piano ─────────────────────────────────────────────────────────────────
const PIANO_KEYS = [
  {midi:60,id:'C4',  white:true,  label:'C4'},
  {midi:61,id:'Cs4', white:false, label:''},
  {midi:62,id:'D4',  white:true,  label:'D'},
  {midi:63,id:'Ds4', white:false, label:''},
  {midi:64,id:'E4',  white:true,  label:'E'},
  {midi:65,id:'F4',  white:true,  label:'F'},
  {midi:66,id:'Fs4', white:false, label:''},
  {midi:67,id:'G4',  white:true,  label:'G'},
  {midi:68,id:'Gs4', white:false, label:''},
  {midi:69,id:'A4',  white:true,  label:'A'},
  {midi:70,id:'As4', white:false, label:''},
  {midi:71,id:'B4',  white:true,  label:'B'},
  {midi:72,id:'C5',  white:true,  label:'C5'},
  {midi:73,id:'Cs5', white:false, label:''},
  {midi:74,id:'D5',  white:true,  label:'D'},
  {midi:75,id:'Ds5', white:false, label:''},
  {midi:76,id:'E5',  white:true,  label:'E'},
];

function buildPiano() {
  const piano = document.getElementById('piano');
  PIANO_KEYS.forEach(k => {
    const key = document.createElement('div');
    key.className = `key ${k.white ? 'white' : 'black'}`;
    key.dataset.note = k.id;
    key.dataset.midi = k.midi;
    key.textContent = k.label;

    const playKey = () => {
      synth.play(k.midi);
      const sel = seq.selectedStep;
      if (sel !== null) {
        const step = seq.rows[sel.rowIndex].steps[sel.stepIndex];
        step.midi = k.midi;
        // Update note label in DOM
        const label = document.querySelector(`.step-note[data-row="${sel.rowIndex}"][data-step="${sel.stepIndex}"]`);
        if (label && seq.rows[sel.rowIndex].btnClass !== 'step-btn-sm') {
          label.textContent = midiToName(k.midi);
        }
        // Update button color
        const btn = document.querySelector(`.step-btn[data-row="${sel.rowIndex}"][data-step="${sel.stepIndex}"]`);
        if (btn) {
          const c = noteColor(k.midi);
          btn.style.background = c;
          btn.style.color = c;
        }
        updateHint();
      }
      key.classList.add('pressed');
      setTimeout(() => key.classList.remove('pressed'), 150);
    };

    key.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      playKey();
    });

    piano.appendChild(key);
  });
}

// ─── Controls ──────────────────────────────────────────────────────────────
document.querySelectorAll('.wave-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.wave-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    synth.waveform = btn.dataset.wave;
  });
});

const filterRange = document.getElementById('filter-range');
const filterVal   = document.getElementById('filter-val');
filterRange.addEventListener('input', () => {
  const v = parseInt(filterRange.value);
  synth.filterFreq = v;
  filterVal.textContent = v >= 1000 ? (v/1000).toFixed(1).replace('.0','') + 'k' : v;
});

const releaseRange = document.getElementById('release-range');
const releaseVal   = document.getElementById('release-val');
releaseRange.addEventListener('input', () => {
  synth.release = parseFloat(releaseRange.value);
  releaseVal.textContent = synth.release.toFixed(2).replace(/0+$/,'').replace(/\.$/,'');
});

document.getElementById('delay-btn').addEventListener('click', function() {
  synth.delayOn = !synth.delayOn;
  synth.setDelay(synth.delayOn);
  this.classList.toggle('active', synth.delayOn);
});

document.getElementById('glide-btn').addEventListener('click', function() {
  synth.glideOn = !synth.glideOn;
  this.classList.toggle('active', synth.glideOn);
});

const bpmRange   = document.getElementById('bpm-range');
const bpmDisplay = document.getElementById('bpm-display');
bpmRange.addEventListener('input', () => {
  seq.bpm = parseInt(bpmRange.value);
  bpmDisplay.textContent = seq.bpm;
});

const playBtn = document.getElementById('play-btn');
playBtn.addEventListener('click', () => {
  if (seq.playing) {
    seq.stop();
    playBtn.textContent = '▶';
    playBtn.classList.remove('playing');
  } else {
    seq.start();
    playBtn.textContent = '■';
    playBtn.classList.add('playing');
  }
});

document.getElementById('random-btn').addEventListener('click', () => {
  seq.randomize();
  buildRows();
  updateHint();
});

// ─── PWA ───────────────────────────────────────────────────────────────────
let installPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  installPrompt = e;
  document.getElementById('install-btn').classList.add('visible');
});
document.getElementById('install-btn').addEventListener('click', async () => {
  if (!installPrompt) return;
  installPrompt.prompt();
  const { outcome } = await installPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('install-btn').classList.remove('visible');
    installPrompt = null;
  }
});

if ('serviceWorker' in navigator) {
  let hasRefreshedForUpdate = false;

  function showUpdateBanner(registration) {
    if (document.getElementById('sw-update-banner')) return;
    const banner = document.createElement('div');
    banner.id = 'sw-update-banner';
    banner.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:#1a1827', 'color:#e0e0ff', 'padding:12px 16px',
      'display:flex', 'align-items:center', 'justify-content:space-between',
      'z-index:9999', 'font-family:inherit', 'font-size:14px',
      'border-top:2px solid #7c3aed'
    ].join(';');
    banner.innerHTML = [
      '<span>A new version is available.</span>',
      '<button style="background:#7c3aed;color:#fff;border:none;padding:6px 14px;',
      'border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold">Refresh</button>'
    ].join('');
    banner.querySelector('button').addEventListener('click', () => {
      if (registration.waiting) {
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
    });
    document.body.appendChild(banner);
  }

  navigator.serviceWorker.register('/synth/sw.js', { scope: '/synth/' }).then(registration => {
    if (registration.waiting) {
      showUpdateBanner(registration);
    }

    registration.addEventListener('updatefound', () => {
      const newWorker = registration.installing;
      if (!newWorker) return;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          showUpdateBanner(registration);
        }
      });
    });

    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (hasRefreshedForUpdate) return;
      hasRefreshedForUpdate = true;
      window.location.reload();
    });

    window.addEventListener('focus', () => registration.update());
    setInterval(() => registration.update(), 60 * 60 * 1000);
  }).catch(() => {});
}

// ─── Init ──────────────────────────────────────────────────────────────────
buildRowMutes();
buildRows();
buildPiano();
updateHint();
</script>
</body>
</html>
