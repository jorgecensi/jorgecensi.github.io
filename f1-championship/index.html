---
layout: null
title: F1 Championship Dashboard
permalink: /f1-championship/
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="F1 Champ">
  <meta name="theme-color" content="#0c0a1a">
  <title>F1 Championship</title>
  <link rel="manifest" href="/f1-championship/manifest.json">
  <link rel="apple-touch-icon" href="/f1-championship/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/f1-championship/icons/icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0c0a1a;
      --surface:  #1a1825;
      --surface2: #221f35;
      --accent:   #6366f1;
      --accent2:  #818cf8;
      --text:     #f1f0ff;
      --muted:    #9ca3af;
      --border:   rgba(255,255,255,0.08);
      --bhover:   rgba(99,102,241,0.35);
      --gold:     #f59e0b;
      --silver:   #94a3b8;
      --bronze:   #cd7f32;
      --red:      #f43f5e;
      --green:    #10b981;
      --radius:   16px;
      --rsm:      10px;
      --ease:     0.2s ease;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ─── APP SHELL ─── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 700px;
      margin: 0 auto;
    }

    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .hdr-icon { font-size: 1.35rem; line-height: 1; }
    .hdr-title { flex: 1; font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em; }
    .hdr-badge {
      font-size: 0.68rem; font-weight: 600;
      padding: 0.18rem 0.5rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; color: var(--muted);
      cursor: pointer;
    }
    #btn-install-hdr {
      font-size: 0.72rem; padding: 0.28rem 0.65rem;
      background: var(--accent); color: #fff;
      border: none; border-radius: 20px; cursor: pointer;
      font-family: inherit; display: none;
    }
    #btn-install-hdr.show { display: block; }

    main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

    .view { display: none; padding: 1rem; padding-bottom: 2rem; }
    .view.active { display: block; }

    /* ─── TAB BAR ─── */
    #tab-bar {
      flex-shrink: 0;
      display: flex;
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    #tab-bar button {
      flex: 1; padding: 0.6rem 0.5rem;
      background: none; border: none; color: var(--muted);
      font-size: 0.68rem; font-family: inherit; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 0.15rem;
      transition: color var(--ease);
    }
    .tab-ico { font-size: 1.05rem; line-height: 1; }
    #tab-bar button.active { color: var(--accent); }

    /* ─── COMMON ─── */
    .sec-title {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted); margin: 1.25rem 0 0.55rem;
    }
    .sec-title:first-child { margin-top: 0; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .btn-primary {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--rsm); padding: 0.5rem 1rem;
      font-family: inherit; font-size: 0.85rem; font-weight: 600;
      cursor: pointer; transition: opacity var(--ease); white-space: nowrap;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-sec {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--rsm);
      padding: 0.5rem 1rem; font-family: inherit; font-size: 0.85rem;
      font-weight: 500; cursor: pointer; transition: border-color var(--ease);
      white-space: nowrap;
    }
    .btn-sec:hover { border-color: var(--bhover); }

    .btn-danger {
      background: rgba(244,63,94,0.1); color: var(--red);
      border: 1px solid rgba(244,63,94,0.2); border-radius: var(--rsm);
      padding: 0.5rem 1rem; font-family: inherit; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: background var(--ease);
      width: 100%;
    }
    .btn-danger:hover { background: rgba(244,63,94,0.2); }

    .input-field {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--rsm);
      color: var(--text); font-family: inherit; font-size: 0.88rem;
      padding: 0.5rem 0.75rem; outline: none;
      transition: border-color var(--ease);
    }
    .input-field:focus { border-color: var(--accent); }
    .input-field::placeholder { color: var(--muted); opacity: 0.6; }

    .player-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .driver-cell { display: flex; align-items: center; gap: 0.45rem; }

    /* ─── PROGRESS ─── */
    .progress-wrap { margin-bottom: 1.25rem; }
    .progress-lbl { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.3rem; }
    .progress-lbl span { color: var(--text); font-weight: 600; }
    .progress-bar { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 3px; transition: width 0.5s ease;
    }

    /* ─── PODIUM ─── */
    .podium {
      display: flex; align-items: flex-end;
      gap: 0.5rem; margin-bottom: 1.25rem;
    }
    .podium-card {
      flex: 1; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.85rem 0.5rem; text-align: center;
    }
    .podium-card.p1 {
      background: linear-gradient(180deg, rgba(245,158,11,0.12) 0%, var(--surface) 100%);
      border-color: rgba(245,158,11,0.28); order: 2;
      padding-top: 1.15rem; padding-bottom: 1.15rem;
    }
    .podium-card.p2 { order: 1; }
    .podium-card.p3 { order: 3; }
    .p-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      overflow: hidden; margin: 0 auto 0.3rem; flex-shrink: 0;
    }
    .avatar-letter {
      width: 100%; height: 100%; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff;
    }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 50%; }
    .avatar-edit { position: relative; cursor: pointer; border-radius: 50%; flex-shrink: 0; overflow: hidden; }
    .avatar-edit-overlay {
      position: absolute; inset: 0; background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; opacity: 0; transition: opacity var(--ease);
      border-radius: 50%;
    }
    .avatar-edit:hover .avatar-edit-overlay { opacity: 1; }
    .p-medal { font-size: 1rem; margin-bottom: 0.2rem; }
    .p-name { font-size: 0.72rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .p-pts { font-size: 0.98rem; font-weight: 700; color: var(--accent2); line-height: 1.3; }
    .p-pts span { font-size: 0.6rem; color: var(--muted); font-weight: 400; }
    .p-sub { font-size: 0.62rem; color: var(--muted); margin-top: 0.1rem; }

    /* ─── EMPTY STATE ─── */
    .empty {
      text-align: center; padding: 3rem 1rem; color: var(--muted);
    }
    .empty-ico { font-size: 3rem; margin-bottom: 0.75rem; }
    .empty p { font-size: 0.88rem; line-height: 1.7; }

    /* ─── STANDINGS TABLE ─── */
    .tbl-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; margin-bottom: 0.5rem;
    }
    .stbl { width: 100%; border-collapse: collapse; font-size: 0.87rem; }
    .stbl thead th {
      padding: 0.55rem 0.75rem; text-align: left;
      font-size: 0.67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .stbl tbody td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); }
    .stbl tbody tr:last-child td { border-bottom: none; }
    .stbl tbody tr:hover { background: rgba(255,255,255,0.025); }
    .td-pos { font-weight: 700; color: var(--accent2); width: 2rem; }
    .td-pts { text-align: right !important; }
    .td-c { text-align: center !important; }

    /* ─── RACE GRID ─── */
    .grid-scroll {
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .rgrid { border-collapse: collapse; white-space: nowrap; font-size: 0.73rem; }
    .rgrid th, .rgrid td {
      padding: 0.42rem 0.48rem; border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border); text-align: center;
    }
    .rgrid th { color: var(--muted); font-weight: 600; font-size: 0.75rem; background: var(--surface2); line-height: 1; }
    .rgrid tr:last-child td { border-bottom: none; }
    .rgrid td:last-child, .rgrid th:last-child { border-right: none; }
    .sticky-col { position: sticky; left: 0; background: var(--surface); z-index: 1; text-align: left !important; min-width: 88px; }
    .rgrid thead .sticky-col { background: var(--surface2); }
    .gc { color: var(--muted); }
    .gc.g1 { color: var(--gold); font-weight: 700; background: rgba(245,158,11,0.1); }
    .gc.g2 { color: var(--silver); font-weight: 600; background: rgba(148,163,184,0.08); }
    .gc.g3 { color: var(--bronze); font-weight: 600; background: rgba(205,127,50,0.08); }

    /* ─── CALENDAR ─── */
    .race-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .next-lbl {
      font-size: 0.63rem; font-weight: 700; color: var(--accent2);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.25rem;
      padding-left: 0.25rem;
    }
    .race-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--rsm); padding: 0.75rem 0.9rem;
      cursor: pointer; display: flex; align-items: center; gap: 0.65rem;
      transition: border-color var(--ease), background var(--ease);
    }
    .race-card:hover { border-color: var(--bhover); background: var(--surface2); }
    .race-card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .race-card.next-race {
      border-color: rgba(99,102,241,0.4);
      background: linear-gradient(135deg, rgba(99,102,241,0.07) 0%, var(--surface) 100%);
    }
    .rnd-badge {
      width: 30px; height: 30px; border-radius: var(--rsm);
      background: var(--surface2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.68rem; font-weight: 700; color: var(--muted);
    }
    .rnd-badge.done { background: rgba(99,102,241,0.15); color: var(--accent2); }
    .race-flag { flex-shrink: 0; border-radius: 3px; display: block; }
    .race-info { flex: 1; min-width: 0; }
    .race-name { font-size: 0.83rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .race-meta { font-size: 0.7rem; color: var(--muted); margin-top: 0.08rem; }
    .r-status {
      font-size: 0.62rem; font-weight: 700; padding: 0.18rem 0.45rem;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.04em;
      flex-shrink: 0;
    }
    .st-up   { background: rgba(255,255,255,0.05); color: var(--muted); }
    .st-done { background: rgba(16,185,129,0.12); color: var(--green); }
    .st-lock { background: rgba(99,102,241,0.12); color: var(--accent2); }

    /* ─── SETTINGS ─── */
    .set-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; }
    .set-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.75rem; }
    .player-row { display: flex; align-items: center; gap: 0.7rem; padding: 0.55rem 0; border-bottom: 1px solid var(--border); }
    .player-row:last-of-type { border-bottom: none; }
    .player-cdot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .player-rname { flex: 1; font-size: 0.87rem; }
    .btn-rm {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 0.95rem; padding: 0.2rem;
      line-height: 1; transition: color var(--ease);
    }
    .btn-rm:hover:not(:disabled) { color: var(--red); }
    .btn-rm:disabled { opacity: 0.3; cursor: not-allowed; }
    .add-form { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .set-row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; }
    .set-row .btn-sec { flex: 1; text-align: center; }

    /* ─── MODAL ─── */
    #modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: flex; align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #modal-overlay.hidden { display: none; }
    #race-modal {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 700px;
      max-height: 92dvh; overflow-y: auto;
      padding: 0 1.25rem calc(1.25rem + env(safe-area-inset-bottom, 0));
    }
    .modal-handle {
      width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0.75rem auto 1rem;
    }
    .modal-hdr {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding-bottom: 0.85rem; border-bottom: 1px solid var(--border);
      margin-bottom: 0.85rem;
    }
    .modal-flag { font-size: 1.75rem; line-height: 1; }
    .modal-rname { font-size: 0.97rem; font-weight: 700; }
    .modal-rmeta { font-size: 0.75rem; color: var(--muted); margin-top: 0.12rem; }
    .modal-rbadge {
      margin-left: auto; font-size: 0.68rem; font-weight: 700;
      color: var(--muted); background: var(--surface2);
      padding: 0.2rem 0.5rem; border-radius: 20px; white-space: nowrap;
    }
    .lock-msg {
      font-size: 0.77rem; color: var(--accent2); text-align: center;
      padding: 0.5rem; background: rgba(99,102,241,0.1);
      border-radius: var(--rsm); margin-bottom: 0.85rem;
    }
    .te-row {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.5rem 0; border-bottom: 1px solid var(--border);
    }
    .te-row:last-of-type { border-bottom: none; }
    .te-player { display: flex; align-items: center; gap: 0.45rem; min-width: 88px; flex-shrink: 0; }
    .te-pdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .te-pname { font-size: 0.85rem; font-weight: 600; }
    .time-input {
      flex: 1; background: var(--surface2);
      border: 1px solid var(--border); border-radius: var(--rsm);
      color: var(--text); font-family: 'DM Mono', 'Courier New', monospace;
      font-size: 0.92rem; padding: 0.48rem 0.7rem;
      outline: none; width: 100%;
      transition: border-color var(--ease);
    }
    .time-input:focus { border-color: var(--accent); }
    .time-input.err { border-color: var(--red); }
    .time-input::placeholder { color: var(--muted); opacity: 0.5; }
    .time-input[readonly] { opacity: 0.55; cursor: not-allowed; }

    #modal-preview {
      margin: 0.85rem 0 0.5rem;
      background: var(--surface2); border-radius: var(--rsm);
      padding: 0.75rem; min-height: 40px;
    }
    #modal-preview:empty { display: none; }
    .pv-title { font-size: 0.63rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 0.45rem; }
    .pv-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.22rem 0; font-size: 0.83rem; }
    .pv-pos { width: 1.4rem; flex-shrink: 0; font-size: 0.95rem; }
    .pv-name { flex: 1; font-weight: 600; }
    .pv-time { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); }
    .pv-pts { font-size: 0.78rem; font-weight: 700; color: var(--accent2); }

    .modal-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .modal-actions .btn-primary { flex: 1; }
    .modal-actions .btn-sec    { flex: 1; }

    @media (min-width: 600px) {
      #modal-overlay { align-items: center; padding: 1.5rem; }
      #race-modal { border-radius: 20px; max-height: 88dvh; }
    }

    /* ─── CONFIRM ─── */
    #confirm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 300; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    #confirm-overlay.hidden { display: none; }
    #confirm-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      max-width: 340px; width: 100%;
    }
    .cf-title { font-size: 0.97rem; font-weight: 700; margin-bottom: 0.5rem; }
    .cf-msg { font-size: 0.85rem; color: var(--muted); line-height: 1.65; margin-bottom: 1.25rem; }
    .cf-actions { display: flex; gap: 0.5rem; }
    .cf-actions button { flex: 1; }

    /* ─── CHAMPIONSHIP RACE ─── */
    #chase-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: #0a0814; display: flex;
    }
    #chase-overlay.hidden { display: none; }
    #chase-stage {
      flex: 1; display: flex; flex-direction: column;
      height: 100dvh; overflow: hidden;
      padding: env(safe-area-inset-top,0) env(safe-area-inset-right,0) env(safe-area-inset-bottom,0) env(safe-area-inset-left,0);
    }
    .chase-hud {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.7rem 0.9rem; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #chase-flag { font-size: 1.6rem; line-height: 1; }
    #chase-rname { font-size: 0.9rem; font-weight: 700; line-height: 1.2; }
    #chase-rmeta { font-size: 0.7rem; color: var(--muted); margin-top: 0.1rem; }
    #btn-chase-close {
      margin-left: auto; background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 50%;
      width: 34px; height: 34px; font-size: 1rem; cursor: pointer;
      flex-shrink: 0; line-height: 1;
    }
    #btn-chase-close:hover { border-color: var(--bhover); }
    .chase-main {
      flex: 1; position: relative; display: flex; gap: 0.6rem;
      padding: 0.6rem 0.9rem; min-height: 0;
    }
    #chase-svg {
      flex: 1; min-width: 0; height: 100%;
      background: radial-gradient(ellipse at center, #14112a 0%, #0a0814 78%);
      border-radius: var(--rsm);
    }
    .track-under { fill: none; stroke: #2a2740; stroke-width: 56; stroke-linejoin: round; stroke-linecap: round; }
    .track-edge  { fill: none; stroke: #3d3a5c; stroke-width: 62; stroke-linejoin: round; stroke-linecap: round; }
    .track-line  { fill: none; stroke: rgba(255,255,255,0.35); stroke-width: 2.5; stroke-dasharray: 10 14; }
    .chase-label {
      font: 700 11px 'Inter', system-ui, sans-serif;
      text-anchor: middle; paint-order: stroke;
      stroke: #0a0814; stroke-width: 3.5px; stroke-linejoin: round;
    }

    #chase-tower {
      position: relative; width: 152px; flex-shrink: 0;
      align-self: stretch;
    }
    .tw-row {
      position: absolute; left: 0; right: 0; height: 30px;
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0 0.45rem; border-radius: 8px;
      background: var(--surface); border: 1px solid var(--border);
      transform: translateY(calc((var(--rank, 1) - 1) * 32px));
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    .tw-pos { font-size: 0.72rem; font-weight: 700; color: var(--muted); width: 1.1rem; flex-shrink: 0; }
    .tw-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tw-name { font-size: 0.74rem; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tw-pts { font-family: 'DM Mono', monospace; font-size: 0.74rem; font-weight: 700; color: var(--accent2); flex-shrink: 0; }
    .tw-row.gained { animation: twFlash 0.7s ease; }
    @keyframes twFlash {
      0% { background: var(--accent); }
      100% { background: var(--surface); }
    }

    /* Countdown lights */
    #chase-lights {
      position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.5rem; z-index: 5; pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #chase-lights.hidden { display: none; }
    .light-pod {
      background: #0c0a16; border: 1px solid #2a2740; border-radius: 8px;
      padding: 6px; display: flex; flex-direction: column; gap: 5px;
    }
    .light-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: #1c1a2b; box-shadow: inset 0 0 4px rgba(0,0,0,0.6);
    }
    .light-pod.on .light-dot {
      background: #ff2d2d;
      box-shadow: 0 0 16px 3px rgba(255,45,45,0.65), inset 0 0 4px rgba(255,120,120,0.5);
    }
    @media (max-width: 520px) {
      .light-dot { width: 15px; height: 15px; }
    }

    /* Overtake callout */
    #chase-callout {
      position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff; font-size: 0.78rem; font-weight: 700;
      padding: 0.3rem 0.7rem; border-radius: 20px; z-index: 6; pointer-events: none;
      white-space: nowrap; box-shadow: 0 4px 14px rgba(99,102,241,0.5);
    }
    #chase-callout.hidden { display: none; }
    #chase-callout.show { animation: calloutPop 1.5s ease forwards; }
    @keyframes calloutPop {
      0% { opacity: 0; transform: translateX(-50%) translateY(8px) scale(0.8); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.05); }
      25% { transform: translateX(-50%) translateY(0) scale(1); }
      80% { opacity: 1; }
      100% { opacity: 0; transform: translateX(-50%) translateY(-6px) scale(1); }
    }

    /* Winner banner */
    #chase-winner {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.4rem;
      z-index: 7; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(10,8,20,0.55) 0%, rgba(10,8,20,0.15) 60%, transparent 100%);
    }
    #chase-winner.hidden { display: none; }
    .cw-trophy { font-size: 3rem; animation: winnerPop 0.6s cubic-bezier(.2,1.4,.4,1) both; }
    .cw-name { font-size: 1.5rem; font-weight: 800; color: var(--gold); text-shadow: 0 2px 12px rgba(245,158,11,0.5); animation: winnerPop 0.6s 0.1s cubic-bezier(.2,1.4,.4,1) both; }
    .cw-sub { font-size: 0.85rem; color: var(--text); font-weight: 600; animation: winnerPop 0.6s 0.2s cubic-bezier(.2,1.4,.4,1) both; }
    @keyframes winnerPop {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Controls */
    .chase-controls {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.6rem 0.9rem calc(0.6rem + env(safe-area-inset-bottom,0));
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .chase-btn {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 50%;
      width: 40px; height: 40px; font-size: 1rem; cursor: pointer;
      flex-shrink: 0; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    .chase-btn:hover { border-color: var(--bhover); }
    #chase-scrub {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 6px; border-radius: 3px; outline: none; cursor: pointer;
      background: linear-gradient(to right, var(--accent) var(--fill,0%), var(--surface2) var(--fill,0%));
    }
    #chase-scrub::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: 2px solid var(--accent); cursor: pointer;
    }
    #chase-scrub::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: #fff; border: 2px solid var(--accent); cursor: pointer;
    }
    #chase-round-lbl {
      font-family: 'DM Mono', monospace; font-size: 0.75rem;
      color: var(--muted); flex-shrink: 0; min-width: 3.2rem; text-align: right;
    }
    .chase-rotate-hint {
      position: absolute; top: 0.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.68rem; color: var(--muted); background: rgba(26,24,37,0.85);
      padding: 0.25rem 0.6rem; border-radius: 20px; z-index: 4; pointer-events: none;
      display: none;
    }
    @media (orientation: portrait) {
      .chase-main { flex-direction: column; }
      #chase-svg { flex: 1 1 auto; }
      #chase-tower {
        width: auto; flex: 0 0 auto; height: auto;
        display: flex; flex-wrap: wrap; align-content: flex-start;
        gap: 4px;
      }
      .tw-row {
        position: static; transform: none; order: var(--rank, 1);
        width: calc(50% - 2px); height: 28px; transition: none;
      }
      .chase-rotate-hint { display: block; }
    }

    /* Car picker (Settings) */
    .car-thumb {
      width: 58px; height: 26px; object-fit: contain;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer; flex-shrink: 0; padding: 2px;
    }
    .car-thumb.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .car-picker {
      display: flex; gap: 0.4rem; overflow-x: auto;
      padding: 0.5rem 0 0.6rem; -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid var(--border);
    }

    /* ─── INSTALL BANNER ─── */
    #install-banner {
      position: fixed;
      bottom: calc(62px + env(safe-area-inset-bottom, 0));
      left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.75rem 1rem;
      display: flex; align-items: center; gap: 0.75rem;
      max-width: 380px; width: calc(100% - 2rem);
      z-index: 150; box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    #install-banner.hidden { display: none; }
    .ib-text { flex: 1; font-size: 0.8rem; }
    #btn-install-now {
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--rsm); padding: 0.38rem 0.75rem;
      font-size: 0.78rem; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    #btn-install-dismiss {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 1rem; padding: 0.2rem; line-height: 1;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <span class="hdr-icon">🏎️</span>
    <div class="hdr-title">F1 Championship <span id="hdr-season">2026</span></div>
    <span class="hdr-badge" id="hdr-gv" title="Click Settings to change">F1 25</span>
    <button id="btn-install-hdr">Install</button>
  </header>

  <main>
    <section id="view-standings" class="view active" role="tabpanel"></section>
    <section id="view-calendar"  class="view"        role="tabpanel"></section>
    <section id="view-settings"  class="view"        role="tabpanel"></section>
  </main>

  <nav id="tab-bar" role="tablist">
    <button class="active" data-tab="standings" role="tab" aria-selected="true">
      <span class="tab-ico">🏆</span>Championship
    </button>
    <button data-tab="calendar" role="tab" aria-selected="false">
      <span class="tab-ico">📅</span>Calendar
    </button>
    <button data-tab="settings" role="tab" aria-selected="false">
      <span class="tab-ico">⚙️</span>Settings
    </button>
  </nav>
</div>

<!-- Race Entry Modal -->
<div id="modal-overlay" class="hidden" role="dialog" aria-modal="true" aria-label="Race entry">
  <div id="race-modal">
    <div class="modal-handle"></div>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Confirm Dialog -->
<div id="confirm-overlay" class="hidden" role="dialog" aria-modal="true">
  <div id="confirm-box">
    <div class="cf-title" id="cf-title"></div>
    <div class="cf-msg"   id="cf-msg"></div>
    <div class="cf-actions">
      <button class="btn-sec"    id="btn-cf-cancel">Cancel</button>
      <button class="btn-danger" id="btn-cf-ok">Confirm</button>
    </div>
  </div>
</div>

<!-- Championship Race -->
<div id="chase-overlay" class="hidden" role="dialog" aria-modal="true" aria-label="Championship race replay">
  <div id="chase-stage">
    <div class="chase-hud">
      <span id="chase-flag">🏁</span>
      <div>
        <div id="chase-rname">Championship Race</div>
        <div id="chase-rmeta">On the grid</div>
      </div>
      <button id="btn-chase-close" aria-label="Close">✕</button>
    </div>
    <div class="chase-main">
      <svg id="chase-svg" viewBox="0 0 1000 560" preserveAspectRatio="xMidYMid meet">
        <path id="chase-track-edge"  class="track-edge"/>
        <path id="chase-track-under" class="track-under"/>
        <path id="chase-track-line"  class="track-line"/>
        <g id="chase-startline"></g>
        <g id="chase-cars"></g>
        <g id="chase-labels"></g>
      </svg>
      <div id="chase-lights" class="hidden"></div>
      <div id="chase-callout" class="hidden"></div>
      <div id="chase-winner" class="hidden"></div>
      <div class="chase-rotate-hint">↻ Rotate for the full track</div>
      <div id="chase-tower"></div>
    </div>
    <div class="chase-controls">
      <button class="chase-btn" id="btn-chase-play" aria-label="Play or pause">⏸</button>
      <button class="chase-btn" id="btn-chase-replay" aria-label="Replay">↺</button>
      <input type="range" id="chase-scrub" min="0" max="1" value="0" step="1" aria-label="Scrub races">
      <span id="chase-round-lbl">R0</span>
    </div>
  </div>
</div>

<!-- Install Banner -->
<div id="install-banner" class="hidden">
  <span class="ib-text">Add F1 Championship to your home screen</span>
  <button id="btn-install-now">Install</button>
  <button id="btn-install-dismiss" aria-label="Dismiss">✕</button>
</div>

<script>
// ============================================================
// CONSTANTS
// ============================================================
const CALENDAR = [
  { round:1,  name:'Australian Grand Prix',     circuit:'Albert Park',                    flag:'🇦🇺', cc:'au', date:'2026-03-15' },
  { round:2,  name:'Chinese Grand Prix',         circuit:'Shanghai International Circuit', flag:'🇨🇳', cc:'cn', date:'2026-03-22' },
  { round:3,  name:'Japanese Grand Prix',        circuit:'Suzuka',                         flag:'🇯🇵', cc:'jp', date:'2026-04-05' },
  { round:4,  name:'Bahrain Grand Prix',         circuit:'Bahrain International Circuit',  flag:'🇧🇭', cc:'bh', date:'2026-04-19' },
  { round:5,  name:'Saudi Arabian Grand Prix',   circuit:'Jeddah Corniche Circuit',        flag:'🇸🇦', cc:'sa', date:'2026-05-03' },
  { round:6,  name:'Miami Grand Prix',           circuit:'Miami International Autodrome',  flag:'🇺🇸', cc:'us', date:'2026-05-10' },
  { round:7,  name:'Emilia Romagna Grand Prix',  circuit:'Imola',                          flag:'🇮🇹', cc:'it', date:'2026-05-24' },
  { round:8,  name:'Monaco Grand Prix',          circuit:'Circuit de Monaco',              flag:'🇲🇨', cc:'mc', date:'2026-05-31' },
  { round:9,  name:'Spanish Grand Prix',         circuit:'Barcelona-Catalunya',            flag:'🇪🇸', cc:'es', date:'2026-06-07' },
  { round:10, name:'Canadian Grand Prix',        circuit:'Circuit Gilles Villeneuve',      flag:'🇨🇦', cc:'ca', date:'2026-06-21' },
  { round:11, name:'Austrian Grand Prix',        circuit:'Red Bull Ring',                  flag:'🇦🇹', cc:'at', date:'2026-06-28' },
  { round:12, name:'British Grand Prix',         circuit:'Silverstone',                    flag:'🇬🇧', cc:'gb', date:'2026-07-05' },
  { round:13, name:'Belgian Grand Prix',         circuit:'Spa-Francorchamps',              flag:'🇧🇪', cc:'be', date:'2026-07-26' },
  { round:14, name:'Hungarian Grand Prix',       circuit:'Hungaroring',                    flag:'🇭🇺', cc:'hu', date:'2026-08-02' },
  { round:15, name:'Dutch Grand Prix',           circuit:'Zandvoort',                      flag:'🇳🇱', cc:'nl', date:'2026-08-30' },
  { round:16, name:'Italian Grand Prix',         circuit:'Monza',                          flag:'🇮🇹', cc:'it', date:'2026-09-06' },
  { round:17, name:'Azerbaijan Grand Prix',      circuit:'Baku City Circuit',              flag:'🇦🇿', cc:'az', date:'2026-09-20' },
  { round:18, name:'Singapore Grand Prix',       circuit:'Marina Bay Street Circuit',      flag:'🇸🇬', cc:'sg', date:'2026-10-04' },
  { round:19, name:'United States Grand Prix',   circuit:'Circuit of the Americas',        flag:'🇺🇸', cc:'us', date:'2026-10-18' },
  { round:20, name:'Mexico City Grand Prix',     circuit:'Autodromo Hermanos Rodriguez',   flag:'🇲🇽', cc:'mx', date:'2026-10-25' },
  { round:21, name:'São Paulo Grand Prix',       circuit:'Interlagos',                     flag:'🇧🇷', cc:'br', date:'2026-11-08' },
  { round:22, name:'Las Vegas Grand Prix',       circuit:'Las Vegas Strip Circuit',        flag:'🇺🇸', cc:'us', date:'2026-11-21' },
  { round:23, name:'Qatar Grand Prix',           circuit:'Lusail International Circuit',   flag:'🇶🇦', cc:'qa', date:'2026-11-29' },
  { round:24, name:'Abu Dhabi Grand Prix',       circuit:'Yas Marina Circuit',             flag:'🇦🇪', cc:'ae', date:'2026-12-06' },
];

const F1_POINTS    = [25, 18, 15, 12, 10, 8, 6, 4, 2, 1];
const PLR_COLORS   = ['#6366f1','#f43f5e','#10b981','#f59e0b','#3b82f6','#a855f7'];
const NS           = 'f1-championship';

// ============================================================
// STATE
// ============================================================
let players = [];
let results = {};
let config  = {};
let openCarPickerPid = null;

// Lowest car livery index (0-19) not yet used by another player.
function nextFreeCar() {
  const used = new Set(players.map(p => p.car).filter(c => c != null));
  for (let i = 0; i < 20; i++) if (!used.has(i)) return i;
  return players.length % 20;
}

// ============================================================
// STORAGE
// ============================================================
function load(key, fallback) {
  try { return JSON.parse(localStorage.getItem(`${NS}:${key}`)) ?? fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(`${NS}:${key}`, JSON.stringify(val)); }
  catch (e) { /* localStorage unavailable (private browsing / quota exceeded) */ }
}

// ============================================================
// SCORING ENGINE
// ============================================================
function parseTimeMs(str) {
  if (!str) return null;
  const m = str.trim().match(/^(\d+):(\d{2})\.(\d{3})$/);
  if (!m) return null;
  return parseInt(m[1]) * 60000 + parseInt(m[2]) * 1000 + parseInt(m[3]);
}

function getRaceRankings(roundKey) {
  const race = results[roundKey];
  if (!race || !race.entries) return [];
  const entries = [];
  for (const [pid, entry] of Object.entries(race.entries)) {
    if (entry.lapTimeMs != null) {
      const player = players.find(p => p.id === pid);
      if (player) entries.push({ player, lapTime: entry.lapTime, lapTimeMs: entry.lapTimeMs });
    }
  }
  entries.sort((a, b) => a.lapTimeMs - b.lapTimeMs);
  return entries.map((e, i) => ({ ...e, position: i + 1, points: F1_POINTS[i] ?? 0 }));
}

function getStandings() {
  const map = {};
  for (const p of players) map[p.id] = { player: p, points: 0, races: 0, wins: 0, positions: [] };
  for (const rk of Object.keys(results)) {
    for (const r of getRaceRankings(rk)) {
      if (!map[r.player.id]) continue;
      map[r.player.id].points += r.points;
      map[r.player.id].races  += 1;
      if (r.position === 1) map[r.player.id].wins += 1;
      map[r.player.id].positions.push(r.position);
    }
  }
  return Object.values(map).sort((a, b) => b.points !== a.points ? b.points - a.points : b.wins - a.wins);
}

function getPlayerRound(pid, rk) {
  const rank = getRaceRankings(rk).find(r => r.player.id === pid);
  return rank ? { points: rank.points, position: rank.position } : null;
}

// Build cumulative-per-round frames for the Championship Race replay.
// Returns [{round, race, points:{pid:cum}, gains:{pid:g}, pos:{pid:rank}}] with a
// synthetic starting-grid frame at index 0. length === 1 means no results yet.
function buildChampionshipFrames() {
  const cum = {}, wins = {};
  players.forEach(p => { cum[p.id] = 0; wins[p.id] = 0; });
  const orderOf = () => players
    .map((p, i) => ({ id: p.id, pts: cum[p.id], w: wins[p.id], i }))
    .sort((a, b) => b.pts - a.pts || b.w - a.w || a.i - b.i);
  const posMap = () => Object.fromEntries(orderOf().map((e, i) => [e.id, i + 1]));

  const frames = [{ round: 0, race: null, points: { ...cum }, gains: {}, pos: posMap() }];
  for (const race of CALENDAR) {
    const ranks = getRaceRankings(String(race.round));
    if (!ranks.length) continue;
    const gains = {};
    for (const r of ranks) {
      gains[r.player.id] = r.points;
      cum[r.player.id] += r.points;
      if (r.position === 1) wins[r.player.id] += 1;
    }
    frames.push({ round: race.round, race, points: { ...cum }, gains, pos: posMap() });
  }
  return frames;
}

function bestFinish(pos) {
  return pos.length ? 'P' + Math.min(...pos) : '—';
}

// ============================================================
// UTILITIES
// ============================================================
function fmtDate(ds) {
  const [y, m, d] = ds.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function nextRound() {
  for (const r of CALENDAR) if (!results[String(r.round)]) return r.round;
  return null;
}
function uid() { return Math.random().toString(36).slice(2, 10); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ============================================================
// AVATAR HELPERS
// ============================================================
function avatarInner(player, fontSize) {
  if (player.photo) return `<img class="avatar-img" src="${player.photo}" alt="${esc(player.name)}">`;
  return `<div class="avatar-letter" style="background:${esc(player.color)};font-size:${fontSize}px">${esc(player.avatar)}</div>`;
}

function avatarHtml(player, size = 36) {
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;flex-shrink:0">${avatarInner(player, Math.round(size * 0.38))}</div>`;
}

function avatarEditHtml(player, size = 42) {
  return `<div class="avatar-edit" data-pid="${player.id}" style="width:${size}px;height:${size}px" title="Tap to change photo">
    ${avatarInner(player, Math.round(size * 0.38))}
    <div class="avatar-edit-overlay">📷</div>
    <input type="file" class="avatar-file-input" data-pid="${player.id}" accept="image/*" style="display:none">
  </div>`;
}

function resizeImage(file, maxSize, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', 0.82));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('#tab-bar button').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
  document.getElementById(`view-${tab}`).classList.add('active');
  const btn = document.querySelector(`[data-tab="${tab}"]`);
  btn.classList.add('active');
  btn.setAttribute('aria-selected','true');
}

// ============================================================
// RENDER — STANDINGS
// ============================================================
function renderStandings() {
  const standings = getStandings();
  const done  = Object.keys(results).length;
  const total = CALENDAR.length;
  const pct   = (done / total * 100).toFixed(1);

  let h = `<div class="progress-wrap">
    <div class="progress-lbl"><span>${done}</span> of ${total} races completed</div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  </div>`;

  if (done === 0) {
    h += `<div class="empty">
      <div class="empty-ico">🏁</div>
      <p>No races recorded yet.<br>Open the Calendar tab to enter your first lap times!</p>
    </div>`;
  } else {
    // Podium — DOM order: P1, P2, P3. CSS order: P2 | P1 | P3 via order property.
    const top = standings.slice(0, Math.min(3, standings.length));
    const cls  = ['p1','p2','p3'];
    const med  = ['🥇','🥈','🥉'];
    h += '<div class="podium">';
    top.forEach((s, i) => {
      h += `<div class="podium-card ${cls[i]}">
        <div class="p-medal">${med[i]}</div>
        <div class="p-avatar">${avatarInner(s.player, 15)}</div>
        <div class="p-name">${esc(s.player.name)}</div>
        <div class="p-pts">${s.points} <span>pts</span></div>
        <div class="p-sub">${s.wins} win${s.wins !== 1 ? 's' : ''}</div>
      </div>`;
    });
    h += '</div>';

    // Championship Race replay
    h += '<button class="btn-primary" id="btn-open-chase" style="width:100%;margin:0 0 1.1rem">🏁 Championship Race</button>';

    // Standings table
    h += '<div class="sec-title">Driver Standings</div>';
    h += '<div class="tbl-wrap"><table class="stbl"><thead><tr><th>Pos</th><th>Driver</th><th>Pts</th><th class="td-c">Races</th><th class="td-c">Best</th></tr></thead><tbody>';
    standings.forEach((s, i) => {
      h += `<tr>
        <td class="td-pos">${i + 1}</td>
        <td><div class="driver-cell"><span class="player-dot" style="background:${esc(s.player.color)}"></span>${esc(s.player.name)}</div></td>
        <td class="td-pts"><strong>${s.points}</strong></td>
        <td class="td-c">${s.races}</td>
        <td class="td-c">${bestFinish(s.positions)}</td>
      </tr>`;
    });
    h += '</tbody></table></div>';

    // Race-by-race grid
    h += '<div class="sec-title">Race by Race</div>';
    h += '<div class="grid-scroll"><table class="rgrid"><thead><tr><th class="sticky-col">Driver</th>';
    CALENDAR.forEach(r => {
      const done = !!results[String(r.round)];
      h += `<th title="R${r.round} · ${r.name} · ${r.circuit}"><img src="https://flagcdn.com/w40/${r.cc}.png" alt="${r.flag}" width="20" height="15" style="display:block;border-radius:2px"></th>`;
    });
    h += '</tr></thead><tbody>';
    players.forEach(p => {
      h += `<tr><td class="sticky-col"><div class="driver-cell"><span class="player-dot" style="background:${esc(p.color)}"></span>${esc(p.name)}</div></td>`;
      CALENDAR.forEach(r => {
        const key  = String(r.round);
        const data = getPlayerRound(p.id, key);
        if (!data) { h += '<td class="gc">—</td>'; return; }
        const g = data.position === 1 ? 'g1' : data.position === 2 ? 'g2' : data.position === 3 ? 'g3' : '';
        h += `<td class="gc ${g}" title="P${data.position} · ${data.points}pts">${data.points}</td>`;
      });
      h += '</tr>';
    });
    h += '</tbody></table></div>';
  }

  document.getElementById('view-standings').innerHTML = h;
  document.getElementById('btn-open-chase')?.addEventListener('click', openChase);
}

// ============================================================
// RENDER — CALENDAR
// ============================================================
function renderCalendar() {
  const next = nextRound();
  let h = '<div class="race-list">';

  CALENDAR.forEach(race => {
    const key    = String(race.round);
    const res    = results[key];
    const locked = res?.locked === true;
    const done   = !!res;
    const isNext = race.round === next;

    const statusCls  = locked ? 'st-lock' : done ? 'st-done' : 'st-up';
    const statusText = locked ? '🔒 Locked' : done ? '✓ Done' : 'Upcoming';

    if (isNext) h += '<div class="next-lbl">▶ Next race</div>';
    h += `<div class="race-card${isNext ? ' next-race' : ''}" data-round="${race.round}" role="button" tabindex="0">
      <div class="rnd-badge${done ? ' done' : ''}">${race.round}</div>
      <img class="race-flag" src="https://flagcdn.com/w40/${race.cc}.png" alt="${race.flag}" width="28" height="21">
      <div class="race-info">
        <div class="race-name">${esc(race.name)}</div>
        <div class="race-meta">${race.circuit} · ${fmtDate(race.date)}</div>
      </div>
      <div class="r-status ${statusCls}">${statusText}</div>
    </div>`;
  });

  h += '</div>';
  document.getElementById('view-calendar').innerHTML = h;

  document.querySelectorAll('.race-card').forEach(card => {
    const open = () => openModal(parseInt(card.dataset.round));
    card.addEventListener('click', open);
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') open(); });
  });
}

  // Players

    </div>`;
    if (openCarPickerPid === p.id) {
      h += `<div class="car-picker" data-pid="${p.id}">`;

    }

  } else {
    h += '<p style="font-size:0.78rem;color:var(--muted);margin-top:0.6rem">Maximum 6 players reached.</p>';

  h += `<div class="set-card"><div class="set-title">Season</div>

    <div class="set-row">
      <button class="btn-sec" id="btn-export">⬇ Export</button>
      <label class="btn-sec" style="cursor:pointer;text-align:center">

    openCarPickerPid = openCarPickerPid === t.dataset.pickPid ? null : t.dataset.pickPid;
    renderSettings();
  }));
  document.querySelectorAll('.car-thumb[data-set-pid]').forEach(t => t.addEventListener('click', () => {

    if (p) { p.car = +t.dataset.car; save('players', players); }
    openCarPickerPid = null;
    renderSettings();
  }));
  document.querySelectorAll('.avatar-edit').forEach(wrap => {

function renderAll() {
  const gv = config.gameVersion || 'F1 25';
  document.getElementById('hdr-gv').textContent = gv;
  renderStandings();
  renderCalendar();
  renderSettings();
}

// ============================================================
// SETTINGS HANDLERS
// ============================================================
function addPlayer() {
  const inp = document.getElementById('inp-new-player');
  if (!inp) return;
  const name = inp.value.trim();
  if (!name || players.length >= 6) return;
  players.push({ id: uid(), name, color: PLR_COLORS[players.length % PLR_COLORS.length], avatar: name.charAt(0).toUpperCase(), car: nextFreeCar() });
  save('players', players);
  renderSettings();
  renderStandings();
  renderCalendar();
}

function removePlayer(pid) {
  const hasData = Object.values(results).some(r => r.entries?.[pid]);
  const doRemove = () => {
    players = players.filter(p => p.id !== pid);
    for (const k of Object.keys(results)) { if (results[k].entries) delete results[k].entries[pid]; }
    save('players', players);
    save('results', results);
    renderAll();
  };
  hasData ? confirm2('Remove Player', 'This player has recorded race times. Their data will be deleted.', doRemove) : doRemove();
}

function saveGV() {
  const inp = document.getElementById('inp-gv');
  if (!inp) return;
  config.gameVersion = inp.value.trim() || 'F1 25';
  save('config', config);
  document.getElementById('hdr-gv').textContent = config.gameVersion;
}

function exportData() {
  const blob = new Blob([JSON.stringify({ config, players, results }, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: `f1-championship-${new Date().toISOString().slice(0,10)}.json` });
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if (!d.players || !d.results) throw new Error('bad');
      confirm2('Import Data', 'Replace current data with this file?', () => {
        config  = d.config  || {};
        players = d.players;
        results = d.results;
        save('config', config);
        save('players', players);
        save('results', results);
        renderAll();
      });
    } catch { alert('Invalid backup file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ============================================================
// MODAL
// ============================================================
let activeRound = null;

function openModal(round) {
  activeRound = round;
  const race   = CALENDAR.find(r => r.round === round);
  const key    = String(round);
  const existing = results[key];
  const locked   = existing?.locked === true;

  let h = `<div class="modal-hdr">
    <div class="modal-flag">${race.flag}</div>
    <div>
      <div class="modal-rname">${esc(race.name)}</div>
      <div class="modal-rmeta">${race.circuit} · ${fmtDate(race.date)}</div>
    </div>
    <div class="modal-rbadge">Round ${round}</div>
  </div>`;

  if (locked) h += '<div class="lock-msg">🔒 This race is locked. Unlock to edit lap times.</div>';

  h += '<div id="te-entries">';
  players.forEach(p => {
    const val = existing?.entries?.[p.id]?.lapTime || '';
    h += `<div class="te-row">
      <div class="te-player">
        <span class="te-pdot" style="background:${esc(p.color)}"></span>
        <span class="te-pname">${esc(p.name)}</span>
      </div>
      <input type="text" class="time-input" data-pid="${p.id}"
        value="${esc(val)}" placeholder="1:23.456"
        ${locked ? 'readonly' : ''}
        inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>`;
  });
  h += '</div>';

  h += '<div id="modal-preview"></div>';
  h += '<div class="modal-actions">';
  if (!locked) {
    h += '<button class="btn-primary" id="btn-m-save">Save</button>';
    h += '<button class="btn-sec"     id="btn-m-cancel">Cancel</button>';
    if (existing) h += '<button class="btn-sec" id="btn-m-lock" style="flex:none">🔒 Lock</button>';
  } else {
    h += '<button class="btn-sec" id="btn-m-unlock" style="flex:1">🔓 Unlock</button>';
    h += '<button class="btn-sec" id="btn-m-cancel" style="flex:1">Close</button>';
  }
  h += '</div>';

  document.getElementById('modal-content').innerHTML = h;
  document.getElementById('modal-overlay').classList.remove('hidden');

  document.querySelectorAll('.time-input').forEach(inp => {
    inp.addEventListener('input', updatePreview);
    inp.addEventListener('blur',  validateTime);
  });
  document.getElementById('btn-m-save')?.addEventListener('click', saveModal);
  document.getElementById('btn-m-cancel')?.addEventListener('click', closeModal);
  document.getElementById('btn-m-lock')?.addEventListener('click', lockRace);
  document.getElementById('btn-m-unlock')?.addEventListener('click', unlockRace);

  updatePreview();

  if (!locked) {
    const first = document.querySelector('.time-input:not([readonly])');
    if (first && !first.value) setTimeout(() => first.focus(), 50);
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-content').innerHTML = '';
  activeRound = null;
}

function validateTime(e) {
  const v = e.target.value.trim();
  e.target.classList.toggle('err', v !== '' && parseTimeMs(v) === null);
}

function updatePreview() {
  const entries = [];
  document.querySelectorAll('.time-input').forEach(inp => {
    const ms = parseTimeMs(inp.value.trim());
    if (ms !== null) {
      const p = players.find(x => x.id === inp.dataset.pid);
      if (p) entries.push({ player: p, lapTime: inp.value.trim(), lapTimeMs: ms });
    }
  });
  entries.sort((a, b) => a.lapTimeMs - b.lapTimeMs);

  const el = document.getElementById('modal-preview');
  if (!el || entries.length === 0) { if (el) el.innerHTML = ''; return; }

  const med = ['🥇','🥈','🥉'];
  let h = '<div class="pv-title">Preview Rankings</div>';
  entries.forEach((e, i) => {
    h += `<div class="pv-row">
      <span class="pv-pos">${med[i] || 'P'+(i+1)}</span>
      <span class="pv-name" style="color:${esc(e.player.color)}">${esc(e.player.name)}</span>
      <span class="pv-time">${e.lapTime}</span>
      <span class="pv-pts">+${F1_POINTS[i] ?? 0} pts</span>
    </div>`;
  });
  el.innerHTML = h;
}

function saveModal() {
  let hasValid = false, hasErr = false;
  const entries = {};
  document.querySelectorAll('.time-input').forEach(inp => {
    const v  = inp.value.trim();
    const ms = parseTimeMs(v);
    if (v === '') return;
    if (ms === null) { hasErr = true; inp.classList.add('err'); return; }
    entries[inp.dataset.pid] = { lapTime: v, lapTimeMs: ms };
    hasValid = true;
  });
  if (hasErr) return;
  if (!hasValid) { closeModal(); return; }

  results[String(activeRound)] = { locked: false, entries };
  save('results', results);
  closeModal();
  renderAll();
}

function lockRace() {
  const k = String(activeRound);
  if (results[k]) { results[k].locked = true; save('results', results); closeModal(); renderAll(); }
}

function unlockRace() {
  const k = String(activeRound);
  if (results[k]) { results[k].locked = false; save('results', results); openModal(activeRound); }
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ============================================================
// CHAMPIONSHIP RACE (animated progression)
// ============================================================
const SVGNS = 'http://www.w3.org/2000/svg';
const XLINKNS = 'http://www.w3.org/1999/xlink';

// A hand-drawn closed circuit inside the 1000x560 viewBox. Path point 0 (the
// bottom straight) is the start/finish line and the direction of travel.
const TRACK_D = 'M 300 490 L 760 490 C 880 490 960 455 960 380 C 960 315 905 300 850 290 ' +
  'C 815 283 805 265 815 245 C 825 225 860 220 890 205 C 940 180 950 130 900 90 ' +
  'C 855 55 780 60 700 78 L 520 118 C 470 129 430 120 400 90 C 365 55 300 50 240 65 ' +
  'C 150 88 130 150 170 200 C 200 238 190 270 140 285 C 70 306 40 350 55 405 ' +
  'C 70 460 160 490 300 490 Z';

const CHASE = {
  ROUND_MS: 2600, LIGHT_MS: 600, FAST_LIGHT_MS: 340,
  LANE_W: 10, SWERVE_AMPL: 11, GRID_GAP: 26,
  CAR_LEN: 42, CAR_ASPECT: 0.4, SPRITE_HEADING: 0,
  LUT_N: 1400, STARTLINE_PAD: 30, FINISH_PAD: 8,
  CAM_MIN_W: 300, CAM_PAD: 62, CAM_LERP: 0.16, LABEL_DY: 20
};

const chase = {
  frames: [], seg: 0, u: 0, playing: false, raf: null, lastTs: 0,
  path: null, L: 0, lut: [], maxPts: 1, lastRound: 1, cars: [], timeouts: [], finished: false,
  cam: null
};

function lerp(a, b, t) { return a + (b - a) * t; }

function buildChaseLUT() {
  chase.lut = [];
  const N = CHASE.LUT_N, L = chase.L;
  for (let i = 0; i <= N; i++) {
    const pt = chase.path.getPointAtLength((i / N) * L);
    chase.lut.push({ x: pt.x, y: pt.y, angle: 0 });
  }
  for (let i = 0; i <= N; i++) {
    const a = chase.lut[Math.max(0, i - 1)], b = chase.lut[Math.min(N, i + 1)];
    chase.lut[i].angle = Math.atan2(b.y - a.y, b.x - a.x);
  }
}

function lutAt(d) {
  const L = chase.L;
  d = ((d % L) + L) % L;
  const N = CHASE.LUT_N;
  const f = (d / L) * N;
  const i = Math.floor(f), t = f - i;
  const a = chase.lut[i], b = chase.lut[Math.min(N, i + 1)];
  let da = b.angle - a.angle;
  if (da > Math.PI) da -= 2 * Math.PI;
  if (da < -Math.PI) da += 2 * Math.PI;
  return { x: lerp(a.x, b.x, t), y: lerp(a.y, b.y, t), angle: a.angle + da * t };
}

// Cumulative points -> distance along the track. The track spans the whole
// season: progress is scaled by how far through the calendar this round is, so
// the leader only reaches the finish line once the final race is entered.
function distOf(pts, roundNum) {
  const usable = chase.L - CHASE.STARTLINE_PAD - CHASE.FINISH_PAD;
  const seasonFrac = chase.lastRound ? Math.min(roundNum / chase.lastRound, 1) : 1;
  return CHASE.STARTLINE_PAD + (pts / chase.maxPts) * usable * seasonFrac;
}

// Cars launch from a staggered starting grid; the offset blends out over round 1.
function staggerFactor(seg, u) {
  if (seg <= 0) return 1;
  if (seg === 1) return 1 - u;
  return 0;
}

function laneOffsetOf(idx, n, pid, seg, u) {
  let lane = (idx - (n - 1) / 2) * CHASE.LANE_W;
  if (seg > 0) {
    const prev = chase.frames[seg - 1].pos[pid];
    const now = chase.frames[seg].pos[pid];
    if (now < prev) {
      const dir = lane <= 0 ? 1 : -1;
      lane += Math.sin(u * Math.PI) * CHASE.SWERVE_AMPL * dir;
    } else if (now > prev) {
      const dir = lane <= 0 ? -1 : 1;
      lane += Math.sin(u * Math.PI) * CHASE.SWERVE_AMPL * 0.4 * dir;
    }
  }
  return lane;
}

function placeCar(car, d, lateral) {
  const s = lutAt(d);
  const nx = -Math.sin(s.angle), ny = Math.cos(s.angle);
  const cx = s.x + nx * lateral, cy = s.y + ny * lateral;
  const deg = s.angle * 180 / Math.PI + CHASE.SPRITE_HEADING;
  const w = CHASE.CAR_LEN, h = CHASE.CAR_LEN * CHASE.CAR_ASPECT;
  car._x = cx; car._y = cy;
  car.el.setAttribute('transform',
    `translate(${cx.toFixed(1)} ${cy.toFixed(1)}) rotate(${deg.toFixed(1)}) translate(${-w/2} ${-h/2})`);
  car.label.setAttribute('x', cx.toFixed(1));
  car.label.setAttribute('y', (cy - CHASE.LABEL_DY).toFixed(1));
}

// Follow-camera: keep the pack framed and zoomed in (players stay close in
// points, so the whole track is never needed). Reads live element aspect so
// it fills in both orientations. snap=true jumps (open/scrub); else eases.
function updateCamera(snap) {
  if (!chase.cars.length) return;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  chase.cars.forEach(c => {
    minX = Math.min(minX, c._x); maxX = Math.max(maxX, c._x);
    minY = Math.min(minY, c._y); maxY = Math.max(maxY, c._y);
  });
  const svg = document.getElementById('chase-svg');
  const ar = (svg.clientWidth && svg.clientHeight) ? svg.clientWidth / svg.clientHeight : 1000 / 560;
  const pad = CHASE.CAM_PAD;
  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
  const spanW = (maxX - minX) + pad * 2, spanH = (maxY - minY) + pad * 2;
  let w = Math.max(spanW, spanH * ar, CHASE.CAM_MIN_W);
  w = Math.min(w, 1120);
  const h = w / ar;
  const target = { x: cx - w / 2, y: cy - h / 2, w, h };
  if (snap || !chase.cam) {
    chase.cam = target;
  } else {
    const s = CHASE.CAM_LERP;
    chase.cam.x += (target.x - chase.cam.x) * s;
    chase.cam.y += (target.y - chase.cam.y) * s;
    chase.cam.w += (target.w - chase.cam.w) * s;
    chase.cam.h += (target.h - chase.cam.h) * s;
  }
  const c = chase.cam;
  svg.setAttribute('viewBox', `${c.x.toFixed(1)} ${c.y.toFixed(1)} ${c.w.toFixed(1)} ${c.h.toFixed(1)}`);
}

function renderChaseFrame(seg, u, snap) {
  const n = chase.cars.length;
  const stag = staggerFactor(seg, u);
  chase.cars.forEach((car, i) => {
    const fPrev = chase.frames[Math.max(seg - 1, 0)];
    const fNext = chase.frames[seg];
    const dPrev = distOf(fPrev.points[car.pid], fPrev.round);
    const dNext = distOf(fNext.points[car.pid], fNext.round);
    // Linear interpolation keeps the cars moving at a steady speed between races
    // rather than easing to a stop at every race result.
    const d = lerp(dPrev, dNext, u) - i * CHASE.GRID_GAP * stag;
    const lat = laneOffsetOf(i, n, car.pid, seg, u);
    placeCar(car, d, lat);
    const pts = Math.round(lerp(fPrev.points[car.pid], fNext.points[car.pid], u));
    car.ptsEl.textContent = pts;
  });
  updateCamera(snap);
}

function updateChaseTower(seg) {
  const f = chase.frames[seg];
  chase.cars.forEach(car => {
    const rank = f.pos[car.pid];
    car.row.style.setProperty('--rank', rank);
    car.row.style.order = rank;
    car.posEl.textContent = rank;
  });
}

function setChaseHud(seg) {
  const f = chase.frames[seg];
  if (f.race) {
    document.getElementById('chase-flag').textContent = f.race.flag;
    document.getElementById('chase-rname').textContent = f.race.name;
    document.getElementById('chase-rmeta').textContent = `${f.race.circuit} · R${f.round}`;
  } else {
    document.getElementById('chase-flag').textContent = '🏁';
    document.getElementById('chase-rname').textContent = 'On the grid';
    document.getElementById('chase-rmeta').textContent = 'Lights out soon';
  }
  document.getElementById('chase-round-lbl').textContent = `R${f.round}`;
  const scrub = document.getElementById('chase-scrub');
  scrub.value = seg;
  scrub.style.setProperty('--fill', (chase.frames.length > 1 ? seg / (chase.frames.length - 1) * 100 : 0) + '%');
}

function flashGains(seg) {
  const f = chase.frames[seg];
  chase.cars.forEach(car => {
    if (f.gains[car.pid]) {
      car.row.classList.remove('gained');
      void car.row.offsetWidth;
      car.row.classList.add('gained');
    }
  });
  // Overtake callout for the biggest position climber this round.
  const prev = chase.frames[seg - 1];
  let best = null, bestGain = 0;
  chase.cars.forEach(car => {
    const climb = prev.pos[car.pid] - f.pos[car.pid];
    if (climb > bestGain) { bestGain = climb; best = { pid: car.pid, pos: f.pos[car.pid] }; }
  });
  if (best) {
    const p = players.find(x => x.id === best.pid);
    const el = document.getElementById('chase-callout');
    el.textContent = `${p ? p.name : ''} ▲ P${best.pos}`;
    el.classList.remove('hidden'); el.classList.remove('show');
    void el.offsetWidth; el.classList.add('show');
  }
}

function advanceSegment() {
  chase.seg += 1;
  chase.u = 0;
  setChaseHud(chase.seg);
  updateChaseTower(chase.seg);
  flashGains(chase.seg);
  if (chase.seg >= chase.frames.length - 1) finishChase();
}

function chaseTick(ts) {
  if (!chase.playing) return;
  if (!chase.lastTs) chase.lastTs = ts;
  const dt = ts - chase.lastTs;
  chase.lastTs = ts;
  chase.u += dt / CHASE.ROUND_MS;
  while (chase.u >= 1 && chase.seg < chase.frames.length - 1) {
    chase.u -= 1;
    advanceSegment();
  }
  if (chase.seg >= chase.frames.length - 1) {
    renderChaseFrame(chase.frames.length - 1, 1, false);
    chasePause();
    return;
  }
  renderChaseFrame(chase.seg + 1, chase.u, false);
  chase.raf = requestAnimationFrame(chaseTick);
}

function chasePlay() {
  if (chase.finished) return;
  chase.playing = true;
  chase.lastTs = 0;
  document.getElementById('btn-chase-play').textContent = '⏸';
  chase.raf = requestAnimationFrame(chaseTick);
}

function chasePause() {
  chase.playing = false;
  if (chase.raf) cancelAnimationFrame(chase.raf);
  chase.raf = null;
  document.getElementById('btn-chase-play').textContent = chase.finished ? '↺' : '▶';
}

function toggleChase() {
  if (chase.finished) { replayChase(); return; }
  chase.playing ? chasePause() : chasePlay();
}

function finishChase() {
  chase.finished = true;
  const f = chase.frames[chase.frames.length - 1];
  const winnerId = Object.keys(f.pos).find(id => f.pos[id] === 1);
  const p = players.find(x => x.id === winnerId);
  const seasonDone = f.round >= chase.lastRound;
  const title = seasonDone ? 'Champion' : 'Leader';
  const el = document.getElementById('chase-winner');
  el.innerHTML = `<div class="cw-trophy">${seasonDone ? '🏆' : '🏁'}</div>
    <div class="cw-name">${p ? esc(p.name) : title}</div>
    <div class="cw-sub">${f.points[winnerId] || 0} pts · ${title}</div>`;
  el.classList.remove('hidden');
  document.getElementById('btn-chase-play').textContent = '↺';
}

function chaseCountdown(fast) {
  const box = document.getElementById('chase-lights');
  box.innerHTML = '';
  box.classList.remove('hidden');
  const pods = [];
  for (let i = 0; i < 5; i++) {
    const pod = document.createElement('div');
    pod.className = 'light-pod';
    pod.innerHTML = '<div class="light-dot"></div><div class="light-dot"></div>';
    box.appendChild(pod);
    pods.push(pod);
  }
  const step = fast ? CHASE.FAST_LIGHT_MS : CHASE.LIGHT_MS;
  pods.forEach((pod, i) => {
    chase.timeouts.push(setTimeout(() => pod.classList.add('on'), step * (i + 1)));
  });
  const hold = step * 6 + 400 + Math.random() * 500;
  chase.timeouts.push(setTimeout(() => {
    pods.forEach(pod => pod.classList.remove('on'));
    box.classList.add('hidden');
    chasePlay();
  }, hold));
}

function replayChase() {
  clearChaseTimeouts();
  chasePause();
  chase.seg = 0;
  chase.u = 0;
  chase.finished = false;
  document.getElementById('chase-winner').classList.add('hidden');
  document.getElementById('chase-callout').classList.add('hidden');
  setChaseHud(0);
  updateChaseTower(0);
  chase.cam = null;
  renderChaseFrame(0, 0, true);
  chaseCountdown(true);
}

function clearChaseTimeouts() {
  chase.timeouts.forEach(t => clearTimeout(t));
  chase.timeouts = [];
}

function buildChaseCars() {
  const grp = document.getElementById('chase-cars');
  const labels = document.getElementById('chase-labels');
  const tower = document.getElementById('chase-tower');
  grp.innerHTML = '';
  labels.innerHTML = '';
  tower.innerHTML = '';
  chase.cars = [];
  players.forEach((p, i) => {
    const carN = String((p.car ?? 0) + 1).padStart(2, '0');
    const img = document.createElementNS(SVGNS, 'image');
    const href = `cars/car-${carN}.png`;
    img.setAttributeNS(XLINKNS, 'href', href);
    img.setAttribute('href', href);
    img.setAttribute('width', CHASE.CAR_LEN);
    img.setAttribute('height', CHASE.CAR_LEN * CHASE.CAR_ASPECT);
    img.setAttribute('preserveAspectRatio', 'xMidYMid meet');
    grp.appendChild(img);

    const label = document.createElementNS(SVGNS, 'text');
    label.setAttribute('class', 'chase-label');
    label.setAttribute('fill', p.color);
    label.textContent = p.name;
    labels.appendChild(label);

    const row = document.createElement('div');
    row.className = 'tw-row';
    row.innerHTML = `<span class="tw-pos"></span>
      <span class="tw-dot" style="background:${esc(p.color)}"></span>
      <span class="tw-name">${esc(p.name)}</span>
      <span class="tw-pts">0</span>`;
    tower.appendChild(row);

    chase.cars.push({
      pid: p.id, el: img, label, row,
      posEl: row.querySelector('.tw-pos'),
      ptsEl: row.querySelector('.tw-pts')
    });
  });
}

function buildStartLine() {
  const g = document.getElementById('chase-startline');
  g.innerHTML = '';
  const s = lutAt(2);
  const deg = s.angle * 180 / Math.PI;
  const cols = 2, rows = 11, sq = 5;
  let inner = '';
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      if ((r + c) % 2 === 0) {
        inner += `<rect x="${c * sq}" y="${-rows * sq / 2 + r * sq}" width="${sq}" height="${sq}" fill="#fff"/>`;
      }
    }
  }
  g.setAttribute('transform', `translate(${s.x} ${s.y}) rotate(${deg}) translate(-5 0)`);
  g.innerHTML = inner;
}

function openChase() {
  chase.frames = buildChampionshipFrames();
  if (chase.frames.length < 2) return;
  chase.finished = false;
  chase.seg = 0;
  chase.u = 0;
  chase.cam = null;

  const overlay = document.getElementById('chase-overlay');
  document.getElementById('chase-track-edge').setAttribute('d', TRACK_D);
  document.getElementById('chase-track-under').setAttribute('d', TRACK_D);
  document.getElementById('chase-track-line').setAttribute('d', TRACK_D);
  overlay.classList.remove('hidden');   // unhide before measuring geometry

  chase.path = document.getElementById('chase-track-under');
  chase.L = chase.path.getTotalLength();
  buildChaseLUT();
  const last = chase.frames[chase.frames.length - 1].points;
  chase.maxPts = Math.max(1, ...Object.values(last));
  chase.lastRound = CALENDAR[CALENDAR.length - 1].round;

  buildChaseCars();
  buildStartLine();
  const scrub = document.getElementById('chase-scrub');
  scrub.max = chase.frames.length - 1;

  document.getElementById('chase-winner').classList.add('hidden');
  document.getElementById('chase-callout').classList.add('hidden');
  setChaseHud(0);
  updateChaseTower(0);
  renderChaseFrame(0, 0, true);

  overlay.requestFullscreen?.().catch(() => {});
  try { screen.orientation?.lock?.('landscape').catch(() => {}); } catch (e) {}

  document.addEventListener('keydown', chaseKeyHandler);
  chaseCountdown(false);
}

function closeChase() {
  chasePause();
  clearChaseTimeouts();
  chase.finished = false;
  document.removeEventListener('keydown', chaseKeyHandler);
  try { screen.orientation?.unlock?.(); } catch (e) {}
  if (document.fullscreenElement) document.exitFullscreen?.().catch(() => {});
  document.getElementById('chase-cars').innerHTML = '';
  document.getElementById('chase-labels').innerHTML = '';
  document.getElementById('chase-tower').innerHTML = '';
  document.getElementById('chase-lights').innerHTML = '';
  document.getElementById('chase-overlay').classList.add('hidden');
}

function chaseKeyHandler(e) { if (e.key === 'Escape') closeChase(); }

function scrubChase(v) {
  chasePause();
  clearChaseTimeouts();
  document.getElementById('chase-lights').classList.add('hidden');
  chase.seg = Math.min(v, chase.frames.length - 1);
  chase.u = 0;
  chase.finished = chase.seg >= chase.frames.length - 1;
  document.getElementById('chase-winner').classList.toggle('hidden', !chase.finished);
  if (chase.finished) finishChase();
  else document.getElementById('btn-chase-play').textContent = '▶';
  setChaseHud(chase.seg);
  updateChaseTower(chase.seg);
  renderChaseFrame(chase.seg, 1, true);
}

document.getElementById('btn-chase-close').addEventListener('click', closeChase);
document.getElementById('btn-chase-play').addEventListener('click', toggleChase);
document.getElementById('btn-chase-replay').addEventListener('click', replayChase);
document.getElementById('chase-scrub').addEventListener('input', e => scrubChase(+e.target.value));
document.getElementById('chase-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('chase-overlay')) closeChase();
});

  document.getElementById('cf-title').textContent = title;

document.getElementById('btn-cf-cancel').addEventListener('click', () => {

let installEvt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  installEvt = e;
  if (!load('install-dismissed', false)) {
    document.getElementById('install-banner').classList.remove('hidden');
    document.getElementById('btn-install-hdr').classList.add('show');
  }
});

function doInstall() {
  if (!installEvt) return;
  installEvt.prompt();
  installEvt.userChoice.then(() => {
    installEvt = null;
    document.getElementById('install-banner').classList.add('hidden');
    document.getElementById('btn-install-hdr').classList.remove('show');
  });
}

document.getElementById('btn-install-hdr').addEventListener('click', doInstall);
document.getElementById('btn-install-now').addEventListener('click', doInstall);
document.getElementById('btn-install-dismiss').addEventListener('click', () => {
  document.getElementById('install-banner').classList.add('hidden');
  save('install-dismissed', true);
});

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  config  = load('config',  { season: 2026, gameVersion: 'F1 25' });
  players = load('players', []);
  results = load('results', {});

  if (players.length === 0) {
    players = [
      { id: uid(), name: 'Player 1', color: PLR_COLORS[0], avatar: 'P', car: 0 },
      { id: uid(), name: 'Player 2', color: PLR_COLORS[1], avatar: 'P', car: 1 },
    ];
    save('players', players);
  }

  // Backfill car liveries for players saved before the Championship Race feature.
  let migrated = false;
  players.forEach((p, i) => { if (p.car == null) { p.car = i % 20; migrated = true; } });
  if (migrated) save('players', players);

  if ('serviceWorker' in navigator) {
    const SW_VERSION = '2607181241';
    let hasRefreshedForUpdate = false;

    function showUpdateBanner(registration) {
      if (document.getElementById('sw-update-banner')) return;
      const banner = document.createElement('div');
      banner.id = 'sw-update-banner';
      banner.style.cssText = [
        'position:fixed', 'bottom:0', 'left:0', 'right:0',
        'background:#1a1827', 'color:#fff', 'padding:12px 16px',
        'display:flex', 'align-items:center', 'justify-content:space-between',
        'z-index:9999', 'font-family:inherit', 'font-size:14px',
        'border-top:2px solid #6366f1'
      ].join(';');
      banner.innerHTML = [
        '<span>A new version is available.</span>',
        '<button style="background:#6366f1;color:#fff;border:none;padding:6px 14px;',
        'border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold">Refresh</button>'
      ].join('');
      banner.querySelector('button').addEventListener('click', () => {
        if (registration.waiting) {
          registration.waiting.postMessage({ type: 'SKIP_WAITING' });
        }
      });
      document.body.appendChild(banner);
    }

    navigator.serviceWorker.register(`/f1-championship/sw.js?v=${encodeURIComponent(SW_VERSION)}`).then(registration => {
      if (registration.waiting) {
        showUpdateBanner(registration);
      }

      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner(registration);
          }
        });
      });

      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (hasRefreshedForUpdate) return;
        hasRefreshedForUpdate = true;
        window.location.reload();
      });

      window.addEventListener('focus', () => registration.update());
      setInterval(() => registration.update(), 60 * 60 * 1000);
    }).catch(() => {});
  }

  renderAll();
});
</script>
