  <meta name="theme-color" content="#080d16"/>
  <meta name="description" content="Interactive FIFA World Cup 2026 scorecard — track all 48 teams, group standings, knockout bracket with penalties, and live stats. All times in your local timezone."/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="WC 2026"/>
  <title>FIFA World Cup 2026</title>
  <link rel="manifest" href="/worldcup-2026/manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/worldcup-2026/icons/icon-192.png"/>
  <link rel="apple-touch-icon" href="/worldcup-2026/icons/icon-192.png"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #080d16; }
    #root { min-height: 100%; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    @keyframes penStripIn {
      0%   { opacity: 0; transform: translateY(-6px) scale(0.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes penGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(167,139,250,0.0), inset 0 0 0 0 rgba(167,139,250,0.0); }
      50%      { box-shadow: 0 0 22px 4px rgba(167,139,250,0.32), inset 0 0 14px 0 rgba(167,139,250,0.08); }
    }
    @keyframes penGoal {
      0%   { transform: scale(0.35) rotate(-18deg); opacity: 0; }
      55%  { transform: scale(1.35) rotate(6deg); }
      75%  { transform: scale(0.92) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes flashOverlayIn {
      0%   { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes flashBounce {
      0%   { transform: scale(0.4) translateY(24px); opacity: 0; }
      60%  { transform: scale(1.08) translateY(-4px); opacity: 1; }
      80%  { transform: scale(0.96) translateY(0); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes confettiDrop {
      0%   { transform: translateY(-20px) rotate(0deg) scaleX(1); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg) scaleX(0.6); opacity: 0; }
    }
    @keyframes shareModalIn {
      0%   { opacity: 0; transform: translateY(20px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes collapsedPulse {
      0%   { box-shadow: 0 0 0 0 rgba(0,208,132,0); border-color: rgba(255,255,255,0.08); }
      30%  { box-shadow: 0 0 0 5px rgba(0,208,132,0.18); border-color: rgba(0,208,132,0.5); }
      100% { box-shadow: 0 0 0 0 rgba(0,208,132,0); border-color: rgba(255,255,255,0.08); }
    }
    /* ── First-place celebration ──────────────────────────────────────────── */
    @keyframes fpRaysSpin { to { transform: rotate(360deg); } }
    @keyframes fpTrophyPop {
      0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
      45%  { transform: scale(1.35) rotate(10deg); opacity: 1; }
      65%  { transform: scale(0.88) rotate(-6deg); }
      82%  { transform: scale(1.08) rotate(3deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes fpTrophyFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-9px); }
    }
    @keyframes fpCrownDrop {
      0%   { transform: translate(-50%,-220%) scale(0.4) rotate(-25deg); opacity: 0; }
      60%  { opacity: 1; }
      75%  { transform: translate(-50%,-86%) scale(1.15) rotate(8deg); }
      100% { transform: translate(-50%,-92%) scale(1) rotate(-6deg); opacity: 1; }
    }
    @keyframes fpRingPulse {
      0%   { transform: scale(0.5); opacity: 0.9; }
      100% { transform: scale(2.6); opacity: 0; }
    }
    @keyframes fpTitleIn {
      0%   { transform: translateY(18px) scale(0.85); opacity: 0; letter-spacing: 8px; }
      100% { transform: translateY(0) scale(1); opacity: 1; letter-spacing: 2px; }
    }
    @keyframes fpTitleGlow {
      0%, 100% { text-shadow: 0 0 14px rgba(255,215,0,0.55), 0 0 4px rgba(255,215,0,0.4); }
      50%      { text-shadow: 0 0 34px rgba(255,215,0,0.95), 0 0 10px rgba(255,215,0,0.7); }
    }
    @keyframes fpSparkle {
      0%, 100% { transform: scale(0.4) rotate(0deg); opacity: 0; }
      50%      { transform: scale(1.1) rotate(25deg); opacity: 1; }
    }
    @keyframes fpSubIn {
      0%   { transform: translateY(10px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
  </style>

const LangContext = React.createContext(null);

function LangProvider({ children }) {
  const [lang, setLang] = React.useState(() => {
    try {
      const stored = localStorage.getItem('wc2026:lang');
      if (stored) return stored;
    } catch(e) {}
    return navigator.language.startsWith('pt') ? 'pt-BR' : 'en';
  });
  const t = (key) => (TRANSLATIONS[lang]?.[key] ?? TRANSLATIONS['en'][key] ?? key);
  const toggle = () => {
    const next = lang === 'en' ? 'pt-BR' : 'en';
    setLang(next);
    try { localStorage.setItem('wc2026:lang', next); } catch(e) {}
  };
  return (
    <LangContext.Provider value={{ lang, t, toggle }}>
      {children}
    </LangContext.Provider>
  );
}

function useLang() { return React.useContext(LangContext); }

// Country flags are rendered as native emoji rather than from an external image
// CDN, so they display correctly on phones AND keep working offline (this app is
// an installable PWA). Regional flags (England/Scotland) use ISO tag sequences.
const EMOJI_FONT = '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
function subdivisionFlag(tags){
  return "\u{1F3F4}" + [...tags].map(c=>String.fromCodePoint(0xE0000 + c.charCodeAt(0))).join("") + "\u{E007F}";
}
const FLAG_EMOJI = { "gb-eng": subdivisionFlag("gbeng"), "gb-sct": subdivisionFlag("gbsct") };
function ccToFlagEmoji(cc){
  if (FLAG_EMOJI[cc]) return FLAG_EMOJI[cc];
  return cc.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
}

// Not every platform renders flag emoji as flags — desktop Windows (Segoe UI
// Emoji) only has full-colour art for a handful of flags (e.g. the US) and
// falls back to the plain two-letter country code for the rest. A canvas
// probe for a single flag (🇺🇸) therefore reports "supported" on Windows even
// though most other flags still render as letters. Since support is this
// inconsistent, treat Windows as unsupported across the board and use flag
// images there instead (Windows desktops are effectively always online, so
// the offline-PWA concern doesn't apply).
let _flagEmojiSupport;
function supportsFlagEmoji(){
  if (_flagEmojiSupport !== undefined) return _flagEmojiSupport;
  const ua = (typeof navigator !== "undefined" && (navigator.userAgent || navigator.platform)) || "";
  _flagEmojiSupport = !/Windows/i.test(ua);
  return _flagEmojiSupport;
}

        flexShrink:0, verticalAlign:"middle", opacity: faded ? 0.45 : 1,
        fontFamily: EMOJI_FONT, ...style

    );
  }
  // Fallback for platforms that don't render flag emoji (e.g. desktop Windows).

  const h = Math.round(size * 0.75);

      width={size}
      height={h}

  );
}

// Sortable date key for chronological ordering
function dateKey(d) {
  const months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  const parts = d.split(" "); // e.g. "Fri 12 Jun"
  return months[parts[2]] * 100 + parseInt(parts[1]);
}
function timeKey(t) {
  // "5:00 AM" -> sortable int
  const [hm, ap] = t.split(" ");
  let [h, m] = hm.split(":").map(Number);
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  return h * 60 + m;
}
// Convert AEST match date+time strings to a UTC Date object (AEST = UTC+10)
const MONTHS_PARSE = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function matchToUTC(date, time) {
  const parts = date.split(" ");
  const day = parseInt(parts[1]);
  const month = MONTHS_PARSE[parts[2]];
  const [hm, ap] = time.split(" ");
  let [h, m] = hm.split(":").map(Number);
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  return new Date(Date.UTC(2026, month, day, h - 10, m));
}
// dateKey()/dk values are derived from the AEST-labeled date strings above, so
// "today" must be expressed in that same AEST reference frame (UTC+10) to stay
// comparable — otherwise sections keep being flagged as "now" for up to a day
// after every match in them has already kicked off.
function todayDk() {
  const aest = new Date(Date.now() + 10 * 60 * 60 * 1000);
  return (aest.getUTCMonth() + 1) * 100 + aest.getUTCDate();
}
function tomorrowDk() {
  const aest = new Date(Date.now() + 10 * 60 * 60 * 1000 + 24 * 60 * 60 * 1000);
  return (aest.getUTCMonth() + 1) * 100 + aest.getUTCDate();
}

function generateGroupMatches(groups) {
  const all = {};
  Object.entries(groups).forEach(([g, teams]) => {
    all[g] = GROUP_SCHEDULE[g].map(([hi,ai,date,time,city],idx) => ({
      id:`${g}-${idx}`, group:g,
      home:teams[hi], away:teams[ai],
      homeScore:null, awayScore:null,
      date, time, city,
      dk: dateKey(date), tk: timeKey(time),
    }));
  });
  return all;
}

function mkKOMatch(id, schedIdx, round) {
  const s = KO_SCHEDULE[round]?.[schedIdx];
  const date = s?.[0]||"TBD";
  return { id, teamA:null, teamB:null, scoreA:null, scoreB:null, penA:null, penB:null,
    date, time:s?.[1]||"TBD", city:s?.[2]||"TBD", dk:s?.[0]?dateKey(s[0]):0 };
}
function initKO() {
  return {
    r32: R32_BRACKET.map((b,i)=>({...mkKOMatch(b.id,i,"r32"),slotA:b.slotA,slotB:b.slotB,thirdB:b.thirdB})),
    r16: Array.from({length:8},(_,i)=>mkKOMatch(`r16-${i}`,i,"r16")),
    qf:  Array.from({length:4},(_,i)=>mkKOMatch(`qf-${i}`,i,"qf")),
    sf:  Array.from({length:2},(_,i)=>mkKOMatch(`sf-${i}`,i,"sf")),
    final:[mkKOMatch("final",0,"final")],
    third:[mkKOMatch("third",0,"third")],
  };
}

// ─── Persistence ───────────────────────────────────────────────────────────────
// User-entered scores are saved to localStorage so they survive page reloads and
// app restarts (this is an installable PWA). Only the score values are stored —
// keyed by stable match id — and merged back into a freshly generated schedule on
// load, so changes to the fixtures/bracket data don't break old saved scores.
const STORAGE_KEY = "wc2026:scores:v1";
// Timestamp (ISO string) of the scores.json snapshot we last applied, shown
// next to the refresh button. Cached so the label appears immediately on load.
const UPDATED_KEY = "wc2026:scores:updated";

// Format the scores.json "updated" ISO timestamp into a short, locale-aware
// label like "Jun 21, 21:17". Returns null for missing/invalid input.
function formatUpdated(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  if (isNaN(d.getTime())) return null;
  return d.toLocaleString(undefined, {
    month: "short", day: "numeric", hour: "2-digit", minute: "2-digit",
  });
}

function loadStoredScores() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function buildInitialGroupMatches() {
  const gm = generateGroupMatches(GROUPS);
  const stored = loadStoredScores();
  if (stored && stored.group) {
    Object.values(gm).forEach(matches => matches.forEach(m => {
      const s = stored.group[m.id];
      if (s) {
        if (s.homeScore !== undefined) m.homeScore = s.homeScore;
        if (s.awayScore !== undefined) m.awayScore = s.awayScore;
      }
    }));
  }
  return gm;
}

function buildInitialKO() {
  const ko = initKO();
  const stored = loadStoredScores();
  if (stored && stored.ko) {
    Object.values(ko).forEach(matches => matches.forEach(m => {
      const s = stored.ko[m.id];
      if (s) {
        ["scoreA", "scoreB", "penA", "penB"].forEach(f => {
          if (s[f] !== undefined) m[f] = s[f];
        });
      }
    }));
  }
  return ko;
}

function buildScoresPayload(groupMatches, ko) {
  const group = {};
  Object.values(groupMatches).flat().forEach(m => {
    if (m.homeScore !== null || m.awayScore !== null) {
      group[m.id] = { homeScore: m.homeScore, awayScore: m.awayScore };
    }
  });
  const koScores = {};
  [...ko.r32, ...ko.r16, ...ko.qf, ...ko.sf, ...ko.final, ...ko.third].forEach(m => {
    if (m.scoreA !== null || m.scoreB !== null || m.penA !== null || m.penB !== null) {
      koScores[m.id] = { scoreA: m.scoreA, scoreB: m.scoreB, penA: m.penA, penB: m.penB };
    }
  });
  return { group, ko: koScores };
}

function saveScores(groupMatches, ko) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(buildScoresPayload(groupMatches, ko)));
  } catch (e) { /* storage unavailable (e.g. private mode) — fail silently */ }
}

// ─── Bolão (score-guessing predictions) ──────────────────────────────────────
const PRED_KEY = "wc2026:predictions:v1";

function loadPredictions() {
  try {
    const raw = localStorage.getItem(PRED_KEY);
    return raw ? JSON.parse(raw) : { group: {}, ko: {} };
  } catch(e) { return { group: {}, ko: {} }; }
}

function savePredictions(predictions) {
  try { localStorage.setItem(PRED_KEY, JSON.stringify(predictions)); } catch(e) {}
}

// Returns 3 (exact), 1 (correct result), 0 (wrong), or null (actuals not in yet)
function scorePrediction(predH, predA, actualH, actualA) {
  if (predH === null || predA === null || actualH === null || actualA === null) return null;
  const pH=+predH, pA=+predA, aH=+actualH, aA=+actualA;
  if (pH === aH && pA === aA) return 3;
  const predOut = pH > pA ? 1 : pA > pH ? -1 : 0;
  const actOut  = aH > aA ? 1 : aA > aH ? -1 : 0;
  return predOut === actOut ? 1 : 0;
}

// True when a non-exact prediction also nails the goal difference (e.g. predicted 2-1, actual 3-2)
function isGoalDiffMatch(predH, predA, actualH, actualA) {
  if (predH === null || predA === null || actualH === null || actualA === null) return false;
  const pH=+predH, pA=+predA, aH=+actualH, aA=+actualA;
  if (pH === aH && pA === aA) return false;
  return (pH - pA) === (aH - aA);
}

function calcPoints(groupMatches, ko, predictions) {
  const byPhase = { group:0, r32:0, r16:0, qf:0, sf:0, final:0 };
  let total=0, exact=0, correct=0, wrong=0, played=0;
  Object.values(groupMatches).flat().forEach(m => {
    const p = predictions.group?.[m.id];
    if (!p || p.home === null || p.home === undefined || p.away === null || p.away === undefined) return;
    const pts = scorePrediction(p.home, p.away, m.homeScore, m.awayScore);
    if (pts === null) return;
    played++; total += pts; byPhase.group += pts;
    if (pts === 3) exact++; else if (pts === 1) correct++; else wrong++;
  });
  ['r32','r16','qf','sf','final'].forEach(round => {
    [...(ko[round]||[]), ...(round==='final'?ko.third||[]:[])].forEach(m => {
      const p = predictions.ko?.[m.id];
      if (!p || p.a === null || p.a === undefined || p.b === null || p.b === undefined) return;
      const pts = scorePrediction(p.a, p.b, m.scoreA, m.scoreB);
      if (pts === null) return;
      played++; total += pts; byPhase[round] += pts;
      if (pts === 3) exact++; else if (pts === 1) correct++; else wrong++;
    });
  });
  return { total, byPhase, exact, correct, wrong, played };
}

// Returns a funny milestone message for the given exact-score count,
// or null if count isn't a positive multiple of 5.
function milestoneMessage(t, count) {
  if (!count || count % 5 !== 0) return null;
  const key = `milestone_${count}`;
  if (TRANSLATIONS['en'][key]) return t(key);
  return t('milestone_more').replace('{count}', count);
}

// Bucket of KO matches for a given phase key ('final' also includes the third-place match)
function koPhaseBucket(key, ko) {
  return [...(ko[key]||[]), ...(key==='final'?ko.third||[]:[])];
}

// A phase becomes guessable once at least one of its matches has known teams
function isPhaseUnlocked(key, ko) {
  if (key === 'group') return true;
  return koPhaseBucket(key, ko).some(m => !!m.teamA || !!m.teamB);
}

// True once every guess for a single phase (group, or an unlocked KO round) is filled in.
// Matches that have already been played in real life are skipped — their guess
// inputs are locked, so they can't be filled in and shouldn't block the phase
// from being considered complete. This lets people who join after some (or all)
// of a phase already happened in real life still unlock sharing for it.
// Each phase is judged independently, so a completed phase stays shareable even
// while a later phase is still being filled in.
function isPhaseGuessesComplete(key, groupMatches, ko, predictions) {
  if (key === 'group') {
    return Object.values(groupMatches).flat().every(m => {
      if (m.homeScore !== null && m.awayScore !== null) return true;
      const p = predictions.group?.[m.id];
      return p && p.home != null && p.away != null;
    });
  }
  if (!isPhaseUnlocked(key, ko)) return false;
  return koPhaseBucket(key, ko).every(m => {
    if (m.scoreA !== null && m.scoreB !== null) return true;
    const p = predictions.ko?.[m.id];
    return p && p.a != null && p.b != null;
  });
}

function buildShareText(groupMatches, ko, predictions, pts, phaseKey, tFn) {
  const t = tFn || (k => TRANSLATIONS['en'][k] || k);
  const phaseLabels = {
    group: t('share_group_stage'),
    r32:   t('share_r32'),
    r16:   t('share_r16'),
    qf:    t('share_qf'),
    sf:    t('share_sf'),
    final: t('share_final'),
  };
  const lines = [];
  const single = phaseKey && phaseKey !== 'all';

  if (single) {
    lines.push(t('share_header_phase').replace('{phase}', phaseLabels[phaseKey]));
  } else {
    lines.push(t('share_header'));
  }
  lines.push('');

  const teamFlag = tm => {
    if (!tm) return '❓';
    const cc = FLAG[tm];
    if (!cc) return tm;
    return ccToFlagEmoji(cc);
  };

  const matchLine = (hn, an, pH, pA, aH, aA) => {
    const p = scorePrediction(pH, pA, aH, aA);
    const badge = p === 3 ? ' ✓3' : p === 1 ? ' ~1' : p === 0 ? ' ✗0' : '';
    return `${teamFlag(hn)} ${hn||'?'} ${pH}-${pA} ${an||'?'} ${teamFlag(an)}${badge}`;
  };

  const phases = single ? [phaseKey] : ['group','r32','r16','qf','sf','final'];
  phases.forEach(p => {
    const phaseLines = [];
    if (p === 'group') {
      Object.values(groupMatches).flat()
        .sort((a,b)=>(a.dk||0)-(b.dk||0)||(a.tk||0)-(b.tk||0))
        .forEach(m => {
          const pred = predictions.group?.[m.id];
          if (!pred || pred.home === null || pred.home === undefined || pred.away === null || pred.away === undefined) return;
          phaseLines.push(matchLine(m.home, m.away, pred.home, pred.away, m.homeScore, m.awayScore));
        });
    } else {
      const pMatches = (p === 'final' ? [...(ko.final||[]), ...(ko.third||[])] : (ko[p]||[]))
        .slice().sort((a,b)=>(a.dk||0)-(b.dk||0)||timeKey(a.time||'0:00 AM')-timeKey(b.time||'0:00 AM'));
      pMatches.forEach(m => {
        const pred = predictions.ko?.[m.id];
        if (!pred || pred.a === null || pred.a === undefined || pred.b === null || pred.b === undefined) return;
        phaseLines.push(matchLine(m.teamA, m.teamB, pred.a, pred.b, m.scoreA, m.scoreB));
      });
    }
    if (phaseLines.length > 0) {
      if (!single) lines.push(`*${phaseLabels[p]}*`);
      lines.push(...phaseLines);
      lines.push('');
    }
  });

  if (!single && pts) {
    const totalLine = t('share_total')
      .replace('{total}', pts.total)
      .replace('{played}', pts.played)
      .replace('{exact}', pts.exact)
      .replace('{correct}', pts.correct)
      .replace('{wrong}', pts.wrong);
    lines.push(totalLine);
    lines.push('');
  }
  lines.push('jorgecensi.com/worldcup-2026');
  return lines.join('\n');
}

// ─── Proximity / Rival sharing ────────────────────────────────────────────────
const RIVALS_KEY  = "wc2026:rivals:v1";
const PLAYER_KEY  = "wc2026:player:v1";
const SHARE_BASE  = "https://jorgecensi.com/worldcup-2026/";

function loadRivals() {
  try { const r = localStorage.getItem(RIVALS_KEY); return r ? JSON.parse(r) : []; }
  catch(e) { return []; }
}
function saveRivals(r) {
  try { localStorage.setItem(RIVALS_KEY, JSON.stringify(r)); } catch(e) {}
}
function loadPlayerName() {
  try { return localStorage.getItem(PLAYER_KEY) || ""; } catch(e) { return ""; }
}
function savePlayerName(n) {
  try { localStorage.setItem(PLAYER_KEY, n); } catch(e) {}
}

function encodePreds(name, predictions) {
  const g = {}, k = {};
  Object.entries(predictions.group || {}).forEach(([id, p]) => {
    if (p && p.home != null && p.away != null) g[id] = [+p.home, +p.away];
  });
  Object.entries(predictions.ko || {}).forEach(([id, p]) => {
    if (p && p.a != null && p.b != null) k[id] = [+p.a, +p.b];
  });
  const payload = JSON.stringify({ n: name || "Anonymous", g, k });
  try { return btoa(unescape(encodeURIComponent(payload))); } catch(e) { return btoa(payload); }
}

function decodePreds(encoded) {
  try {
    const json = decodeURIComponent(escape(atob(encoded)));
    const d = JSON.parse(json);
    const group = {}, ko = {};
    Object.entries(d.g || {}).forEach(([id, arr]) => { group[id] = { home: arr[0], away: arr[1] }; });
    Object.entries(d.k || {}).forEach(([id, arr]) => { ko[id] = { a: arr[0], b: arr[1] }; });
    return { n: d.n || "Anonymous", predictions: { group, ko } };
  } catch(e) { return null; }
}

function buildShareUrl(name, predictions) {
  return SHARE_BASE + "?rival=" + encodeURIComponent(encodePreds(name, predictions));
}

function buildTransferUrl(name, predictions) {
  return SHARE_BASE + "?transfer=" + encodeURIComponent(encodePreds(name, predictions));
}

// Pull a `rival=`/`transfer=` value out of a pasted share link — accepts a
// full URL or just a raw query string fragment.
function extractLinkParam(text, name) {
  try {
    const url = new URL(text.trim());
    const v = url.searchParams.get(name);
    if (v) return v;
  } catch (e) {}
  const m = text.match(new RegExp('[?&]' + name + '=([^&\\s]+)'));
  return m ? decodeURIComponent(m[1]) : null;
}

function calcRivalPoints(rival, groupMatches, ko) {
  return calcPoints(groupMatches, ko, rival.predictions || { group: {}, ko: {} });
}

// ─── Backup file export / import ──────────────────────────────────────────────
// Lets a user move their data (picks, scores, rivals) between two storage
// contexts on the same device — e.g. a mobile browser tab and the installed
// PWA, which iOS/Android keep in separate localStorage sandboxes.
const BACKUP_APP_ID = "wc2026-bolao";
const BACKUP_VERSION = 1;

function buildBackupData(playerName, predictions, rivals, groupMatches, ko) {
  return {
    app: BACKUP_APP_ID,
    version: BACKUP_VERSION,
    exportedAt: new Date().toISOString(),
    playerName: playerName || "",
    predictions: predictions || { group: {}, ko: {} },
    rivals: rivals || [],
    scores: buildScoresPayload(groupMatches, ko),
  };
}

function downloadBackupFile(data) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `worldcup-2026-bolao-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function readBackupFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || data.app !== BACKUP_APP_ID || !data.predictions) {
          reject(new Error('invalid backup file'));
          return;
        }
        resolve(data);
      } catch (e) { reject(e); }
    };
    reader.onerror = () => reject(reader.error);
    reader.readAsText(file);
  });
}

// ─── QR Code component ────────────────────────────────────────────────────────
function QRCodeView({ url }) {
  const ref = useRef(null);
  const { t, lang } = useLang();
  useEffect(() => {
    if (!ref.current) return;
    ref.current.innerHTML = '';
    if (window.QRCode) {
      try {
        new window.QRCode(ref.current, {
          text: url, width: 200, height: 200,
          colorDark: '#ffffff', colorLight: '#080d16',
          correctLevel: window.QRCode.CorrectLevel?.M,
        });
      } catch(e) {
        ref.current.innerHTML = `<div style="color:#666;font-size:11px;padding:20px;text-align:center">${t('qr_unavailable')}</div>`;
      }
    } else {
      ref.current.innerHTML = `<div style="color:#666;font-size:11px;padding:20px;text-align:center;line-height:1.5">${t('qr_needs_network')}</div>`;
    }
  }, [url, lang]);
  return (
    <div ref={ref} style={{
      display:'flex', justifyContent:'center', alignItems:'center',
      width:200, height:200, borderRadius:8, overflow:'hidden',
    }} />
  );
}

// ─── Share Modal ──────────────────────────────────────────────────────────────
function ShareModal({ playerName, predictions, rivals, groupMatches, ko, initialMode, onClose, onNameSave, onImportFile }) {
  const { t } = useLang();
  const [name, setName] = useState(playerName || '');
  const [mode, setMode] = useState(initialMode || 'rival'); // 'rival' | 'transfer' | 'file'
  const url = mode === 'transfer' ? buildTransferUrl(name, predictions) : buildShareUrl(name, predictions);
  const [copied, setCopied] = useState(false);
  const hasShare = !!navigator.share;
  const fileInputRef = useRef(null);
  const [fileError, setFileError] = useState(false);

  const handleCopy = () => {
    const done = () => { setCopied(true); setTimeout(() => setCopied(false), 2500); };
    navigator.clipboard?.writeText(url).then(done).catch(() => {
      const el = document.createElement('textarea');
      el.value = url; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el); done();
    });
  };

  const handleShare = () => {
    const title = mode === 'rival' ? t('share_title_native') : t('sync_title_native');
    navigator.share({ title, url }).catch(() => {});
  };

  const handleNameBlur = () => { if (name.trim()) onNameSave(name.trim()); };

  const nameRequired = mode !== 'file';
  const nameMissing = nameRequired && !name.trim();

  const handleExportFile = () => {
    downloadBackupFile(buildBackupData(name, predictions, rivals, groupMatches, ko));
  };

  const handleImportClick = () => fileInputRef.current?.click();

  const handleFileChange = async (e) => {
    const file = e.target.files?.[0];
    e.target.value = '';
    if (!file) return;
    try {
      const data = await readBackupFile(file);
      setFileError(false);
      onImportFile(data);
      onClose();
    } catch (err) {
      setFileError(true);
    }
  };

  // Count filled predictions
  const filledCount = Object.values(predictions.group || {}).filter(p => p && p.home != null).length
                    + Object.values(predictions.ko || {}).filter(p => p && p.a != null).length;

  return (
    <div onClick={onClose} style={{
      position:'fixed', inset:0, background:'rgba(0,0,0,0.88)', zIndex:500,
      display:'flex', alignItems:'flex-end', justifyContent:'center',
      padding:'0 0 env(safe-area-inset-bottom,0)',

        background:'#0d1a2e', border:`1px solid rgba(167,139,250,0.4)`,
        borderRadius:'20px 20px 0 0', padding:'20px 20px 28px',
        width:'100%', maxWidth:440,
        display:'flex', flexDirection:'column', alignItems:'center', gap:14,
        animation:'shareModalIn 0.3s ease',

        <div style={{ width:36, height:4, borderRadius:2, background:'rgba(255,255,255,0.12)', marginBottom:2 }}/>

        {/* Mode toggle */}
        <div style={{ display:'flex', gap:6, width:'100%' }}>
          {['rival','transfer','file'].map(m => (
            <button key={m} onClick={() => setMode(m)} style={{
              flex:1, padding:'8px 6px', borderRadius:9,
              border:`1px solid ${mode===m?'rgba(167,139,250,0.5)':'rgba(255,255,255,0.08)'}`,
              background:mode===m?'rgba(167,139,250,0.15)':'transparent',
              color:mode===m?PURPLE:'#666', fontSize:11, fontWeight:700,
              cursor:'pointer', fontFamily:'inherit',
            }}>
              {t(m==='rival'?'share_mode_rival':m==='transfer'?'share_mode_transfer':'share_mode_file')}
            </button>
          ))}
        </div>

        <div style={{ fontSize:11, color:PURPLE, letterSpacing:2, fontWeight:700, textTransform:'uppercase' }}>
          {t(mode==='rival'?'share_predictions_title':mode==='transfer'?'sync_device_title':'file_backup_title')}
        </div>
        <div style={{ fontSize:11, color:'#666', textAlign:'center', lineHeight:1.5, marginTop:-6 }}>
          {t(mode==='rival'?'share_predictions_subtitle':mode==='transfer'?'sync_device_subtitle':'file_backup_subtitle')}
        </div>

        {/* Name */}
        <div style={{ width:'100%' }}>
          <div style={{ fontSize:9, color:'#888', marginBottom:5, fontWeight:700, letterSpacing:1, textTransform:'uppercase' }}>
            {t('your_name_label')}{nameRequired && <span style={{ color:'#ff6b6b' }}> *</span>}
          </div>

            value={name}
            onChange={e => setName(e.target.value)}
            onBlur={handleNameBlur}
            placeholder={t('name_placeholder')}
            style={{
              width:'100%', padding:'9px 12px', borderRadius:9,
              border:`1.5px solid ${nameMissing ? 'rgba(255,107,107,0.6)' : 'rgba(167,139,250,0.4)'}`, background:'rgba(255,255,255,0.05)',

// ─── Sync-to-installed-app hint ────────────────────────────────────────────────
// Shown after accepting a rival from a shared link — offers the same link as
// a copyable "sync link" so the user can paste it into the installed PWA too,
// since browser and home-screen-app storage can be separate sandboxes (iOS).
function SyncHintToast({ hint, isMobile, onDismiss }) {
  const { t } = useLang();
  const [copied, setCopied] = useState(false);
  const url = SHARE_BASE + "?rival=" + encodeURIComponent(hint.raw);

  const handleCopy = () => {
    const done = () => { setCopied(true); setTimeout(onDismiss, 1500); };
    navigator.clipboard?.writeText(url).then(done).catch(() => {
      const el = document.createElement('textarea');
      el.value = url; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el); done();
    });
  };

  return (
    <div style={{
      position:'fixed', left:12, right:12,
      bottom: isMobile ? 'calc(86px + env(safe-area-inset-bottom, 0px))' : 16,
      zIndex:400, maxWidth:440, margin:'0 auto',
      background:'#0d1a2e', border:`1px solid rgba(0,208,132,0.4)`,
      borderRadius:14, padding:'12px 12px', boxShadow:'0 8px 24px rgba(0,0,0,0.45)',
      display:'flex', alignItems:'center', gap:10,
      animation:'flashBounce 0.4s ease',
    }}>
      <div style={{ fontSize:22, flexShrink:0 }}>📲</div>
      <div style={{ flex:1, fontSize:11, color:'#ccc', lineHeight:1.4 }}>
        {t('sync_hint_desc').replace('{name}', hint.name)}
      </div>
      <button onClick={handleCopy} style={{
        background:`rgba(0,208,132,0.14)`, border:`1px solid rgba(0,208,132,0.45)`,
        color:ACCENT, borderRadius:8, padding:'7px 10px', fontSize:11, fontWeight:800,
        cursor:'pointer', fontFamily:'inherit', whiteSpace:'nowrap', flexShrink:0,
      }}>{copied ? t('copied') : t('sync_hint_copy')}</button>
      <button onClick={onDismiss} style={{
        background:'transparent', border:'none', color:'#555',
        fontSize:18, lineHeight:1, cursor:'pointer', padding:0, flexShrink:0, fontFamily:'inherit',
      }}>×</button>
    </div>
  );
}

// ─── Paste a sync link (rival / transfer) ──────────────────────────────────────
// Lets the user paste a previously-received share link directly — useful when
// the same link was already opened in a different storage context (e.g. browser
// vs. installed PWA) and needs to be re-applied here.
function PasteSyncLink({ onResolve }) {
  const { t } = useLang();
  const [open, setOpen] = useState(false);
  const [value, setValue] = useState('');
  const [status, setStatus] = useState(null); // null | 'invalid' | 'duplicate'

  const handleSubmit = () => {
    const text = value.trim();
    if (!text) return;
    const result = onResolve(text);
    if (result === 'ok') { setValue(''); setOpen(false); setStatus(null); }
    else setStatus(result);
  };

  if (!open) {
    return (
      <button onClick={() => { setOpen(true); setStatus(null); }} style={{
        display:'block', margin:'0 auto 14px', background:'transparent', border:'none',
        color:'#555', fontSize:11, fontWeight:700, cursor:'pointer', fontFamily:'inherit',
        textDecoration:'underline',
      }}>
        {t('paste_sync_link_btn')}
      </button>
    );
  }

  return (
    <div style={{
      background:CARD, border:`1px solid ${BORDER}`, borderRadius:14,
      padding:'12px 14px', marginBottom:14,
    }}>
      <div style={{ display:'flex', gap:6 }}>
        <input
          value={value}
          onChange={e => { setValue(e.target.value); setStatus(null); }}
          onKeyDown={e => { if (e.key === 'Enter') handleSubmit(); }}
          placeholder={t('paste_sync_link_placeholder')}
          style={{
            flex:1, minWidth:0, background:'rgba(255,255,255,0.04)', border:`1px solid ${BORDER}`,
            borderRadius:8, padding:'9px 10px', color:'#eee', fontSize:12, fontFamily:'inherit',
          }}
        />
        <button onClick={handleSubmit} style={{
          background:`rgba(0,208,132,0.14)`, border:`1px solid rgba(0,208,132,0.45)`,
          color:ACCENT, borderRadius:8, padding:'9px 14px', fontSize:12, fontWeight:800,
          cursor:'pointer', fontFamily:'inherit', flexShrink:0,
        }}>{t('paste_sync_link_confirm')}</button>
      </div>
      {status === 'invalid' && (
        <div style={{ fontSize:10, color:'#ff6b6b', marginTop:6 }}>{t('paste_sync_link_invalid')}</div>
      )}
      {status === 'duplicate' && (
        <div style={{ fontSize:10, color:'#666', marginTop:6 }}>{t('paste_sync_link_duplicate')}</div>
      )}
    </div>
  );
}

const CONFETTI_CFG = Array.from({length:22}, (_,i) => ({
  left: `${2 + (i * 96/21)}%`,
  delay: `${(i * 0.1).toFixed(2)}s`,
  dur:   `${(1.4 + (i % 6) * 0.28).toFixed(2)}s`,

  rot:   `${(i * 53) % 360}deg`,
}));

function WinnerFlash({ data, onDismiss }) {
  const { t } = useLang();
  const exact = data.winners.filter(w => w.pts === 3);
  const right = data.winners.filter(w => w.pts === 1);
  const goalDiffWinners = right.filter(w => w.goalDiff);
  const best  = exact.length > 0 ? exact : right;
  const isExact = exact.length > 0;
  const isGoalDiff = !isExact && goalDiffWinners.length > 0;
  const milestoneMsg = (data.milestone && isExact) ? milestoneMessage(t, data.milestone) : null;

  useEffect(() => {
    const timer = setTimeout(onDismiss, milestoneMsg ? MILESTONE_FLASH_MS : WINNER_FLASH_MS);
    return () => clearTimeout(timer);
  }, [onDismiss, milestoneMsg]);

  return (
    <div onClick={onDismiss} style={{
      position:'fixed', inset:0, zIndex:600,
      background:'rgba(0,0,0,0.55)',
      display:'flex', alignItems:'center', justifyContent:'center',
      animation:'flashOverlayIn 0.2s ease',
      cursor:'pointer',
    }}>
      {/* confetti */}
      {isExact && CONFETTI_CFG.map((c, i) => (
        <div key={i} style={{
          position:'absolute', top:'-12px', left:c.left,
          width:c.size, height:Math.round(c.size*0.55),
          background:c.color, borderRadius:2,
          transform:`rotate(${c.rot})`,
          animation:`confettiDrop ${c.dur} ${c.delay} ease-in forwards`,
          pointerEvents:'none',
        }}/>
      ))}

      {/* card */}
      <div onClick={e => e.stopPropagation()} style={{
        background:'#0c1827',
        border:`2px solid ${milestoneMsg ? GOLD : (isExact ? ACCENT : PURPLE)}`,
        borderRadius:22, padding:'28px 32px 24px',
        maxWidth:300, width:'88%',
        textAlign:'center',
        boxShadow:`0 0 80px ${milestoneMsg ? 'rgba(255,215,0,0.45)' : (isExact ? 'rgba(0,208,132,0.45)' : 'rgba(167,139,250,0.35)')}`,
        animation:'flashBounce 0.45s cubic-bezier(0.34,1.56,0.64,1)',
      }}>
        <div style={{ fontSize:54, marginBottom:10, lineHeight:1 }}>{isExact ? '🎯' : '✅'}</div>
        <div style={{ fontSize:13, fontWeight:900, color:isExact?ACCENT:PURPLE, letterSpacing:1.5, textTransform:'uppercase', marginBottom:10 }}>
          {isExact ? (best.length > 1 ? t('exact_scores') : t('exact_score')) : t('right_result')}
        </div>
        {best.map((w, i) => (
          <div key={i} style={{
            fontSize: best.length > 1 ? 18 : 22,
            fontWeight:900, color:'#fff', marginBottom:4,
          }}>
            {w.isMe ? `${w.name}${t('you_suffix')}` : w.name}
          </div>
        ))}
        {isGoalDiff && (
          <div style={{
            fontSize:12, fontWeight:700, color:ACCENT,
            marginTop:8, marginBottom:4, lineHeight:1.4,
          }}>
            {t('goal_diff_bonus')}
          </div>
        )}
        {milestoneMsg && (
          <div style={{
            fontSize:13, fontWeight:700, color:GOLD,
            marginTop:10, marginBottom:4, lineHeight:1.4,
          }}>
            {milestoneMsg}

        )}
        {data.score && (
          <div style={{ fontSize:12, color:'#666', marginTop:8 }}>
            {data.home} {data.scoreH}–{data.scoreA} {data.away}
          </div>
        )}
        <div style={{ fontSize:10, color:'#444', marginTop:14 }}>{t('tap_to_dismiss')}</div>

    </div>
  );

// ─── Logic helpers ────────────────────────────────────────────────────────────
function computeStandings(teams, matches) {
  const t={};
  teams.forEach(tm=>{t[tm]={team:tm,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0,results:[]};});
  // Iterate in chronological order so per-team result dots read left→right by date.
  const ordered=[...matches].sort((a,b)=>(a.dk||0)-(b.dk||0)||(a.tk||0)-(b.tk||0));
  ordered.forEach(m=>{
    if(!t[m.home]||!t[m.away]) return;
    if(m.homeScore===null||m.awayScore===null){
      t[m.home].results.push("future");t[m.away].results.push("future");
      return;
    }
    const hs=+m.homeScore,as_=+m.awayScore;
    t[m.home].played++;t[m.away].played++;
    t[m.home].gf+=hs;t[m.home].ga+=as_;t[m.away].gf+=as_;t[m.away].ga+=hs;
    t[m.home].gd=t[m.home].gf-t[m.home].ga;t[m.away].gd=t[m.away].gf-t[m.away].ga;
    if(hs>as_){t[m.home].won++;t[m.home].pts+=3;t[m.away].lost++;t[m.home].results.push("win");t[m.away].results.push("loss");}
    else if(hs<as_){t[m.away].won++;t[m.away].pts+=3;t[m.home].lost++;t[m.away].results.push("win");t[m.home].results.push("loss");}
    else{t[m.home].drawn++;t[m.home].pts++;t[m.away].drawn++;t[m.away].pts++;t[m.home].results.push("draw");t[m.away].results.push("draw");}
  });
  return Object.values(t).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

// Round of 32. Colour + label are driven by getGroupQualStatuses' kind.
const QUAL_BADGE = {

    }}>

// Returns only teams that have MATHEMATICALLY CLINCHED a bracket slot.
// A team fills slot "1G"/"2G" only when NO combination of remaining group
// results can keep it out of that exact finishing position.
//
// We enumerate every possible outcome (win / draw / loss) of the group's
// remaining matches — at most 6 matches, so ≤ 3^6 = 729 combinations — and
// test each team against all of them. Because the app's tiebreakers (goal
// difference, goals scored) can be swung arbitrarily by an adversary
// choosing the scoreline of a remaining match, any rival that can merely
// EQUAL a candidate on points is treated as finishing above it. This is the
// conservative, never-over-claim reading of "mathematically qualified": a
// slot is filled only when the position is certain on points alone.
function getGroupQualifiers(gm) {
  const slots = {};
  Object.entries(GROUPS).forEach(([g, teams]) => {
    const matches = gm[g] || [];
    const remaining = matches.filter(m => m.homeScore === null || m.awayScore === null);

    // When all group matches are done, standings are final — use actual
    // tiebreakers (GD, GF) instead of the conservative points-only logic below.
    if (remaining.length === 0 && matches.length > 0) {
      const st = computeStandings(teams, matches);
      if (st[0]) slots[`1${g}`] = st[0].team;
      if (st[1]) slots[`2${g}`] = st[1].team;
      return;
    }

    // Points already banked from completed matches.
    const basePts = {};
    teams.forEach(tm => { basePts[tm] = 0; });
    matches.forEach(m => {
      if (m.homeScore === null || m.awayScore === null) return;
      const hs = +m.homeScore, as = +m.awayScore;
      if (hs > as) basePts[m.home] += 3;
      else if (hs < as) basePts[m.away] += 3;
      else { basePts[m.home] += 1; basePts[m.away] += 1; }
    });

    // guaranteed1st: candidate is the SOLE points leader in every scenario.
    // guaranteedTop2: at most one other team can reach the candidate's points
    //                 in every scenario (so it can never drop below 2nd).
    const guaranteed1st = {}, guaranteedTop2 = {};
    teams.forEach(tm => { guaranteed1st[tm] = true; guaranteedTop2[tm] = true; });

    const total = Math.pow(3, remaining.length);
    for (let mask = 0; mask < total; mask++) {
      const pts = { ...basePts };
      let x = mask;
      for (let i = 0; i < remaining.length; i++) {
        const outcome = x % 3; x = Math.floor(x / 3);
        const m = remaining[i];
        if (outcome === 0) pts[m.home] += 3;        // home win
        else if (outcome === 1) pts[m.away] += 3;   // away win
        else { pts[m.home] += 1; pts[m.away] += 1; } // draw
      }
      teams.forEach(tm => {
        // Count rivals that finish at or above this team on points (ties count
        // against the team, since goal-based tiebreakers are not guaranteed).
        let atOrAbove = 0;
        teams.forEach(o => { if (o !== tm && pts[o] >= pts[tm]) atOrAbove++; });
        if (atOrAbove >= 1) guaranteed1st[tm] = false;
        if (atOrAbove >= 2) guaranteedTop2[tm] = false;
      });
    }

    // Fill the winner slot only for a guaranteed sole leader; the runner-up
    // slot only once the winner is settled and a second team is locked into
    // the top two (it is then necessarily 2nd).
    const winner = teams.find(tm => guaranteed1st[tm]);
    if (winner) {
      slots[`1${g}`] = winner;
      const runnerUp = teams.find(tm => tm !== winner && guaranteedTop2[tm]);
      if (runnerUp) slots[`2${g}`] = runnerUp;
    }
  });
  return slots;
}
// Per-team "what's needed to reach the Round of 32" status, computed within a
// single group. We enumerate every win/draw/loss outcome of the group's
// remaining matches (≤ 3^6 = 729) and judge each team two ways per scenario:
//   • conservative top-2  — a tie on points counts AGAINST the team (so a slot
//     is "secured" only when certain on points alone), used to confirm advances.
//   • optimistic top-2/3  — a tie on points counts FOR the team (goal tiebreakers
//     could swing its way), used to confirm a path still mathematically exists.
// Direct qualification means finishing in the top 2; a team that can no longer
// reach the top 2 but can still finish 3rd stays in the best-thirds race.
// Returns { team: kind } where kind ∈ qualified | win | draw | mustwin |
// contention | third | eliminated.
function getGroupQualStatuses(teams, matches) {
  const out = {};
  const remaining = matches.filter(m => m.homeScore === null || m.awayScore === null);

  // When all matches are done, standings are final — use actual tiebreakers
  // (GD, GF) instead of the conservative points-only scenario enumeration below,
  // which incorrectly treats a tied-on-points rival as finishing above a team
  // that's clearly ahead on goal difference.
  if (remaining.length === 0 && matches.length > 0) {
    const st = computeStandings(teams, matches);
    teams.forEach(tm => {
      const rank = st.findIndex(s => s.team === tm);
      out[tm] = rank <= 1 ? 'qualified' : rank === 2 ? 'third' : 'eliminated';
    });
    return out;
  }

  // Points banked so far, and each team's next still-to-play match.
  const basePts = {};
  teams.forEach(tm => { basePts[tm] = 0; });
  matches.forEach(m => {
    if (m.homeScore === null || m.awayScore === null) return;
    const hs = +m.homeScore, as = +m.awayScore;
    if (hs > as) basePts[m.home] += 3;
    else if (hs < as) basePts[m.away] += 3;
    else { basePts[m.home] += 1; basePts[m.away] += 1; }
  });
  const ordered = [...remaining].sort((a, b) => (a.dk || 0) - (b.dk || 0) || (a.tk || 0) - (b.tk || 0));
  const nextMatch = {}; // team -> its earliest remaining match
  teams.forEach(tm => {
    nextMatch[tm] = ordered.find(m => m.home === tm || m.away === tm) || null;
  });

  // Per-team accumulators across all scenarios.
  const acc = {};
  teams.forEach(tm => {
    acc[tm] = {
      allConsTop2: true,   // conservatively top-2 in EVERY scenario  → clinched
      everOptTop2: false,  // optimistically top-2 in SOME scenario   → top-2 still possible
      everOpt3rd: false,   // optimistically top-3 in SOME scenario   → 3rd still reachable
      // keyed by own next-match outcome ('win'|'draw'|'loss'):
      consTop2: { win: true, draw: true, loss: true },  // AND of conservative top-2
      optTop2:  { win: false, draw: false, loss: false }, // OR of optimistic top-2
      seen:     { win: false, draw: false, loss: false }, // did this outcome occur
    };
  });

  const total = Math.pow(3, remaining.length);
  for (let mask = 0; mask < total; mask++) {
    const pts = { ...basePts };
    const outcomeFor = {}; // matchRef -> 'win'/'draw'/'loss' for home perspective
    let x = mask;
    for (let i = 0; i < remaining.length; i++) {
      const o = x % 3; x = Math.floor(x / 3);
      const m = remaining[i];
      if (o === 0) { pts[m.home] += 3; outcomeFor[i] = 'home'; }
      else if (o === 1) { pts[m.away] += 3; outcomeFor[i] = 'away'; }
      else { pts[m.home] += 1; pts[m.away] += 1; outcomeFor[i] = 'draw'; }
    }
    teams.forEach(tm => {
      let atOrAbove = 0, strictlyAbove = 0;
      teams.forEach(o => {
        if (o === tm) return;
        if (pts[o] >= pts[tm]) atOrAbove++;
        if (pts[o] > pts[tm]) strictlyAbove++;
      });
      const consTop2 = atOrAbove <= 1;      // certain top-2 on points alone
      const optTop2  = strictlyAbove <= 1;  // top-2 achievable with tiebreakers
      const opt3rd   = strictlyAbove <= 2;  // 3rd (or better) still achievable
      const a = acc[tm];
      if (!consTop2) a.allConsTop2 = false;
      if (optTop2) a.everOptTop2 = true;
      if (opt3rd) a.everOpt3rd = true;
      // Record against this team's own next-match result, if it has one.
      const nm = nextMatch[tm];
      if (nm) {
        const idx = remaining.indexOf(nm);
        const res = outcomeFor[idx];
        const own = res === 'draw' ? 'draw' : (res === 'home') === (nm.home === tm) ? 'win' : 'loss';
        a.seen[own] = true;
        if (!consTop2) a.consTop2[own] = false;
        if (optTop2) a.optTop2[own] = true;
      }
    });
  }

  teams.forEach(tm => {
    const a = acc[tm];
    let kind;
    if (remaining.length === 0) {
      // Group finished: rank is settled within the group.
      kind = a.allConsTop2 ? 'qualified' : (a.everOpt3rd ? 'third' : 'eliminated');
    } else if (a.allConsTop2) {
      kind = 'qualified';
    } else if (!a.everOptTop2) {
      kind = a.everOpt3rd ? 'third' : 'eliminated';
    } else if (a.seen.draw && a.consTop2.draw) {
      kind = 'draw';                 // avoiding defeat secures top-2
    } else if (a.seen.win && a.consTop2.win) {
      kind = 'win';                  // a win secures top-2 (a draw would not)
    } else if (a.optTop2.win && !a.optTop2.draw && !a.optTop2.loss) {
      kind = 'mustwin';              // only a win keeps top-2 alive
    } else {
      kind = 'contention';           // still possible, hinges on other results
    }
    out[tm] = kind;
  });
  return out;
}
// Resolve the eight best third-placed teams and their bracket slots (FIFA Annex C).
// Returns an 8-element array indexed by R32_BRACKET.thirdB (winner order
// A,B,D,E,G,I,K,L), or null while any group still has matches to play — the eight
// qualifiers (and therefore the matchups) can only be fixed once every group is final.
function getThirdPlaceTeams(gm) {
  const thirdByGroup = {};
  for (const [g, teams] of Object.entries(GROUPS)) {
    const matches = gm[g];
    if (!matches || matches.some(m => m.homeScore === null || m.awayScore === null)) return null;
    const st = computeStandings(teams, matches);
    if (!st[2]) return null;
    thirdByGroup[g] = { g, team: st[2].team, pts: st[2].pts, gd: st[2].gd, gf: st[2].gf };
  }
  // Rank the twelve third-placed teams; the top eight advance.
  // FIFA criteria: points, then goal difference, then goals scored (disciplinary
  // points / drawing of lots are not modelled — fall back to group letter).
  const ranked = Object.values(thirdByGroup)
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.g.localeCompare(b.g));
  const key = ranked.slice(0, 8).map(t => t.g).sort().join("");
  const placement = THIRD_PLACE_TABLE[key];
  if (!placement) return null;
  // placement[col] is the group letter whose 3rd-place team fills that bracket slot.
  return placement.split("").map(letter => thirdByGroup[letter]?.team || null);
}
function koWinner(m) {
  if(m.scoreA===null||m.scoreB===null) return null;
  const sa=+m.scoreA,sb=+m.scoreB;
  if(sa>sb) return m.teamA; if(sb>sa) return m.teamB;
  if(m.penA!==null&&m.penB!==null){if(+m.penA>+m.penB)return m.teamA;if(+m.penB>+m.penA)return m.teamB;}
  return null;
}
function koLoser(m){const w=koWinner(m);if(!w)return null;return w===m.teamA?m.teamB:m.teamA;}
const isMatchScored = m => m.homeScore!==null && m.homeScore!==undefined && m.awayScore!==null && m.awayScore!==undefined;
function propagateKO(ko,gm){
  const slots=getGroupQualifiers(gm);
  const thirds=getThirdPlaceTeams(gm);
  const next=structuredClone(ko);
  next.r32.forEach(m=>{
    m.teamA=slots[m.slotA]||null;
    m.teamB = m.thirdB!=null ? (thirds?thirds[m.thirdB]:null) : (slots[m.slotB]||null);
  });
  R16_PAIRS.forEach(([ia,ib],i)=>{next.r16[i].teamA=koWinner(next.r32[ia]);next.r16[i].teamB=koWinner(next.r32[ib]);});
  QF_PAIRS.forEach(([ia,ib],i)=>{next.qf[i].teamA=koWinner(next.r16[ia]);next.qf[i].teamB=koWinner(next.r16[ib]);});
  SF_PAIRS.forEach(([ia,ib],i)=>{next.sf[i].teamA=koWinner(next.qf[ia]);next.sf[i].teamB=koWinner(next.qf[ib]);});
  next.third[0].teamA=koLoser(next.sf[0]);next.third[0].teamB=koLoser(next.sf[1]);
  next.final[0].teamA=koWinner(next.sf[0]);next.final[0].teamB=koWinner(next.sf[1]);
  return next;
}

// ─── Shared UI ───────────────────────────────────────────────────────────────
function Stepper({value,onChange,highlight,disabled=false,color=ACCENT,small=false,pulse=false}){
  const h=small?30:38,numW=small?28:36,fs=small?12:16;
  const dec=()=>{if(disabled)return;if(value===null||value===0){onChange(null);return;}onChange(value-1);};
  const inc=()=>{if(disabled)return;onChange(value===null?0:value+1);};
  const btnS=(side)=>({
    width:h,height:h,
    borderRadius:side==="left"?"8px 0 0 8px":"0 8px 8px 0",
    border:`1.5px solid ${disabled?"rgba(255,255,255,0.05)":highlight?`${color}55`:"rgba(255,255,255,0.12)"}`,
    borderRight:side==="left"?"none":undefined,borderLeft:side==="right"?"none":undefined,
    background:disabled?"rgba(255,255,255,0.02)":highlight?`${color}15`:"rgba(255,255,255,0.06)",
    color:disabled?"#2a2a2a":highlight?color:"#777",
    fontSize:18,fontWeight:700,cursor:disabled?"default":"pointer",
    display:"flex",alignItems:"center",justifyContent:"center",
    WebkitTapHighlightColor:"transparent",userSelect:"none",flexShrink:0,lineHeight:1,
  });
  return(
    <div style={{display:"flex",alignItems:"stretch"}}>
      <button onClick={dec} style={btnS("left")} disabled={disabled}>−</button>
      <div style={{width:numW,height:h,display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:fs,fontWeight:900,userSelect:"none",
        background:disabled?"rgba(255,255,255,0.02)":highlight?`${color}18`:"rgba(255,255,255,0.07)",
        borderTop:`1.5px solid ${disabled?"rgba(255,255,255,0.05)":highlight?`${color}55`:"rgba(255,255,255,0.12)"}`,
        borderBottom:`1.5px solid ${disabled?"rgba(255,255,255,0.05)":highlight?`${color}55`:"rgba(255,255,255,0.12)"}`,
        color:disabled?"#333":highlight?color:"#e8eaf0",overflow:"hidden"}}>
        {value===null?<span style={{color:"#444",fontSize:fs-2}}>–</span>:
          <span key={pulse?value:"static"} style={pulse?{display:"inline-block",animation:"penGoal 0.5s cubic-bezier(0.22,1,0.36,1) both"}:undefined}>{value}</span>}
      </div>
      <button onClick={inc} style={btnS("right")} disabled={disabled}>+</button>
    </div>
  );
}

function TimeBadge({date,time,city}){
  const utc=matchToUTC(date,time);
  const localH=utc.getHours();
  const col=localH<5?RED:localH<7?"#ff9500":localH<12?GOLD:ACCENT;
  const localTime=utc.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"});
  const tzLabel=new Intl.DateTimeFormat(undefined,{timeZoneName:"short"}).formatToParts(utc).find(p=>p.type==="timeZoneName")?.value||"";
  const localDate=utc.toLocaleDateString([],{weekday:"short",day:"numeric",month:"short"});
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
      <span style={{fontSize:9,color:col,fontWeight:700,background:`${col}18`,border:`1px solid ${col}44`,borderRadius:4,padding:"2px 6px",whiteSpace:"nowrap"}}>{localTime} {tzLabel}</span>
      <span style={{fontSize:9,color:"#555",whiteSpace:"nowrap"}}>{localDate} · {city}</span>
    </div>
  );

function SLabel({children,style={}}){

}

// ─── Splash Screen ────────────────────────────────────────────────────────────
const SPLASH_CSS = `
  @keyframes emblemIn {
    0%   { opacity:0; transform:scale(0.3) rotate(-15deg); filter:blur(12px); }
    60%  { opacity:1; transform:scale(1.08) rotate(2deg);  filter:blur(0); }
    80%  { transform:scale(0.97) rotate(-1deg); }
    100% { transform:scale(1) rotate(0deg); }
  }
  @keyframes glowRing {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,208,132,0), 0 0 0 0 rgba(255,215,0,0); }
    50%      { box-shadow: 0 0 60px 20px rgba(0,208,132,0.25), 0 0 100px 40px rgba(255,215,0,0.1); }
  }
  @keyframes textUp {
    0%   { opacity:0; transform:translateY(24px); }
    100% { opacity:1; transform:translateY(0); }
  }
  @keyframes taglineUp {
    0%   { opacity:0; transform:translateY(16px); }
    100% { opacity:1; transform:translateY(0); }
  }
  @keyframes splashOut {
    0%   { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(1.06); pointer-events:none; }
  }
  @keyframes bgPulse {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @keyframes particleDrift {
    0%   { transform:translateY(0) translateX(0) scale(1); opacity:0.7; }
    100% { transform:translateY(-120px) translateX(var(--dx)) scale(0.3); opacity:0; }
  }
  @keyframes ballFly {
    0%   { transform: translate(0px, 0px) scale(0.18); opacity:0; }
    6%   { opacity: 1; }
    50%  { transform: translate(calc(50vw - 40px), calc(-50vh + 60px)) scale(1); opacity:1; }
    94%  { opacity: 1; }
    100% { transform: translate(calc(100vw + 20px), calc(-100vh - 20px)) scale(1); opacity:0; }
  }
  @keyframes ballSpin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(600deg); }
  }
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
`;

function SplashScreen({ onDone }) {
  const { t } = useLang();
  const [phase, setPhase] = useState("in"); // in | hold | out

  useEffect(() => {
    // After emblem animates in (0.9s), hold briefly, then exit
    const holdTimer = setTimeout(() => setPhase("out"), 2200);
    const doneTimer = setTimeout(() => onDone(), 2900);
    return () => { clearTimeout(holdTimer); clearTimeout(doneTimer); };
  }, [onDone]);

  // Random particle positions
  const particles = useMemo(() => Array.from({length:12}, (_,i) => ({
    id:i,
    x: Math.sin(i * 30 * Math.PI/180) * 80,
    delay: (i * 0.15) % 1.2,
    size: 4 + (i % 4) * 3,
    color: i % 3 === 0 ? ACCENT : i % 3 === 1 ? GOLD : "#fff",
  })), []);

  return (
    <>
      <style>{SPLASH_CSS}</style>
      <div style={{
        position:"fixed", inset:0, zIndex:9999,
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        background:"linear-gradient(135deg, #040810 0%, #0a1628 40%, #071020 70%, #040810 100%)",
        animation: phase==="out" ? "splashOut 0.7s cubic-bezier(0.4,0,1,1) forwards" : "none",
        overflow:"hidden",
      }}>

        {/* Animated background gradient sweep */}
        <div style={{
          position:"absolute", inset:0,
          background:"linear-gradient(120deg, transparent 30%, rgba(0,208,132,0.04) 50%, transparent 70%)",
          backgroundSize:"300% 300%",
          animation:"bgPulse 3s ease infinite",
        }}/>

        {/* Radial glow behind emblem */}
        <div style={{
          position:"absolute",
          width:320, height:320,
          borderRadius:"50%",
          background:"radial-gradient(circle, rgba(0,208,132,0.12) 0%, rgba(255,215,0,0.06) 40%, transparent 70%)",
          animation:"glowRing 2s ease-in-out infinite",
        }}/>

        {/* Flying soccer ball */}
        <div style={{
          position:"absolute",
          bottom:40, left:20,
          width:90, height:90,
          zIndex:0,
          animation:"ballFly 2.6s linear 0.2s both",
          pointerEvents:"none",
          filter:"drop-shadow(0 6px 16px rgba(0,0,0,0.6))",
          transformOrigin:"center center",
        }}>
          <img src={BALL_DATA_URL} alt="" width="90" height="90"
            style={{
              width:"100%", height:"100%", objectFit:"contain", display:"block",
              animation:"ballSpin 2.6s linear 0.2s both",
            }}
          />
        </div>

        {/* Floating particles */}
        {particles.map(p => (
          <div key={p.id} style={{
            position:"absolute",
            bottom:"42%",
            left:`calc(50% + ${p.x}px)`,
            width:p.size, height:p.size,
            borderRadius:"50%",
            background:p.color,
            opacity:0,
            "--dx": `${p.x * 0.4}px`,
            animation:`particleDrift 1.8s ${p.delay + 0.4}s ease-out infinite`,
          }}/>
        ))}

        {/* Emblem */}
        <div style={{
          animation: "emblemIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s both",
          marginBottom:28,
          filter:"drop-shadow(0 0 30px rgba(0,208,132,0.3)) drop-shadow(0 0 60px rgba(255,215,0,0.15))",
        }}>
          <EmblemImage size={170}/>
        </div>

        {/* Title */}
        <div style={{
          animation:"textUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.75s both",
          textAlign:"center",
        }}>
          <div style={{
            fontSize:28, fontWeight:900, letterSpacing:4, textTransform:"uppercase",
            color:"transparent",
            background:"linear-gradient(90deg, #fff 20%, #ffd700 50%, #fff 80%)",
            backgroundSize:"200% auto",
            WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent",
            backgroundClip:"text",
            animation:"shimmer 2.5s linear 1s infinite",
            marginBottom:6,
          }}>
            {t('header_title')}
          </div>
          <div style={{
            animation:"taglineUp 0.5s ease 1.05s both",
            fontSize:11, color:ACCENT, letterSpacing:4, fontWeight:700, textTransform:"uppercase",
          }}>
            {t('splash_subtitle')}
          </div>
        </div>

        {/* Loading bar */}
        <div style={{
          animation:"taglineUp 0.5s ease 1.2s both",
          marginTop:40, width:120, height:2,
          background:"rgba(255,255,255,0.08)", borderRadius:2, overflow:"hidden",
        }}>
          <div style={{
            height:"100%", borderRadius:2,
            background:`linear-gradient(90deg,${ACCENT},${GOLD})`,
            animation:"splashBar 1.8s ease 1.3s both",
          }}/>
        </div>

        <style>{`
          @keyframes splashBar {
            from { width:0%; }
            to   { width:100%; }
          }
        `}</style>
      </div>
    </>
  );
}
