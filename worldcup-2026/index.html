function GuessBadge({ pts }) {
  if (pts === null || pts === undefined) return null;
  const [col, text] = pts === 3 ? [ACCENT, '✓ 3'] : pts === 1 ? [GOLD, '~ 1'] : [RED, '✗ 0'];
  return (
    <span style={{
      fontSize:9, fontWeight:800, letterSpacing:0.5, flexShrink:0,
      color:col, background:`${col}18`, border:`1px solid ${col}44`,
      borderRadius:20, padding:"2px 7px",
    }}>{text}</span>
  );
}

// A single rival's pick for a match — repeated once per rival when comparing
// against more than one at a time.
function RivalPickRow({ name, hasPred, scoreA, scoreB, pts, showBadge, isFirst }) {
  const { t } = useLang();
  return (
    <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", gap:6, ...(isFirst?{}:{marginTop:5})}}>
      <span style={{fontSize:10, color:PURPLE, fontWeight:700, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
        {t('rival_pick').replace('{name}', name)}
      </span>
      <div style={{display:"flex", alignItems:"center", gap:6, flexShrink:0}}>
        {hasPred ? (
          <span style={{fontSize:12, fontWeight:800, color:"#ccc"}}>{scoreA}–{scoreB}</span>
        ) : (
          <span style={{fontSize:10, color:"#444"}}>{t('no_pick')}</span>
        )}
        {showBadge && hasPred && <GuessBadge pts={pts}/>}
      </div>
    </div>
  );
}

function GuessGroupMatchCard({ match, prediction, onPred, isMobile, rivalPicks }) {
  const { t } = useLang();
  const predH = prediction?.home ?? null;
  const predA = prediction?.away ?? null;
  const actual = match.homeScore !== null && match.awayScore !== null;
  const pts = actual ? scorePrediction(predH, predA, match.homeScore, match.awayScore) : null;
  const hasPred = predH !== null && predA !== null;
  return (
    <div style={{background:CARD, border:`1px solid ${hasPred?'rgba(167,139,250,0.3)':BORDER}`, borderRadius:12, padding:"10px 12px"}}>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:7, gap:6}}>
        <span style={{fontSize:8, color:GOLD, fontWeight:800, background:`${GOLD}18`, border:`1px solid ${GOLD}33`, borderRadius:4, padding:"2px 6px", letterSpacing:1}}>GROUP {match.group}</span>
        <div style={{display:"flex", alignItems:"center", gap:5}}>
          {hasPred && <GuessBadge pts={pts}/>}
          <span style={{fontSize:8, color:"#555"}}>{match.date}</span>
        </div>
      </div>
      <div style={{display:"flex", alignItems:"center", gap:7, paddingBottom:5, borderBottom:`1px solid ${BORDER}`}}>
        <Flag team={match.home} size={isMobile?21:19}/>
        <span style={{flex:1, fontSize:12, fontWeight:500, color:"#ccc", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}><TeamName name={match.home}/></span>
        <Stepper value={predH} onChange={v=>onPred(match.id,"home",v)} color={PURPLE} disabled={actual}/>
      </div>
      <div style={{display:"flex", alignItems:"center", gap:7, paddingTop:5}}>
        <Flag team={match.away} size={isMobile?21:19}/>
        <span style={{flex:1, fontSize:12, fontWeight:500, color:"#ccc", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}><TeamName name={match.away}/></span>
        <Stepper value={predA} onChange={v=>onPred(match.id,"away",v)} color={PURPLE} disabled={actual}/>
      </div>
      {actual && (
        <div style={{marginTop:5, fontSize:9, color:"#555", textAlign:"center"}}>
          {t('actual_score').replace('{a}',match.homeScore).replace('{b}',match.awayScore)}
        </div>
      )}
      {rivalPicks?.length > 0 && (
        <div style={{marginTop:6, paddingTop:6, borderTop:`1px solid ${BORDER}`}}>
          {rivalPicks.map((r, i) => {
            const rH = r.prediction?.home ?? null;
            const rA = r.prediction?.away ?? null;
            const rHasPred = rH !== null && rA !== null;
            const rPts = (actual && rHasPred) ? scorePrediction(rH, rA, match.homeScore, match.awayScore) : null;
            return (
              <RivalPickRow key={r.name} name={r.name} hasPred={rHasPred}
                scoreA={rH} scoreB={rA} pts={rPts} showBadge={actual} isFirst={i===0}/>
            );
          })}
        </div>
      )}
    </div>
  );
}

function GuessKOMatchCard({ match, prediction, onPred, isMobile, matchLabel, prevPhaseLabel, rivalPicks }) {
  const { t } = useLang();
  const hasTeams = !!match.teamA && !!match.teamB;
  const predA = prediction?.a ?? null;
  const predB = prediction?.b ?? null;
  const actual = match.scoreA !== null && match.scoreB !== null;
  const pts = (actual && hasTeams) ? scorePrediction(predA, predB, match.scoreA, match.scoreB) : null;
  const hasPred = predA !== null && predB !== null;

  const teamRow = (team, val, field, isTop) => (
    <div style={{display:"flex", alignItems:"center", gap:8, padding:"9px 0",
      ...(isTop ? {borderBottom:`1px solid ${BORDER}`, paddingBottom:5} : {paddingTop:5})}}>
      <Flag team={team||null} size={isMobile?21:19} faded={!team}/>
      <span style={{flex:1, fontSize:12, fontWeight:400, color:team?"#ccc":"#444",
        fontStyle:team?"normal":"italic", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
        {team ? <TeamName name={team}/> : t('tbd')}
      </span>
      <Stepper value={val} onChange={v=>onPred(match.id,field,v)} color={PURPLE} disabled={!hasTeams||actual}/>
    </div>
  );

  return (
    <div style={{background:CARD, border:`1px solid ${hasPred&&hasTeams?'rgba(167,139,250,0.3)':BORDER}`, borderRadius:12, padding:"11px 13px"}}>
      {matchLabel && (
        <div style={{fontSize:9, fontWeight:800, letterSpacing:2, textTransform:"uppercase", color:GOLD, marginBottom:6}}>{matchLabel}</div>
      )}
      <div style={{marginBottom:7, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
        <TimeBadge date={match.date} time={match.time} city={match.city}/>
        {hasPred && hasTeams && <GuessBadge pts={pts}/>}
      </div>
      {teamRow(match.teamA, predA, "a", true)}
      {teamRow(match.teamB, predB, "b", false)}
      {!hasTeams && (
        <div style={{marginTop:6, fontSize:9, color:"#555", textAlign:"center"}}>
          {t('phase_locked_reason').replace('{phase}', prevPhaseLabel)}
        </div>
      )}
      {actual && hasTeams && (
        <div style={{marginTop:5, fontSize:9, color:"#555", textAlign:"center"}}>
          {t('actual_score').replace('{a}',match.scoreA).replace('{b}',match.scoreB)}
        </div>
      )}
      {rivalPicks?.length > 0 && hasTeams && (
        <div style={{marginTop:6, paddingTop:6, borderTop:`1px solid ${BORDER}`}}>
          {rivalPicks.map((r, i) => {
            const rA = r.prediction?.a ?? null;
            const rB = r.prediction?.b ?? null;
            const rHasPred = rA !== null && rB !== null;
            const rPts = (actual && rHasPred) ? scorePrediction(rA, rB, match.scoreA, match.scoreB) : null;
            return (
              <RivalPickRow key={r.name} name={r.name} hasPred={rHasPred}
                scoreA={rA} scoreB={rB} pts={rPts} showBadge={actual} isFirst={i===0}/>
            );
          })}
        </div>
      )}
    </div>
  );
}

function GuessesView({ groupMatches, ko, predictions, onGroupPred, onKOPred, isMobile,
                        rivals, playerName, onShare, onRemoveRival, onResolveLink }) {
  const { t } = useLang();
  const PHASES = [
    { key:'group', label:t('phase_group'),    matches:Object.values(groupMatches).flat().sort((a,b)=>(a.dk||0)-(b.dk||0)||(a.tk||0)-(b.tk||0)) },
    { key:'r32',   label:t('phase_r32'),   matches:[...ko.r32].sort((a,b)=>(a.dk||0)-(b.dk||0)||timeKey(a.time||'0:00 AM')-timeKey(b.time||'0:00 AM')) },
    { key:'r16',   label:t('phase_r16'),   matches:[...ko.r16].sort((a,b)=>(a.dk||0)-(b.dk||0)||timeKey(a.time||'0:00 AM')-timeKey(b.time||'0:00 AM')) },
    { key:'qf',    label:t('phase_qf'), matches:[...ko.qf].sort((a,b)=>(a.dk||0)-(b.dk||0)||timeKey(a.time||'0:00 AM')-timeKey(b.time||'0:00 AM')) },
    { key:'sf',    label:t('phase_sf'),    matches:[...ko.sf].sort((a,b)=>(a.dk||0)-(b.dk||0)||timeKey(a.time||'0:00 AM')-timeKey(b.time||'0:00 AM')) },
    { key:'final', label:t('phase_final'),          matches:[...ko.third,...ko.final].sort((a,b)=>(a.dk||0)-(b.dk||0)||timeKey(a.time||'0:00 AM')-timeKey(b.time||'0:00 AM')) },
  ];

  const isUnlocked = key => isPhaseUnlocked(key, ko);

  const [phase, setPhase] = useState('group');
  const pts = useMemo(()=>calcPoints(groupMatches,ko,predictions),[groupMatches,ko,predictions]);
  // Group stage being complete unlocks "Copy All" / proximity sharing for good —
  // a later phase still in progress doesn't re-lock it. Late joiners who missed
  // the (now-moot) group stage in real life don't need to back-fill those guesses,
  // since already-played matches are skipped by isPhaseGuessesComplete.
  const canShare = useMemo(()=>isPhaseGuessesComplete('group',groupMatches,ko,predictions),[groupMatches,ko,predictions]);
  const canSharePhase = useMemo(()=>isPhaseGuessesComplete(phase,groupMatches,ko,predictions),[phase,groupMatches,ko,predictions]);
  const [copied, setCopied] = useState(null); // null | 'all' | 'phase'

  // Compare picks with a selected rival (or all of them at once), match-by-match.
  // Comparison is on by default (against all rivals) so picks line up with
  // friends without an extra tap — the effect below switches it off automatically
  // when there are no rivals to compare against.
  const [compareRival, setCompareRival] = useState(ALL_RIVALS);
  useEffect(()=>{
    if(!compareRival) return;
    if(compareRival === ALL_RIVALS){ if(rivals.length===0) setCompareRival(null); return; }
    if(!rivals.some(r=>r.n===compareRival)) setCompareRival(null);
  },[rivals, compareRival]);
  const toggleCompare = useCallback(name=>{
    setCompareRival(prev=>prev===name?null:name);
  },[]);
  const compareList = compareRival === ALL_RIVALS ? rivals
    : compareRival ? rivals.filter(r=>r.n===compareRival)
    : [];

  // My live rank on the leaderboard — mirrors RivalsLeaderboard's ordering so the
  // celebration fires exactly when the rendered #1 row becomes "me".
  const myRank = useMemo(() => {
    if (rivals.length === 0) return null;
    const players = [
      { isMe:true,  total: pts.total },
      ...rivals.map(r => ({ isMe:false, total: calcRivalPoints(r, groupMatches, ko).total })),
    ].sort((a, b) => b.total - a.total);
    return players.findIndex(p => p.isMe) + 1;
  }, [rivals, pts.total, groupMatches, ko]);

  // Celebrate only the *transition* into 1st place against real rivals with a
  // real score — not on first load if you happen to already be on top.
  const prevRankRef = useRef(null);
  const [showFirstPlace, setShowFirstPlace] = useState(false);
  useEffect(() => {
    const prev = prevRankRef.current;
    prevRankRef.current = myRank;
    if (myRank === 1 && prev !== null && prev > 1 && pts.total > 0) {
      setShowFirstPlace(true);
    }
  }, [myRank, pts.total]);

  const copyText = (text, which) => {
    const done = () => { setCopied(which); setTimeout(()=>setCopied(null),2000); };
    navigator.clipboard?.writeText(text).then(done).catch(()=>{
      const el=document.createElement('textarea');
      el.value=text; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el); done();
    });
  };

  const currentPhase = PHASES.find(p => p.key === phase);
  const prevPhaseLabel = PHASES[PHASES.findIndex(p => p.key === phase) - 1]?.label || '';

  // Already-played matches are collapsed by default so the list opens on
  // the next upcoming match instead of a long scroll of locked results.
  const [showPlayed, setShowPlayed] = useState(false);
  useEffect(()=>{ setShowPlayed(false); }, [phase]);

  const isMatchPlayed = m => phase === 'group'
    ? (m.homeScore !== null && m.awayScore !== null)
    : (m.scoreA !== null && m.scoreB !== null);

  const { playedMatches, upcomingMatches } = useMemo(()=>{
    const played = [], upcoming = [];
    (currentPhase?.matches||[]).forEach(m=>(isMatchPlayed(m)?played:upcoming).push(m));
    return { playedMatches:played, upcomingMatches:upcoming };
  },[currentPhase, phase]);

  const renderMatchCard = m => {
    if (phase === 'group') {
      return (
        <GuessGroupMatchCard key={m.id} match={m}
          prediction={predictions.group?.[m.id]}
          onPred={onGroupPred} isMobile={isMobile}
          rivalPicks={compareList.map(r=>({ name:r.n, prediction:r.predictions?.group?.[m.id] }))}/>
      );
    }
    const label = phase === 'final'
      ? (m.id === 'third' ? t('match_label_third') : t('match_label_final'))
      : undefined;
    return (
      <GuessKOMatchCard key={m.id} match={m}
        prediction={predictions.ko?.[m.id]}
        onPred={onKOPred} isMobile={isMobile}
        matchLabel={label}
        prevPhaseLabel={prevPhaseLabel}
        rivalPicks={compareList.map(r=>({ name:r.n, prediction:r.predictions?.ko?.[m.id] }))}/>
    );
  };

  return (
    <div>
      {showFirstPlace && (
        <FirstPlaceCelebration
          name={playerName || t('you_default')}
          onDismiss={() => setShowFirstPlace(false)}
        />
      )}

      {/* Rivals Leaderboard */}
      <RivalsLeaderboard
        rivals={rivals} myName={playerName} myPts={pts}
        groupMatches={groupMatches} ko={ko} canShare={canShare}
        onShare={onShare} onRemove={onRemoveRival}
        compareRival={compareRival} onToggleCompare={toggleCompare}
      />

      {/* Paste a sync link received in another storage context (e.g. browser vs. installed PWA) */}
      <PasteSyncLink onResolve={onResolveLink} />

      {/* Summary + Share All */}
      <div style={{background:CARD, border:`1px solid rgba(167,139,250,0.3)`, borderRadius:14, padding:"14px 16px", marginBottom:14}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8}}>
          <div>
            <div style={{fontSize:9, color:PURPLE, letterSpacing:2, fontWeight:700, textTransform:"uppercase", marginBottom:4}}>{t('fantasy_label')}</div>
            <div style={{fontSize:22, fontWeight:900, color:"#fff"}}>
              {pts.total} <span style={{fontSize:13, color:"#666", fontWeight:400}}>{t('pts_label')}</span>
            </div>
            {pts.played > 0 && (
              <div style={{fontSize:10, color:"#666", marginTop:2}}>
                {t('pts_played_summary').replace('{played}',pts.played).replace('{exact}',pts.exact).replace('{correct}',pts.correct).replace('{wrong}',pts.wrong)}
              </div>
            )}
          </div>
          {canShare ? (
            <button
              onClick={()=>copyText(buildShareText(groupMatches,ko,predictions,pts,null,t),'all')}
              style={{background:`rgba(167,139,250,0.15)`, border:`1px solid rgba(167,139,250,0.4)`,
                color:PURPLE, borderRadius:10, padding:"8px 14px", fontSize:12, fontWeight:700,
                cursor:"pointer", display:"flex", alignItems:"center", gap:6}}
            >
              {copied==='all' ? t('copied') : t('share_all')}
            </button>
          ) : (
            <div style={{fontSize:10, color:"#555", maxWidth:160, textAlign:"right"}}>{t('share_locked_hint')}</div>
          )}
        </div>
      </div>

      {/* Phase Selector */}
      <div style={{display:"flex", gap:6, overflowX:"auto", paddingBottom:8, marginBottom:12, scrollbarWidth:"none", msOverflowStyle:"none"}}>
        {PHASES.map(p => {
          const unlocked = isUnlocked(p.key);
          const active = phase === p.key;
          return (
            <button key={p.key} onClick={()=>setPhase(p.key)} style={{
              padding:"6px 12px", borderRadius:20, fontSize:11, fontWeight:700,
              letterSpacing:0.5, whiteSpace:"nowrap", flexShrink:0,
              border:`1px solid ${active?PURPLE:unlocked?'rgba(167,139,250,0.3)':BORDER}`,
              background:active?`rgba(167,139,250,0.2)`:"transparent",
              color:active?PURPLE:unlocked?"#888":"#444",
              cursor:"pointer",
            }}>
              {unlocked?'':'🔒 '}{p.label}
            </button>
          );
        })}
      </div>

      {/* Phase header + Share Phase */}
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
        <div>
          <div style={{fontSize:12, fontWeight:700, color:"#ccc"}}>{currentPhase?.label}</div>
          {pts.byPhase[phase] > 0 && (
            <div style={{fontSize:10, color:PURPLE, marginTop:2}}>{t('pts_earned').replace('{pts}',pts.byPhase[phase])}</div>
          )}
        </div>
        {canSharePhase ? (
          <button
            onClick={()=>copyText(buildShareText(groupMatches,ko,predictions,pts,phase,t),'phase')}
            style={{background:"transparent", border:`1px solid rgba(167,139,250,0.3)`,
              color:"#888", borderRadius:8, padding:"5px 10px", fontSize:10, fontWeight:700, cursor:"pointer"}}
          >
            {copied==='phase' ? t('copied') : t('share_phase')}
          </button>
        ) : isUnlocked(phase) && (
          <div style={{fontSize:10, color:"#555", maxWidth:140, textAlign:"right"}}>{t('share_phase_locked_hint')}</div>
        )}
      </div>

      {/* Match list */}
      {!isUnlocked(phase) ? (
        <div style={{textAlign:"center", padding:"32px 0", color:"#555", fontSize:13}}>
          {t('phase_locked_reason').replace('{phase}', prevPhaseLabel)}
        </div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:8}}>
          {playedMatches.length > 0 && (() => {
            // Pin the most recent played match so its picked scores stay visible
            // even when the rest of the played matches are collapsed away — only
            // the older results hide behind the toggle.
            const lastPlayed = playedMatches[playedMatches.length - 1];
            const olderPlayed = playedMatches.slice(0, -1);
            return (
              <div style={{display:"flex", flexDirection:"column", gap:8}}>
                {olderPlayed.length > 0 && (
                  <div>
                    <button onClick={()=>setShowPlayed(p=>!p)} style={{
                      width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
                      background:"transparent", border:`1px solid ${BORDER}`, borderRadius:10,
                      padding:"8px 12px", color:"#888", fontSize:11, fontWeight:700, cursor:"pointer",
                    }}>
                      <span>
                        {showPlayed ? t('hide_played_matches') : t('show_played_matches')}
                        {' · '}
                        {olderPlayed.length===1 ? t('match_count').replace('{n}',olderPlayed.length) : t('matches_count').replace('{n}',olderPlayed.length)}
                      </span>
                      <span style={{fontSize:9}}>{showPlayed ? '▲' : '▼'}</span>
                    </button>
                    {showPlayed && (
                      <div style={{display:"flex", flexDirection:"column", gap:8, marginTop:8}}>
                        {olderPlayed.map(renderMatchCard)}
                      </div>
                    )}
                  </div>
                )}
                {renderMatchCard(lastPlayed)}
              </div>
            );
          })()}
          {upcomingMatches.map(renderMatchCard)}
        </div>
      )}
    </div>
  );
}

// ─── Match Kick-off Notifications ──────────────────────────────────────────────
const NOTIF_KEY = "wc2026:notify:v1";

function loadNotifState() {
  try {
    const raw = localStorage.getItem(NOTIF_KEY);
    const parsed = raw ? JSON.parse(raw) : null;
    return { enabled: !!parsed?.enabled, notified: parsed?.notified || {} };
  } catch (e) {
    return { enabled: false, notified: {} };
  }
}
function saveNotifState(state) {
  try { localStorage.setItem(NOTIF_KEY, JSON.stringify(state)); } catch (e) {}
}

// Flatten group + knockout fixtures into a single list of matches with both
// teams known and a UTC kick-off Date, ready to be checked against "now".
function getNotifiableMatches(groupMatches, ko) {
  const list = [];
  Object.values(groupMatches).flat().forEach(m => {
    list.push({ id:`g-${m.id}`, home:m.home, away:m.away, city:m.city, kickoff:matchToUTC(m.date,m.time) });
  });
  [...ko.r32,...ko.r16,...ko.qf,...ko.sf,...ko.final,...ko.third].forEach(m => {
    if (!m.teamA || !m.teamB || m.date==="TBD") return;
    list.push({ id:`k-${m.id}`, home:m.teamA, away:m.teamB, city:m.city, kickoff:matchToUTC(m.date,m.time) });
  });
  return list;
}

function roundRectPath(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// Shrink the font size until `text` fits within `maxWidth`
function fitFontSize(ctx,text,maxWidth,startSize){
  let size=startSize;
  ctx.font=`900 ${size}px Arial,sans-serif`;
  while(ctx.measureText(text).width>maxWidth && size>14){
    size-=2;
    ctx.font=`900 ${size}px Arial,sans-serif`;
  }
  return size;
}

// Bundled SVG flags load fast and work offline; cache them so repeat
// notifications (e.g. multiple kick-offs in the same minute) don't refetch.
const _flagImgCache={};
function loadFlagImg(team){
  const cc=FLAG[team];
  if(!cc) return Promise.resolve(null);
  if(_flagImgCache[cc]) return _flagImgCache[cc];
  const p=new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>resolve(null);
    img.src=`/worldcup-2026/icons/flags/${cc}.svg`;
  });
  _flagImgCache[cc]=p;
  return p;
}

// Build a "VS" banner (team flags on each team's colours) used as the
// notification's big-picture `image`.
async function buildMatchBanner(home,away){
  const W=800,H=400;
  const canvas=document.createElement('canvas');
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');

  const [hc1,hc2]=TEAM_COLORS[home]||DEFAULT_TEAM_COLORS;
  const [ac1,ac2]=TEAM_COLORS[away]||DEFAULT_TEAM_COLORS;

  // Diagonal split: home team's colours on the left, away team's on the right
  const gLeft=ctx.createLinearGradient(0,0,W*0.6,H);
  gLeft.addColorStop(0,hc1); gLeft.addColorStop(1,hc2);
  ctx.fillStyle=gLeft;
  ctx.beginPath();
  ctx.moveTo(0,0); ctx.lineTo(W*0.56,0); ctx.lineTo(W*0.44,H); ctx.lineTo(0,H);
  ctx.closePath(); ctx.fill();

  const gRight=ctx.createLinearGradient(W*0.4,0,W,H);
  gRight.addColorStop(0,ac2); gRight.addColorStop(1,ac1);
  ctx.fillStyle=gRight;
  ctx.beginPath();
  ctx.moveTo(W*0.56,0); ctx.lineTo(W,0); ctx.lineTo(W,H); ctx.lineTo(W*0.44,H);
  ctx.closePath(); ctx.fill();

  // Dark gradient at the bottom so the team names stay legible
  const gOverlay=ctx.createLinearGradient(0,H*0.5,0,H);
  gOverlay.addColorStop(0,"rgba(8,13,22,0)");
  gOverlay.addColorStop(1,"rgba(8,13,22,0.88)");
  ctx.fillStyle=gOverlay;
  ctx.fillRect(0,0,W,H);

  // Flags
  const [homeImg,awayImg]=await Promise.all([loadFlagImg(home),loadFlagImg(away)]);
  const flagW=210,flagH=148,flagY=H*0.36;
  function drawFlag(img,cx){
    if(!img) return;
    ctx.save();
    ctx.shadowColor="rgba(0,0,0,0.5)"; ctx.shadowBlur=20; ctx.shadowOffsetY=8;
    roundRectPath(ctx,cx-flagW/2,flagY-flagH/2,flagW,flagH,12);
    ctx.fillStyle="#000"; ctx.fill();
    ctx.restore();
    ctx.save();
    roundRectPath(ctx,cx-flagW/2,flagY-flagH/2,flagW,flagH,12);
    ctx.clip();
    ctx.drawImage(img,cx-flagW/2,flagY-flagH/2,flagW,flagH);
    ctx.restore();
    ctx.save();
    roundRectPath(ctx,cx-flagW/2,flagY-flagH/2,flagW,flagH,12);
    ctx.lineWidth=4; ctx.strokeStyle="rgba(255,255,255,0.85)"; ctx.stroke();
    ctx.restore();
  }
  drawFlag(homeImg,W*0.255);
  drawFlag(awayImg,W*0.745);

  // "VS" badge
  ctx.save();
  ctx.fillStyle="rgba(8,13,22,0.9)";
  ctx.beginPath(); ctx.arc(W/2,flagY,40,0,Math.PI*2); ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle=GOLD; ctx.stroke();
  ctx.fillStyle=GOLD; ctx.font="900 34px Arial,sans-serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("VS",W/2,flagY+2);
  ctx.restore();

  // Team names
  ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.shadowColor="rgba(0,0,0,0.6)"; ctx.shadowBlur=6; ctx.shadowOffsetY=2;
  const maxNameWidth=W*0.42;
  [[home,W*0.255],[away,W*0.745]].forEach(([name,cx])=>{
    const size=fitFontSize(ctx,name.toUpperCase(),maxNameWidth,32);
    ctx.font=`900 ${size}px Arial,sans-serif`;
    ctx.fillText(name.toUpperCase(),cx,H*0.86);
  });

  // Header label
  ctx.shadowBlur=0; ctx.fillStyle=ACCENT;
  ctx.font="900 24px Arial,sans-serif";
  ctx.fillText("⚽ KICK-OFF!",W/2,40);

  return canvas.toDataURL('image/png');
}

// Show the rich kick-off notification via the service worker
async function showKickoffNotification(match,t){
  if(typeof Notification==='undefined'||Notification.permission!=='granted') return;
  if(!('serviceWorker' in navigator)) return;
  let image;
  try { image=await buildMatchBanner(match.home,match.away); } catch(e) {}
  const reg=await navigator.serviceWorker.ready;
  reg.showNotification(t('notif_kickoff_title'), {
    body:t('notif_kickoff_body').replace('{home}',match.home).replace('{away}',match.away).replace('{city}',match.city),
    icon:'/worldcup-2026/icons/icon-192.png',
    badge:'/worldcup-2026/icons/icon-192.png',
    image,
    tag:`kickoff-${match.id}`,
    vibrate:[200,100,200],
    data:{ url:'/worldcup-2026/#fixtures' },
  });
}

// Polls the upcoming-matches list while notifications are enabled and fires a
// kick-off notification once a match's kick-off time is reached. Also
// re-checks whenever the app regains visibility/focus, so a kick-off that
// happened while the phone was locked or the app was backgrounded still
// surfaces a notification as soon as the user comes back.
const NOTIF_CHECK_MS=30000;
const NOTIF_CATCHUP_MS=3*60*60*1000; // how late a kick-off can still trigger a notification
function useGameNotifications(matches,enabled,t){
  const matchesRef=useRef(matches);
  matchesRef.current=matches;
  const tRef=useRef(t);
  tRef.current=t;

  useEffect(()=>{
    if(!enabled) return;
    if(typeof Notification==='undefined'||Notification.permission!=='granted') return;

    const check=()=>{
      const now=Date.now();
      const state=loadNotifState();
      let changed=false;
      matchesRef.current.forEach(m=>{
        if(state.notified[m.id]) return;
        const ts=m.kickoff.getTime();
        if(now<ts) return;
        if(now-ts<NOTIF_CATCHUP_MS) showKickoffNotification(m,tRef.current);
        state.notified[m.id]=true;
        changed=true;
      });
      if(changed) saveNotifState(state);
    };

    check();
    const interval=setInterval(check,NOTIF_CHECK_MS);
    const onVisible=()=>{ if(document.visibilityState==='visible') check(); };
    document.addEventListener('visibilitychange',onVisible);
    window.addEventListener('focus',check);
    window.addEventListener('pageshow',check);
    return ()=>{
      clearInterval(interval);
      document.removeEventListener('visibilitychange',onVisible);
      window.removeEventListener('focus',check);
      window.removeEventListener('pageshow',check);
    };
  },[enabled,matches]);
}

function App(){
  const { t, lang, toggle } = useLang();
  const [splash,setSplash]=useState(true);
  const [groupMatches,setGroupMatches]=useState(buildInitialGroupMatches);
  // Pre-propagate so KO matches already have teamA/teamB resolved on the very
  // first render — otherwise the flash-detection baseline below would miss
  // already-scored KO matches and treat them as "new" once propagateKO runs.
  const [ko,setKo]=useState(()=>propagateKO(buildInitialKO(),buildInitialGroupMatches()));
  const [view,setView]=useState("guesses");
  const [fixtureFilter,setFixtureFilter]=useState(null); // group letter to pre-filter fixtures
  const [predictions,setPredictions]=useState(loadPredictions);
  const isMobile=useIsMobile();
  const navRef=useRef(null);
  const [navHeight,setNavHeight]=useState(0);

  // Rivals / proximity sharing
  const [rivals,setRivals]=useState(loadRivals);
  const [playerName,setPlayerName]=useState(loadPlayerName);
  const [showShareModal,setShowShareModal]=useState(false);
  const [shareModalMode,setShareModalMode]=useState('rival');
  const [incomingRival,setIncomingRival]=useState(null);
  const [incomingTransfer,setIncomingTransfer]=useState(null);
  const [incomingBackup,setIncomingBackup]=useState(null);
  const [flashData,setFlashData]=useState(null);
  // ID of the group match currently animating into the Fixtures "played" section
  const [collapsingMatchId,setCollapsingMatchId]=useState(null);
  const [syncHint,setSyncHint]=useState(null);

  // Kick-off notifications
  const [notifEnabled,setNotifEnabled]=useState(()=>loadNotifState().enabled);

  // Score refresh
  const [refreshing,setRefreshing]=useState(false);
  const [lastUpdated,setLastUpdated]=useState(()=>{
    try{ return localStorage.getItem(UPDATED_KEY)||null; }catch(e){ return null; }
  });

  // Refs to read current state inside effects without re-running them
  const predictionsRef=useRef(predictions);
  predictionsRef.current=predictions;
  const rivalsRef=useRef(rivals);
  rivalsRef.current=rivals;
  const playerNameRef=useRef(playerName);
  playerNameRef.current=playerName;

  // Persist rivals + playerName
  useEffect(()=>{saveRivals(rivals);},[rivals]);
  useEffect(()=>{savePlayerName(playerName);},[playerName]);

  // Detect ?rival= URL param on first load — offer to add the rival
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const rivalParam=params.get('rival');
    if(!rivalParam) return;
    const decoded=decodePreds(rivalParam);
    if(!decoded) return;
    // Don't add yourself or a duplicate
    const alreadyExists=loadRivals().some(r=>r.n===decoded.n);
    if(alreadyExists){ window.history.replaceState({},'',window.location.pathname); return; }
    setIncomingRival({...decoded,_raw:rivalParam});
    window.history.replaceState({},'',window.location.pathname);
  },[]);

  // Detect ?transfer= URL param on first load — offer to import predictions from another device
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    const transferParam=params.get('transfer');
    if(!transferParam) return;
    const decoded=decodePreds(transferParam);
    if(!decoded) return;
    setIncomingTransfer(decoded);
    window.history.replaceState({},'',window.location.pathname);
  },[]);

  // Measure the real (unzoomed) bottom-nav height so fixed bars can sit flush above it
  useEffect(()=>{
    const el=navRef.current;
    if(!el){setNavHeight(0);return;}
    const measure=()=>setNavHeight(el.offsetHeight);
    measure();
    const ro=new ResizeObserver(measure);
    ro.observe(el);
    return ()=>ro.disconnect();
  },[isMobile]);

  useEffect(()=>{
    let meta=document.querySelector('meta[name="viewport"]');
    if(!meta){meta=document.createElement("meta");meta.name="viewport";document.head.appendChild(meta);}
    meta.content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover";
  },[]);

  useEffect(()=>{setKo(prev=>propagateKO(prev,groupMatches));},[groupMatches]);

  // Persist scores to localStorage whenever they change
  useEffect(()=>{saveScores(groupMatches,ko);},[groupMatches,ko]);
  useEffect(()=>{savePredictions(predictions);},[predictions]);

  // Flash detection: compare snapshot of all scores before/after changes.
  // Newly-completed/changed scores are debounced so a flash only fires once
  // the score has settled — otherwise an in-progress edit (e.g. briefly
  // passing through 0-0 while dialing in the real result) could coincidentally
  // match someone's prediction and pop the celebration prematurely.
  const FLASH_DEBOUNCE_MS=2500;
  const prevScoresRef=useRef(null);
  const pendingFlashRef=useRef({});
  const collapseTimeoutRef=useRef({});
  const collapseFallbackRef=useRef({});

  useEffect(()=>{
    // Build current score snapshot
    const snap={};
    Object.values(groupMatches).flat().forEach(m=>{
      if(m.homeScore!==null&&m.awayScore!==null) snap[m.id]={h:m.homeScore,a:m.awayScore,hn:m.home,an:m.away,kind:'group'};
    });
    [...ko.r32,...ko.r16,...ko.qf,...ko.sf,...ko.final,...ko.third].forEach(m=>{
      if(m.scoreA!==null&&m.scoreB!==null&&m.teamA&&m.teamB) snap[m.id]={h:m.scoreA,a:m.scoreB,hn:m.teamA,an:m.teamB,kind:'ko'};
    });

    const prev=prevScoresRef.current;
    prevScoresRef.current=snap;

    // Cancel pending flashes for matches whose score was cleared/changed away again
    Object.keys(pendingFlashRef.current).forEach(id=>{
      const p=pendingFlashRef.current[id];
      if(!snap[id]||snap[id].h!==p.h||snap[id].a!==p.a){
        clearTimeout(p.timeoutId);
        delete pendingFlashRef.current[id];
      }
    });

    // Cancel pending/scheduled collapses for matches whose score was cleared/changed away again
    Object.keys(collapseTimeoutRef.current).forEach(id=>{
      if(!snap[id]){
        clearTimeout(collapseTimeoutRef.current[id]);
        delete collapseTimeoutRef.current[id];
        clearTimeout(collapseFallbackRef.current[id]);
        delete collapseFallbackRef.current[id];
      }
    });

    if(prev===null) return; // first run: just establish the baseline

    // Find matches whose score is newly complete or has changed since last run
    Object.entries(snap).forEach(([id,{h,a,hn,an,kind}])=>{
      const prevEntry=prev[id];
      if(prevEntry&&prevEntry.h===h&&prevEntry.a===a) return; // unchanged
      if(pendingFlashRef.current[id]) return; // already debouncing this exact score

      const timeoutId=setTimeout(()=>{
        delete pendingFlashRef.current[id];
        const winners=[];
        const preds=predictionsRef.current;
        const myG=preds.group?.[id]; const myK=preds.ko?.[id];
        const myH=myG?myG.home:myK?myK.a:undefined;
        const myA=myG?myG.away:myK?myK.b:undefined;
        let myExactMilestone=null;
        if(myH!=null&&myA!=null){
          const pts=scorePrediction(myH,myA,h,a);
          if(pts>0) winners.push({name:playerNameRef.current||'You',pts,goalDiff:isGoalDiffMatch(myH,myA,h,a),isMe:true});
          if(pts===3){
            const myExactCount=calcPoints(groupMatches,ko,predictionsRef.current).exact;
            if(myExactCount>0 && myExactCount%5===0) myExactMilestone=myExactCount;
          }
        }
        rivalsRef.current.forEach(r=>{
          const rG=r.predictions?.group?.[id]; const rK=r.predictions?.ko?.[id];
          const rH=rG?rG.home:rK?rK.a:undefined;
          const rA=rG?rG.away:rK?rK.b:undefined;
          if(rH!=null&&rA!=null){
            const pts=scorePrediction(rH,rA,h,a);
            if(pts>0) winners.push({name:r.n,pts,goalDiff:isGoalDiffMatch(rH,rA,h,a),isMe:false});
          }
        });
        if(winners.length>0){
          setFlashData({matchId:id,scoreH:h,scoreA:a,home:hn,away:an,winners,milestone:myExactMilestone});
        }

        // Schedule this match's collapse into the Fixtures "played" section.
        // If a WinnerFlash celebration is about to show, wait for it to finish
        // (plus a short buffer) so the collapse animation doesn't compete with it.
        if(kind==='group'){
          clearTimeout(collapseTimeoutRef.current[id]);
          clearTimeout(collapseFallbackRef.current[id]);
          const delay = winners.length>0 ? WINNER_FLASH_MS+300 : 400;
          collapseTimeoutRef.current[id]=setTimeout(()=>{
            delete collapseTimeoutRef.current[id];
            setCollapsingMatchId(id);
          },delay);
          // Fallback: if FixturesView never reports the animation as done
          // (e.g. it's not mounted, or the match is hidden by a group filter),
          // make sure collapsingMatchId doesn't get stuck forever.
          collapseFallbackRef.current[id]=setTimeout(()=>{
            delete collapseFallbackRef.current[id];
            handleCollapseAnimEnd(id);
          },delay+1500);
        }
      },FLASH_DEBOUNCE_MS);

      pendingFlashRef.current[id]={h,a,timeoutId};
    });
  },[groupMatches,ko]);

  // Cancel any pending flash/collapse timers on unmount
  useEffect(()=>()=>{
    Object.values(pendingFlashRef.current).forEach(p=>clearTimeout(p.timeoutId));
    Object.values(collapseTimeoutRef.current).forEach(clearTimeout);
    Object.values(collapseFallbackRef.current).forEach(clearTimeout);
  },[]);

  // Marks a Fixtures "collapse into played" animation as finished (called by
  // FixturesView when the CollapseTransition completes, or by the fallback
  // timer above if it never gets the chance to run).
  const handleCollapseAnimEnd=useCallback((id)=>{
    setCollapsingMatchId(prev=>prev===id?null:prev);
  },[]);

  const updateGroupScore=useCallback((group,matchId,side,val)=>{
    setGroupMatches(prev=>({...prev,[group]:prev[group].map(m=>m.id===matchId?{...m,[side]:val}:m)}));
  },[]);
  const updateKOScore=useCallback((round,idx,field,val)=>{
    setKo(prev=>{const next=structuredClone(prev);next[round][idx][field]=val;return propagateKO(next,groupMatches);});
  },[groupMatches]);
  const updateGroupPred=useCallback((matchId,side,val)=>{
    setPredictions(prev=>({...prev,group:{...prev.group,[matchId]:{...prev.group?.[matchId],[side]:val}}}));
  },[]);
  const updateKOPred=useCallback((matchId,field,val)=>{
    setPredictions(prev=>({...prev,ko:{...prev.ko,[matchId]:{...prev.ko?.[matchId],[field]:val}}}));
  },[]);

  const handleAcceptRival=useCallback((rival)=>{
    const {_raw,...rivalData}=rival;
    setRivals(prev=>[...prev,{...rivalData,addedAt:Date.now()}]);
    setIncomingRival(null);
    if(_raw) setSyncHint({name:rivalData.n,raw:_raw});
  },[]);

  const handleAcceptTransfer=useCallback((data)=>{
    setPredictions(data.predictions);
    if(data.n && data.n!=='Anonymous') setPlayerName(data.n);
    setIncomingTransfer(null);
  },[]);

  // Resolve a pasted share link (rival or transfer) — reuses the same
  // incoming-prompt flow as a `?rival=`/`?transfer=` URL param.
  const handleResolvePastedLink=useCallback((text)=>{
    const rivalParam=extractLinkParam(text,'rival');
    if(rivalParam){
      const decoded=decodePreds(rivalParam);
      if(!decoded) return 'invalid';
      if(rivalsRef.current.some(r=>r.n===decoded.n)) return 'duplicate';
      setIncomingRival({...decoded,_raw:rivalParam});
      return 'ok';
    }
    const transferParam=extractLinkParam(text,'transfer');
    if(transferParam){
      const decoded=decodePreds(transferParam);
      if(!decoded) return 'invalid';
      setIncomingTransfer(decoded);
      return 'ok';
    }
    return 'invalid';
  },[]);

  // Restore a backup file exported from this app (e.g. from the mobile
  // browser into the installed PWA, which has its own localStorage).
  const handleAcceptBackup=useCallback((data)=>{
    const predictions=data.predictions||{group:{},ko:{}};
    const rivals=data.rivals||[];
    const scores=data.scores||{group:{},ko:{}};

    try{ localStorage.setItem(PRED_KEY, JSON.stringify(predictions)); }catch(e){}
    try{ localStorage.setItem(RIVALS_KEY, JSON.stringify(rivals)); }catch(e){}
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(scores)); }catch(e){}
    if(data.playerName){
      try{ localStorage.setItem(PLAYER_KEY, data.playerName); }catch(e){}
    }

    setPredictions(predictions);
    setRivals(rivals);
    if(data.playerName) setPlayerName(data.playerName);

    const gm=buildInitialGroupMatches();
    setGroupMatches(gm);
    setKo(propagateKO(buildInitialKO(),gm));

    setIncomingBackup(null);
  },[]);

  const handleRemoveRival=useCallback((name)=>{
    setRivals(prev=>prev.filter(r=>r.n!==name));
  },[]);

  // Kick-off notifications
  const notifiableMatches=useMemo(()=>getNotifiableMatches(groupMatches,ko),[groupMatches,ko]);
  useGameNotifications(notifiableMatches,notifEnabled,t);

  const handleToggleNotif=useCallback(async()=>{
    if(typeof Notification==='undefined') return;
    if(notifEnabled){
      const state=loadNotifState();
      state.enabled=false;
      saveNotifState(state);
      setNotifEnabled(false);
      return;
    }
    if(Notification.permission==='denied'){
      alert(t('notif_denied'));
      return;
    }
    let permission=Notification.permission;
    if(permission==='default') permission=await Notification.requestPermission();
    if(permission==='granted'){
      const state=loadNotifState();
      state.enabled=true;
      saveNotifState(state);
      setNotifEnabled(true);
    }
  },[notifEnabled,t]);

  const applyAutoScores=useCallback((data)=>{
    if(data.group&&Object.keys(data.group).length){
      setGroupMatches(prev=>{
        const next={};
        Object.entries(prev).forEach(([g,matches])=>{
          next[g]=matches.map(m=>{
            const s=data.group[m.id];
            if(!s) return m;
            return {...m,homeScore:s.homeScore,awayScore:s.awayScore};
          });
        });
        return next;
      });
    }
    if(data.ko&&Object.keys(data.ko).length){
      setKo(prev=>{
        const next=structuredClone(prev);
        ['r32','r16','qf','sf','final','third'].forEach(round=>{
          next[round].forEach((m,idx)=>{
            if(!m.teamA||!m.teamB) return;
            const key=[m.teamA,m.teamB].sort().join('|');
            const s=data.ko[key];
            if(!s) return;
            if(s.scoreA!=null) next[round][idx].scoreA=s.scoreA;
            if(s.scoreB!=null) next[round][idx].scoreB=s.scoreB;
            next[round][idx].penA=s.penA??null;
            next[round][idx].penB=s.penB??null;
          });
        });
        return propagateKO(next,groupMatches);
      });
    }
  },[groupMatches]);

  const handleRefreshScores=useCallback(async()=>{
    if(refreshing) return;
    setRefreshing(true);
    try{
      const res=await fetch('/worldcup-2026/scores.json?t='+Date.now());
      if(res.ok){
        const data=await res.json();
        if(data&&data.updated){
          setLastUpdated(data.updated);
          try{ localStorage.setItem(UPDATED_KEY,data.updated); }catch(_){}
        }
        if(data&&(Object.keys(data.group||{}).length||Object.keys(data.ko||{}).length)){
          applyAutoScores(data);
        }
      }
    }catch(_){}
    setRefreshing(false);
  },[refreshing,applyAutoScores]);

  // Real results are only pulled when the user taps the refresh button — we
  // deliberately do NOT auto-fetch on load. The "last updated" label is seeded
  // from the cached timestamp (UPDATED_KEY) so it still reflects the last
  // refresh the user performed.

  const champion = React.useMemo(()=>koWinner(ko.final[0]),[ko]);

  const globalStats=useMemo(()=>{
    const allG=Object.values(groupMatches).flat();
    const gPlayed=allG.filter(m=>m.homeScore!==null&&m.awayScore!==null);
    const gGoals=gPlayed.reduce((s,m)=>s+(+m.homeScore)+(+m.awayScore),0);
    const allKO=[...ko.r32,...ko.r16,...ko.qf,...ko.sf,...ko.final,...ko.third];
    const kPlayed=allKO.filter(m=>m.scoreA!==null&&m.scoreB!==null&&m.teamA&&m.teamB);
    const kGoals=kPlayed.reduce((s,m)=>s+(+m.scoreA)+(+m.scoreB),0);
    const totalGoals=gGoals+kGoals,totalPlayed=gPlayed.length+kPlayed.length;
    const teamGoals={};
    gPlayed.forEach(m=>{teamGoals[m.home]=(teamGoals[m.home]||0)+(+m.homeScore);teamGoals[m.away]=(teamGoals[m.away]||0)+(+m.awayScore);});
    kPlayed.forEach(m=>{if(m.teamA)teamGoals[m.teamA]=(teamGoals[m.teamA]||0)+(+m.scoreA);if(m.teamB)teamGoals[m.teamB]=(teamGoals[m.teamB]||0)+(+m.scoreB);});
    return{
      totalGoals,totalPlayed,avgGoals:totalPlayed?(totalGoals/totalPlayed).toFixed(2):"0.00",
      topScorers:Object.entries(teamGoals).sort((a,b)=>b[1]-a[1]).slice(0,8).filter(([,g])=>g>0),
    };
  },[groupMatches,ko]);

  const NAV=[
    {v:"guesses",   Icon:IconGuesses,   label:t('nav_fantasy')},
    {v:"fixtures",  Icon:IconFixtures,  label:t('nav_fixtures')},
    {v:"standings", Icon:IconStandings, label:t('nav_standings')},
    {v:"knockout",  Icon:IconKnockout,  label:t('nav_knockout')},
    {v:"stats",     Icon:IconStats,     label:t('nav_stats')},
  ];

  const currentNav = NAV.find(n=>n.v===view)||NAV[0];

  return(
    <ChampionContext.Provider value={champion}>
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${BG} 0%,#0d1a2e 60%,${BG} 100%)`,fontFamily:"'Trebuchet MS','Segoe UI',sans-serif",color:"#e8eaf0",paddingBottom:isMobile?"calc(78px + env(safe-area-inset-bottom, 0px))":0}}>
      {splash && <SplashScreen onDone={()=>setSplash(false)}/>}
      {flashData && <WinnerFlash data={flashData} onDismiss={()=>setFlashData(null)}/>}
      {showShareModal && (
        <ShareModal
          playerName={playerName} predictions={predictions}
          rivals={rivals} groupMatches={groupMatches} ko={ko}
          initialMode={shareModalMode}
          onClose={()=>setShowShareModal(false)}
          onNameSave={n=>{setPlayerName(n);}}
          onImportFile={data=>setIncomingBackup(data)}
        />
      )}
      {incomingRival && (
        <AddRivalModal
          rival={incomingRival}
          onAccept={handleAcceptRival}
          onDecline={()=>setIncomingRival(null)}
        />
      )}
      {incomingTransfer && (
        <ImportPredictionsModal
          data={incomingTransfer}
          onAccept={()=>handleAcceptTransfer(incomingTransfer)}
          onDecline={()=>setIncomingTransfer(null)}
        />
      )}
      {incomingBackup && (
        <ImportBackupModal
          data={incomingBackup}
          onAccept={()=>handleAcceptBackup(incomingBackup)}
          onDecline={()=>setIncomingBackup(null)}
        />
      )}
      {syncHint && (
        <SyncHintToast
          hint={syncHint}
          isMobile={isMobile}
          onDismiss={()=>setSyncHint(null)}
        />
      )}

      {/* HEADER */}
      <div style={{background:"linear-gradient(90deg,#0a1020,#162035,#0a1020)",borderBottom:`2px solid ${ACCENT}`,position:"sticky",top:0,zIndex:100,boxShadow:`0 4px 24px rgba(0,208,132,0.18)`,overflow:"hidden",paddingTop:"env(safe-area-inset-top, 0px)"}}>
        <div style={{maxWidth:1040,margin:"0 auto",padding:isMobile?"0 12px":"0 24px",height:isMobile?56:62,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>

          {/* LEFT: emblem + wordmark */}
          <div style={{display:"flex",alignItems:"center",gap:9,flexShrink:0}}>
            <img
              src={EMBLEM_DATA_URL}
              alt="FIFA World Cup 2026"
              style={{width:isMobile?28:42,height:"auto",display:"block",filter:"drop-shadow(0 0 6px rgba(0,208,132,0.3))"}}
            />
            <div>
              <div style={{fontSize:isMobile?13:15,fontWeight:900,letterSpacing:isMobile?1:2,textTransform:"uppercase",color:"#fff",lineHeight:1.15}}>{t('header_title')}</div>
              <div style={{fontSize:isMobile?9:8,color:ACCENT,letterSpacing:isMobile?1:2,fontWeight:700}}>{t('header_subtitle')}</div>
            </div>
          </div>

          {/* RIGHT: page title + nav icons (desktop) / page title + score badge (mobile) */}
          <div style={{display:"flex",alignItems:"center",gap:isMobile?8:10,flexShrink:0}}>
            {/* Current page title */}
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <currentNav.Icon size={isMobile?18:20} active={true}/>
              <span style={{
                fontSize:isMobile?13:13,fontWeight:800,letterSpacing:isMobile?1:1.5,
                textTransform:"uppercase",color:"#fff",whiteSpace:"nowrap",
              }}>{currentNav.label}</span>
            </div>

            {/* Desktop icon-only nav */}
            {!isMobile&&(
              <div style={{display:"flex",gap:2,marginLeft:6}}>
                {NAV.map(({v,Icon,label})=>{
                  const isActive=view===v;
                  return(
                    <button key={v} onClick={()=>{setView(v);window.scrollTo({top:0});}} title={label} style={{
                      width:38,height:38,borderRadius:9,
                      border:`1.5px solid ${isActive?ACCENT:BORDER}`,
                      background:isActive?`${ACCENT}20`:"transparent",
                      cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",
                      transition:"all 0.15s",
                    }}>
                      <Icon size={19} active={isActive}/>
                    </button>
                  );
                })}
              </div>
            )}


            {/* Kick-off notifications toggle */}
            {typeof Notification!=='undefined'&&(
              <button onClick={handleToggleNotif} title={notifEnabled?t('notif_disable'):t('notif_enable')} style={{
                background:"transparent",border:"none",cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center",
                padding:"2px 4px",flexShrink:0,
                borderRadius:6,transition:"background 0.15s",
              }}
              onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.1)"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}
              ><IconBell size={isMobile?17:19} active={notifEnabled}/></button>
            )}

            {/* Language toggle */}
            <button onClick={toggle} title={lang==='en'?"Switch to Portuguese":"Mudar para Inglês"} style={{
              background:"transparent",border:"none",cursor:"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",
              padding:"2px 4px",flexShrink:0,
              borderRadius:6,transition:"background 0.15s",
            }}
            onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.1)"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}
            ><Flag team={lang==='en'?'Australia':'Brazil'} size={isMobile?15:17}/></button>
          </div>
        </div>
      </div>

      {/* MAIN */}
      <div style={{maxWidth:1040,margin:"0 auto",padding:isMobile?"12px 10px":"20px 24px",overflowX:"hidden",zoom:isMobile?1.2:1}}>
        {view==="fixtures"  && <FixturesView  groupMatches={groupMatches} onScore={updateGroupScore} isMobile={isMobile} navHeight={navHeight} initialFilter={fixtureFilter} onFilterUsed={()=>setFixtureFilter(null)} collapsingMatchId={collapsingMatchId} onCollapseAnimEnd={handleCollapseAnimEnd} onRefreshScores={handleRefreshScores} refreshing={refreshing} lastUpdated={lastUpdated}/>}
        {view==="standings" && <StandingsView groupMatches={groupMatches} isMobile={isMobile} onShowFixtures={g=>{setFixtureFilter(g);setView("fixtures");}}/>}
        {view==="knockout"  && <KnockoutView  ko={ko} onScore={updateKOScore} isMobile={isMobile} navHeight={navHeight} groupMatches={groupMatches} onRefreshScores={handleRefreshScores} refreshing={refreshing} lastUpdated={lastUpdated}/>}
        {view==="stats"     && <GlobalStats   stats={globalStats} groupMatches={groupMatches} ko={ko} isMobile={isMobile}/>}
        {view==="guesses"   && <GuessesView   groupMatches={groupMatches} ko={ko} predictions={predictions} onGroupPred={updateGroupPred} onKOPred={updateKOPred} isMobile={isMobile} navHeight={navHeight} rivals={rivals} playerName={playerName} onShare={()=>{setShareModalMode('rival');setShowShareModal(true);}} onRemoveRival={handleRemoveRival} onResolveLink={handleResolvePastedLink}/>}
      </div>

      {/* MOBILE BOTTOM NAV */}
      {isMobile&&(
        <div ref={navRef} style={{position:"fixed",bottom:0,left:0,right:0,background:"#0a1020",borderTop:`2px solid ${ACCENT}33`,display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom, 0px)"}}>
          {NAV.map(({v,Icon,label})=>(
            <button key={v} onClick={()=>{setView(v);window.scrollTo({top:0});}} style={{flex:1,padding:"14px 0 12px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <Icon size={22} active={view===v}/>
              <span style={{fontSize:10,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",color:view===v?ACCENT:"#555"}}>{label}</span>
              {view===v&&<span style={{width:18,height:2,background:ACCENT,borderRadius:2,marginTop:1}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
    </ChampionContext.Provider>
  );
}

// ─── UPWARD DROPDOWN ───────────────────────────────────────────────────────────
// Custom select that always opens its option list above the trigger button
// (native <select> popups are positioned by the browser and can't be forced up).
function UpDropdown({value,options,onChange}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(!open) return;
    const onOutside=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",onOutside);
    document.addEventListener("touchstart",onOutside);
    return ()=>{
      document.removeEventListener("mousedown",onOutside);
      document.removeEventListener("touchstart",onOutside);
    };
  },[open]);
  const current=options.find(o=>o.value===value);
  return(
    <div ref={ref} style={{position:"relative",fontFamily:"'Trebuchet MS','Segoe UI',sans-serif"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,padding:"10px 14px",borderRadius:9,border:`1.5px solid ${open?ACCENT:BORDER}`,background:CARD,color:"#fff",fontWeight:700,fontSize:13,fontFamily:"inherit",cursor:"pointer"}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{current?.label}</span>
        <span style={{color:open?ACCENT:"#777",fontSize:11,flexShrink:0,transform:open?"rotate(180deg)":"none",transition:"transform 0.15s"}}>▾</span>
      </button>
      {open&&(
        <div style={{position:"absolute",left:0,right:0,bottom:"calc(100% + 6px)",maxHeight:260,overflowY:"auto",borderRadius:10,border:`1.5px solid ${BORDER}`,background:"#0d1a2e",boxShadow:"0 -10px 30px rgba(0,0,0,0.55)",zIndex:250}}>
          {options.map(o=>{
            const isA=o.value===value;
            return(
              <div key={o.value} onClick={()=>{onChange(o.value);setOpen(false);}} style={{padding:"11px 14px",fontSize:13,fontWeight:isA?800:500,fontFamily:"inherit",color:isA?GOLD:"#ddd",background:isA?`${GOLD}14`:"transparent",cursor:"pointer",borderBottom:`1px solid rgba(255,255,255,0.05)`}}>
                {o.label}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── FIXED FILTER BAR ──────────────────────────────────────────────────────────
// On phones, portals to <body> so it sits flush above the bottom tab bar at the
// real (unzoomed) nav height — the MAIN container's CSS `zoom` would otherwise
// create its own containing block for position:fixed descendants and throw the
// offset off. On desktop it just sticks to the bottom of the content column.
function FixedFilterBar({isMobile,navHeight,marginTop,children}){
  if(isMobile){
    return ReactDOM.createPortal(
      <div style={{position:"fixed",left:0,right:0,bottom:navHeight,zIndex:150,padding:"8px 10px",background:"rgba(10,16,32,0.94)",backdropFilter:"blur(6px)",borderTop:`1px solid ${BORDER}`}}>
        {children}
      </div>,
      document.body
    );
  }
  return(
    <div style={{position:"sticky",bottom:0,zIndex:50,marginTop,paddingTop:8,paddingBottom:8,background:"rgba(10,16,32,0.92)",backdropFilter:"blur(6px)",borderTop:`1px solid ${BORDER}`}}>
      {children}
    </div>
  );
}

// ─── COLLAPSE TRANSITION ────────────────────────────────────────────────────────
// Animates a match card shrinking away when it's collapsed into "played".
function CollapseTransition({onDone, children}){
  const [collapsed,setCollapsed]=useState(false);
  useEffect(()=>{
    const raf=requestAnimationFrame(()=>setCollapsed(true));
    return ()=>cancelAnimationFrame(raf);
  },[]);
  return (
    <div
      onTransitionEnd={e=>{if(e.propertyName==='opacity') onDone&&onDone();}}
      style={{
        overflow:"hidden",
        transition:"max-height 0.45s ease, opacity 0.45s ease, transform 0.45s ease",
        maxHeight: collapsed?0:320,
        opacity: collapsed?0:1,
        transform: collapsed?"scale(0.9)":"scale(1)",
        transformOrigin:"top center",
      }}
    >
      {children}
    </div>
  );
}

// ─── FIXTURES VIEW ─────────────────────────────────────────────────────────────
// All 72 group matches sorted chronologically, grouped by date
function FixturesView({groupMatches,onScore,isMobile,navHeight,initialFilter,onFilterUsed,collapsingMatchId,onCollapseAnimEnd,onRefreshScores,refreshing,lastUpdated}){
  const { t } = useLang();
  const [filter,setFilter]=useState(initialFilter||"ALL");
  const dateRefs=useRef({});
  const containerRef=useRef(null);
  const didMountScrollRef=useRef(false);

  // Apply an incoming filter request from Standings shortcut (runs once)
  useEffect(()=>{
    if(initialFilter){setFilter(initialFilter);onFilterUsed&&onFilterUsed();}
  },[initialFilter]);

  const allMatches=useMemo(()=>{
    return Object.values(groupMatches).flat()
      .sort((a,b)=>a.dk-b.dk||a.tk-b.tk);
  },[groupMatches]);

  const filtered=filter==="ALL"?allMatches:allMatches.filter(m=>m.group===filter);

  // Matches that already have a final score collapse behind a "Show played"
  // toggle. A match that just finished stays in its normal slot — animating
  // into the collapsed section — until the CollapseTransition reports it's done.
  const [collapsedIds,setCollapsedIds]=useState(()=>{
    const ids=new Set();
    Object.values(groupMatches).flat().forEach(m=>{ if(isMatchScored(m)) ids.add(m.id); });
    return ids;
  });
  const [showPlayed,setShowPlayed]=useState(false);
  const [togglePulse,setTogglePulse]=useState(false);

  const handleCardCollapseEnd=useCallback((id)=>{
    setCollapsedIds(prev=>prev.has(id) ? prev : new Set(prev).add(id));
    onCollapseAnimEnd&&onCollapseAnimEnd(id);
  },[onCollapseAnimEnd]);

  const activeMatches=useMemo(
    ()=>filtered.filter(m=>!collapsedIds.has(m.id)||m.id===collapsingMatchId),
    [filtered,collapsedIds,collapsingMatchId]
  );
  const playedMatches=useMemo(
    ()=>filtered.filter(m=>collapsedIds.has(m.id)&&m.id!==collapsingMatchId),
    [filtered,collapsedIds,collapsingMatchId]
  );

  // Briefly pulse the "Show played" toggle whenever a match collapses into it
  const prevPlayedCountRef=useRef(playedMatches.length);
  useEffect(()=>{
    if(playedMatches.length>prevPlayedCountRef.current){
      setTogglePulse(true);
      const timer=setTimeout(()=>setTogglePulse(false),900);
      prevPlayedCountRef.current=playedMatches.length;
      return ()=>clearTimeout(timer);
    }
    prevPlayedCountRef.current=playedMatches.length;
  },[playedMatches.length]);

  // Group by date
  const byDate=useMemo(()=>{
    const map={};
    activeMatches.forEach(m=>{
      if(!map[m.date]) map[m.date]={date:m.date,dk:m.dk,matches:[]};
      map[m.date].matches.push(m);
    });
    return Object.values(map).sort((a,b)=>a.dk-b.dk);
  },[activeMatches]);

  const playedByDate=useMemo(()=>{
    const map={};
    playedMatches.forEach(m=>{
      if(!map[m.date]) map[m.date]={date:m.date,dk:m.dk,matches:[]};
      map[m.date].matches.push(m);
    });
    return Object.values(map).sort((a,b)=>a.dk-b.dk);
  },[playedMatches]);

  const scored=Object.values(groupMatches).flat().filter(m=>m.homeScore!==null).length;

  // Find the date section closest to today; skip today if all its games have already kicked off
  const closestDate=useMemo(()=>{
    if(byDate.length===0) return null;
    const dk=todayDk();
    const now=Date.now();
    const future=byDate.filter(d=>{
      if(d.dk>dk) return true;
      if(d.dk===dk) return d.matches.some(m=>matchToUTC(m.date,m.time).getTime()>now);
      return false;
    });
    return future.length>0 ? future[0].date : byDate[byDate.length-1].date;
  },[byDate]);

  const closestDk=useMemo(()=>byDate.find(d=>d.date===closestDate)?.dk??null,[byDate,closestDate]);

  // Scroll to closest date when filter changes (skip initial mount — tab switch resets to top)
  useEffect(()=>{
    if(!closestDate) return;
    if(!didMountScrollRef.current){ didMountScrollRef.current=true; return; }
    const el=dateRefs.current[closestDate];
    if(!el) return;
    const timer=setTimeout(()=>{
      el.scrollIntoView({behavior:"smooth",block:"start"});
    },120);
    return ()=>clearTimeout(timer);
  },[closestDate, filter]);

  const renderCard = m => {
    const card = <GroupMatchCard key={m.id} match={m} onScore={(side,val)=>onScore(m.group,m.id,side,val)} isMobile={isMobile}/>;
    if(m.id===collapsingMatchId){
      return <CollapseTransition key={m.id} onDone={()=>handleCardCollapseEnd(m.id)}>{card}</CollapseTransition>;
    }
    return card;
  };

  return(
    <div ref={containerRef} style={{paddingBottom:isMobile?170:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <button onClick={onRefreshScores} disabled={refreshing} title={t('refresh_scores')} style={{
            display:"flex",alignItems:"center",gap:5,background:"transparent",
            border:`1px solid ${BORDER}`,borderRadius:20,
            padding:"3px 10px 3px 7px",cursor:refreshing?"default":"pointer",
            color:refreshing?ACCENT:"#888",fontSize:10,fontWeight:700,opacity:refreshing?0.7:1,
            transition:"color 0.2s,opacity 0.2s",
          }}>
            <span style={{display:"inline-flex",animation:refreshing?"spin 0.8s linear infinite":undefined}}><IconSync size={13} active={refreshing}/></span>
            {refreshing?t('refreshing_scores'):t('refresh_scores')}
          </button>
          {formatUpdated(lastUpdated)&&<span style={{fontSize:10,color:"#555"}}>{t('last_updated').replace('{time}',formatUpdated(lastUpdated))}</span>}
        </div>
        <span style={{fontSize:10,color:"#555"}}>{t('played_count').replace('{n}',scored)}</span>
      </div>

      {/* Played matches — collapsed by default, shown up top so it doesn't get
          buried below a long list of upcoming fixtures on mobile */}
      {playedMatches.length>0&&(
        <div style={{marginBottom:22}}>
          <button onClick={()=>setShowPlayed(p=>!p)} style={{
            width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
            background:"transparent", border:`1px solid ${BORDER}`, borderRadius:10,
            padding:"8px 12px", color:"#888", fontSize:11, fontWeight:700, cursor:"pointer",
            animation: togglePulse ? "collapsedPulse 0.9s ease-out" : undefined,
          }}>
            <span>
              {showPlayed ? t('hide_played_matches') : t('show_played_matches')}
              {' · '}
              {playedMatches.length===1 ? t('match_count').replace('{n}',playedMatches.length) : t('matches_count').replace('{n}',playedMatches.length)}
            </span>
            <span style={{fontSize:9}}>{showPlayed ? '▲' : '▼'}</span>
          </button>
          {showPlayed&&playedByDate.map(({date,matches:dayMatches})=>(
            <div key={date} style={{marginTop:14}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:800,letterSpacing:1,color:"#fff"}}>{date}</div>
                <div style={{flex:1,height:1,background:BORDER}}/>
                <div style={{fontSize:9,color:"#555"}}>{dayMatches.length===1?t('match_count').replace('{n}',1):t('matches_count').replace('{n}',dayMatches.length)}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:8}}>
                {dayMatches.map(m=>(
                  <GroupMatchCard key={m.id} match={m} onScore={(side,val)=>onScore(m.group,m.id,side,val)} isMobile={isMobile}/>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Date sections */}
      {byDate.map(({date,matches:dayMatches})=>{
        const isToday=date===closestDate;
        return(
          <div
            key={date}
            ref={el=>{dateRefs.current[date]=el;}}
            style={{marginBottom:22,scrollMarginTop:72}}
          >
            {/* Date header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{
                fontSize:11,fontWeight:800,letterSpacing:1,
                color:isToday?"#fff":"#fff",
              }}>{date}</div>
              {isToday&&(
                <span style={{
                  fontSize:8,fontWeight:800,letterSpacing:1,
                  color:"#0a1020",background:ACCENT,
                  borderRadius:4,padding:"2px 6px",flexShrink:0,
                }}>{t(closestDk===todayDk()?'today_badge':closestDk===tomorrowDk()?'tomorrow_badge':'upcoming_badge')}</span>
              )}
              <div style={{flex:1,height:1,background:isToday?`${ACCENT}44`:BORDER}}/>
              <div style={{fontSize:9,color:"#555"}}>{dayMatches.length===1?t('match_count').replace('{n}',1):t('matches_count').replace('{n}',dayMatches.length)}</div>
            </div>
            {/* Matches grid: 1 col mobile, 2 col desktop */}
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:8}}>
              {dayMatches.map(renderCard)}
            </div>
          </div>
        );
      })}

      {/* Group filter dropdown — fixed above the bottom tab bar on phones so it's always within thumb's reach */}
      <FixedFilterBar isMobile={isMobile} navHeight={navHeight} marginTop={8}>

// ─── KNOCKOUT VIEW ─────────────────────────────────────────────────────────────
function KnockoutView({ko,onScore,isMobile,navHeight,groupMatches,onRefreshScores,refreshing,lastUpdated}){
  const { t } = useLang();
  const [round,setRound]=useState("r32");
  const ROUNDS=[
    {key:"r32",label:"R32",fullLabel:t('round_r32')},
    {key:"r16",label:"R16",fullLabel:t('round_r16')},
    {key:"qf",label:"QF",fullLabel:t('round_qf')},
    {key:"sf",label:"SF",fullLabel:t('round_sf')},
    {key:"third",label:t('finish_3rd'),fullLabel:t('round_third')},
    {key:"final",label:"🏆 Final",fullLabel:t('round_final')},
  ];
  const matches=ko[round];
  const currentRound=ROUNDS.find(r=>r.key===round);
  const dateRefs=useRef({});
  const didMountScrollRef=useRef(false);

  // Group by date
  const byDate=useMemo(()=>{
    const map={};
    matches.forEach(m=>{
      if(!map[m.date]) map[m.date]={date:m.date,dk:m.dk,matches:[]};
      map[m.date].matches.push(m);
    });
    return Object.values(map).sort((a,b)=>a.dk-b.dk)
      .map(g=>({...g,matches:[...g.matches].sort((a,b)=>timeKey(a.time||'0:00 AM')-timeKey(b.time||'0:00 AM'))}));
  },[matches]);

  // Find the date section closest to today; skip today if all its games have already kicked off
  const closestDate=useMemo(()=>{
    if(byDate.length===0) return null;
    const dk=todayDk();
    const now=Date.now();
    const future=byDate.filter(d=>{
      if(!d.dk||d.dk<=0) return false;
      if(d.dk>dk) return true;
      if(d.dk===dk) return d.matches.some(m=>m.date!=="TBD"&&matchToUTC(m.date,m.time).getTime()>now);
      return false;
    });
    return future.length>0 ? future[0].date : byDate[byDate.length-1].date;
  },[byDate]);

  const closestDk=useMemo(()=>byDate.find(d=>d.date===closestDate)?.dk??null,[byDate,closestDate]);

  // Scroll to closest date when round changes (skip initial mount — tab switch resets to top)
  useEffect(()=>{
    if(!closestDate) return;
    if(!didMountScrollRef.current){ didMountScrollRef.current=true; return; }
    const el=dateRefs.current[closestDate];
    if(!el) return;
    const timer=setTimeout(()=>{
      el.scrollIntoView({behavior:"smooth",block:"start"});
    },120);
    return ()=>clearTimeout(timer);
  },[closestDate, round]);

  return(
    <div style={{paddingBottom:isMobile?170:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <SLabel style={{margin:0}}>{currentRound?.fullLabel}</SLabel>
        <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",justifyContent:"flex-end"}}>
          {formatUpdated(lastUpdated)&&<span style={{fontSize:10,color:"#555"}}>{t('last_updated').replace('{time}',formatUpdated(lastUpdated))}</span>}
          <button onClick={onRefreshScores} disabled={refreshing} title={t('refresh_scores')} style={{
            display:"flex",alignItems:"center",gap:5,background:"transparent",
            border:`1px solid ${BORDER}`,borderRadius:20,
            padding:"3px 10px 3px 7px",cursor:refreshing?"default":"pointer",
            color:refreshing?ACCENT:"#888",fontSize:10,fontWeight:700,opacity:refreshing?0.7:1,
            transition:"color 0.2s,opacity 0.2s",
          }}>
            <span style={{display:"inline-flex",animation:refreshing?"spin 0.8s linear infinite":undefined}}><IconSync size={13} active={refreshing}/></span>
            {refreshing?t('refreshing_scores'):t('refresh_scores')}
          </button>
        </div>
      </div>
      {round==="final"&&ko.final[0].teamA&&(
        <div style={{textAlign:"center",marginBottom:16}}>
          <div style={{fontSize:30}}>🏆</div>
          <div style={{fontSize:12,color:GOLD,fontWeight:700,letterSpacing:2,textTransform:"uppercase"}}>{t('the_wc_final')}</div>
          {koWinner(ko.final[0])&&<div style={{marginTop:8,fontSize:isMobile?17:21,fontWeight:900,color:GOLD,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Flag team={koWinner(ko.final[0])} size={isMobile?17:21} /> <TeamName name={koWinner(ko.final[0])} style={{color:GOLD}}/> 🎉</div>}
        </div>
      )}

      {/* Date sections */}
      {byDate.map(({date,matches:dayMatches})=>{
        const isToday=date===closestDate;
        return(
          <div
            key={date}
            ref={el=>{dateRefs.current[date]=el;}}
            style={{marginBottom:22,scrollMarginTop:72}}
          >
            {/* Date header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{fontSize:11,fontWeight:800,letterSpacing:1,color:"#fff"}}>{date}</div>
              {isToday&&(
                <span style={{fontSize:8,fontWeight:800,letterSpacing:1,color:"#0a1020",background:ACCENT,borderRadius:4,padding:"2px 6px",flexShrink:0}}>{t(closestDk===todayDk()?'today_badge':closestDk===tomorrowDk()?'tomorrow_badge':'upcoming_badge')}</span>
              )}
              <div style={{flex:1,height:1,background:isToday?`${ACCENT}44`:BORDER}}/>
              <div style={{fontSize:9,color:"#555"}}>{dayMatches.length===1?t('match_count').replace('{n}',1):t('matches_count').replace('{n}',dayMatches.length)}</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:9}}>
              {dayMatches.map(m=>{
                const matchIdx=matches.indexOf(m);
                return <KOMatchCard key={m.id} match={m} matchIdx={matchIdx} round={round} onScore={onScore} isMobile={isMobile} groupMatches={groupMatches}/>;
              })}
            </div>
          </div>
        );
      })}

      {/* Round filter dropdown — fixed above the bottom tab bar on phones so it's always within thumb's reach */}
      <FixedFilterBar isMobile={isMobile} navHeight={navHeight} marginTop={14}>
        <UpDropdown
          value={round}
          onChange={setRound}
          options={ROUNDS.map(r=>({
            value:r.key,
            label:r.fullLabel+(ko[r.key].some(m=>m.scoreA!==null||m.scoreB!==null)?" •":""),
          }))}
        />
      </FixedFilterBar>
    </div>
  );
}

// ─── KO MATCH CARD ─────────────────────────────────────────────────────────────
// For an unresolved R32 slot, describe which group it comes from (and a flag
// preview of the candidate teams) instead of a bare "TBD". `slot` is a "1X"/"2X"
// group-position label; `thirdB` (teamB only) is the index into
// THIRD_PLACE_ELIGIBLE_GROUPS for "best 3rd place" slots.
function r32SlotInfo(t, slot, thirdB, groupMatches) {
  if (thirdB != null) {
    const groups = THIRD_PLACE_ELIGIBLE_GROUPS[thirdB];
    return {
      label: t('slot_best_third').replace('{g}', groups.join('/')),
      flags: groups.map(g => computeStandings(GROUPS[g], groupMatches[g])[2]?.team || null),
    };
  }
  if (!slot) return null;
  const pos = slot[0], g = slot.slice(1);
  return {
    label: t(pos === '1' ? 'slot_group_winner' : 'slot_group_runnerup').replace('{g}', g),
    flags: GROUPS[g],
  };
}

function KOMatchCard({match,matchIdx,round,onScore,isMobile,groupMatches}){
  const { t } = useLang();
  const winner=koWinner(match);
  const draw=match.scoreA!==null&&match.scoreB!==null&&+match.scoreA===+match.scoreB;
  const penWinner=draw&&match.penA!==null&&match.penB!==null
    ?(+match.penA>+match.penB?match.teamA:+match.penB>+match.penA?match.teamB:null):null;

  const row=(team,score,pen,scoreField,penField,isWinner,slot)=>{
    const has=!!team;
    return(
      <div style={{padding:"9px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
            <Flag team={has?team:null} size={isMobile?21:19} faded={!has} />
            <span style={{fontSize:12,fontWeight:isWinner?800:400,color:isWinner?"#fff":has?"#aaa":"#444",fontStyle:has?"normal":"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{has?<TeamName name={team}/>:slot?slot.label:t('tbd')}</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
            <Stepper value={score} onChange={v=>onScore(round,matchIdx,scoreField,v)} highlight={isWinner&&!draw} disabled={!has}/>
          </div>
        </div>
        {!has&&slot&&(
          <div style={{display:"flex",gap:3,marginTop:3,paddingLeft:isMobile?27:25,flexWrap:"wrap"}}>
            {slot.flags.map((tm,i)=>tm&&<Flag key={tm+i} team={tm} size={13}/>)}
          </div>
        )}
      </div>
    );
  };

  const penCell=(team,pen,penField,isWinner)=>(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,flex:1,minWidth:0}}>
      <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0,maxWidth:"100%"}}>
        <Flag team={team} size={15} />
        <span style={{fontSize:10,fontWeight:isWinner?800:500,color:isWinner?"#fff":"#999",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><TeamName name={team}/></span>
      </div>
      <Stepper value={pen} onChange={v=>onScore(round,matchIdx,penField,v)} highlight={isWinner} color={PURPLE} small pulse/>
    </div>
  );

  return(
    <div style={{background:winner?"linear-gradient(135deg,rgba(0,208,132,0.07),rgba(255,255,255,0.02))":CARD,border:`1px solid ${winner?"rgba(0,208,132,0.22)":draw&&(match.penA!==null||match.penB!==null)?`rgba(167,139,250,0.3)`:BORDER}`,borderRadius:12,padding:"11px 13px"}}>
      <div style={{marginBottom:7}}><TimeBadge date={match.date} time={match.time} city={match.city}/></div>
      <div style={{borderBottom:`1px solid ${BORDER}`,paddingBottom:2,marginBottom:2}}>{row(match.teamA,match.scoreA,match.penA,"scoreA","penA",winner===match.teamA,round==='r32'?r32SlotInfo(t,match.slotA,null,groupMatches):null)}</div>
      {row(match.teamB,match.scoreB,match.penB,"scoreB","penB",winner===match.teamB,round==='r32'?r32SlotInfo(t,match.slotB,match.thirdB,groupMatches):null)}
      {draw&&(
        <div style={{marginTop:8,padding:"9px 10px 11px",borderRadius:10,
          background:"linear-gradient(135deg, rgba(167,139,250,0.12), rgba(167,139,250,0.03))",
          border:"1px solid rgba(167,139,250,0.4)",
          animation:`penStripIn 0.4s cubic-bezier(0.22,1,0.36,1) both${penWinner?"":", penGlow 2.2s ease-in-out infinite 0.4s"}`}}>
          <div style={{textAlign:"center",fontSize:9,letterSpacing:2.5,fontWeight:800,color:PURPLE,textTransform:"uppercase",marginBottom:8}}>{t('penalty_shootout')}</div>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"center",gap:14}}>
            {penCell(match.teamA,match.penA,"penA",penWinner===match.teamA)}
            <span style={{fontSize:9,color:"#666",fontWeight:800,marginTop:8}}>VS</span>
            {penCell(match.teamB,match.penB,"penB",penWinner===match.teamB)}
          </div>
        </div>
      )}
      <div style={{marginTop:5,display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap"}}>
        {draw&&penWinner&&<span style={{fontSize:8,color:ACCENT,background:`${ACCENT}18`,border:`1px solid ${ACCENT}44`,borderRadius:20,padding:"2px 7px",fontWeight:700,display:"inline-flex",alignItems:"center",gap:3}}><Flag team={penWinner} size={11} /> <TeamName name={penWinner}/> {t('win_pen')}</span>}
        {!draw&&winner&&<span style={{fontSize:8,color:ACCENT,background:`${ACCENT}18`,border:`1px solid ${ACCENT}44`,borderRadius:20,padding:"2px 7px",fontWeight:700,display:"inline-flex",alignItems:"center",gap:3}}><Flag team={winner} size={11} /> <TeamName name={winner}/> {t('advance')}</span>}
      </div>
    </div>
  );
}

// ─── GROUP MATCH CARD ──────────────────────────────────────────────────────────

  const played=match.homeScore!==null&&match.awayScore!==null;
  const hw=played&&match.homeScore>match.awayScore;
  const aw=played&&match.awayScore>match.homeScore;
  const draw=played&&match.homeScore===match.awayScore;
  return(
    <div style={{background:played?"linear-gradient(135deg,rgba(0,208,132,0.06),rgba(255,255,255,0.02))":CARD,border:`1px solid ${played?"rgba(0,208,132,0.2)":BORDER}`,borderRadius:12,padding:"10px 12px"}}>

          {hw ? <><TeamName name={match.home}/><span style={{fontSize:7,color:ACCENT,marginLeft:5,letterSpacing:1}}>{t('win_badge')}</span></> : <TeamName name={match.home}/>}

      {/* Away */}

        <span style={{flex:1,fontSize:12,fontWeight:aw?800:500,color:aw?"#fff":"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>

        </span>
        <Stepper value={match.awayScore} onChange={v=>onScore("awayScore",v)} highlight={aw}/>
      </div>
      {draw&&<div style={{textAlign:"center",fontSize:8,color:"#666",letterSpacing:1,marginTop:5}}>{t('draw_badge')}</div>}
    </div>
  );
