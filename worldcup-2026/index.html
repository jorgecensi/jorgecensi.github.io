// Country flags are rendered as native emoji rather than from an external image
// CDN, so they display correctly on phones AND keep working offline (this app is
// an installable PWA). Regional flags (England/Scotland) use ISO tag sequences.
const EMOJI_FONT = '"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
function subdivisionFlag(tags){
  return "\u{1F3F4}" + [...tags].map(c=>String.fromCodePoint(0xE0000 + c.charCodeAt(0))).join("") + "\u{E007F}";
}
const FLAG_EMOJI = { "gb-eng": subdivisionFlag("gbeng"), "gb-sct": subdivisionFlag("gbsct") };
function ccToFlagEmoji(cc){
  if (FLAG_EMOJI[cc]) return FLAG_EMOJI[cc];
  return cc.toUpperCase().replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt(0)));
}

// Not every platform renders flag emoji as flags — desktop Windows (Segoe UI
// Emoji) shows the two-letter country code instead. Detect support once by
// drawing a flag to a canvas and checking for colour: a real flag glyph has
// non-grayscale pixels, whereas letter fallbacks are monochrome text. When
// unsupported we fall back to flag images (those clients are effectively
// always online, so the offline-PWA concern doesn't apply there).
let _flagEmojiSupport;
function supportsFlagEmoji(){
  if (_flagEmojiSupport !== undefined) return _flagEmojiSupport;
  _flagEmojiSupport = false;
  try {
    const c = document.createElement("canvas");
    c.width = c.height = 16;
    const ctx = c.getContext("2d");
    if (ctx) {
      ctx.textBaseline = "top";
      ctx.font = "16px " + EMOJI_FONT;
      ctx.fillStyle = "#000";
      ctx.fillText("\u{1F1FA}\u{1F1F8}", 0, 0); // 🇺🇸
      const d = ctx.getImageData(0, 0, 16, 16).data;
      for (let i = 0; i < d.length; i += 4) {
        if (d[i+3] > 0 && (d[i] !== d[i+1] || d[i+1] !== d[i+2])) { _flagEmojiSupport = true; break; }
      }
    }
  } catch (e) { _flagEmojiSupport = false; }
  return _flagEmojiSupport;
}

function Flag({ team, size=15, faded=false, style={} }) {
  const cc = team && FLAG[team];
  if (!cc) {
    const h = Math.round(size * 0.75);
    return (
      <span style={{
        display:"inline-block", width:size, height:h, borderRadius:2,
        background:"rgba(255,255,255,0.08)", flexShrink:0,
        opacity: faded ? 0.2 : 0.4, verticalAlign:"middle", ...style
      }} />
    );
  }
  if (supportsFlagEmoji()) {
    return (
      <span role="img" aria-label={team} style={{
        display:"inline-block", fontSize:Math.round(size*1.2), lineHeight:1,
        flexShrink:0, verticalAlign:"middle", opacity: faded ? 0.45 : 1,
        fontFamily: EMOJI_FONT, ...style
      }}>{ccToFlagEmoji(cc)}</span>
    );
  }
  // Fallback for platforms that don't render flag emoji (e.g. desktop Windows).
  const h = Math.round(size * 0.75);
  return (
    <img
      src={`https://flagcdn.com/w40/${cc}.png`}
      alt={team}
      width={size}
      height={h}
      style={{display:"inline-block", borderRadius:2, verticalAlign:"middle", flexShrink:0, opacity: faded ? 0.45 : 1, ...style}}
    />
  );
}

// Sortable date key for chronological ordering
function dateKey(d) {
  const months = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  const parts = d.split(" "); // e.g. "Fri 12 Jun"
  return months[parts[2]] * 100 + parseInt(parts[1]);
}
function timeKey(t) {
  // "5:00 AM" -> sortable int
  const [hm, ap] = t.split(" ");
  let [h, m] = hm.split(":").map(Number);
  if (ap === "PM" && h !== 12) h += 12;
  if (ap === "AM" && h === 12) h = 0;
  return h * 60 + m;
}

// ─── Data generation ──────────────────────────────────────────────────────────
function generateGroupMatches(groups) {
  const all = {};
  Object.entries(groups).forEach(([g, teams]) => {
    all[g] = GROUP_SCHEDULE[g].map(([hi,ai,date,time,city],idx) => ({
      id:`${g}-${idx}`, group:g,
      home:teams[hi], away:teams[ai],
      homeScore:null, awayScore:null,
      date, time, city,
      dk: dateKey(date), tk: timeKey(time),
    }));
  });
  return all;
}

function mkKOMatch(id, schedIdx, round) {
  const s = KO_SCHEDULE[round]?.[schedIdx];
  const date = s?.[0]||"TBD";
  return { id, teamA:null, teamB:null, scoreA:null, scoreB:null, penA:null, penB:null,
    date, time:s?.[1]||"TBD", city:s?.[2]||"TBD", dk:s?.[0]?dateKey(s[0]):0 };
}
function initKO() {
  return {
    r32: R32_BRACKET.map((b,i)=>({...mkKOMatch(b.id,i,"r32"),slotA:b.slotA,slotB:b.slotB,thirdB:b.thirdB})),
    r16: Array.from({length:8},(_,i)=>mkKOMatch(`r16-${i}`,i,"r16")),
    qf:  Array.from({length:4},(_,i)=>mkKOMatch(`qf-${i}`,i,"qf")),
    sf:  Array.from({length:2},(_,i)=>mkKOMatch(`sf-${i}`,i,"sf")),
    final:[mkKOMatch("final",0,"final")],
    third:[mkKOMatch("third",0,"third")],
  };
}

// ─── Persistence ───────────────────────────────────────────────────────────────
// User-entered scores are saved to localStorage so they survive page reloads and
// app restarts (this is an installable PWA). Only the score values are stored —
// keyed by stable match id — and merged back into a freshly generated schedule on
// load, so changes to the fixtures/bracket data don't break old saved scores.
const STORAGE_KEY = "wc2026:scores:v1";

function loadStoredScores() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch (e) {
    return null;
  }
}

function buildInitialGroupMatches() {
  const gm = generateGroupMatches(GROUPS);
  const stored = loadStoredScores();
  if (stored && stored.group) {
    Object.values(gm).forEach(matches => matches.forEach(m => {
      const s = stored.group[m.id];
      if (s) {
        if (s.homeScore !== undefined) m.homeScore = s.homeScore;
        if (s.awayScore !== undefined) m.awayScore = s.awayScore;
      }
    }));
  }
  return gm;
}

function buildInitialKO() {
  const ko = initKO();
  const stored = loadStoredScores();
  if (stored && stored.ko) {
    Object.values(ko).forEach(matches => matches.forEach(m => {
      const s = stored.ko[m.id];
      if (s) {
        ["scoreA", "scoreB", "penA", "penB"].forEach(f => {
          if (s[f] !== undefined) m[f] = s[f];
        });
      }
    }));
  }
  return ko;
}

function saveScores(groupMatches, ko) {
  try {
    const group = {};
    Object.values(groupMatches).flat().forEach(m => {
      if (m.homeScore !== null || m.awayScore !== null) {
        group[m.id] = { homeScore: m.homeScore, awayScore: m.awayScore };
      }
    });
    const koScores = {};
    [...ko.r32, ...ko.r16, ...ko.qf, ...ko.sf, ...ko.final, ...ko.third].forEach(m => {
      if (m.scoreA !== null || m.scoreB !== null || m.penA !== null || m.penB !== null) {
        koScores[m.id] = { scoreA: m.scoreA, scoreB: m.scoreB, penA: m.penA, penB: m.penB };
      }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ group, ko: koScores }));
  } catch (e) { /* storage unavailable (e.g. private mode) — fail silently */ }
}

// ─── Bolão (score-guessing predictions) ──────────────────────────────────────
const PRED_KEY = "wc2026:predictions:v1";

function loadPredictions() {
  try {
    const raw = localStorage.getItem(PRED_KEY);
    return raw ? JSON.parse(raw) : { group: {}, ko: {} };
  } catch(e) { return { group: {}, ko: {} }; }
}

function savePredictions(predictions) {
  try { localStorage.setItem(PRED_KEY, JSON.stringify(predictions)); } catch(e) {}
}

// Returns 3 (exact), 1 (correct result), 0 (wrong), or null (actuals not in yet)
function scorePrediction(predH, predA, actualH, actualA) {
  if (predH === null || predA === null || actualH === null || actualA === null) return null;
  const pH=+predH, pA=+predA, aH=+actualH, aA=+actualA;
  if (pH === aH && pA === aA) return 3;
  const predOut = pH > pA ? 1 : pA > pH ? -1 : 0;
  const actOut  = aH > aA ? 1 : aA > aH ? -1 : 0;
  return predOut === actOut ? 1 : 0;
}

function calcPoints(groupMatches, ko, predictions) {
  const byPhase = { group:0, r32:0, r16:0, qf:0, sf:0, final:0 };
  let total=0, exact=0, correct=0, wrong=0, played=0;
  Object.values(groupMatches).flat().forEach(m => {
    const p = predictions.group?.[m.id];
    if (!p || p.home === null || p.home === undefined || p.away === null || p.away === undefined) return;
    const pts = scorePrediction(p.home, p.away, m.homeScore, m.awayScore);
    if (pts === null) return;
    played++; total += pts; byPhase.group += pts;
    if (pts === 3) exact++; else if (pts === 1) correct++; else wrong++;
  });
  ['r32','r16','qf','sf','final'].forEach(round => {
    [...(ko[round]||[]), ...(round==='final'?ko.third||[]:[])].forEach(m => {
      const p = predictions.ko?.[m.id];
      if (!p || p.a === null || p.a === undefined || p.b === null || p.b === undefined) return;
      const pts = scorePrediction(p.a, p.b, m.scoreA, m.scoreB);
      if (pts === null) return;
      played++; total += pts; byPhase[round] += pts;
      if (pts === 3) exact++; else if (pts === 1) correct++; else wrong++;
    });
  });
  return { total, byPhase, exact, correct, wrong, played };
}

function buildShareText(groupMatches, ko, predictions, pts, phaseKey) {
  const phaseLabels = {
    group:'GROUP STAGE', r32:'ROUND OF 32', r16:'ROUND OF 16',
    qf:'QUARTER-FINALS', sf:'SEMI-FINALS', final:'FINAL',
  };
  const lines = [];
  const single = phaseKey && phaseKey !== 'all';

  if (single) {
    lines.push(`⚽ *World Cup 2026 – My ${phaseLabels[phaseKey]} Guesses*`);
  } else {
    lines.push('⚽ *World Cup 2026 – My Guesses*');
  }
  lines.push('');

  const teamFlag = t => {
    if (!t) return '❓';
    const cc = FLAG[t];
    if (!cc) return t;
    return ccToFlagEmoji(cc);
  };

  const matchLine = (hn, an, pH, pA, aH, aA) => {
    const p = scorePrediction(pH, pA, aH, aA);
    const badge = p === 3 ? ' ✓3' : p === 1 ? ' ~1' : p === 0 ? ' ✗0' : '';
    return `${teamFlag(hn)} ${hn||'?'} ${pH}-${pA} ${an||'?'} ${teamFlag(an)}${badge}`;
  };

  const phases = single ? [phaseKey] : ['group','r32','r16','qf','sf','final'];
  phases.forEach(p => {
    const phaseLines = [];
    if (p === 'group') {
      Object.values(groupMatches).flat()
        .sort((a,b)=>(a.dk||0)-(b.dk||0)||(a.tk||0)-(b.tk||0))
        .forEach(m => {
          const pred = predictions.group?.[m.id];
          if (!pred || pred.home === null || pred.home === undefined || pred.away === null || pred.away === undefined) return;
          phaseLines.push(matchLine(m.home, m.away, pred.home, pred.away, m.homeScore, m.awayScore));
        });
    } else {
      const pMatches = p === 'final' ? [...(ko.final||[]), ...(ko.third||[])] : (ko[p]||[]);
      pMatches.forEach(m => {
        const pred = predictions.ko?.[m.id];
        if (!pred || pred.a === null || pred.a === undefined || pred.b === null || pred.b === undefined) return;
        phaseLines.push(matchLine(m.teamA, m.teamB, pred.a, pred.b, m.scoreA, m.scoreB));
      });
    }
    if (phaseLines.length > 0) {
      if (!single) lines.push(`*${phaseLabels[p]}*`);
      lines.push(...phaseLines);
      lines.push('');
    }
  });

  if (!single && pts) {
    lines.push(`*🏆 Total: ${pts.total} pts* (${pts.played} played · 🎯 ${pts.exact} exact · ✅ ${pts.correct} right · ❌ ${pts.wrong} wrong)`);
    lines.push('');
  }
  lines.push('jorgecensi.github.io/worldcup-2026');
  return lines.join('\n');
}

// ─── Logic helpers ────────────────────────────────────────────────────────────
function computeStandings(teams, matches) {
  const t={};
  teams.forEach(tm=>{t[tm]={team:tm,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0,results:[]};});
  // Iterate in chronological order so per-team result dots read left→right by date.
  const ordered=[...matches].sort((a,b)=>(a.dk||0)-(b.dk||0)||(a.tk||0)-(b.tk||0));
  ordered.forEach(m=>{
    if(!t[m.home]||!t[m.away]) return;
    if(m.homeScore===null||m.awayScore===null){
      t[m.home].results.push("future");t[m.away].results.push("future");
      return;
    }
    const hs=+m.homeScore,as_=+m.awayScore;
    t[m.home].played++;t[m.away].played++;
    t[m.home].gf+=hs;t[m.home].ga+=as_;t[m.away].gf+=as_;t[m.away].ga+=hs;
    t[m.home].gd=t[m.home].gf-t[m.home].ga;t[m.away].gd=t[m.away].gf-t[m.away].ga;
    if(hs>as_){t[m.home].won++;t[m.home].pts+=3;t[m.away].lost++;t[m.home].results.push("win");t[m.away].results.push("loss");}
    else if(hs<as_){t[m.away].won++;t[m.away].pts+=3;t[m.home].lost++;t[m.away].results.push("win");t[m.home].results.push("loss");}
    else{t[m.home].drawn++;t[m.home].pts++;t[m.away].drawn++;t[m.away].pts++;t[m.home].results.push("draw");t[m.away].results.push("draw");}
  });
  return Object.values(t).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
}

// Colour-coded result dots shown after a team's name in the standings.
const RESULT_DOT_COLORS = { win:ACCENT, loss:RED, draw:GOLD, future:"#4a4f5e" };
function ResultDots({ results=[] }) {
  if(!results.length) return null;
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:2,marginLeft:4,flexShrink:0}}>
      {results.map((r,i)=>(
        <span key={i} title={r==="future"?"Upcoming":r==="win"?"Won":r==="loss"?"Lost":"Draw"}
          style={{width:6,height:6,borderRadius:"50%",background:RESULT_DOT_COLORS[r]||"#4a4f5e",display:"inline-block"}}/>
      ))}
    </span>
  );
}
// Returns only teams that have MATHEMATICALLY CLINCHED their position.
// A team is confirmed 1st/2nd only when no permutation of remaining results
// can displace them from that position.
function getGroupQualifiers(gm) {
  const slots = {};
  Object.entries(GROUPS).forEach(([g, teams]) => {
    const matches = gm[g];

    // Check each target position (0 = 1st, 1 = 2nd)
    [0, 1].forEach(pos => {
      const current = computeStandings(teams, matches);
      const candidate = current[pos]?.team;
      if (!candidate) return;

      // Simulate the worst case for this candidate:
      // - their own remaining matches: they lose
      // - other remaining matches: home team wins (maximises rivals' points)
      const worstCase = matches.map(m => {
        if (m.homeScore !== null && m.awayScore !== null) return m;
        if (m.home === candidate) return { ...m, homeScore: 0, awayScore: 1 };
        if (m.away === candidate) return { ...m, homeScore: 1, awayScore: 0 };
        return { ...m, homeScore: 1, awayScore: 0 };
      });

      const worstStandings = computeStandings(teams, worstCase);
      const worstPos = worstStandings.findIndex(r => r.team === candidate);

      // Clinched if even in the worst case they still finish at or above this position
      if (worstPos <= pos) {
        slots[`${pos + 1}${g}`] = candidate;
      }
    });
  });
  return slots;
}
// Resolve the eight best third-placed teams and their bracket slots (FIFA Annex C).
// Returns an 8-element array indexed by R32_BRACKET.thirdB (winner order
// A,B,D,E,G,I,K,L), or null while any group still has matches to play — the eight
// qualifiers (and therefore the matchups) can only be fixed once every group is final.
function getThirdPlaceTeams(gm) {
  const thirdByGroup = {};
  for (const [g, teams] of Object.entries(GROUPS)) {
    const matches = gm[g];
    if (!matches || matches.some(m => m.homeScore === null || m.awayScore === null)) return null;
    const st = computeStandings(teams, matches);
    if (!st[2]) return null;
    thirdByGroup[g] = { g, team: st[2].team, pts: st[2].pts, gd: st[2].gd, gf: st[2].gf };
  }
  // Rank the twelve third-placed teams; the top eight advance.
  // FIFA criteria: points, then goal difference, then goals scored (disciplinary
  // points / drawing of lots are not modelled — fall back to group letter).
  const ranked = Object.values(thirdByGroup)
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.g.localeCompare(b.g));
  const key = ranked.slice(0, 8).map(t => t.g).sort().join("");
  const placement = THIRD_PLACE_TABLE[key];
  if (!placement) return null;
  // placement[col] is the group letter whose 3rd-place team fills that bracket slot.
  return placement.split("").map(letter => thirdByGroup[letter]?.team || null);
}
function koWinner(m) {
  if(m.scoreA===null||m.scoreB===null) return null;
  const sa=+m.scoreA,sb=+m.scoreB;
  if(sa>sb) return m.teamA; if(sb>sa) return m.teamB;
  if(m.penA!==null&&m.penB!==null){if(+m.penA>+m.penB)return m.teamA;if(+m.penB>+m.penA)return m.teamB;}
  return null;
}
function koLoser(m){const w=koWinner(m);if(!w)return null;return w===m.teamA?m.teamB:m.teamA;}
function propagateKO(ko,gm){
  const slots=getGroupQualifiers(gm);
  const thirds=getThirdPlaceTeams(gm);
  const next=structuredClone(ko);
  next.r32.forEach(m=>{
    m.teamA=slots[m.slotA]||null;
    m.teamB = m.thirdB!=null ? (thirds?thirds[m.thirdB]:null) : (slots[m.slotB]||null);
  });
  R16_PAIRS.forEach(([ia,ib],i)=>{next.r16[i].teamA=koWinner(next.r32[ia]);next.r16[i].teamB=koWinner(next.r32[ib]);});
  QF_PAIRS.forEach(([ia,ib],i)=>{next.qf[i].teamA=koWinner(next.r16[ia]);next.qf[i].teamB=koWinner(next.r16[ib]);});
  SF_PAIRS.forEach(([ia,ib],i)=>{next.sf[i].teamA=koWinner(next.qf[ia]);next.sf[i].teamB=koWinner(next.qf[ib]);});
  next.third[0].teamA=koLoser(next.sf[0]);next.third[0].teamB=koLoser(next.sf[1]);
  next.final[0].teamA=koWinner(next.sf[0]);next.final[0].teamB=koWinner(next.sf[1]);
  return next;
}

// ─── Shared UI ───────────────────────────────────────────────────────────────
function Stepper({value,onChange,highlight,disabled=false,color=ACCENT,small=false,pulse=false}){
  const h=small?30:38,numW=small?28:36,fs=small?12:16;
  const dec=()=>{if(disabled)return;if(value===null||value===0){onChange(null);return;}onChange(value-1);};
  const inc=()=>{if(disabled)return;onChange(value===null?0:value+1);};
  const btnS=(side)=>({
    width:h,height:h,
    borderRadius:side==="left"?"8px 0 0 8px":"0 8px 8px 0",
    border:`1.5px solid ${disabled?"rgba(255,255,255,0.05)":highlight?`${color}55`:"rgba(255,255,255,0.12)"}`,
    borderRight:side==="left"?"none":undefined,borderLeft:side==="right"?"none":undefined,
    background:disabled?"rgba(255,255,255,0.02)":highlight?`${color}15`:"rgba(255,255,255,0.06)",
    color:disabled?"#2a2a2a":highlight?color:"#777",
    fontSize:18,fontWeight:700,cursor:disabled?"default":"pointer",
    display:"flex",alignItems:"center",justifyContent:"center",
    WebkitTapHighlightColor:"transparent",userSelect:"none",flexShrink:0,lineHeight:1,
  });
  return(
    <div style={{display:"flex",alignItems:"stretch"}}>
      <button onClick={dec} style={btnS("left")} disabled={disabled}>−</button>
      <div style={{width:numW,height:h,display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:fs,fontWeight:900,userSelect:"none",
        background:disabled?"rgba(255,255,255,0.02)":highlight?`${color}18`:"rgba(255,255,255,0.07)",
        borderTop:`1.5px solid ${disabled?"rgba(255,255,255,0.05)":highlight?`${color}55`:"rgba(255,255,255,0.12)"}`,
        borderBottom:`1.5px solid ${disabled?"rgba(255,255,255,0.05)":highlight?`${color}55`:"rgba(255,255,255,0.12)"}`,
        color:disabled?"#333":highlight?color:"#e8eaf0",overflow:"hidden"}}>
        {value===null?<span style={{color:"#444",fontSize:fs-2}}>–</span>:
          <span key={pulse?value:"static"} style={pulse?{display:"inline-block",animation:"penGoal 0.5s cubic-bezier(0.22,1,0.36,1) both"}:undefined}>{value}</span>}
      </div>
      <button onClick={inc} style={btnS("right")} disabled={disabled}>+</button>
    </div>
  );
}

function TimeBadge({date,time,city}){
  const h=timeKey(time);
  const col=h<300?RED:h<420?"#ff9500":h<720?GOLD:ACCENT;
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
      <span style={{fontSize:9,color:col,fontWeight:700,background:`${col}18`,border:`1px solid ${col}44`,borderRadius:4,padding:"2px 6px",whiteSpace:"nowrap"}}>{time} AEST</span>
      <span style={{fontSize:9,color:"#555",whiteSpace:"nowrap"}}>{date} · {city}</span>
    </div>
  );
}

function SLabel({children,style={}}){
  return <div style={{fontSize:10,letterSpacing:3,color:ACCENT,textTransform:"uppercase",marginBottom:12,fontWeight:700,...style}}>── {children}</div>;
}

function useIsMobile(){
  const [mob,setMob]=useState(typeof window!=="undefined"?window.innerWidth<640:false);
  useEffect(()=>{const h=()=>setMob(window.innerWidth<640);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  return mob;
}

// ─── Splash Screen ────────────────────────────────────────────────────────────
const SPLASH_CSS = `
  @keyframes emblemIn {
    0%   { opacity:0; transform:scale(0.3) rotate(-15deg); filter:blur(12px); }
    60%  { opacity:1; transform:scale(1.08) rotate(2deg);  filter:blur(0); }
    80%  { transform:scale(0.97) rotate(-1deg); }
    100% { transform:scale(1) rotate(0deg); }
  }
  @keyframes glowRing {
    0%,100% { box-shadow: 0 0 0 0 rgba(0,208,132,0), 0 0 0 0 rgba(255,215,0,0); }
    50%      { box-shadow: 0 0 60px 20px rgba(0,208,132,0.25), 0 0 100px 40px rgba(255,215,0,0.1); }
  }
  @keyframes textUp {
    0%   { opacity:0; transform:translateY(24px); }
    100% { opacity:1; transform:translateY(0); }
  }
  @keyframes taglineUp {
    0%   { opacity:0; transform:translateY(16px); }
    100% { opacity:1; transform:translateY(0); }
  }
  @keyframes splashOut {
    0%   { opacity:1; transform:scale(1); }
    100% { opacity:0; transform:scale(1.06); pointer-events:none; }
  }
  @keyframes bgPulse {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }
  @keyframes particleDrift {
    0%   { transform:translateY(0) translateX(0) scale(1); opacity:0.7; }
    100% { transform:translateY(-120px) translateX(var(--dx)) scale(0.3); opacity:0; }
  }
  @keyframes ballFly {
    0%   { transform: translate(0px, 0px) scale(0.18); opacity:0; }
    6%   { opacity: 1; }
    50%  { transform: translate(calc(50vw - 40px), calc(-50vh + 60px)) scale(1); opacity:1; }
    94%  { opacity: 1; }
    100% { transform: translate(calc(100vw + 20px), calc(-100vh - 20px)) scale(1); opacity:0; }
  }
  @keyframes ballSpin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(600deg); }
  }
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
`;

function SplashScreen({ onDone }) {
  const [phase, setPhase] = useState("in"); // in | hold | out

  useEffect(() => {
    // After emblem animates in (0.9s), hold briefly, then exit
    const holdTimer = setTimeout(() => setPhase("out"), 2200);
    const doneTimer = setTimeout(() => onDone(), 2900);
    return () => { clearTimeout(holdTimer); clearTimeout(doneTimer); };
  }, [onDone]);

  // Random particle positions
  const particles = useMemo(() => Array.from({length:12}, (_,i) => ({
    id:i,
    x: Math.sin(i * 30 * Math.PI/180) * 80,
    delay: (i * 0.15) % 1.2,
    size: 4 + (i % 4) * 3,
    color: i % 3 === 0 ? ACCENT : i % 3 === 1 ? GOLD : "#fff",
  })), []);

  return (
    <>
      <style>{SPLASH_CSS}</style>
      <div style={{
        position:"fixed", inset:0, zIndex:9999,
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        background:"linear-gradient(135deg, #040810 0%, #0a1628 40%, #071020 70%, #040810 100%)",
        animation: phase==="out" ? "splashOut 0.7s cubic-bezier(0.4,0,1,1) forwards" : "none",
        overflow:"hidden",
      }}>

        {/* Animated background gradient sweep */}
        <div style={{
          position:"absolute", inset:0,
          background:"linear-gradient(120deg, transparent 30%, rgba(0,208,132,0.04) 50%, transparent 70%)",
          backgroundSize:"300% 300%",
          animation:"bgPulse 3s ease infinite",
        }}/>

        {/* Radial glow behind emblem */}
        <div style={{
          position:"absolute",
          width:320, height:320,
          borderRadius:"50%",
          background:"radial-gradient(circle, rgba(0,208,132,0.12) 0%, rgba(255,215,0,0.06) 40%, transparent 70%)",
          animation:"glowRing 2s ease-in-out infinite",

function GuessBadge({ pts }) {
  if (pts === null || pts === undefined) return null;
  const [col, text] = pts === 3 ? [ACCENT, '✓ 3'] : pts === 1 ? [GOLD, '~ 1'] : [RED, '✗ 0'];
  return (
    <span style={{
      fontSize:9, fontWeight:800, letterSpacing:0.5, flexShrink:0,
      color:col, background:`${col}18`, border:`1px solid ${col}44`,
      borderRadius:20, padding:"2px 7px",
    }}>{text}</span>
  );
}

function GuessGroupMatchCard({ match, prediction, onPred, isMobile }) {
  const predH = prediction?.home ?? null;
  const predA = prediction?.away ?? null;
  const actual = match.homeScore !== null && match.awayScore !== null;
  const pts = actual ? scorePrediction(predH, predA, match.homeScore, match.awayScore) : null;
  const hasPred = predH !== null && predA !== null;
  return (
    <div style={{background:CARD, border:`1px solid ${hasPred?'rgba(167,139,250,0.3)':BORDER}`, borderRadius:12, padding:"10px 12px"}}>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:7, gap:6}}>
        <span style={{fontSize:8, color:GOLD, fontWeight:800, background:`${GOLD}18`, border:`1px solid ${GOLD}33`, borderRadius:4, padding:"2px 6px", letterSpacing:1}}>GROUP {match.group}</span>
        <div style={{display:"flex", alignItems:"center", gap:5}}>
          {hasPred && <GuessBadge pts={pts}/>}
          <span style={{fontSize:8, color:"#555"}}>{match.date}</span>
        </div>
      </div>
      <div style={{display:"flex", alignItems:"center", gap:7, paddingBottom:5, borderBottom:`1px solid ${BORDER}`}}>
        <Flag team={match.home} size={isMobile?21:19}/>
        <span style={{flex:1, fontSize:12, fontWeight:500, color:"#ccc", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}><TeamName name={match.home}/></span>
        <Stepper value={predH} onChange={v=>onPred(match.id,"home",v)} color={PURPLE}/>
      </div>
      <div style={{display:"flex", alignItems:"center", gap:7, paddingTop:5}}>
        <Flag team={match.away} size={isMobile?21:19}/>
        <span style={{flex:1, fontSize:12, fontWeight:500, color:"#ccc", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}><TeamName name={match.away}/></span>
        <Stepper value={predA} onChange={v=>onPred(match.id,"away",v)} color={PURPLE}/>
      </div>
      {actual && hasPred && (
        <div style={{marginTop:5, fontSize:9, color:"#555", textAlign:"center"}}>
          Actual: {match.homeScore}–{match.awayScore}
        </div>
      )}
    </div>
  );
}

function GuessKOMatchCard({ match, prediction, onPred, isMobile, matchLabel }) {
  const hasTeams = !!match.teamA && !!match.teamB;
  const predA = prediction?.a ?? null;
  const predB = prediction?.b ?? null;
  const actual = match.scoreA !== null && match.scoreB !== null;
  const pts = (actual && hasTeams) ? scorePrediction(predA, predB, match.scoreA, match.scoreB) : null;
  const hasPred = predA !== null && predB !== null;

  const teamRow = (team, val, field, isTop) => (
    <div style={{display:"flex", alignItems:"center", gap:8, padding:"9px 0",
      ...(isTop ? {borderBottom:`1px solid ${BORDER}`, paddingBottom:5} : {paddingTop:5})}}>
      <Flag team={team||null} size={isMobile?21:19} faded={!team}/>
      <span style={{flex:1, fontSize:12, fontWeight:400, color:team?"#ccc":"#444",
        fontStyle:team?"normal":"italic", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
        {team ? <TeamName name={team}/> : "TBD"}
      </span>
      <Stepper value={val} onChange={v=>onPred(match.id,field,v)} color={PURPLE} disabled={!hasTeams}/>
    </div>
  );

  return (
    <div style={{background:CARD, border:`1px solid ${hasPred&&hasTeams?'rgba(167,139,250,0.3)':BORDER}`, borderRadius:12, padding:"11px 13px"}}>
      {matchLabel && (
        <div style={{fontSize:9, fontWeight:800, letterSpacing:2, textTransform:"uppercase", color:GOLD, marginBottom:6}}>{matchLabel}</div>
      )}
      <div style={{marginBottom:7, display:"flex", alignItems:"center", justifyContent:"space-between"}}>
        <TimeBadge date={match.date} time={match.time} city={match.city}/>
        {hasPred && hasTeams && <GuessBadge pts={pts}/>}
      </div>
      {teamRow(match.teamA, predA, "a", true)}
      {teamRow(match.teamB, predB, "b", false)}
      {!hasTeams && (
        <div style={{marginTop:6, fontSize:9, color:"#555", textAlign:"center"}}>Enter previous round results to unlock</div>
      )}
      {actual && hasPred && hasTeams && (
        <div style={{marginTop:5, fontSize:9, color:"#555", textAlign:"center"}}>
          Actual: {match.scoreA}–{match.scoreB}
        </div>
      )}
    </div>
  );
}

function GuessesView({ groupMatches, ko, predictions, onGroupPred, onKOPred, isMobile }) {
  const PHASES = [
    { key:'group', label:'Group Stage',    matches:Object.values(groupMatches).flat().sort((a,b)=>(a.dk||0)-(b.dk||0)||(a.tk||0)-(b.tk||0)) },
    { key:'r32',   label:'Round of 32',   matches:ko.r32 },
    { key:'r16',   label:'Round of 16',   matches:ko.r16 },
    { key:'qf',    label:'Quarter-finals', matches:ko.qf },
    { key:'sf',    label:'Semi-finals',    matches:ko.sf },
    { key:'final', label:'Final',          matches:[...ko.third,...ko.final] },
  ];

  const isUnlocked = key => {
    if (key === 'group') return true;
    const bucket = key === 'final' ? [...ko.final,...ko.third] : (ko[key]||[]);
    return bucket.some(m => !!m.teamA || !!m.teamB);
  };

  const [phase, setPhase] = useState('group');
  const pts = useMemo(()=>calcPoints(groupMatches,ko,predictions),[groupMatches,ko,predictions]);
  const [copied, setCopied] = useState(null); // null | 'all' | 'phase'

  const copyText = (text, which) => {
    const done = () => { setCopied(which); setTimeout(()=>setCopied(null),2000); };
    navigator.clipboard?.writeText(text).then(done).catch(()=>{
      const el=document.createElement('textarea');
      el.value=text; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el); done();
    });
  };

  const currentPhase = PHASES.find(p => p.key === phase);

  return (
    <div>
      {/* Summary + Share All */}
      <div style={{background:CARD, border:`1px solid rgba(167,139,250,0.3)`, borderRadius:14, padding:"14px 16px", marginBottom:14}}>
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8}}>
          <div>
            <div style={{fontSize:9, color:PURPLE, letterSpacing:2, fontWeight:700, textTransform:"uppercase", marginBottom:4}}>🎯 Fantasy</div>
            <div style={{fontSize:22, fontWeight:900, color:"#fff"}}>
              {pts.total} <span style={{fontSize:13, color:"#666", fontWeight:400}}>pts</span>
            </div>
            {pts.played > 0 && (
              <div style={{fontSize:10, color:"#666", marginTop:2}}>
                {pts.played} played · 🎯 {pts.exact} exact · ✅ {pts.correct} right · ❌ {pts.wrong} wrong
              </div>
            )}
          </div>
          <button
            onClick={()=>copyText(buildShareText(groupMatches,ko,predictions,pts,null),'all')}
            style={{background:`rgba(167,139,250,0.15)`, border:`1px solid rgba(167,139,250,0.4)`,
              color:PURPLE, borderRadius:10, padding:"8px 14px", fontSize:12, fontWeight:700,
              cursor:"pointer", display:"flex", alignItems:"center", gap:6}}
          >
            {copied==='all' ? '✓ Copied!' : '📋 Share All'}
          </button>
        </div>
      </div>

      {/* Phase Selector */}
      <div style={{display:"flex", gap:6, overflowX:"auto", paddingBottom:8, marginBottom:12, scrollbarWidth:"none", msOverflowStyle:"none"}}>
        {PHASES.map(p => {
          const unlocked = isUnlocked(p.key);
          const active = phase === p.key;
          return (
            <button key={p.key} onClick={()=>unlocked&&setPhase(p.key)} style={{
              padding:"6px 12px", borderRadius:20, fontSize:11, fontWeight:700,
              letterSpacing:0.5, whiteSpace:"nowrap", flexShrink:0,
              border:`1px solid ${active?PURPLE:unlocked?'rgba(167,139,250,0.3)':BORDER}`,
              background:active?`rgba(167,139,250,0.2)`:"transparent",
              color:active?PURPLE:unlocked?"#888":"#444",
              cursor:unlocked?"pointer":"default",
            }}>
              {unlocked?'':'🔒 '}{p.label}
            </button>
          );
        })}
      </div>

      {/* Phase header + Share Phase */}
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
        <div>
          <div style={{fontSize:12, fontWeight:700, color:"#ccc"}}>{currentPhase?.label}</div>
          {pts.byPhase[phase] > 0 && (
            <div style={{fontSize:10, color:PURPLE, marginTop:2}}>{pts.byPhase[phase]} pts earned this phase</div>
          )}
        </div>
        <button
          onClick={()=>copyText(buildShareText(groupMatches,ko,predictions,pts,phase),'phase')}
          style={{background:"transparent", border:`1px solid rgba(167,139,250,0.3)`,
            color:"#888", borderRadius:8, padding:"5px 10px", fontSize:10, fontWeight:700, cursor:"pointer"}}
        >
          {copied==='phase' ? '✓ Copied!' : '📋 Share Phase'}
        </button>
      </div>

      {/* Match list */}
      {!isUnlocked(phase) ? (
        <div style={{textAlign:"center", padding:"32px 0", color:"#555", fontSize:13}}>
          🔒 Enter results for the previous round first
        </div>
      ) : (
        <div style={{display:"flex", flexDirection:"column", gap:8}}>
          {phase === 'group' ? (
            currentPhase.matches.map(m => (
              <GuessGroupMatchCard key={m.id} match={m}
                prediction={predictions.group?.[m.id]}
                onPred={onGroupPred} isMobile={isMobile}/>
            ))
          ) : (
            currentPhase.matches.map(m => {
              const label = phase === 'final'
                ? (m.id === 'third' ? '🥉 3rd Place' : '🏆 Final')
                : undefined;
              return (
                <GuessKOMatchCard key={m.id} match={m}
                  prediction={predictions.ko?.[m.id]}
                  onPred={onKOPred} isMobile={isMobile}
                  matchLabel={label}/>
              );
            })
          )}
        </div>
      )}
    </div>
  );
}

function App(){
  const [splash,setSplash]=useState(true);
  const [groupMatches,setGroupMatches]=useState(buildInitialGroupMatches);
  const [ko,setKo]=useState(buildInitialKO);
  const [view,setView]=useState("guesses");
  const [fixtureFilter,setFixtureFilter]=useState(null); // group letter to pre-filter fixtures
  const [predictions,setPredictions]=useState(loadPredictions);
  const isMobile=useIsMobile();
  const navRef=useRef(null);
  const [navHeight,setNavHeight]=useState(0);

  // Measure the real (unzoomed) bottom-nav height so fixed bars can sit flush above it
  useEffect(()=>{
    const el=navRef.current;
    if(!el){setNavHeight(0);return;}
    const measure=()=>setNavHeight(el.offsetHeight);
    measure();
    const ro=new ResizeObserver(measure);
    ro.observe(el);
    return ()=>ro.disconnect();
  },[isMobile]);

  useEffect(()=>{
    let meta=document.querySelector('meta[name="viewport"]');
    if(!meta){meta=document.createElement("meta");meta.name="viewport";document.head.appendChild(meta);}
    meta.content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no";
  },[]);

  useEffect(()=>{setKo(prev=>propagateKO(prev,groupMatches));},[groupMatches]);

  // Persist scores to localStorage whenever they change
  useEffect(()=>{saveScores(groupMatches,ko);},[groupMatches,ko]);
  useEffect(()=>{savePredictions(predictions);},[predictions]);

  const updateGroupScore=useCallback((group,matchId,side,val)=>{
    setGroupMatches(prev=>({...prev,[group]:prev[group].map(m=>m.id===matchId?{...m,[side]:val}:m)}));
  },[]);
  const updateKOScore=useCallback((round,idx,field,val)=>{
    setKo(prev=>{const next=structuredClone(prev);next[round][idx][field]=val;return propagateKO(next,groupMatches);});
  },[groupMatches]);
  const updateGroupPred=useCallback((matchId,side,val)=>{
    setPredictions(prev=>({...prev,group:{...prev.group,[matchId]:{...prev.group?.[matchId],[side]:val}}}));
  },[]);
  const updateKOPred=useCallback((matchId,field,val)=>{
    setPredictions(prev=>({...prev,ko:{...prev.ko,[matchId]:{...prev.ko?.[matchId],[field]:val}}}));
  },[]);

  const globalStats=useMemo(()=>{
    const allG=Object.values(groupMatches).flat();
    const gPlayed=allG.filter(m=>m.homeScore!==null&&m.awayScore!==null);
    const gGoals=gPlayed.reduce((s,m)=>s+(+m.homeScore)+(+m.awayScore),0);
    const allKO=[...ko.r32,...ko.r16,...ko.qf,...ko.sf,...ko.final,...ko.third];
    const kPlayed=allKO.filter(m=>m.scoreA!==null&&m.scoreB!==null&&m.teamA&&m.teamB);
    const kGoals=kPlayed.reduce((s,m)=>s+(+m.scoreA)+(+m.scoreB),0);
    const totalGoals=gGoals+kGoals,totalPlayed=gPlayed.length+kPlayed.length;
    const teamGoals={};
    gPlayed.forEach(m=>{teamGoals[m.home]=(teamGoals[m.home]||0)+(+m.homeScore);teamGoals[m.away]=(teamGoals[m.away]||0)+(+m.awayScore);});
    kPlayed.forEach(m=>{if(m.teamA)teamGoals[m.teamA]=(teamGoals[m.teamA]||0)+(+m.scoreA);if(m.teamB)teamGoals[m.teamB]=(teamGoals[m.teamB]||0)+(+m.scoreB);});
    return{
      totalGoals,totalPlayed,avgGoals:totalPlayed?(totalGoals/totalPlayed).toFixed(2):"0.00",
      topScorers:Object.entries(teamGoals).sort((a,b)=>b[1]-a[1]).slice(0,8).filter(([,g])=>g>0),

            <img

              alt="FIFA World Cup 2026"
              style={{width:isMobile?28:42,height:"auto",display:"block",filter:"drop-shadow(0 0 6px rgba(0,208,132,0.3))"}}
            />
            <div>
              <div style={{fontSize:isMobile?13:15,fontWeight:900,letterSpacing:isMobile?1:2,textTransform:"uppercase",color:"#fff",lineHeight:1.15}}>World Cup 2026</div>
              <div style={{fontSize:isMobile?9:8,color:ACCENT,letterSpacing:isMobile?1:2,fontWeight:700}}>USA · CANADA · MEXICO</div>

            {/* Desktop icon-only nav */}

                  return(

// ─── UPWARD DROPDOWN ───────────────────────────────────────────────────────────
// Custom select that always opens its option list above the trigger button
// (native <select> popups are positioned by the browser and can't be forced up).
function UpDropdown({value,options,onChange}){
  const [open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    if(!open) return;
    const onOutside=e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown",onOutside);
    document.addEventListener("touchstart",onOutside);
    return ()=>{
      document.removeEventListener("mousedown",onOutside);
      document.removeEventListener("touchstart",onOutside);
    };
  },[open]);
  const current=options.find(o=>o.value===value);
  return(
    <div ref={ref} style={{position:"relative",fontFamily:"'Trebuchet MS','Segoe UI',sans-serif"}}>
      <button onClick={()=>setOpen(o=>!o)} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,padding:"10px 14px",borderRadius:9,border:`1.5px solid ${open?ACCENT:BORDER}`,background:CARD,color:"#fff",fontWeight:700,fontSize:13,fontFamily:"inherit",cursor:"pointer"}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{current?.label}</span>
        <span style={{color:open?ACCENT:"#777",fontSize:11,flexShrink:0,transform:open?"rotate(180deg)":"none",transition:"transform 0.15s"}}>▾</span>
      </button>
      {open&&(
        <div style={{position:"absolute",left:0,right:0,bottom:"calc(100% + 6px)",maxHeight:260,overflowY:"auto",borderRadius:10,border:`1.5px solid ${BORDER}`,background:"#0d1a2e",boxShadow:"0 -10px 30px rgba(0,0,0,0.55)",zIndex:250}}>
          {options.map(o=>{
            const isA=o.value===value;
            return(
              <div key={o.value} onClick={()=>{onChange(o.value);setOpen(false);}} style={{padding:"11px 14px",fontSize:13,fontWeight:isA?800:500,fontFamily:"inherit",color:isA?GOLD:"#ddd",background:isA?`${GOLD}14`:"transparent",cursor:"pointer",borderBottom:`1px solid rgba(255,255,255,0.05)`}}>
                {o.label}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── FIXED FILTER BAR ──────────────────────────────────────────────────────────
// On phones, portals to <body> so it sits flush above the bottom tab bar at the
// real (unzoomed) nav height — the MAIN container's CSS `zoom` would otherwise
// create its own containing block for position:fixed descendants and throw the
// offset off. On desktop it just sticks to the bottom of the content column.
function FixedFilterBar({isMobile,navHeight,marginTop,children}){
  if(isMobile){
    return ReactDOM.createPortal(
      <div style={{position:"fixed",left:0,right:0,bottom:navHeight,zIndex:150,padding:"8px 10px",background:"rgba(10,16,32,0.94)",backdropFilter:"blur(6px)",borderTop:`1px solid ${BORDER}`}}>
        {children}
      </div>,
      document.body
    );
  }
  return(
    <div style={{position:"sticky",bottom:0,zIndex:50,marginTop,paddingTop:8,paddingBottom:8,background:"rgba(10,16,32,0.92)",backdropFilter:"blur(6px)",borderTop:`1px solid ${BORDER}`}}>
      {children}
    </div>
  );
}

// ─── FIXTURES VIEW ─────────────────────────────────────────────────────────────
// All 72 group matches sorted chronologically, grouped by date
function FixturesView({groupMatches,onScore,isMobile,navHeight,initialFilter,onFilterUsed}){
  const [filter,setFilter]=useState(initialFilter||"ALL");
  const dateRefs=useRef({});
  const containerRef=useRef(null);

  // Apply an incoming filter request from Standings shortcut (runs once)
  useEffect(()=>{
    if(initialFilter){setFilter(initialFilter);onFilterUsed&&onFilterUsed();}
  },[initialFilter]);

  const allMatches=useMemo(()=>{
    return Object.values(groupMatches).flat()
      .sort((a,b)=>a.dk-b.dk||a.tk-b.tk);
  },[groupMatches]);

  const filtered=filter==="ALL"?allMatches:allMatches.filter(m=>m.group===filter);

  // Group by date
  const byDate=useMemo(()=>{
    const map={};
    filtered.forEach(m=>{
      if(!map[m.date]) map[m.date]={date:m.date,dk:m.dk,matches:[]};
      map[m.date].matches.push(m);
    });
    return Object.values(map).sort((a,b)=>a.dk-b.dk);
  },[filtered]);

  const scored=Object.values(groupMatches).flat().filter(m=>m.homeScore!==null).length;

  // Find the date section closest to today (Brisbane = UTC+10, no DST)
  const closestDate=useMemo(()=>{
    if(byDate.length===0) return null;
    // Derive Brisbane date using raw UTC offset (UTC+10, Queensland has no DST)
    const brisbaneMs = Date.now() + (10 * 60 * 60 * 1000);
    const d = new Date(brisbaneMs);
    const todayDk = ((d.getUTCMonth()+1)*100) + d.getUTCDate();
    const future=byDate.filter(d=>d.dk>=todayDk);
    return future.length>0 ? future[0].date : byDate[byDate.length-1].date;
  },[byDate]);

  // Scroll to closest date on mount and when filter changes
  useEffect(()=>{
    if(!closestDate) return;
    const el=dateRefs.current[closestDate];
    if(!el) return;
    // Short delay so layout is complete
    const timer=setTimeout(()=>{
      el.scrollIntoView({behavior:"smooth",block:"start"});
    },120);
    return ()=>clearTimeout(timer);
  },[closestDate, filter]);

  return(
    <div ref={containerRef} style={{paddingBottom:isMobile?130:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <span style={{fontSize:10,color:"#555"}}>{scored}/72 played</span>
      </div>

      {/* Date sections */}
      {byDate.map(({date,matches:dayMatches})=>{
        const isToday=date===closestDate;
        return(
          <div
            key={date}
            ref={el=>{dateRefs.current[date]=el;}}
            style={{marginBottom:22,scrollMarginTop:72}}
          >
            {/* Date header */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{
                fontSize:11,fontWeight:800,letterSpacing:1,
                color:isToday?"#fff":"#fff",
              }}>{date}</div>
              {isToday&&(
                <span style={{
                  fontSize:8,fontWeight:800,letterSpacing:1,
                  color:"#0a1020",background:ACCENT,
                  borderRadius:4,padding:"2px 6px",flexShrink:0,
                }}>NOW</span>
              )}
              <div style={{flex:1,height:1,background:isToday?`${ACCENT}44`:BORDER}}/>
              <div style={{fontSize:9,color:"#555"}}>{dayMatches.length} match{dayMatches.length!==1?"es":""}</div>
            </div>
            {/* Matches grid: 1 col mobile, 2 col desktop */}
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:8}}>
              {dayMatches.map(m=>(
                <GroupMatchCard key={m.id} match={m} onScore={(side,val)=>onScore(m.group,m.id,side,val)} isMobile={isMobile}/>
              ))}
            </div>
          </div>
        );
      })}

      {/* Group filter dropdown — fixed above the bottom tab bar on phones so it's always within thumb's reach */}
      <FixedFilterBar isMobile={isMobile} navHeight={navHeight} marginTop={8}>
        <UpDropdown
          value={filter}
          onChange={setFilter}
          options={[
            {value:"ALL",label:`All Groups (${scored} played)`},
            ...Object.keys(GROUPS).map(g=>({value:g,label:`Group ${g} (${groupMatches[g].filter(m=>m.homeScore!==null).length} played)`})),
          ]}
        />
      </FixedFilterBar>
    </div>
  );
}

// ─── KNOCKOUT VIEW ─────────────────────────────────────────────────────────────

    {key:"third",label:"3rd",fullLabel:"Third Place"},

  ];
  const matches=ko[round];
  const currentRound=ROUNDS.find(r=>r.key===round);
  const dateRefs=useRef({});

  // Group by date
  const byDate=useMemo(()=>{
    const map={};
    matches.forEach(m=>{
      if(!map[m.date]) map[m.date]={date:m.date,dk:m.dk,matches:[]};
      map[m.date].matches.push(m);
    });
    return Object.values(map).sort((a,b)=>a.dk-b.dk);
  },[matches]);

  // Find the date section closest to today (Brisbane = UTC+10, no DST)
  const closestDate=useMemo(()=>{
    if(byDate.length===0) return null;
    const brisbaneMs = Date.now() + (10 * 60 * 60 * 1000);
    const d = new Date(brisbaneMs);
    const todayDk = ((d.getUTCMonth()+1)*100) + d.getUTCDate();
    const future=byDate.filter(d=>d.dk>0&&d.dk>=todayDk);
    return future.length>0 ? future[0].date : byDate[byDate.length-1].date;
  },[byDate]);

  // Scroll to closest date on mount and when round changes
  useEffect(()=>{
    if(!closestDate) return;
    const el=dateRefs.current[closestDate];
    if(!el) return;
    const timer=setTimeout(()=>{

        </div>

      {/* Date sections */}
      {byDate.map(({date,matches:dayMatches})=>{

          <div

            </div>
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:9}}>

                const matchIdx=matches.indexOf(m);
                return <KOMatchCard key={m.id} match={m} matchIdx={matchIdx} round={round} onScore={onScore} isMobile={isMobile}/>;

          value={round}

          }))}
        />
      </FixedFilterBar>
    </div>
  );

// ─── KO MATCH CARD ─────────────────────────────────────────────────────────────
function KOMatchCard({match,matchIdx,round,onScore,isMobile}){
  const winner=koWinner(match);
  const draw=match.scoreA!==null&&match.scoreB!==null&&+match.scoreA===+match.scoreB;
  const penWinner=draw&&match.penA!==null&&match.penB!==null
    ?(+match.penA>+match.penB?match.teamA:+match.penB>+match.penA?match.teamB:null):null;

  const row=(team,score,pen,scoreField,penField,isWinner)=>{
    const has=!!team;
    return(
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
          <Flag team={has?team:null} size={isMobile?21:19} faded={!has} />
          <span style={{fontSize:12,fontWeight:isWinner?800:400,color:isWinner?"#fff":has?"#aaa":"#444",fontStyle:has?"normal":"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{has?<TeamName name={team}/>:"TBD"}</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
          <Stepper value={score} onChange={v=>onScore(round,matchIdx,scoreField,v)} highlight={isWinner&&!draw} disabled={!has}/>
        </div>
      </div>
    );
  };

  const penCell=(team,pen,penField,isWinner)=>(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,flex:1,minWidth:0}}>
      <div style={{display:"flex",alignItems:"center",gap:5,minWidth:0,maxWidth:"100%"}}>
        <Flag team={team} size={15} />
        <span style={{fontSize:10,fontWeight:isWinner?800:500,color:isWinner?"#fff":"#999",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}><TeamName name={team}/></span>
      </div>
      <Stepper value={pen} onChange={v=>onScore(round,matchIdx,penField,v)} highlight={isWinner} color={PURPLE} small pulse/>
    </div>
  );

  return(
    <div style={{background:winner?"linear-gradient(135deg,rgba(0,208,132,0.07),rgba(255,255,255,0.02))":CARD,border:`1px solid ${winner?"rgba(0,208,132,0.22)":draw&&(match.penA!==null||match.penB!==null)?`rgba(167,139,250,0.3)`:BORDER}`,borderRadius:12,padding:"11px 13px"}}>
      <div style={{marginBottom:7}}><TimeBadge date={match.date} time={match.time} city={match.city}/></div>
      <div style={{borderBottom:`1px solid ${BORDER}`,paddingBottom:2,marginBottom:2}}>{row(match.teamA,match.scoreA,match.penA,"scoreA","penA",winner===match.teamA)}</div>
      {row(match.teamB,match.scoreB,match.penB,"scoreB","penB",winner===match.teamB)}
      {draw&&(
        <div style={{marginTop:8,padding:"9px 10px 11px",borderRadius:10,
          background:"linear-gradient(135deg, rgba(167,139,250,0.12), rgba(167,139,250,0.03))",
          border:"1px solid rgba(167,139,250,0.4)",
          animation:`penStripIn 0.4s cubic-bezier(0.22,1,0.36,1) both${penWinner?"":", penGlow 2.2s ease-in-out infinite 0.4s"}`}}>
          <div style={{textAlign:"center",fontSize:9,letterSpacing:2.5,fontWeight:800,color:PURPLE,textTransform:"uppercase",marginBottom:8}}>🥅 Penalty Shootout</div>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"center",gap:14}}>
            {penCell(match.teamA,match.penA,"penA",penWinner===match.teamA)}
            <span style={{fontSize:9,color:"#666",fontWeight:800,marginTop:8}}>VS</span>
            {penCell(match.teamB,match.penB,"penB",penWinner===match.teamB)}
          </div>
        </div>
      )}
      <div style={{marginTop:5,display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap"}}>
        {draw&&penWinner&&<span style={{fontSize:8,color:ACCENT,background:`${ACCENT}18`,border:`1px solid ${ACCENT}44`,borderRadius:20,padding:"2px 7px",fontWeight:700,display:"inline-flex",alignItems:"center",gap:3}}><Flag team={penWinner} size={11} /> <TeamName name={penWinner}/> WIN (PEN)</span>}
        {!draw&&winner&&<span style={{fontSize:8,color:ACCENT,background:`${ACCENT}18`,border:`1px solid ${ACCENT}44`,borderRadius:20,padding:"2px 7px",fontWeight:700,display:"inline-flex",alignItems:"center",gap:3}}><Flag team={winner} size={11} /> <TeamName name={winner}/> ADVANCE</span>}
      </div>
    </div>
  );
}

function GroupMatchCard({match,onScore,isMobile}){
  const played=match.homeScore!==null&&match.awayScore!==null;

  const aw=played&&match.awayScore>match.homeScore;
  const draw=played&&match.homeScore===match.awayScore;
  return(
    <div style={{background:played?"linear-gradient(135deg,rgba(0,208,132,0.06),rgba(255,255,255,0.02))":CARD,border:`1px solid ${played?"rgba(0,208,132,0.2)":BORDER}`,borderRadius:12,padding:"10px 12px"}}>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:7,gap:6}}>

        <TimeBadge date={match.date} time={match.time} city={match.city}/>
      </div>
      {/* Home */}
      <div style={{display:"flex",alignItems:"center",gap:7,paddingBottom:5,borderBottom:`1px solid ${BORDER}`}}>
        <Flag team={match.home} size={isMobile?21:19} />
        <span style={{flex:1,fontSize:12,fontWeight:hw?800:500,color:hw?"#fff":"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {hw ? <><TeamName name={match.home}/><span style={{fontSize:7,color:ACCENT,marginLeft:5,letterSpacing:1}}>WIN ✓</span></> : <TeamName name={match.home}/>}
        </span>
        <Stepper value={match.homeScore} onChange={v=>onScore("homeScore",v)} highlight={hw}/>
      </div>
      {/* Away */}
      <div style={{display:"flex",alignItems:"center",gap:7,paddingTop:5}}>
        <Flag team={match.away} size={isMobile?21:19} />
        <span style={{flex:1,fontSize:12,fontWeight:aw?800:500,color:aw?"#fff":"#aaa",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {aw ? <><TeamName name={match.away}/><span style={{fontSize:7,color:ACCENT,marginLeft:5,letterSpacing:1}}>WIN ✓</span></> : <TeamName name={match.away}/>}

        <Stepper value={match.awayScore} onChange={v=>onScore("awayScore",v)} highlight={aw}/>
      </div>
      {draw&&<div style={{textAlign:"center",fontSize:8,color:"#666",letterSpacing:1,marginTop:5}}>DRAW</div>}
    </div>
  );
}

// FIFA confederation membership for all 48 WC2026 teams
const CONFEDERATIONS = {
  UEFA: {
    name:"UEFA", label:"Europe", color:"#4f8ef7",
    teams:["Germany","Netherlands","Sweden","Belgium","Spain","France","England","Croatia","Switzerland","Portugal","Serbia","Bosnia","Czechia","Scotland","Norway","Austria","Turkey"],
  },
  CONMEBOL: {
    name:"CONMEBOL", label:"S. America", color:"#f7c948",
    teams:["Brazil","Argentina","Colombia","Ecuador","Uruguay","Paraguay","Chile","Peru","Venezuela","Bolivia"],
  },
  CONCACAF: {
    name:"CONCACAF", label:"N/C America", color:"#00d084",
    teams:["United States","Mexico","Canada","Haiti","Panama","Curacao","Jamaica","Honduras"],
  },
  CAF: {
    name:"CAF", label:"Africa", color:"#ff6b35",
    teams:["Morocco","South Africa","Senegal","Ivory Coast","Egypt","Ghana","DR Congo","Cameroon","Tunisia","Mali","Nigeria","Algeria","Cape Verde"],
  },
  AFC: {
    name:"AFC", label:"Asia", color:"#a78bfa",
    teams:["South Korea","Japan","Saudi Arabia","Iran","Iraq","Australia","Qatar","Uzbekistan","Jordan"],
  },
  OFC: {
    name:"OFC", label:"Oceania", color:"#ff3b55",
    teams:["New Zealand"],
  },
};

function ConfederationChart({groupMatches, ko, isMobile}) {
  const data = useMemo(()=>{
    // Build per-team stats across group + KO
    const teamStats = {};
    // Group matches
    Object.values(groupMatches).flat().forEach(m=>{
      if(m.homeScore===null||m.awayScore===null) return;
      const hs=+m.homeScore, as_=+m.awayScore;
      [m.home,m.away].forEach((t,ti)=>{
        if(!teamStats[t]) teamStats[t]={gf:0,ga:0,pts:0,played:0,wins:0,draws:0};
        const gf=ti===0?hs:as_, ga=ti===0?as_:hs;
        teamStats[t].gf+=gf; teamStats[t].ga+=ga; teamStats[t].played++;
        if(gf>ga){teamStats[t].pts+=3;teamStats[t].wins++;}
        else if(gf===ga){teamStats[t].pts++;teamStats[t].draws++;}
      });
    });
    // KO matches (points: win=1, loss=0, draw handled by penalties)
    const allKO=[...ko.r32,...ko.r16,...ko.qf,...ko.sf,...ko.final,...ko.third];
    allKO.forEach(m=>{
      if(m.scoreA===null||m.scoreB===null||!m.teamA||!m.teamB) return;
      [m.teamA,m.teamB].forEach((t,ti)=>{
        if(!teamStats[t]) teamStats[t]={gf:0,ga:0,pts:0,played:0,wins:0,draws:0};
        const gf=ti===0?+m.scoreA:+m.scoreB, ga=ti===0?+m.scoreB:+m.scoreA;
        teamStats[t].gf+=gf; teamStats[t].ga+=ga; teamStats[t].played++;
        const w = koWinner(m);
        if(w===t){teamStats[t].pts+=3;teamStats[t].wins++;}
        else if(!w){teamStats[t].pts++;teamStats[t].draws++;}
      });
    });

    // Aggregate per confederation
    return Object.entries(CONFEDERATIONS).map(([key,conf])=>{
      // Only count teams actually in the tournament (present in GROUPS)
      const allTeams = Object.values(GROUPS).flat();
      const confTeams = conf.teams.filter(t=>allTeams.includes(t));
      let totalGF=0,totalGA=0,totalPts=0,totalPlayed=0,totalWins=0,totalDraws=0;
      confTeams.forEach(t=>{
        const s=teamStats[t]||{gf:0,ga:0,pts:0,played:0,wins:0,draws:0};
        totalGF+=s.gf; totalGA+=s.ga; totalPts+=s.pts;
        totalPlayed+=s.played; totalWins+=s.wins; totalDraws+=s.draws;
      });
      return {
        key, ...conf,
        teams: confTeams,
        teamCount: confTeams.length,
        totalGF, totalGA, totalGD: totalGF-totalGA,
        totalPts, totalPlayed, totalWins, totalDraws,
        avgPts: confTeams.length>0&&totalPlayed>0 ? (totalPts/confTeams.length).toFixed(1) : "—",
        avgGF:  confTeams.length>0&&totalPlayed>0 ? (totalGF/confTeams.length).toFixed(1) : "—",
      };
    });
  },[groupMatches,ko]);

  // Find max values for bar scaling
  const maxPts = Math.max(...data.map(d=>+d.totalPts||0), 1);
  const maxGF  = Math.max(...data.map(d=>d.totalGF), 1);

  const [metric, setMetric] = useState("pts"); // pts | gf | gd

  const metricFn = d => metric==="pts" ? d.totalPts : metric==="gf" ? d.totalGF : d.totalGD;
  const maxVal = Math.max(...data.map(d=>Math.abs(metricFn(d))||0), 1);

  const metricLabel = metric==="pts"?"Total Points":metric==="gf"?"Goals Scored":"Goal Diff";

  return(
    <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"14px 14px",marginBottom:13}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:8,color:"#555",letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>Performance by Confederation</div>
        {/* Metric toggle */}
        <div style={{display:"flex",gap:3}}>
          {[["pts","PTS"],["gf","GF"],["gd","GD"]].map(([v,label])=>(
            <button key={v} onClick={()=>setMetric(v)} style={{
              padding:"3px 8px",borderRadius:5,fontSize:8,fontWeight:700,letterSpacing:0.8,
              border:`1px solid ${metric===v?GOLD:BORDER}`,
              background:metric===v?`${GOLD}18`:"transparent",
              color:metric===v?GOLD:"#555",cursor:"pointer",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* Bars */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {data.map(conf=>{
          const val = metricFn(conf);
          const isNeg = val < 0;
          const pct = maxVal>0 ? Math.abs(val)/maxVal*100 : 0;
          const noData = conf.totalPlayed===0;
          return(
            <div key={conf.key}>
              {/* Conf name + teams row */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{width:7,height:7,borderRadius:2,background:conf.color,display:"inline-block",flexShrink:0}}/>
                  <span style={{fontSize:10,fontWeight:700,color:"#ccc"}}>{conf.label}</span>
                  <span style={{fontSize:8,fontWeight:800,letterSpacing:0.5,color:conf.color,background:`${conf.color}1a`,border:`1px solid ${conf.color}40`,borderRadius:4,padding:"1px 4px"}}>{conf.name}</span>
                  <span style={{fontSize:9,color:"#444"}}>({conf.teamCount} {conf.teamCount===1?"team":"teams"})</span>
                  {/* Always-visible team flags so every confederation shows its countries */}
                  <span style={{display:"flex",alignItems:"center",gap:2,flexWrap:"wrap"}}>
                    {conf.teams.slice(0,isMobile?6:12).map(t=>(
                      <Flag key={t} team={t} size={11} />
                    ))}
                  </span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  {!noData&&<span style={{fontSize:9,color:"#555"}}>{conf.teamCount>0?`avg ${conf.avgPts} pts`:""}</span>}
                  <span style={{fontSize:11,fontWeight:900,color:noData?"#333":isNeg?RED:conf.color,minWidth:24,textAlign:"right"}}>
                    {noData?"—":val>0?`+${val}`:val}
                  </span>
                </div>
              </div>
              {/* Bar */}
              <div style={{height:18,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden",position:"relative"}}>
                {!noData&&(
                  <div style={{
                    position:"absolute",
                    [isNeg?"right":"left"]:0,
                    width:`${pct}%`,
                    height:"100%",
                    background:isNeg?`${RED}cc`:conf.color,
                    borderRadius:isNeg?"4px 0 0 4px":"0 4px 4px 0",
                    transition:"width 0.5s ease",
                    display:"flex",alignItems:"center",
                    justifyContent:isNeg?"flex-start":"flex-end",
                    paddingRight:isNeg?0:5,paddingLeft:isNeg?5:0,
                  }}/>
                )}
                {noData&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:8,fontSize:9,color:"#333"}}>No results yet</div>}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{marginTop:10,fontSize:8,color:"#444",textAlign:"right"}}>{metricLabel} · All stages combined</div>
    </div>
  );
}
