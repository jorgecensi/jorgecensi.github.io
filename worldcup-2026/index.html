function ConfederationChart({groupMatches, ko, isMobile}) {
  const { t } = useLang();
  const data = useMemo(()=>{
    // Build per-team stats across group + KO
    const teamStats = {};
    // Group matches
    Object.values(groupMatches).flat().forEach(m=>{
      if(m.homeScore===null||m.awayScore===null) return;
      const hs=+m.homeScore, as_=+m.awayScore;
      [m.home,m.away].forEach((t,ti)=>{
        if(!teamStats[t]) teamStats[t]={gf:0,ga:0,pts:0,played:0,wins:0,draws:0};
        const gf=ti===0?hs:as_, ga=ti===0?as_:hs;
        teamStats[t].gf+=gf; teamStats[t].ga+=ga; teamStats[t].played++;
        if(gf>ga){teamStats[t].pts+=3;teamStats[t].wins++;}
        else if(gf===ga){teamStats[t].pts++;teamStats[t].draws++;}
      });
    });
    // KO matches (points: win=1, loss=0, draw handled by penalties)
    const allKO=[...ko.r32,...ko.r16,...ko.qf,...ko.sf,...ko.final,...ko.third];
    allKO.forEach(m=>{
      if(m.scoreA===null||m.scoreB===null||!m.teamA||!m.teamB) return;
      [m.teamA,m.teamB].forEach((t,ti)=>{
        if(!teamStats[t]) teamStats[t]={gf:0,ga:0,pts:0,played:0,wins:0,draws:0};
        const gf=ti===0?+m.scoreA:+m.scoreB, ga=ti===0?+m.scoreB:+m.scoreA;
        teamStats[t].gf+=gf; teamStats[t].ga+=ga; teamStats[t].played++;
        const w = koWinner(m);
        if(w===t){teamStats[t].pts+=3;teamStats[t].wins++;}
        else if(!w){teamStats[t].pts++;teamStats[t].draws++;}
      });
    });

    // Aggregate per confederation
    return Object.entries(CONFEDERATIONS).map(([key,conf])=>{
      // Only count teams actually in the tournament (present in GROUPS)
      const allTeams = Object.values(GROUPS).flat();
      const confTeams = conf.teams.filter(t=>allTeams.includes(t));
      let totalGF=0,totalGA=0,totalPts=0,totalPlayed=0,totalWins=0,totalDraws=0;
      confTeams.forEach(t=>{
        const s=teamStats[t]||{gf:0,ga:0,pts:0,played:0,wins:0,draws:0};
        totalGF+=s.gf; totalGA+=s.ga; totalPts+=s.pts;
        totalPlayed+=s.played; totalWins+=s.wins; totalDraws+=s.draws;
      });
      return {
        key, ...conf,
        teams: confTeams,
        teamCount: confTeams.length,
        totalGF, totalGA, totalGD: totalGF-totalGA,
        totalPts, totalPlayed, totalWins, totalDraws,
        avgPts: confTeams.length>0&&totalPlayed>0 ? (totalPts/confTeams.length).toFixed(1) : "—",
        avgGF:  confTeams.length>0&&totalPlayed>0 ? (totalGF/confTeams.length).toFixed(1) : "—",
      };
    });
  },[groupMatches,ko]);

  // Find max values for bar scaling
  const maxPts = Math.max(...data.map(d=>+d.totalPts||0), 1);
  const maxGF  = Math.max(...data.map(d=>d.totalGF), 1);

  const [metric, setMetric] = useState("pts"); // pts | gf | gd

  const metricFn = d => metric==="pts" ? d.totalPts : metric==="gf" ? d.totalGF : d.totalGD;
  const maxVal = Math.max(...data.map(d=>Math.abs(metricFn(d))||0), 1);

  const metricLabel = metric==="pts"?t('metric_total_pts'):metric==="gf"?t('metric_goals_scored'):t('metric_goal_diff');
  const confLabelMap = {UEFA:t('conf_europe'),CONMEBOL:t('conf_s_america'),CONCACAF:t('conf_nc_america'),CAF:t('conf_africa'),AFC:t('conf_asia'),OFC:t('conf_oceania')};

  return(
    <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:12,padding:"14px 14px",marginBottom:13}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:11,color:"#555",letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>{t('perf_by_conf')}</div>
        {/* Metric toggle */}
        <div style={{display:"flex",gap:3}}>
          {[["pts",t('metric_pts')],["gf",t('metric_gf')],["gd",t('metric_gd')]].map(([v,label])=>(
            <button key={v} onClick={()=>setMetric(v)} style={{
              padding:"3px 8px",borderRadius:5,fontSize:10,fontWeight:700,letterSpacing:0.8,
              border:`1px solid ${metric===v?GOLD:BORDER}`,
              background:metric===v?`${GOLD}18`:"transparent",
              color:metric===v?GOLD:"#555",cursor:"pointer",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {/* Bars */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {data.map(conf=>{
          const val = metricFn(conf);
          const isNeg = val < 0;
          const pct = maxVal>0 ? Math.abs(val)/maxVal*100 : 0;
          const noData = conf.totalPlayed===0;
          return(
            <div key={conf.key}>
              {/* Conf name + teams row */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                  <span style={{width:7,height:7,borderRadius:2,background:conf.color,display:"inline-block",flexShrink:0}}/>
                  <span style={{fontSize:12,fontWeight:700,color:"#ccc"}}>{confLabelMap[conf.key]||conf.label}</span>
                  <span style={{fontSize:10,fontWeight:800,letterSpacing:0.5,color:conf.color,background:`${conf.color}1a`,border:`1px solid ${conf.color}40`,borderRadius:4,padding:"1px 4px"}}>{conf.name}</span>
                  <span style={{fontSize:11,color:"#444"}}>({conf.teamCount} {conf.teamCount===1?t('conf_team'):t('conf_teams')})</span>
                  {/* Always-visible team flags so every confederation shows its countries */}
                  <span style={{display:"flex",alignItems:"center",gap:2,flexWrap:"wrap"}}>
                    {conf.teams.slice(0,isMobile?6:12).map(tm=>(
                      <Flag key={tm} team={tm} size={11} />
                    ))}
                  </span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  {!noData&&<span style={{fontSize:11,color:"#555"}}>{conf.teamCount>0?t('conf_avg_pts').replace('{n}',conf.avgPts):""}</span>}
                  <span style={{fontSize:13,fontWeight:900,color:noData?"#333":isNeg?RED:conf.color,minWidth:24,textAlign:"right"}}>
                    {noData?"—":val>0?`+${val}`:val}
                  </span>
                </div>
              </div>
              {/* Bar */}
              <div style={{height:18,background:"rgba(255,255,255,0.04)",borderRadius:4,overflow:"hidden",position:"relative"}}>
                {!noData&&(
                  <div style={{
                    position:"absolute",
                    [isNeg?"right":"left"]:0,
                    width:`${pct}%`,
                    height:"100%",
                    background:isNeg?`${RED}cc`:conf.color,
                    borderRadius:isNeg?"4px 0 0 4px":"0 4px 4px 0",
                    transition:"width 0.5s ease",
                    display:"flex",alignItems:"center",
                    justifyContent:isNeg?"flex-start":"flex-end",
                    paddingRight:isNeg?0:5,paddingLeft:isNeg?5:0,
                  }}/>
                )}
                {noData&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",paddingLeft:8,fontSize:9,color:"#333"}}>{t('no_results_yet')}</div>}
              </div>
            </div>
          );
        })}
      </div>

      <div style={{marginTop:10,fontSize:10,color:"#444",textAlign:"right"}}>{metricLabel} · {t('all_stages_combined')}</div>
    </div>
  );
}

            <button key={v} onClick={()=>setMetric(v)} style={{
              padding:"3px 8px", borderRadius:5, fontSize:10, fontWeight:700, letterSpacing:0.8,
              border:`1px solid ${metric===v?ACCENT:BORDER}`,
              background:metric===v?`${ACCENT}18`:"transparent",
              color:metric===v?ACCENT:"#555", cursor:"pointer",
            }}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{overflowX:"auto", paddingBottom:2}}>
        <div style={{position:"relative", height:CHART_H+32, width:allData.length*(BAR_W+GAP)}}>

          {/* Average GPG dashed line */}
          {metric==="gpg" && (
            <div style={{
              position:"absolute", left:0, right:0,
              top: CHART_H - (avgGpg/maxVal*CHART_H) - 1,
              borderTop:`1px dashed ${GOLD}55`, zIndex:2, pointerEvents:"none",
            }}>
              <span style={{position:"absolute", right:2, top:-9, fontSize:7, color:GOLD, opacity:0.65, whiteSpace:"nowrap"}}>
                avg {avgGpg.toFixed(2)}
              </span>
            </div>
          )}

          {/* Bars */}
          {allData.map((d,i)=>{
            const val = getValue(d);
            const hasData = val !== null && val > 0;
            const barH = hasData ? Math.max(val/maxVal*CHART_H, 3) : 3;
            const isHighest = metric==="gpg" && d.year===1954;
            const isLowest  = metric==="gpg" && d.year===1990;
            const color = d.isCurrent ? ACCENT : isHighest ? GOLD : isLowest ? RED : "rgba(255,255,255,0.18)";
            const x = i*(BAR_W+GAP);

            return (
              <div key={d.year} style={{position:"absolute", left:x, bottom:28, width:BAR_W}}>
                {(d.isCurrent||isHighest||isLowest) && hasData && (
                  <div style={{
                    position:"absolute", bottom:barH+3, width:"100%", textAlign:"center",
                    fontSize:7, fontWeight:900, color, whiteSpace:"nowrap",
                  }}>
                    {metric==="gpg" ? (val).toFixed(2) : val}
                  </div>
                )}
                <div style={{
                  position:"absolute", bottom:0, width:"100%", height:barH,
                  background:color, borderRadius:"3px 3px 0 0",
                  border:d.isCurrent?`1px solid ${ACCENT}88`:"none",
                  opacity:hasData?1:0.25,
                }}/>
                <div style={{
                  position:"absolute", top:"100%", left:0, width:BAR_W,
                  marginTop:4, fontSize:7, textAlign:"left",
                  color:d.isCurrent?ACCENT:"#444", fontWeight:d.isCurrent?900:400,
                  transform:"rotate(-45deg)", transformOrigin:"top left",
                  whiteSpace:"nowrap",
                }}>
                  {d.year}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{display:"flex", gap:10, fontSize:10, color:"#444", flexWrap:"wrap", marginTop:6}}>
        <span><span style={{color:GOLD}}>■</span> {t('chart_most')}</span>
        <span><span style={{color:RED}}>■</span> {t('chart_fewest')}</span>
        <span><span style={{color:ACCENT}}>■</span> {t('chart_live')}</span>
        {metric==="gpg" && <span><span style={{color:GOLD, opacity:0.5}}>╌</span> {t('chart_hist_avg')} {avgGpg.toFixed(2)}</span>}
      </div>
    </div>
  );
}

function PastChampions({isMobile}) {
  const { t } = useLang();
  const [showAll, setShowAll] = useState(false);
  const reversed = useMemo(()=>[...HISTORICAL_WC].reverse(), []);
  const displayed = showAll ? reversed : reversed.slice(0, 8);

  const champCount = useMemo(()=>{
    const c={};
    HISTORICAL_WC.forEach(wc=>{ c[wc.champion]=(c[wc.champion]||0)+1; });
    return c;
  },[]);

  return (
    <div style={{background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:"12px 14px", marginBottom:13}}>
      <div style={{fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", marginBottom:10, fontWeight:700}}>
        {t('past_champions')}
      </div>
      <div style={{display:"grid", gridTemplateColumns:"34px 1fr 1fr 34px", gap:6, paddingBottom:6, borderBottom:`1px solid ${BORDER}`, marginBottom:4}}>
        {[t('col_year'),t('col_champion'),t('col_runner_up'),t('col_gpg')].map(h=>(
          <div key={h} style={{fontSize:11, color:"#444", fontWeight:700, letterSpacing:0.5}}>{h}</div>
        ))}
      </div>
      {displayed.map(wc=>(
        <div key={wc.year} style={{
          display:"grid", gridTemplateColumns:"34px 1fr 1fr 34px", gap:6,
          padding:"5px 0", borderBottom:`1px solid rgba(255,255,255,0.025)`,
          alignItems:"center",
        }}>
          <div style={{fontSize:12, color:"#777", fontWeight:600}}>{wc.year}</div>
          <div style={{display:"flex", alignItems:"center", gap:4, minWidth:0}}>
            <Flag team={wc.champion} size={13}/>
            <span style={{
              fontSize:12, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap",
              color:champCount[wc.champion]>=3?GOLD:"#ccc",
              fontWeight:champCount[wc.champion]>=3?700:400,
            }}>
              {wc.champion}{champCount[wc.champion]>=3?" ★":""}
            </span>
          </div>
          <div style={{display:"flex", alignItems:"center", gap:4, minWidth:0}}>
            <Flag team={wc.runnerUp} size={13}/>
            <span style={{fontSize:12, color:"#555", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
              {wc.runnerUp}
            </span>
          </div>
          <div style={{fontSize:12, fontWeight:600, color:wc.gpg>=4?GOLD:wc.gpg<2.3?RED:"#555"}}>{wc.gpg.toFixed(2)}</div>
        </div>
      ))}
      {!showAll && (
        <button onClick={()=>setShowAll(true)} style={{
          marginTop:8, width:"100%", padding:"6px 0", fontSize:11, color:"#555",
          background:"transparent", border:`1px solid ${BORDER}`, borderRadius:6,
          cursor:"pointer", letterSpacing:0.5,
        }}>{t('show_all_editions').replace('{n}',HISTORICAL_WC.length)}</button>
      )}
    </div>
  );
}

const FINISH_I18N_KEY = {W:'finish_champion',F:'finish_runner_up','3':'finish_3rd','4':'finish_4th',QF:'finish_qf',R16:'finish_r16',GS:'finish_gs'};
function FinishBadge({finish, size=11}) {
  const { t } = useLang();
  if (!finish) return <span style={{fontSize:size,color:"#555",fontStyle:"italic"}}>{t('debut')}</span>;
  const color = FINISH_COLOR_MAP[finish] || "#555";
  const icon = finish==="W"?"🏆 ":finish==="F"?"🥈 ":finish==="3"?"🥉 ":"";
  return (
    <span style={{
      fontSize:size, fontWeight:800, color,
      background:`${color}22`, border:`1px solid ${color}44`,
      borderRadius:4, padding:"1px 5px", whiteSpace:"nowrap",
    }}>
      {icon}{FINISH_I18N_KEY[finish]?t(FINISH_I18N_KEY[finish]):(FINISH_LABEL_MAP[finish]||finish)}
    </span>
  );
}

function TeamHistoryRow({team, history, expanded, onToggle}) {
  const { t } = useLang();
  const finishes = Object.values(history);
  const bestFinish = finishes.length > 0
    ? finishes.reduce((b,f)=>(FINISH_RANK[f]||99)<(FINISH_RANK[b]||99)?f:b, finishes[0])
    : null;
  const years = Object.keys(history).map(Number).sort((a,b)=>a-b);

  return (
    <div>
      <div onClick={onToggle} style={{
        display:"flex", alignItems:"center", gap:6, padding:"6px 0",
        borderBottom:`1px solid rgba(255,255,255,0.025)`,
        cursor:"pointer", userSelect:"none",
      }}>
        <Flag team={team} size={15}/>
        <span style={{flex:1, fontSize:13, color:"#bbb", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>
          <TeamName name={team}/>
        </span>
        {/* Mini coloured dots — last 8 appearances */}
        <div style={{display:"flex", gap:2, alignItems:"center", flexShrink:0}}>
          {years.slice(-8).map(y=>(
            <div key={y} style={{
              width:5, height:5, borderRadius:1,
              background:FINISH_COLOR_MAP[history[y]]||"#333",
            }}/>
          ))}
        </div>
        <div style={{flexShrink:0}}><FinishBadge finish={bestFinish}/></div>
        <span style={{fontSize:10, color:"#555", minWidth:22, textAlign:"right", flexShrink:0}}>
          {years.length>0?`×${years.length}`:""}
        </span>
      </div>
      {expanded && (
        <div style={{padding:"8px 4px 10px 20px", display:"flex", flexWrap:"wrap", gap:5, borderBottom:`1px solid rgba(255,255,255,0.04)`}}>
          {years.length===0 ? (
            <span style={{fontSize:11, color:"#555", fontStyle:"italic"}}>{t('first_appearance')}</span>
          ) : years.map(year=>{
            const f = history[year];
            const col = FINISH_COLOR_MAP[f]||"#333";
            const icon = f==="W"?"🏆":f==="F"?"🥈":f==="3"?"🥉":"";
            return (
              <div key={year} style={{
                display:"flex", flexDirection:"column", alignItems:"center", gap:1,
                background:`${col}18`, border:`1px solid ${col}33`,
                borderRadius:5, padding:"4px 7px", minWidth:46,
              }}>
                <span style={{fontSize:10, color:"#666", fontWeight:600}}>{year}</span>
                <span style={{fontSize:11, fontWeight:800, color:col}}>{icon||(FINISH_I18N_KEY[f]?t(FINISH_I18N_KEY[f]):(FINISH_LABEL_MAP[f]||f))}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function TeamHistorySection({isMobile}) {
  const { t } = useLang();
  const [expanded, setExpanded] = useState(null);
  const [sortBy, setSortBy] = useState("best");

  const allTeams = useMemo(()=>Object.values(GROUPS).flat(), []);
  const getHist  = t => TEAM_WC_HISTORY[t] || {};
  const getBest  = t => {
    const f = Object.values(getHist(t));
    return f.length ? f.reduce((b,v)=>(FINISH_RANK[v]||99)<(FINISH_RANK[b]||99)?v:b, f[0]) : null;
  };

  const sorted = useMemo(()=>[...allTeams].sort((a,b)=>{
    if(sortBy==="best"){
      const d=(FINISH_RANK[getBest(a)]||99)-(FINISH_RANK[getBest(b)]||99);
      if(d!==0) return d;
      return Object.keys(getHist(b)).length-Object.keys(getHist(a)).length;
    }
    if(sortBy==="apps") return Object.keys(getHist(b)).length-Object.keys(getHist(a)).length;
    return a.localeCompare(b);
  }), [allTeams,sortBy]);

  const toggle = t => setExpanded(p=>p===t?null:t);

  return (
    <div style={{background:CARD, border:`1px solid ${BORDER}`, borderRadius:12, padding:"12px 14px", marginBottom:13}}>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10, gap:6, flexWrap:"wrap"}}>
        <div style={{fontSize:11, color:"#555", letterSpacing:2, textTransform:"uppercase", fontWeight:700}}>
          {t('team_wc_history')}
        </div>
        <div style={{display:"flex", gap:3}}>
          {[["best",t('sort_best_finish')],["apps",t('sort_most_apps')],["alpha",t('sort_alpha')]].map(([v,l])=>(
            <button key={v} onClick={()=>setSortBy(v)} style={{
              padding:"3px 8px", borderRadius:5, fontSize:10, fontWeight:700, letterSpacing:0.8,
              border:`1px solid ${sortBy===v?ACCENT:BORDER}`,
              background:sortBy===v?`${ACCENT}18`:"transparent",
              color:sortBy===v?ACCENT:"#555", cursor:"pointer",
            }}>{l}</button>
          ))}
        </div>
      </div>
      <div style={{display:"flex", flexDirection:"column"}}>
        {sorted.map(team=>(
          <TeamHistoryRow
            key={team}
            team={team}
            history={getHist(team)}
            expanded={expanded===team}
            onToggle={()=>toggle(team)}
          />
        ))}
      </div>
    </div>
  );
}
