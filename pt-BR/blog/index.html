---
layout: wrapper
title: Blog
lang: pt-BR
ref: blog
---
{% assign t = site.data.translations.pt-BR %}
<h1>{{ t.blog_page.heading }}</h1>
<p>{{ t.blog_page.subtitle }}</p>

<ul class="blog-list">
	{% for post in site.posts %}
	<li>
		<a href="{{ post.url }}">{{ post.title }}</a>
		<span style="color: var(--text-muted); font-size: 0.85rem; margin-left: 0.5rem;">{{ post.date | date: "%b %Y" }}</span>
	</li>
	{% endfor %}
</ul>
