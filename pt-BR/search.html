---
layout: wrapper
title: Tópicos
lang: pt-BR
ref: search
---
{% assign t = site.data.translations.pt-BR %}
<h1>{{ t.search_page.heading }}</h1>
<p>{{ t.search_page.subtitle }}</p>

<div class="tag-section">
{% for tag in site.tags %}
<h3>{{ tag[0] }}</h3>
<ul>
    {% for post in tag[1] %}
    <li><a href="{{ post.url }}">{{ post.title }}</a></li>
    {% endfor %}
</ul>
{% endfor %}
</div>
