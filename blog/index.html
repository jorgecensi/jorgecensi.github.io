---
layout: wrapper
title: Blog
---
<h1>Blog</h1>
<p>Thoughts, tips, and the occasional rant about software and tech.</p>

<ul class="blog-list">
	{% for post in site.posts %}
	<li>
		<a href="{{ post.url }}">{{ post.title }}</a>
		<span style="color: var(--text-muted); font-size: 0.85rem; margin-left: 0.5rem;">{{ post.date | date: "%b %Y" }}</span>
	</li>
	{% endfor %}
</ul>
