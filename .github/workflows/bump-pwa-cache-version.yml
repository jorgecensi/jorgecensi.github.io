name: Bump PWA cache version

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-cache-version:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 2

      - name: Resolve version
        id: version
        run: |
          VERSION="$(date -u +"%y%m%d%H%M")"
          echo "value=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Detect changed PWA files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

          check() {
            local files="$1"
            for f in $files; do
              if echo "$CHANGED" | grep -qF "$f"; then
                echo "true"
                return
              fi
            done
            echo "false"
          }

          echo "binary=$(check 'binary/sw.js binary/binary.js binary/index.html binary/manifest.json')" >> "${GITHUB_OUTPUT}"
          echo "binary_ptbr=$(check 'pt-BR/binary/sw.js pt-BR/binary/index.html binary/binary.js binary/manifest-pt-BR.json')" >> "${GITHUB_OUTPUT}"
          echo "flappy=$(check 'flappy/sw.js flappy/index.html flappy/flappyBird.js flappy/manifest.json')" >> "${GITHUB_OUTPUT}"
          echo "crossfit=$(check 'crossfit-timer/sw.js crossfit-timer/index.html crossfit-timer/manifest.json')" >> "${GITHUB_OUTPUT}"
          echo "curator=$(check 'curator/sw.js curator/index.html curator/manifest.json')" >> "${GITHUB_OUTPUT}"
          echo "drum_machine=$(check 'drum-machine/sw.js drum-machine/index.html drum-machine/manifest.json')" >> "${GITHUB_OUTPUT}"
          echo "f1=$(check 'f1-championship/sw.js f1-championship/index.html f1-championship/manifest.json')" >> "${GITHUB_OUTPUT}"
          echo "synth=$(check 'synth/sw.js synth/index.html synth/manifest.json')" >> "${GITHUB_OUTPUT}"
          echo "tuner=$(check 'tuner/sw.js tuner/index.html tuner/manifest.json')" >> "${GITHUB_OUTPUT}"

      - name: Update PWA version constants
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import os

          version = "${{ steps.version.outputs.value }}"
          is_tag_or_dispatch = "${{ github.event_name }}" in ("workflow_dispatch",) or "${{ github.ref }}".startswith("refs/tags/")
          changed = {
              "binary":       "${{ steps.changed.outputs.binary }}" == "true",
              "binary_ptbr":  "${{ steps.changed.outputs.binary_ptbr }}" == "true",
              "flappy":       "${{ steps.changed.outputs.flappy }}" == "true",
              "crossfit":     "${{ steps.changed.outputs.crossfit }}" == "true",
              "curator":      "${{ steps.changed.outputs.curator }}" == "true",
              "drum_machine": "${{ steps.changed.outputs.drum_machine }}" == "true",
              "f1":           "${{ steps.changed.outputs.f1 }}" == "true",
              "synth":        "${{ steps.changed.outputs.synth }}" == "true",
              "tuner":        "${{ steps.changed.outputs.tuner }}" == "true",
          }

          # On tag/dispatch, bump everything; on push to main, only bump changed PWAs
          bump_all = is_tag_or_dispatch

          repo = pathlib.Path(".")

          # Map: relative_path -> (const_name, version)
          versioned_files = {}

          if bump_all or changed["flappy"]:
              versioned_files["flappy/sw.js"] = ("CACHE_VERSION", version)
              versioned_files["flappy/index.html"] = ("SW_VERSION", version)
          if bump_all or changed["crossfit"]:
              versioned_files["crossfit-timer/sw.js"] = ("CACHE_VERSION", version)
              versioned_files["crossfit-timer/index.html"] = ("SW_VERSION", version)
          if bump_all or changed["binary"]:
              versioned_files["binary/sw.js"] = ("CACHE_VERSION", version)
              versioned_files["binary/binary.js"] = ("APP_VERSION", version)
          if bump_all or changed["binary_ptbr"]:
              versioned_files["pt-BR/binary/sw.js"] = ("CACHE_VERSION", version)
          if bump_all or changed["curator"]:
              versioned_files["curator/sw.js"] = ("CACHE_VERSION", version)
              versioned_files["curator/index.html"] = ("APP_VERSION", version)
          if bump_all or changed["drum_machine"]:
              versioned_files["drum-machine/sw.js"] = ("CACHE_VERSION", version)
              versioned_files["drum-machine/index.html"] = ("SW_VERSION", version)
          if bump_all or changed["f1"]:
              versioned_files["f1-championship/sw.js"] = ("CACHE_VERSION", version)
          if bump_all or changed["synth"]:
              versioned_files["synth/sw.js"] = ("CACHE_VERSION", version)
          if bump_all or changed["tuner"]:
              versioned_files["tuner/sw.js"] = ("CACHE_VERSION", version)
              versioned_files["tuner/index.html"] = ("SW_VERSION", version)

          for relative_path, (const_name, ver) in versioned_files.items():
              path = repo / relative_path
              content = path.read_text(encoding="utf-8")
              pattern = rf"const {const_name} = '[^']*';"
              replacement = f"const {const_name} = '{ver}';"
              updated, count = re.subn(pattern, replacement, content, count=1)
              if count != 1:
                  raise RuntimeError(f"Expected to update one {const_name} in {relative_path}, found {count}.")
              path.write_text(updated, encoding="utf-8")
              print(f"Updated {const_name} in {relative_path} -> {ver}")
          PY

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No cache-version updates required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            binary/sw.js \
            binary/binary.js \
            pt-BR/binary/sw.js \
            crossfit-timer/sw.js \
            crossfit-timer/index.html \
            flappy/sw.js \
            flappy/index.html \
            curator/sw.js \
            curator/index.html \
            drum-machine/sw.js \
            drum-machine/index.html \
            f1-championship/sw.js \
            synth/sw.js \
            tuner/sw.js \
            tuner/index.html
          git commit -m "chore: bump PWA cache version to ${{ steps.version.outputs.value }} [skip ci]"
          git push origin "HEAD:${{ github.event.repository.default_branch }}"
