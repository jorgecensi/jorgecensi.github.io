<body>
  <canvas id="canvas"></canvas>

  <script>
    const SW_VERSION = '2607171110';
    if ('serviceWorker' in navigator) {
      let refreshed = false;
      function showBanner(reg) {
        if (document.getElementById('sw-banner')) return;
        const b = document.createElement('div');
        b.id = 'sw-banner';
        b.innerHTML = '<span>Update available.</span><button>Refresh</button>';
        b.querySelector('button').onclick = () => reg.waiting && reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        document.body.appendChild(b);
      }
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register(`/elastomania/sw.js?v=${SW_VERSION}`, { scope: '/elastomania/' });
          if (reg.waiting) showBanner(reg);
          reg.addEventListener('updatefound', () => {
            const w = reg.installing;
            w && w.addEventListener('statechange', () => {
              if (w.state === 'installed' && navigator.serviceWorker.controller) showBanner(reg);
            });
          });
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshed) return; refreshed = true; location.reload();
          });
          window.addEventListener('focus', () => reg.update());
          setInterval(() => reg.update(), 3600000);
        } catch (e) { console.warn('SW failed', e); }
      });
    }
  </script>

  <script>
  (function () {
    'use strict';

    // ── roundRect polyfill for older Safari/Chrome ─────────────
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        r = Math.min(r, w / 2, h / 2);
        this.beginPath();
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
      };
    }

    // ── Matter.js destructure ──────────────────────────────────
    const { Engine, Bodies, Body, Composite, Constraint } = Matter;

    // ── Constants ──────────────────────────────────────────────
    // WORLD_W varies per level and is declared with the LEVELS data below.
    const WORLD_H = 700;
    const WHEEL_R = 13;
    const CHASSIS_W = 55;
    const CHASSIS_H = 10;
    // Half the wheelbase. The original Elasto Mania bike has its wheels well
    // apart — the wheelbase is about two wheel diameters — with the frame
    // stretched between them, so the wheels sit at the fork/swingarm tips
    // rather than tucked under the engine.
    const WHEELBASE_HALF = 30;

    // Suspension: one soft main leg from above each axle plus two stiffer
    // braces from points closer to the chassis centre. Soft enough that the
    // wheels visibly squash into the frame on landings and spring back — the
    // bouncy Elasto Mania feel — while the three non-collinear attachment
    // points make the wheel's rest pose the unique intersection of three
    // circles, so it can't wander around the chassis or flip to the mirror
    // solution the way a one- or two-link hookup can.
    const SUSPENSION_ANCHOR_Y  = 5;
    const SUSPENSION_LENGTH    = 15;
    const SUSPENSION_STIFFNESS = 0.12;
    const SUSPENSION_DAMPING   = 0.06;
    const BRACE_STIFFNESS = 0.18;
    const BRACE_DAMPING   = 0.06;
    // The front fork runs noticeably softer than the rear, so it visibly
    // dives on landings and under braking (about double the rear's travel
    // on the same bump) while the rear stays planted.
    const FRONT_SUS_STIFFNESS   = 0.05;
    const FRONT_SUS_DAMPING     = 0.05;
    const FRONT_BRACE_STIFFNESS = 0.08;
    const FRONT_BRACE_DAMPING   = 0.05;
    // Where a wheel sits in chassis space when the suspension is at rest.
    const AXLE_REST_Y = SUSPENSION_ANCHOR_Y + SUSPENSION_LENGTH;
    // Bump stop: a wheel can never rise above this chassis-local height —
    // the suspension bottoms out. Keeps violent landings from punching a
    // wheel through the frame into the mirror equilibrium.
    const BUMP_STOP_Y = 8;

    // Front fork geometry: the fork crown (where the fork enters the frame
    // art, under the handlebars) and the slider axis from it to the axle's
    // rest position. The front wheel is kept ON this axis by a gentle
    // per-frame correction: its perpendicular offset is decayed (capped per
    // frame so it can never teleport the wheel through an obstacle) and the
    // perpendicular part of its relative velocity is damped. The springs
    // stay in charge of the along-axis suspension travel, so the wheel only
    // moves diagonally along the fork angle.
    const FORK_CROWN = { x: 23, y: 4 };
    const FORK_DIR = (() => {
      const dx = WHEELBASE_HALF - FORK_CROWN.x;
      const dy = AXLE_REST_Y - FORK_CROWN.y;
      const len = Math.hypot(dx, dy);
      return { x: dx / len, y: dy / len };
    })();
    const FORK_ALIGN_POS_K   = 0.5;  // perp offset decay per frame
    const FORK_ALIGN_POS_CAP = 4;    // max perp position correction px/frame
    const FORK_ALIGN_VEL_K   = 0.4;  // perp relative-velocity damping

    // Engine torque acts BETWEEN the rear wheel and the frame, like the real
    // game: gassing spins the wheel up and kicks the frame back (nose-up), so
    // holding full throttle from a standstill loops you over backwards in
    // about a second and a half unless you lean forward, and throttle/brake
    // rotate the bike in mid-air. MOTOR_REACTION scales the
    // I_wheel/I_chassis reaction reaching the frame — a feel knob. With
    // both wheels held on their suspension axes there is no trailing-wheel
    // weight transfer any more, so the reaction torque is the sole wheelie
    // source (as in the original game). MOTOR_REACTION is the full-kick
    // value: suddenly opening the throttle at full kick budget lifts the
    // nose hard (and loops if held), while steady throttle fades toward
    // KICK_FLOOR of it and just rides with a mild rear-weighted attitude.
    const MOTOR_ACCEL    = 0.12;   // wheel spin gain per 16.67ms frame
    const MOTOR_REACTION = 1.6;
    // Brake couples both wheels to the frame (locks them relative to it, no
    // reverse thrust) — turn around with the flip key instead, as in the
    // original.
    const BRAKE_LOCK     = 0.25;   // per-frame lock-up fraction
    // Wheel spin cap near the rolling rate at top speed (2.2 rad/step ×
    // 13px ≈ 29px/step of surface speed). Bounding slip keeps traction
    // predictable at any attitude instead of letting the wheel rev away.
    const MAX_WHEEL_SPIN = 2.2;
    // Throttle kick: wheelies come from SUDDENLY opening the throttle, not
    // from steady cruising. A "kick budget" is full after coasting and
    // drains while gas is held — the frame reaction scales from full
    // (punchy: a flat-out from coast lifts the nose hard) down to
    // KICK_FLOOR (steady throttle just settles into a mild rear-weighted
    // attitude).
    const KICK_FLOOR  = 0.55;
    const KICK_DRAIN  = 0.010;     // per-frame drain while gassing
    const KICK_REFILL = 0.007;     // per-frame refill while off throttle
    // Terminal velocity for every bike body (px per 16.67ms step). Long
    // free-falls and monster jumps otherwise build impact speeds that
    // outrun the collision solver.
    const MAX_SPEED = 22;
    // Lean ("spin") input: kept very subtle — it nudges the bike's rotation
    // for balance corrections rather than whipping it around. Still strong
    // enough (about 5× the throttle's reaction torque) to hold a wheelie
    // down under full gas.
    const LEAN_ACCEL     = 0.02;

    const SPAWN_X = 80;
    const SPAWN_Y = 400;

    // ── Seeded PRNG (mulberry32) ─────────────────────────────────
    // Deterministic: same seed → same sequence, so every player gets
    // identical levels.
    function mulberry32(seed) {
      let s = seed | 0;
      return function () {
        s = (s + 0x6D2B79F5) | 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    // ── Procedural level generator ────────────────────────────
    const LEVEL_NAMES = [
      'Green Hills', 'Rolling Ridge', 'Canyon Run', 'Cliffside Dash',
      'Volcano Peak', 'Frozen Trail', 'Desert Storm', 'Jungle Rumble',
      'Mountain Pass', 'Lava Fields', 'Crystal Caves', 'Thunder Ridge',
      'Sunset Gorge', 'Broken Bridge', 'Sky Plateau', 'Shadow Valley'
    ];

    function generateLevel(index) {
      const rng = mulberry32(42 + index * 7919);

      const difficulty = Math.min(index / 8, 1);
      const worldW = Math.round(2800 + index * 440);
      const name = LEVEL_NAMES[index % LEVEL_NAMES.length]
        + (index >= LEVEL_NAMES.length ? ' ' + (Math.floor(index / LEVEL_NAMES.length) + 1) : '');

      const FLAT_Y = 420;
      const MIN_Y = 180 + Math.round((1 - difficulty) * 80);
      const MAX_Y = 430;
      const STEP = 60;
      const segCount = Math.floor(worldW / STEP);

      // Build terrain in segments; some stretches are rolling hills,
      // others are ramp → cliff → wall obstacles the player must brake
      // for or die.
      const terrain = [[0, FLAT_Y]];
      let y = FLAT_Y;
      let i = 1;

      // Flat spawn zone
      const flatStart = 2;
      for (; i <= flatStart; i++) terrain.push([i * STEP, FLAT_Y]);

      const maxSlope = 30 + difficulty * 40;

      // How many ramp obstacles to place (scales with difficulty)
      const rampCount = 1 + Math.floor(difficulty * 3 + rng() * 1.5);
      // Spread ramp placements roughly evenly across the track
      const rampZoneSize = Math.floor((segCount - flatStart - 4) / (rampCount + 1));
      const rampPositions = new Set();
      for (let r = 0; r < rampCount; r++) {
        const base = flatStart + 2 + rampZoneSize * (r + 1);
        const jitter = Math.floor((rng() - 0.5) * rampZoneSize * 0.4);
        rampPositions.add(Math.max(flatStart + 3, Math.min(segCount - 10, base + jitter)));
      }

      while (i < segCount - 2) {
        const x = i * STEP;

        if (rampPositions.has(i) && i < segCount - 9) {
          // ── Ramp → cliff → wall obstacle ──
          // Approach: upslope (ramp), then a cliff drop, then a wall rise.
          // Geometry is bounded by what the bike can actually do: the bike
          // can't static-climb slopes past ~40° (tyre/ground friction) and
          // tops out around 15 px/frame, so both the ramp and the wall are
          // spread over three segments (≤ ~35° each) and the wall height is
          // capped. Verified by simulating the bike over the generated
          // obstacle at every difficulty — the old 2-segment, ~52° walls
          // were impossible to pass at level 5+ no matter the approach.
          const rampHeight = 40 + Math.round(difficulty * 50 + rng() * 25);
          const gapWidth = 2 + Math.floor(rng() * 1.5);
          const wallHeight = 20 + Math.round(difficulty * 25 + rng() * 12);

          // Ramp up (3 segments)
          const rampBase = y;
          const rampTop = Math.max(MIN_Y, rampBase - rampHeight);
          terrain.push([x, Math.round(rampBase - rampHeight * 0.25)]);
          i++;
          terrain.push([i * STEP, Math.round(rampBase - rampHeight * 0.62)]);
          i++;
          terrain.push([i * STEP, rampTop]);
          i++;

          // Cliff edge — drop to floor
          const cliffBottom = Math.min(MAX_Y, rampTop + rampHeight + 30);
          terrain.push([i * STEP, cliffBottom]);
          i++;

          // Gap floor (1–2 segments)
          for (let g = 0; g < gapWidth; g++) {
            terrain.push([i * STEP, cliffBottom]);
            i++;
          }

          // Wall — a rise that punishes a too-fast approach but stays
          // climbable with momentum (3 segments)
          const wallTop = Math.max(MIN_Y, cliffBottom - wallHeight - rampHeight * 0.5);
          const wallRise = cliffBottom - wallTop;
          terrain.push([i * STEP, Math.round(cliffBottom - wallRise * 0.35)]);
          i++;
          terrain.push([i * STEP, Math.round(cliffBottom - wallRise * 0.72)]);
          i++;
          terrain.push([i * STEP, wallTop]);
          i++;

          // Gentle descent back to rideable terrain
          y = wallTop;
          const recover = Math.min(MAX_Y, wallTop + 40 + rng() * 30);
          terrain.push([i * STEP, Math.round(y + (recover - y) * 0.5)]);
          i++;
          y = Math.round(recover);
          terrain.push([i * STEP, y]);
          i++;

          continue;
        }

        // ── Regular rolling terrain ──
        const progress = i / segCount;
        const wave = Math.sin(progress * Math.PI * (2 + rng() * 2)) * (60 + difficulty * 80);
        const jitter = (rng() - 0.5) * maxSlope;

        let target = FLAT_Y + wave + jitter;
        target = Math.max(MIN_Y, Math.min(MAX_Y, target));

        const maxDelta = maxSlope * 0.8;
        const delta = Math.max(-maxDelta, Math.min(maxDelta, target - y));
        y = y + delta;
        y = Math.max(MIN_Y, Math.min(MAX_Y, Math.round(y)));

        terrain.push([x, y]);
        i++;
      }

      // Flatten the last few segments for flower placement
      const endY = Math.min(400, y);
      for (; i <= segCount; i++) {
        terrain.push([i * STEP, endY]);
      }
      terrain.push([worldW, endY]);

      // Find hill crests for apple placement
      const crests = [];
      for (let j = 2; j < terrain.length - 3; j++) {
        const [, yPrev] = terrain[j - 1];
        const [xC, yC] = terrain[j];
        const [, yNext] = terrain[j + 1];
        if (yC < yPrev && yC < yNext && yC < FLAT_Y - 10) {
          crests.push({ x: xC, y: yC, depth: FLAT_Y - yC });
        }
      }
      crests.sort((a, b) => b.depth - a.depth);

      const appleCount = 5 + Math.min(Math.floor(index * 0.8), 7);
      const apples = [];
      const usedZones = new Set();

      for (const c of crests) {
        if (apples.length >= appleCount) break;
        const zone = Math.floor(c.x / 300);
        if (usedZones.has(zone)) continue;
        usedZones.add(zone);
        apples.push({ x: c.x, y: c.y - 30 });
      }

      // Fill remaining apples at random positions along the track
      let attempts = 0;
      while (apples.length < appleCount && attempts < 200) {
        attempts++;
        const seg = Math.floor(rng() * (terrain.length - 6)) + 3;
        const [ax, ay] = terrain[seg];
        const zone = Math.floor(ax / 300);
        if (usedZones.has(zone)) continue;
        usedZones.add(zone);
        apples.push({ x: ax, y: ay - 30 });
      }

      apples.sort((a, b) => a.x - b.x);

      const flowerX = terrain[terrain.length - 3][0];
      const flowerY = terrain[terrain.length - 3][1] - 22;

      return { name, worldW, terrain, apples, flower: { x: flowerX, y: flowerY } };
    }

    // Cache generated levels so re-selecting a level is instant and
    // the same object is reused (same terrain, same apples).
    const levelCache = {};
    function getLevel(index) {
      if (!levelCache[index]) levelCache[index] = generateLevel(index);
      return levelCache[index];
    }

    // LEVELS is now a thin accessor; level count is unlimited.
    const TOTAL_LEVELS = 999;
    const LEVELS = new Proxy([], {
      get(target, prop) {
        if (prop === 'length') return TOTAL_LEVELS;
        const i = Number(prop);
        if (Number.isInteger(i) && i >= 0) return getLevel(i);
        return target[prop];
      }
    });

    const PROGRESS_KEY = 'elastomania_unlocked';
    function loadUnlockedCount() {
      try {
        const n = parseInt(localStorage.getItem(PROGRESS_KEY), 10);
        if (Number.isFinite(n)) return Math.min(Math.max(n, 1), TOTAL_LEVELS);
      } catch (e) { /* localStorage unavailable (private mode, etc.) */ }
      return 1;
    }
    function saveUnlockedCount(n) {
      try { localStorage.setItem(PROGRESS_KEY, String(n)); } catch (e) { /* ignore */ }
    }

    let unlockedCount     = loadUnlockedCount();
    let selectedLevel     = unlockedCount - 1;
    let currentLevelIndex = selectedLevel;
    let WORLD_W    = LEVELS[0].worldW;
    let TERRAIN    = LEVELS[0].terrain;
    let APPLES_DATA = LEVELS[0].apples;
    let FLOWER_DATA = LEVELS[0].flower;

    function loadLevel(index) {
      currentLevelIndex = index;
      const lvl = LEVELS[index];
      WORLD_W     = lvl.worldW;
      TERRAIN     = lvl.terrain;
      APPLES_DATA = lvl.apples;
      FLOWER_DATA = lvl.flower;
    }

    // ── Canvas ─────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ── Sprites ────────────────────────────────────────────────
    const bikeBodyImg  = new Image();
    bikeBodyImg.src    = '/elastomania/img/bike-body.png';
    const bikeWheelImg = new Image();
    bikeWheelImg.src   = '/elastomania/img/bike-wheel.png';
    // Axle points in bike-body.png pixel coordinates, solved from the
    // artist's assembled reference shot: the wheels sit INBOARD of the
    // sprite tips — the rear fender/prong overhangs the rear wheel and the
    // front fender arcs above the front wheel — with both axle centres
    // below the sprite's lower edge (the frame rides on top of the wheels).
    // Mapping these two points onto the wheels' rest positions in chassis
    // space (a similarity transform: scale + slight rotation) reproduces
    // the reference layout exactly.
    const BODY_ART_REAR_AXLE  = { x: 37,  y: 140 };
    const BODY_ART_FRONT_AXLE = { x: 273, y: 123 };
    const BODY_ART_DX = BODY_ART_FRONT_AXLE.x - BODY_ART_REAR_AXLE.x;
    const BODY_ART_DY = BODY_ART_FRONT_AXLE.y - BODY_ART_REAR_AXLE.y;
    const BIKE_BODY_SCALE = (WHEELBASE_HALF * 2) / Math.hypot(BODY_ART_DX, BODY_ART_DY);
    const BIKE_BODY_ROT   = -Math.atan2(BODY_ART_DY, BODY_ART_DX);
    const BIKE_WHEEL_SCALE   = (WHEEL_R * 2.05) / 108;
    // Only spin the wheel art at a fraction of the real wheel speed so the
    // spokes read as a calm roll instead of a dizzy strobe at full throttle.
    const WHEEL_SPIN_VISUAL  = 0.3;

    const riderImg = new Image();
    riderImg.src   = '/elastomania/img/rider.png';
    // Rider art is a seated/crouched pose; anchor at the hip (where the
    // thighs bend to horizontal) rather than image center, so that point
    // lands on the bike's seat instead of floating above or sinking into it.
    // Size and hip placement match the assembled reference shot: the rider
    // is big relative to the bike (helmet well above the handlebars, feet
    // reaching the pegs at the engine bottom).
    const RIDER_SCALE    = 0.20;
    const RIDER_ANCHOR_X = 0.286;
    const RIDER_ANCHOR_Y = 0.569;
    const RIDER_OFFSET_X = -7;
    const RIDER_OFFSET_Y = -3;
    // Lean the rider forward around his hip so his gloves rest on the
    // handlebar grips instead of hovering above them.
    const RIDER_TILT     = 0.15;

    // Point at the rider's helmet, in chassis-local space (before rotation)
    // — used as the hit-test spot for ground/terrain crashes so only the
    // head counts as a collision (as in the original game), not the wheels,
    // frame, or legs clipping a bump.
    const UPPER_BODY_OFFSET = { x: 4, y: -27 };

    function getUpperBodyPos() {
      const a = chassis.angle;
      const cos = Math.cos(a), sin = Math.sin(a);
      // Flip the fore/aft offset with facing, since the rider (and his torso)
      // mirror when the bike is switched to face the other way.
      const ox = UPPER_BODY_OFFSET.x * facing;
      return {
        x: chassis.position.x + ox * cos - UPPER_BODY_OFFSET.y * sin,
        y: chassis.position.y + ox * sin + UPPER_BODY_OFFSET.y * cos
      };
    }

    // ── Physics engine ─────────────────────────────────────────
    const engine = Engine.create();
    engine.gravity.y = 1.8;
    const world = engine.world;

    // ── Game state ─────────────────────────────────────────────
    let state = 'start'; // 'start' | 'playing' | 'dead' | 'win'
    let rearWheel, frontWheel, chassis;
    let apples = [];
    let camera  = { x: 0, y: 0 };
    let keys    = {};
    let touch   = { gas: 0, brake: false, leanFwd: false, leanBack: false };
    let facing  = 1; // 1 = the bike drives/faces right, -1 = flipped to the left
    let throttleKick = 1; // reaction budget: full after coasting, drains while gassing
    let startTime   = 0;
    let elapsedTime = 0;
    let deadTimer   = 0;
    let lastTs      = 0;

    // ── Terrain helper ─────────────────────────────────────────
    function getTerrainY(worldX) {
      if (worldX <= TERRAIN[0][0])               return TERRAIN[0][1];
      if (worldX >= TERRAIN[TERRAIN.length-1][0]) return TERRAIN[TERRAIN.length-1][1];
      for (let i = 0; i < TERRAIN.length - 1; i++) {
        const x1 = TERRAIN[i][0], y1 = TERRAIN[i][1];
        const x2 = TERRAIN[i+1][0], y2 = TERRAIN[i+1][1];
        if (worldX >= x1 && worldX <= x2) {
          const t = (worldX - x1) / (x2 - x1);
          return y1 + t * (y2 - y1);
        }
      }
      return WORLD_H;
    }

    // ── Terrain segment body ───────────────────────────────────
    // The collision slab extends 62px below the surface line (only the top
    // face matters visually — terrain is drawn as a filled polygon). Thick
    // slabs are cheap insurance against fast bodies stepping across a thin
    // slab between frames, since Matter has no continuous collision.
    function makeSegment(x1, y1, x2, y2) {
      const cx    = (x1 + x2) / 2;
      const cy    = (y1 + y2) / 2;
      const len   = Math.hypot(x2 - x1, y2 - y1);
      const angle = Math.atan2(y2 - y1, x2 - x1);
      // Offset the slab centre along the segment's downward NORMAL so the
      // top face lies exactly on the drawn surface line at any slope.
      return Bodies.rectangle(cx - 31 * Math.sin(angle), cy + 31 * Math.cos(angle), len, 62, {
        isStatic: true,
        angle,
        friction: 0.85,
        frictionStatic: 1.0,
        restitution: 0.05,
        collisionFilter: { category: 0x0002, mask: 0x0001 },
        label: 'terrain'
      });
    }

    // ── Physics init / reset ───────────────────────────────────
    function initPhysics() {
      Composite.clear(world, false);

      rearWheel = Bodies.circle(SPAWN_X - WHEELBASE_HALF, SPAWN_Y, WHEEL_R, {
        friction: 0.95,
        density: 0.002,
        restitution: 0.05,
        frictionAir: 0.01,
        collisionFilter: { category: 0x0001, mask: 0x0002 },
        label: 'rearWheel'
      });

      frontWheel = Bodies.circle(SPAWN_X + WHEELBASE_HALF, SPAWN_Y, WHEEL_R, {
        friction: 0.95,
        density: 0.002,
        restitution: 0.05,
        frictionAir: 0.01,
        collisionFilter: { category: 0x0001, mask: 0x0002 },
        label: 'frontWheel'
      });

      chassis = Bodies.rectangle(SPAWN_X, SPAWN_Y - 20, CHASSIS_W, CHASSIS_H, {
        density: 0.005,
        frictionAir: 0.02,
        collisionFilter: { category: 0x0004, mask: 0x0000 },
        label: 'chassis'
      });
      // Real bike frames strongly resist pitching (rider + engine mass sits
      // well away from the wheel axles). The thin default rectangle body is
      // too easy to snap-rotate — bump pitch inertia up without changing its
      // mass (so suspension loading stays the same). Tuned together with
      // MOTOR_REACTION so a held full throttle loops the bike backwards in
      // roughly a second and a half, like the original.
      Body.setInertia(chassis, chassis.inertia * 6);

      // Each wheel hangs from the chassis by THREE links: the soft main
      // suspension leg plus two stiffer braces from separate points. With
      // only one or two attachment points a soft suspension has a second
      // (mirrored) equilibrium where the wheel sits beside/above the frame,
      // and a violent impact can flip the wheel into it, where it sticks.
      // Three non-collinear anchors make the rest pose unique
      // (trilateration), so the leg can compress and stretch but not
      // migrate. Anchor heights sit at or below the chassis centre so drive
      // force is transmitted below the centre of mass — accelerating pitches
      // the nose up, as it should.
      function wheelLinks(wheel, side) {
        const susStiff  = side > 0 ? FRONT_SUS_STIFFNESS   : SUSPENSION_STIFFNESS;
        const susDamp   = side > 0 ? FRONT_SUS_DAMPING     : SUSPENSION_DAMPING;
        const brStiff   = side > 0 ? FRONT_BRACE_STIFFNESS : BRACE_STIFFNESS;
        const brDamp    = side > 0 ? FRONT_BRACE_DAMPING   : BRACE_DAMPING;
        return [
          Constraint.create({
            bodyA: chassis, bodyB: wheel,
            pointA: { x: side * WHEELBASE_HALF, y: SUSPENSION_ANCHOR_Y }, pointB: { x: 0, y: 0 },
            stiffness: susStiff, damping: susDamp, length: SUSPENSION_LENGTH
          }),
          Constraint.create({
            bodyA: chassis, bodyB: wheel,
            pointA: { x: side * 12, y: 2 }, pointB: { x: 0, y: 0 },
            stiffness: brStiff, damping: brDamp
          }),
          Constraint.create({
            bodyA: chassis, bodyB: wheel,
            pointA: { x: side * 24, y: 0 }, pointB: { x: 0, y: 0 },
            stiffness: brStiff, damping: brDamp
          })
        ];
      }

      const terrainBodies = [];
      for (let i = 0; i < TERRAIN.length - 1; i++) {
        terrainBodies.push(makeSegment(
          TERRAIN[i][0], TERRAIN[i][1],
          TERRAIN[i+1][0], TERRAIN[i+1][1]
        ));
      }

      const floor = Bodies.rectangle(1400, 720, 2800, 60, {
        isStatic: true, friction: 0.85, frictionStatic: 1.0, restitution: 0.05,
        collisionFilter: { category: 0x0002, mask: 0x0001 }, label: 'terrain'
      });
      const wallL = Bodies.rectangle(-20, 350, 40, 700, {
        isStatic: true,
        collisionFilter: { category: 0x0002, mask: 0x0001 }, label: 'terrain'
      });
      const wallR = Bodies.rectangle(WORLD_W + 20, 350, 40, 700, {
        isStatic: true,
        collisionFilter: { category: 0x0002, mask: 0x0001 }, label: 'terrain'
      });

      Composite.add(world, [
        rearWheel, frontWheel, chassis,
        ...wheelLinks(rearWheel, -1), ...wheelLinks(frontWheel, 1),
        floor, wallL, wallR,
        ...terrainBodies
      ]);
    }

    // ── Apple & flower init ─────────────────────────────────────
    function initPickups() {
      apples = APPLES_DATA.map((d, i) => ({
        ...d, collected: false, id: i,
        wobble: Math.random() * Math.PI * 2
      }));
    }

    // ── Input ──────────────────────────────────────────────────
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (state === 'start') {
        if (e.code === 'Space') startGame();
        if (e.code === 'ArrowRight' || e.code === 'KeyD') changeSelectedLevel(1);
        if (e.code === 'ArrowLeft'  || e.code === 'KeyA') changeSelectedLevel(-1);
      }
      if (e.code === 'KeyR' && state === 'win')   resetToStart();
      // Restart in place, like Esc in the original — with loops legal it's
      // possible to end up wedged/upside-down without a head touch.
      if (e.code === 'KeyR' && state === 'playing' && !e.repeat) die();
      if (e.code === 'KeyF' && state === 'playing' && !e.repeat) flipBike();
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    // The manifest already declares landscape for the installed app; in the
    // browser, orientation can only be locked from a user gesture and only
    // while fullscreen, so try both on the start tap. Each step is
    // best-effort: iOS Safari supports neither, Android Chrome supports
    // both — and failing just leaves the game as a normal page.
    const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
    function tryLockLandscape() {
      if (!isTouchDevice) return;
      try {
        const el = document.documentElement;
        Promise.resolve(el.requestFullscreen && el.requestFullscreen({ navigationUI: 'hide' }))
          .then(() => screen.orientation && screen.orientation.lock &&
                      screen.orientation.lock('landscape'))
          .catch(() => { /* unsupported (e.g. iOS Safari) — ignore */ });
      } catch (e) { /* ignore */ }
    }

    canvas.addEventListener('pointerdown', () => {
      if (state === 'start') { tryLockLandscape(); startGame(); }
      if (state === 'win')   resetToStart();
    });

    function bindBtn(id, flag) {
      const el = document.getElementById(id);
      const press = (e) => {
        e.preventDefault();
        if (state === 'start' && flag === 'brake') {
          changeSelectedLevel(-1);
          return;
        }
        touch[flag] = true;
        el.classList.add('pressed');
      };
      const release = () => { touch[flag] = false; el.classList.remove('pressed'); };
      el.addEventListener('pointerdown',   press);
      el.addEventListener('pointerup',     release);
      el.addEventListener('pointercancel', release);
      el.addEventListener('pointerleave',  release);
    }
    bindBtn('btn-brake',     'brake');
    bindBtn('btn-spin-fwd',  'leanFwd');
    bindBtn('btn-spin-back', 'leanBack');

    // Throttle slider: slide the knob up for more gas — the throttle is
    // analog (knob height = throttle amount) and snaps shut on release.
    // On the start screen a tap steps the level selector instead.
    (function () {
      const track = document.getElementById('throttle-slider');
      const knob  = document.getElementById('throttle-knob');
      const KNOB = 56, PAD = 6;
      let pointer = null;
      function setFromClientY(clientY) {
        const r = track.getBoundingClientRect();
        const travel = r.height - KNOB - PAD * 2;
        const fromBottom = (r.bottom - PAD - KNOB / 2) - clientY;
        const v = Math.max(0, Math.min(1, fromBottom / travel));
        touch.gas = v;
        knob.style.bottom = (PAD + v * travel) + 'px';
      }
      track.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        if (state === 'start') { changeSelectedLevel(1); return; }
        pointer = e.pointerId;
        track.setPointerCapture(e.pointerId);
        setFromClientY(e.clientY);
      });
      track.addEventListener('pointermove', (e) => {
        if (pointer === e.pointerId) setFromClientY(e.clientY);
      });
      const release = (e) => {
        if (pointer !== e.pointerId) return;
        pointer = null;
        touch.gas = 0;
        knob.style.bottom = PAD + 'px';
      };
      track.addEventListener('pointerup', release);
      track.addEventListener('pointercancel', release);
    })();

    // Switch-side button: flips which way the bike faces/drives. A one-shot on
    // press (not a held flag) with a short lockout so a single tap flips once.
    (function () {
      const el = document.getElementById('btn-switch');
      let lock = false;
      el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        el.classList.add('pressed');
        if (state === 'playing' && !lock) { flipBike(); lock = true; }
      });
      const release = () => { el.classList.remove('pressed'); lock = false; };
      el.addEventListener('pointerup',     release);
      el.addEventListener('pointercancel', release);
      el.addEventListener('pointerleave',  release);
    })();

    function flipBike() {
      facing = -facing;
    }

    // ── Controls application ───────────────────────────────────
    function applyControls(dt) {
      // Keyboard throttle is full-on; the touch slider is analog (0..1).
      const gasAmount = (keys['ArrowRight'] || keys['KeyD']) ? 1 : touch.gas;
      const brake     = keys['ArrowLeft']  || keys['KeyA'] || touch.brake;
      const leanFwd  = keys['ArrowUp']    || keys['KeyW'] || touch.leanFwd;
      const leanBack = keys['ArrowDown']  || keys['KeyS'] || touch.leanBack;

      // Scale per-frame accelerations to elapsed time so input feels the
      // same regardless of frame rate (was previously applied flat per
      // animation frame, which spiked torque at high frame rates).
      const scale = dt / 16.67;

      // Spin a wheel and apply the scaled reaction torque to the frame —
      // engine and brake torque act between wheel and chassis, which is what
      // makes throttle wheelies, in-air throttle rotation, and the brake
      // "gyro" behave like the original game.
      function spinPair(wheel, dOmega) {
        Body.setAngularVelocity(wheel, wheel.angularVelocity + dOmega);
        Body.setAngularVelocity(chassis,
          chassis.angularVelocity - dOmega * MOTOR_REACTION * wheel.inertia / chassis.inertia);
      }

      // Drive/lean respect `facing`, so a flipped bike accelerates and spins
      // the correct way relative to the direction it faces. The driven wheel
      // is always the VISUAL rear wheel: flipping mirrors the sprite around
      // the chassis centre, so when facing left the physical front body is
      // the one under the swingarm.
      const driveWheel = facing > 0 ? rearWheel : frontWheel;
      if (gasAmount > 0) {
        throttleKick = Math.max(0, throttleKick - KICK_DRAIN * scale * gasAmount);
        const room = facing > 0
          ? MAX_WHEEL_SPIN - driveWheel.angularVelocity
          : driveWheel.angularVelocity + MAX_WHEEL_SPIN;
        const d = Math.min(MOTOR_ACCEL * scale * gasAmount, Math.max(0, room));
        if (d > 0) {
          Body.setAngularVelocity(driveWheel, driveWheel.angularVelocity + d * facing);
        }
        // The frame reaction follows the THROTTLE, not the wheel's spin
        // headroom, scaled by the kick budget — so a sudden flat-out
        // pitches the nose up while held throttle settles down.
        const r = MOTOR_ACCEL * scale * gasAmount * MOTOR_REACTION
                * (KICK_FLOOR + (1 - KICK_FLOOR) * throttleKick)
                * driveWheel.inertia / chassis.inertia;
        Body.setAngularVelocity(chassis, chassis.angularVelocity - r * facing);
      } else {
        throttleKick = Math.min(1, throttleKick + KICK_REFILL * scale);
      }
      if (brake) {
        // Lock both wheels to the frame (no reverse thrust, as in the
        // original — turn around with the flip key instead).
        const lock = Math.min(1, BRAKE_LOCK * scale);
        for (const w of [rearWheel, frontWheel]) {
          spinPair(w, (chassis.angularVelocity - w.angularVelocity) * lock);
        }
      }
      if (leanFwd) {
        Body.setAngularVelocity(chassis, chassis.angularVelocity + LEAN_ACCEL * scale * facing);
      }
      if (leanBack) {
        Body.setAngularVelocity(chassis, chassis.angularVelocity - LEAN_ACCEL * scale * facing);
      }
    }

    // ── Suspension bump stop (ground-aware) ────────────────────
    // The fork/swingarm is steel: a wheel can never rise above BUMP_STOP_Y
    // in chassis space, so clamp it there — but never place it below the
    // terrain surface. Re-embedding a grounded wheel below the surface
    // every frame while the chassis keeps falling ratchets the whole bike
    // through the floor on hard landings; and shoving the chassis around
    // instead makes every fork bottom-out on a bump kick the nose up.
    // Only in the pathological case (the stop position would be
    // underground) is the chassis's approach velocity cancelled, so the
    // crush of a monster landing is absorbed without either failure mode.
    function applyBumpStops() {
      const cos = Math.cos(chassis.angle), sin = Math.sin(chassis.angle);
      for (const w of [rearWheel, frontWheel]) {
        const dx = w.position.x - chassis.position.x;
        const dy = w.position.y - chassis.position.y;
        const localX = dx * cos + dy * sin;
        const localY = -dx * sin + dy * cos;
        if (localY >= BUMP_STOP_Y) continue;
        const tx = chassis.position.x + localX * cos - BUMP_STOP_Y * sin;
        let   ty = chassis.position.y + localX * sin + BUMP_STOP_Y * cos;
        // Chassis-local "up" (-y) in world coords.
        const upX = sin, upY = -cos;
        const groundLimit = getTerrainY(tx) - WHEEL_R + 2;
        if (ty > groundLimit) {
          ty = groundLimit;
          const approach = chassis.velocity.x * -upX + chassis.velocity.y * -upY;
          if (approach > 0) {
            Body.setVelocity(chassis, {
              x: chassis.velocity.x + approach * upX,
              y: chassis.velocity.y + approach * upY
            });
          }
        }
        Body.setPosition(w, { x: tx, y: ty });
        const inward = (w.velocity.x - chassis.velocity.x) * upX
                     + (w.velocity.y - chassis.velocity.y) * upY;
        if (inward > 0) {
          Body.setVelocity(w, {
            x: w.velocity.x - inward * upX,
            y: w.velocity.y - inward * upY
          });
        }
      }
    }

    // ── Wheel axis alignment ───────────────────────────────────
    // Keep each wheel on its suspension's slider axis: the front wheel
    // moves only diagonally along the fork angle (crown → axle) and the
    // rear wheel only straight up and down in chassis space, never
    // sideways. The correction is deliberately soft and capped: the
    // springs and the collision solver keep full authority (a hard
    // projection here can drag a wheel through walls or fight the springs
    // into stuck states), while the capped perpendicular pull plus
    // velocity damping keeps the visible off-axis error under about a
    // pixel in normal riding and lets brutal impacts flex for only a few
    // frames.
    function alignWheelToAxis(w, restX, dir) {
      const cos = Math.cos(chassis.angle), sin = Math.sin(chassis.angle);
      const dx = w.position.x - chassis.position.x;
      const dy = w.position.y - chassis.position.y;
      const localX = dx * cos + dy * sin;
      const localY = -dx * sin + dy * cos;
      // Perpendicular offset from the axis, in chassis space.
      const o = (localX - restX) * -dir.y + (localY - AXLE_REST_Y) * dir.x;
      const corr = Math.max(-FORK_ALIGN_POS_CAP,
                   Math.min(FORK_ALIGN_POS_CAP, o * FORK_ALIGN_POS_K));
      if (Math.abs(corr) > 0.01) {
        const nx = localX - corr * -dir.y;
        const ny = localY - corr * dir.x;
        Body.setPosition(w, {
          x: chassis.position.x + nx * cos - ny * sin,
          y: chassis.position.y + nx * sin + ny * cos
        });
      }
      // Damp the perpendicular part of the wheel's relative velocity.
      const px = -dir.y * cos - dir.x * sin;
      const py = -dir.y * sin + dir.x * cos;
      const pv = ((w.velocity.x - chassis.velocity.x) * px
                + (w.velocity.y - chassis.velocity.y) * py) * FORK_ALIGN_VEL_K;
      Body.setVelocity(w, {
        x: w.velocity.x - pv * px,
        y: w.velocity.y - pv * py
      });
    }

    const REAR_AXIS_DIR = { x: 0, y: 1 }; // straight down in chassis space

    function alignWheelAxes() {
      alignWheelToAxis(frontWheel, WHEELBASE_HALF, FORK_DIR);
      alignWheelToAxis(rearWheel, -WHEELBASE_HALF, REAR_AXIS_DIR);
    }

    // ── Death detection ────────────────────────────────────────
    function checkDeath() {
      if (state !== 'playing') return;

      // Only the rider's head counts as a crash — the wheels, frame, and
      // legs can clip a bump or scrape a slope without ending the run, and
      // full mid-air loops are fine (as in the original game): being upside
      // down only kills once the head actually meets the ground, which it
      // does on its own if the bike comes to rest inverted.
      const upperBody = getUpperBodyPos();
      const groundY = getTerrainY(upperBody.x);
      if (upperBody.y > groundY) { die(); return; }
      if (upperBody.y > WORLD_H + 50) { die(); return; }
    }

    // ── Apple & flower checks ──────────────────────────────────
    // Apples and the flower are taken by touching them with a wheel or the
    // head, as in the original — not by the bike's centre passing nearby.
    function touchPoints() {
      return [
        { p: rearWheel.position,  r: WHEEL_R + 10 },
        { p: frontWheel.position, r: WHEEL_R + 10 },
        { p: getUpperBodyPos(),   r: 18 }
      ];
    }

    function checkApples() {
      if (state !== 'playing') return;
      const pts = touchPoints();
      for (const apple of apples) {
        if (apple.collected) continue;
        for (const t of pts) {
          const dx = t.p.x - apple.x, dy = t.p.y - apple.y;
          if (dx * dx + dy * dy < t.r * t.r) { apple.collected = true; break; }
        }
      }
    }

    function checkWin() {
      if (state !== 'playing') return;
      if (!apples.every(a => a.collected)) return;
      for (const t of touchPoints()) {
        const dx = t.p.x - FLOWER_DATA.x, dy = t.p.y - FLOWER_DATA.y;
        const r = t.r + 12;
        if (dx * dx + dy * dy < r * r) { win(); return; }
      }
    }

    // ── State transitions ──────────────────────────────────────
    function startGame() {
      loadLevel(selectedLevel);
      initPickups();
      initPhysics();
      facing = 1;
      throttleKick = 1;
      state = 'playing';
      startTime = performance.now();
      lastTs = performance.now();
    }

    function die() {
      state = 'dead';
      deadTimer = performance.now();
    }

    function respawn() {
      initPhysics(); // keeps apples collected state
      facing = 1;
      throttleKick = 1;
      state = 'playing';
      lastTs = performance.now();
    }

    function win() {
      state = 'win';
      elapsedTime = (performance.now() - startTime) / 1000;
      if (currentLevelIndex + 1 >= unlockedCount) {
        unlockedCount = Math.min(currentLevelIndex + 2, LEVELS.length);
        saveUnlockedCount(unlockedCount);
      }
    }

    function resetToStart() {
      // Land back on the next level if the one just won unlocked it,
      // otherwise stay on whichever level was last selected.
      if (state === 'win' && currentLevelIndex + 1 < unlockedCount) {
        selectedLevel = currentLevelIndex + 1;
      }
      state = 'start';
    }

    function changeSelectedLevel(delta) {
      if (state !== 'start') return;
      selectedLevel = Math.max(0, Math.min(unlockedCount - 1, selectedLevel + delta));
    }

    // ── Camera ─────────────────────────────────────────────────
    function updateCamera() {
      let bikeX, bikeY;
      if (state === 'start') {
        bikeX = SPAWN_X;
        bikeY = SPAWN_Y;
      } else {
        bikeX = (rearWheel.position.x + frontWheel.position.x) / 2;
        bikeY = (rearWheel.position.y + frontWheel.position.y) / 2;
      }

      const targetX = bikeX - canvas.width / 2;
      const targetY = bikeY - canvas.height * 0.45;

      camera.x += (targetX - camera.x) * 0.1;
      camera.y += (targetY - camera.y) * 0.1;

      camera.x = Math.max(0, Math.min(camera.x, Math.max(0, WORLD_W - canvas.width)));
      camera.y = Math.max(0, Math.min(camera.y, Math.max(0, WORLD_H - canvas.height)));
    }

    // ── Wheel drawing ──────────────────────────────────────────
    function drawWheel(pos, angle) {
      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(angle * WHEEL_SPIN_VISUAL);
      const w = bikeWheelImg.width * BIKE_WHEEL_SCALE;
      const h = bikeWheelImg.height * BIKE_WHEEL_SCALE;
      ctx.drawImage(bikeWheelImg, -w / 2, -h / 2, w, h);
      ctx.restore();
    }

    // ── Motorcycle drawing ─────────────────────────────────────
    function drawMotorcycle() {
      const rp = rearWheel.position;
      const fp = frontWheel.position;
      const cp = chassis.position;
      const ca = chassis.angle;

      ctx.save();
      // Mirror the whole bike around its own centre when it's flipped to face
      // left, so the frame, wheels and rider all point the other way.
      if (facing < 0) { ctx.translate(cp.x, 0); ctx.scale(-1, 1); ctx.translate(-cp.x, 0); }

      // Suspension animation: the swingarm pivots from the frame down to the
      // actual rear wheel centre and the front fork telescopes from the fork
      // crown to the actual front wheel centre, so both visibly compress,
      // stretch and flex with the physics. Their frame-side ends are fixed
      // in chassis space (points read off the body art: swingarm pivot by
      // the engine, fork crown under the handlebars).
      const cos = Math.cos(ca), sin = Math.sin(ca);
      const localPt = (lx, ly) => ({
        x: cp.x + lx * cos - ly * sin,
        y: cp.y + lx * sin + ly * cos
      });
      const swingarmPivot = localPt(-14, 15);
      const forkCrown     = localPt(FORK_CROWN.x, FORK_CROWN.y);
      ctx.lineCap = 'round';
      // Rear swingarm: single dark arm.
      ctx.strokeStyle = '#2a2a3a';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(swingarmPivot.x, swingarmPivot.y); ctx.lineTo(rp.x, rp.y);
      ctx.stroke();
      // Front fork: dark outer tube with a lighter slider core, so the
      // telescoping motion reads clearly.
      ctx.strokeStyle = '#2a2a3a';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(forkCrown.x, forkCrown.y); ctx.lineTo(fp.x, fp.y);
      ctx.stroke();
      ctx.strokeStyle = '#9a9aa8';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(forkCrown.x, forkCrown.y);
      ctx.lineTo((forkCrown.x + fp.x) / 2, (forkCrown.y + fp.y) / 2);
      ctx.stroke();

      drawWheel(rp, rearWheel.angle);
      drawWheel(fp, frontWheel.angle);

      // Chassis body: place the art so its measured rear-axle pixel sits on
      // the rear wheel's rest position, rotated so the art's axle line runs
      // along the real wheelbase.
      ctx.save();
      ctx.translate(cp.x, cp.y);
      ctx.rotate(ca);
      ctx.translate(-WHEELBASE_HALF, AXLE_REST_Y);
      ctx.rotate(BIKE_BODY_ROT);
      ctx.scale(BIKE_BODY_SCALE, BIKE_BODY_SCALE);
      ctx.drawImage(bikeBodyImg, -BODY_ART_REAR_AXLE.x, -BODY_ART_REAR_AXLE.y);
      ctx.restore();

      // Rider
      ctx.save();
      ctx.translate(cp.x, cp.y);
      ctx.rotate(ca);
      ctx.translate(RIDER_OFFSET_X, RIDER_OFFSET_Y);
      ctx.rotate(RIDER_TILT);
      const rw = riderImg.width * RIDER_SCALE;
      const rh = riderImg.height * RIDER_SCALE;
      ctx.drawImage(riderImg, -rw * RIDER_ANCHOR_X, -rh * RIDER_ANCHOR_Y, rw, rh);
      ctx.restore();

      ctx.restore(); // end facing-mirror
    }

    // ── Terrain drawing ────────────────────────────────────────
    function drawTerrain() {
      ctx.beginPath();
      ctx.moveTo(TERRAIN[0][0], TERRAIN[0][1]);
      for (let i = 1; i < TERRAIN.length; i++) {
        ctx.lineTo(TERRAIN[i][0], TERRAIN[i][1]);
      }
      ctx.lineTo(WORLD_W, WORLD_H);
      ctx.lineTo(0, WORLD_H);
      ctx.closePath();
      ctx.fillStyle = '#2d5a1b';
      ctx.fill();

      // Surface highlight
      ctx.beginPath();
      ctx.moveTo(TERRAIN[0][0], TERRAIN[0][1]);
      for (let i = 1; i < TERRAIN.length; i++) {
        ctx.lineTo(TERRAIN[i][0], TERRAIN[i][1]);
      }
      ctx.strokeStyle = '#5c9a3a';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // ── Apple drawing ──────────────────────────────────────────
    function drawApples() {
      const now = performance.now();
      for (const apple of apples) {
        if (apple.collected) continue;
        const bob = Math.sin(now * 0.002 + apple.wobble) * 3;
        const ax = apple.x, ay = apple.y + bob;

        ctx.beginPath();
        ctx.arc(ax, ay, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#e63030';
        ctx.fill();
        ctx.strokeStyle = '#a01010';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Shine
        ctx.beginPath();
        ctx.arc(ax - 2, ay - 2, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fill();

        // Stem
        ctx.beginPath();
        ctx.moveTo(ax, ay - 8);
        ctx.lineTo(ax + 2, ay - 15);
        ctx.strokeStyle = '#4a2800';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // Leaf
        ctx.save();
        ctx.translate(ax + 5, ay - 14);
        ctx.rotate(-0.4);
        ctx.beginPath();
        ctx.ellipse(0, 0, 5, 3, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#3a8020';
        ctx.fill();
        ctx.restore();
      }
    }

    // ── Flower drawing ─────────────────────────────────────────
    function drawFlower() {
      const allCollected = apples.length > 0 && apples.every(a => a.collected);
      const fx = FLOWER_DATA.x, fy = FLOWER_DATA.y;
      const now = performance.now();
      const pulse = allCollected ? (1 + 0.15 * Math.sin(now * 0.004)) : 1;

      ctx.save();
      ctx.translate(fx, fy);
      ctx.scale(pulse, pulse);

      const petalColor = allCollected ? '#ffffff' : '#aaaaaa';
      const centerColor = allCollected ? '#f5e020' : '#888888';

      // Stem
      ctx.strokeStyle = allCollected ? '#5c9a3a' : '#666';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(0, 18);
      ctx.stroke();

      // Petals
      for (let i = 0; i < 6; i++) {
        ctx.save();
        ctx.rotate((i / 6) * Math.PI * 2);
        ctx.beginPath();
        ctx.ellipse(0, -12, 5, 9, 0, 0, Math.PI * 2);
        ctx.fillStyle = petalColor;
        ctx.fill();
        ctx.restore();
      }

      // Center
      ctx.beginPath();
      ctx.arc(0, 0, 5, 0, Math.PI * 2);
      ctx.fillStyle = centerColor;
      ctx.fill();

      ctx.restore();
    }

    // ── HUD ────────────────────────────────────────────────────
    function drawHUD() {
      if (state !== 'playing' && state !== 'dead') return;
      const collected = apples.filter(a => a.collected).length;
      const total     = apples.length;
      const elapsed   = state === 'playing'
        ? (performance.now() - startTime) / 1000
        : elapsedTime;

      const mins    = Math.floor(elapsed / 60);
      const secVal  = elapsed % 60;
      const timeStr = `${mins}:${secVal < 10 ? '0' : ''}${secVal.toFixed(2)}`;

      ctx.save();
      ctx.font = 'bold 16px system-ui, sans-serif';
      ctx.textBaseline = 'middle';

      // Apple pill
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.roundRect(12, 12, 115, 32, 8); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'left';
      ctx.fillText(`🍎  ${collected} / ${total}`, 22, 28);

      // Timer pill
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.roundRect(canvas.width - 135, 12, 123, 32, 8); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'right';
      ctx.fillText(`⏱ ${timeStr}`, canvas.width - 20, 28);

      // Level pill (top center)
      const lvlLabel = `Lv ${currentLevelIndex + 1} · ${LEVELS[currentLevelIndex].name}`;
      ctx.font = 'bold 13px system-ui, sans-serif';
      const lvlWidth = ctx.measureText(lvlLabel).width + 24;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath(); ctx.roundRect(canvas.width / 2 - lvlWidth / 2, 12, lvlWidth, 32, 8); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.fillText(lvlLabel, canvas.width / 2, 28);

      ctx.restore();
    }

    // ── Overlay screens ────────────────────────────────────────
    function drawStartScreen() {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const cx = canvas.width / 2, cy = canvas.height / 2;

      ctx.font = 'bold 38px system-ui, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#1e4d2b';
      ctx.shadowBlur = 16;
      ctx.fillText('🏍️  Elasto Mania', cx, cy - 100);
      ctx.shadowBlur = 0;

      // Level selector: ◀ name ▶, with arrows only shown if there's
      // somewhere to go, plus a row of dots (filled = unlocked, one lit
      // brighter for the current selection, dim = still locked).
      const lvl = LEVELS[selectedLevel];
      const canGoLeft  = selectedLevel > 0;
      const canGoRight = selectedLevel < unlockedCount - 1;

      ctx.font = 'bold 24px system-ui, sans-serif';
      ctx.fillStyle = canGoLeft ? '#ffffff' : 'rgba(255,255,255,0.25)';
      ctx.fillText('◀', cx - 150, cy - 48);
      ctx.fillStyle = canGoRight ? '#ffffff' : 'rgba(255,255,255,0.25)';
      ctx.fillText('▶', cx + 150, cy - 48);

      ctx.font = 'bold 24px system-ui, sans-serif';
      ctx.fillStyle = '#ffe08a';
      ctx.fillText(`Level ${selectedLevel + 1}: ${lvl.name}`, cx, cy - 48);

      const dotSpacing = 18;
      const maxDots = 15;
      const dotCount = Math.min(unlockedCount, maxDots);
      const halfWin = Math.floor(dotCount / 2);
      let dotFirst = Math.max(0, selectedLevel - halfWin);
      if (dotFirst + dotCount > unlockedCount) dotFirst = Math.max(0, unlockedCount - dotCount);
      const dotLast = Math.min(dotFirst + dotCount - 1, unlockedCount - 1);
      const actualCount = dotLast - dotFirst + 1;
      const dotStartX = cx - (actualCount - 1) * dotSpacing / 2;
      for (let i = dotFirst; i <= dotLast; i++) {
        const di = i - dotFirst;
        ctx.beginPath();
        ctx.arc(dotStartX + di * dotSpacing, cy - 14, i === selectedLevel ? 5 : 3.5, 0, Math.PI * 2);
        ctx.fillStyle = i === selectedLevel ? '#ffe08a' : '#ffffff';
        ctx.fill();
      }

      ctx.font = '19px system-ui, sans-serif';
      ctx.fillStyle = '#ccffcc';
      ctx.fillText('Collect all 🍎 apples, then reach the 🌸 flower', cx, cy + 18);

      const pulse = 0.75 + 0.25 * Math.sin(performance.now() * 0.003);
      ctx.globalAlpha = pulse;
      ctx.font = 'bold 22px system-ui, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText('Press Space or Tap to Start', cx, cy + 62);
      ctx.globalAlpha = 1;

      ctx.font = '14px system-ui, sans-serif';
      ctx.fillStyle = '#aaaaaa';
      ctx.fillText(
        unlockedCount > 1
          ? '← → choose level   ↑ ↓ lean   F flip   R restart'
          : '← → throttle/brake   ↑ ↓ lean   F flip   R restart',
        cx, cy + 100
      );

      // Nudge phone players toward landscape — the game is built wide.
      if (isTouchDevice && canvas.height > canvas.width) {
        ctx.font = 'bold 17px system-ui, sans-serif';
        ctx.fillStyle = '#ffe08a';
        ctx.fillText('↻ Rotate your device to landscape', cx, cy + 136);
      }

      ctx.restore();
    }

    function drawDeadScreen() {
      const elapsed = performance.now() - deadTimer;
      const alpha   = Math.min(0.65, elapsed / 400);

      ctx.save();
      ctx.fillStyle = `rgba(80,0,0,${alpha * 0.8})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (elapsed > 180) {
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const a = Math.min(1, (elapsed - 180) / 300);
        ctx.globalAlpha = a;
        ctx.font = 'bold 48px system-ui, sans-serif';
        ctx.fillStyle = '#ff4444';
        ctx.fillText('BOOM! 💥', canvas.width / 2, canvas.height / 2 - 18);
        ctx.font = '20px system-ui, sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.fillText('Respawning…', canvas.width / 2, canvas.height / 2 + 26);
        ctx.globalAlpha = 1;
      }
      ctx.restore();

      if (elapsed > 1500) respawn();
    }

    function drawWinScreen() {
      ctx.save();
      ctx.fillStyle = 'rgba(0,30,0,0.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const cx = canvas.width / 2, cy = canvas.height / 2;
      const bounce = Math.sin(performance.now() * 0.004) * 5;

      const isLastLevel = currentLevelIndex === LEVELS.length - 1;

      ctx.font = 'bold 46px system-ui, sans-serif';
      ctx.fillStyle = '#88ff88';
      ctx.shadowColor = '#00cc00';
      ctx.shadowBlur = 22;
      ctx.fillText('🌸  Level Complete!  🌸', cx, cy - 68 + bounce);

      ctx.shadowBlur = 0;
      const mins   = Math.floor(elapsedTime / 60);
      const secVal = elapsedTime % 60;
      const tStr   = `${mins}:${secVal < 10 ? '0' : ''}${secVal.toFixed(2)}`;
      ctx.font = 'bold 28px system-ui, sans-serif';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(`Time: ${tStr}`, cx, cy + 2);

      ctx.font = 'bold 18px system-ui, sans-serif';
      ctx.fillStyle = '#ffe08a';
      ctx.fillText(
        isLastLevel
          ? '🏆 All levels complete!'
          : `Next up: Level ${currentLevelIndex + 2} – ${LEVELS[currentLevelIndex + 1].name}`,
        cx, cy + 40
      );

      const pulse = 0.75 + 0.25 * Math.sin(performance.now() * 0.003);
      ctx.globalAlpha = pulse;
      ctx.font = '20px system-ui, sans-serif';
      ctx.fillStyle = '#ccffcc';
      ctx.fillText('Press R or Tap to continue', cx, cy + 80);
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    // ── Render ─────────────────────────────────────────────────
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Sky gradient
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, '#87ceeb');
      sky.addColorStop(1, '#d4edda');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.translate(-camera.x, -camera.y);

      drawTerrain();
      drawApples();
      drawFlower();
      if (state !== 'start') drawMotorcycle();

      ctx.restore();

      drawHUD();

      if (state === 'start') drawStartScreen();
      if (state === 'dead')  drawDeadScreen();
      if (state === 'win')   drawWinScreen();
    }

    // ── Game loop ──────────────────────────────────────────────
    function loop(ts) {
      requestAnimationFrame(loop);
      const dt = Math.min(ts - lastTs, 33);
      lastTs = ts;

      if (state === 'playing') {
        applyControls(dt);
        for (const b of [rearWheel, frontWheel, chassis]) {
          const sp = Math.hypot(b.velocity.x, b.velocity.y);
          if (sp > MAX_SPEED) {
            Body.setVelocity(b, {
              x: b.velocity.x * MAX_SPEED / sp,
              y: b.velocity.y * MAX_SPEED / sp
            });
          }
        }
        Engine.update(engine, dt);
        applyBumpStops();
        alignWheelAxes();
        checkApples();
        checkDeath();
        checkWin();
      }

      updateCamera();
      render();
    }

    // ── Boot ───────────────────────────────────────────────────
    // Set start camera to spawn area
    camera.x = Math.max(0, SPAWN_X - canvas.width / 2);
    camera.y = Math.max(0, SPAWN_Y - canvas.height * 0.45);

    lastTs = performance.now();
    requestAnimationFrame(loop);

    // Test/debug hook: expose a physics snapshot for automated checks.
    window.__DBG = function () {
      if (!chassis) return { state };
      return {
        state,
        chassis: { x: chassis.position.x, y: chassis.position.y, angle: chassis.angle },
        rear:  { x: rearWheel.position.x,  y: rearWheel.position.y,  spin: rearWheel.angularVelocity },
        front: { x: frontWheel.position.x, y: frontWheel.position.y, spin: frontWheel.angularVelocity },
        head: getUpperBodyPos(),
        groundAtChassis: getTerrainY(chassis.position.x)
      };
    };

  })();
  </script>
</body>
