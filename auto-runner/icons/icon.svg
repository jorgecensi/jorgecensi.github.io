<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#2d2b55"/>
  <!-- Starfield -->
  <circle cx="80"  cy="60"  r="2.5" fill="rgba(255,255,255,0.45)"/>
  <circle cx="155" cy="90"  r="1.8" fill="rgba(255,255,255,0.35)"/>
  <circle cx="240" cy="50"  r="2"   fill="rgba(255,255,255,0.4)"/>
  <circle cx="330" cy="80"  r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="420" cy="55"  r="2.5" fill="rgba(255,255,255,0.45)"/>
  <circle cx="460" cy="100" r="1.8" fill="rgba(255,255,255,0.35)"/>
  <circle cx="60"  cy="130" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="380" cy="130" r="2"   fill="rgba(255,255,255,0.4)"/>
  <!-- Ground -->
  <rect x="0" y="395" width="512" height="117" fill="#3a3870"/>
  <line x1="0" y1="395" x2="512" y2="395" stroke="rgba(255,255,255,0.75)" stroke-width="3"/>
  <!-- Speed dots behind P1 (red) -->
  <circle cx="90"  cy="345" r="6" fill="rgba(232,64,64,0.55)"/>
  <circle cx="65"  cy="345" r="4" fill="rgba(232,64,64,0.35)"/>
  <circle cx="44"  cy="345" r="3" fill="rgba(232,64,64,0.18)"/>
  <!-- Speed dots behind P2 (blue) -->
  <circle cx="262" cy="317" r="6" fill="rgba(58,142,255,0.55)"/>
  <circle cx="237" cy="317" r="4" fill="rgba(58,142,255,0.35)"/>
  <circle cx="216" cy="317" r="3" fill="rgba(58,142,255,0.18)"/>
  <!-- P1 Robot (Red) — grounded: body bottom at y=395 -->
  <g transform="translate(106,295)">
    <rect width="100" height="100" rx="16" fill="#e84040"/>
    <rect x="13" y="13" width="74" height="74" rx="8" fill="rgba(0,0,0,0.28)"/>
    <rect x="13" y="13" width="74" height="33" rx="8" fill="rgba(255,255,255,0.12)"/>
    <rect x="20" y="26" width="21" height="21" fill="#ffffff"/>
    <rect x="26" y="32" width="10" height="10" fill="#1a1833"/>
    <rect x="59" y="26" width="21" height="21" fill="#ffffff"/>
    <rect x="65" y="32" width="10" height="10" fill="#1a1833"/>
    <rect x="20" y="71" width="11" height="11" fill="rgba(255,255,255,0.75)"/>
    <rect x="45" y="71" width="11" height="11" fill="rgba(255,255,255,0.75)"/>
    <rect x="69" y="71" width="11" height="11" fill="rgba(255,255,255,0.75)"/>
  </g>
  <!-- P2 Robot (Blue) — jumping: raised 28px off the ground -->
  <g transform="translate(306,267)">
    <rect width="100" height="100" rx="16" fill="#3a8eff"/>
    <rect x="13" y="13" width="74" height="74" rx="8" fill="rgba(0,0,0,0.28)"/>
    <rect x="13" y="13" width="74" height="33" rx="8" fill="rgba(255,255,255,0.12)"/>
    <rect x="20" y="26" width="21" height="21" fill="#ffffff"/>
    <rect x="26" y="32" width="10" height="10" fill="#1a1833"/>
    <rect x="59" y="26" width="21" height="21" fill="#ffffff"/>
    <rect x="65" y="32" width="10" height="10" fill="#1a1833"/>
    <rect x="20" y="71" width="11" height="11" fill="rgba(255,255,255,0.75)"/>
    <rect x="45" y="71" width="11" height="11" fill="rgba(255,255,255,0.75)"/>
    <rect x="69" y="71" width="11" height="11" fill="rgba(255,255,255,0.75)"/>
  </g>
</svg>
