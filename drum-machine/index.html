<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Drum Machine">
    <meta name="theme-color" content="#0d0d0d">
    <meta name="description" content="A circular step sequencer inspired by the Dato Drum. Build beats with 4 voices, swappable samples, effects and BPM/swing control.">
    <title>Drum Machine</title>
    <link rel="manifest" href="/drum-machine/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/img/drum-machine-icon-192.png">
    <link rel="apple-touch-icon" href="/img/drum-machine-icon-192.png">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d0d0d;
            --surface: #181818;
            --surface2: #242424;
            --surface3: #2e2e2e;
            --text: #f0f0f0;
            --text-dim: #555;
            --text-mid: #888;
            --kick:      #FF4757;
            --snare:     #FFA502;
            --hihat:     #2ED573;
            --clap:      #A29BFE;
            --kick-dim:  rgba(255,71,87,0.18);
            --snare-dim: rgba(255,165,2,0.18);
            --hihat-dim: rgba(46,213,115,0.18);
            --clap-dim:  rgba(162,155,254,0.18);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            gap: 8px;
            height: 100%;
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            padding:
                max(env(safe-area-inset-top, 0px), 10px)
                max(env(safe-area-inset-right, 0px), 14px)
                max(env(safe-area-inset-bottom, 0px), 10px)
                max(env(safe-area-inset-left, 0px), 14px);
        }

        /* ── Header ─────────────────────────────────────── */
        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        #header h1 {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        #tempo-display {
            font-size: 0.7rem;
            color: var(--text-mid);
            letter-spacing: 0.08em;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        #tempo-display:active { background: var(--surface2); }

        /* ── Sample selectors ────────────────────────────── */
        #sample-row {
            display: flex;
            gap: 6px;
            width: 100%;
        }
        .sample-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 10px 6px;
            background: var(--surface);
            border: 1.5px solid var(--surface3);
            border-radius: 10px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .sample-btn:active { transform: scale(0.95); }
        .sample-btn[data-voice="0"] { border-color: var(--kick-dim); }
        .sample-btn[data-voice="1"] { border-color: var(--snare-dim); }
        .sample-btn[data-voice="2"] { border-color: var(--hihat-dim); }
        .sample-btn[data-voice="3"] { border-color: var(--clap-dim); }
        .sample-btn[data-voice="0"]:active { border-color: var(--kick); }
        .sample-btn[data-voice="1"]:active { border-color: var(--snare); }
        .sample-btn[data-voice="2"]:active { border-color: var(--hihat); }
        .sample-btn[data-voice="3"]:active { border-color: var(--clap); }
        .sample-voice { font-size: 0.75rem; font-weight: 800; letter-spacing: 0.08em; }
        .sample-btn[data-voice="0"] .sample-voice { color: var(--kick); }
        .sample-btn[data-voice="1"] .sample-voice { color: var(--snare); }
        .sample-btn[data-voice="2"] .sample-voice { color: var(--hihat); }
        .sample-btn[data-voice="3"] .sample-voice { color: var(--clap); }
        .sample-name  { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.06em; color: var(--text); }
        .sample-hint  { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.05em; }

        /* ── Sequencer ───────────────────────────────────── */
        #sequencer-wrap {
            position: relative;
            width: min(92vw, 440px);
            aspect-ratio: 460 / 380;
            flex-shrink: 0;
        }
        #sequencer-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
            touch-action: none;
        }
        .step-node, .voice-pad, .effect-btn { cursor: pointer; }

        /* ── Roll indicator ──────────────────────────────── */
        #roll-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: rgba(10, 10, 10, 0.88);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            pointer-events: none;
            z-index: 10;
        }
        #roll-indicator.visible { display: flex; }
        .ri-hint {
            font-size: 0.5rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        .ri-speed {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            padding: 2px 8px;
            border-radius: 5px;
            transition: color 0.06s, background 0.06s;
        }
        .ri-speed.active {
            color: var(--text);
            background: rgba(255,255,255,0.12);
        }

        /* ── Filter indicator ────────────────────────────── */
        #filter-indicator {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: rgba(10, 10, 10, 0.88);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 16px;
            pointer-events: none;
            z-index: 10;
        }
        #filter-indicator.visible { display: flex; }
        .fi-hint {
            font-size: 0.5rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
        }
        .fi-level {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            padding: 2px 8px;
            border-radius: 5px;
            transition: color 0.06s, background 0.06s;
        }
        .fi-level.active {
            color: #2ED573;
            background: rgba(46,213,115,0.15);
        }

        /* ── Sliders ─────────────────────────────────────── */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        .slider-label {
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
            min-width: 36px;
        }
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            height: 5px;
            background: var(--surface3);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            border-radius: 50%;
            background: var(--text);
            cursor: pointer;
            box-shadow: 0 0 6px rgba(255,255,255,0.2);
        }
        input[type=range]::-moz-range-thumb {
            width: 20px; height: 20px;
            border: none; border-radius: 50%;
            background: var(--text); cursor: pointer;
        }
        .slider-value {
            font-size: 0.8rem; font-weight: 700;
            min-width: 38px; text-align: right;
        }

        /* ── BPM step buttons ────────────────────────────── */
        .bpm-step-btn {
            background: var(--surface2);
            border: 1px solid var(--surface3);
            border-radius: 8px;
            color: var(--text);
            font-size: 1.2rem;
            width: 38px;
            height: 38px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
            line-height: 1;
        }
        .bpm-step-btn:active { background: var(--surface3); }

        /* ── Tune row ────────────────────────────────────── */
        #pitch-row {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        #pitch-label {
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-dim);
            min-width: 36px;
        }
        .pitch-group {
            display: flex; flex-direction: column;
            align-items: center; flex: 1; gap: 3px;
        }
        .pitch-badge {
            font-size: 0.55rem; font-weight: 800;
            padding: 1px 5px; border-radius: 3px; color: #000;
        }
        .pitch-badge.kick  { background: var(--kick); }
        .pitch-badge.snare { background: var(--snare); }
        .pitch-badge.hihat { background: var(--hihat); }
        .pitch-badge.clap  { background: var(--clap); }
        .pitch-slider {
            -webkit-appearance: none; appearance: none;
            width: 100%; height: 5px;
            border-radius: 2px; outline: none; cursor: pointer;
        }
        .pitch-slider.kick  { background: linear-gradient(to right, var(--surface3), var(--kick)); }
        .pitch-slider.snare { background: linear-gradient(to right, var(--surface3), var(--snare)); }
        .pitch-slider.hihat { background: linear-gradient(to right, var(--surface3), var(--hihat)); }
        .pitch-slider.clap  { background: linear-gradient(to right, var(--surface3), var(--clap)); }
        .pitch-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px; height: 20px;
            border-radius: 50%; background: var(--text); cursor: pointer;
        }
        .pitch-slider::-moz-range-thumb {
            width: 20px; height: 20px;
            border: none; border-radius: 50%; background: var(--text);
        }

        /* ── Update banner ───────────────────────────────── */
        #update-banner {
            display: none;
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: #333; border: 1px solid #555;
            border-radius: 10px; padding: 10px 20px;
            font-size: 0.8rem; gap: 12px;
            align-items: center; z-index: 100; white-space: nowrap;
        }
        #update-banner.show { display: flex; }
        #update-banner button {
            background: var(--text); color: var(--bg);
            border: none; border-radius: 6px;
            padding: 4px 12px; font-size: 0.8rem;
            font-weight: 700; cursor: pointer;
        }

        /* ── FX toast ────────────────────────────────────── */
        #fx-toast {
            display: none;
            position: fixed; bottom: 70px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px; padding: 8px 16px;
            font-size: 0.75rem; color: var(--text);
            white-space: nowrap; z-index: 99;
            pointer-events: none;
        }
        #fx-toast.show { display: block; animation: toast-fade 2.5s ease forwards; }
        @keyframes toast-fade {
            0%   { opacity: 0; transform: translateX(-50%) translateY(4px); }
            15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
            70%  { opacity: 1; }
            100% { opacity: 0; }
        }

        /* ── Effect button active pulse ──────────────────── */
        @keyframes fx-pulse {
            0%, 100% { stroke-width: 1.5; }
            50%       { stroke-width: 3; }
        }
        .effect-btn.active circle {
            animation: fx-pulse 0.8s ease-in-out infinite;
        }

        /* ── Clap recording panel ───────────────────────── */
        #clap-record-row {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }
        #clap-record-row.visible { display: flex; }
        #rec-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 18px;
            background: var(--surface);
            border: 1.5px solid var(--clap-dim);
            border-radius: 20px;
            color: var(--clap);
            font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s, border-color 0.15s;
        }
        #rec-btn:active { background: var(--surface2); }
        #rec-btn.recording { border-color: var(--clap); animation: rec-pulse 0.8s ease-in-out infinite; }
        @keyframes rec-pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        #rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--clap); flex-shrink: 0; }
        #rec-btn.recording #rec-dot { background: #ff4757; }
        #rec-clear-btn {
            background: none; border: none;
            color: var(--text-dim); font-size: 0.7rem;
            cursor: pointer; padding: 4px 8px;
            border-radius: 8px;
        }
        #rec-clear-btn:active { color: var(--text); }

        /* ── Sync + BPM Detect buttons ──────────────────── */
        #sync-beat-btn {
            background: none;
            border: 1px solid var(--surface3);
            border-radius: 10px;
            color: var(--text-dim);
            font-size: 0.82rem;
            padding: 7px 16px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        #sync-beat-btn:active { background: var(--surface2); }
        #sync-beat-btn.synced {
            border-color: #2ED573;
            color: #2ED573;
        }

        #detect-bpm-btn {
            background: none;
            border: 1px solid var(--surface3);
            border-radius: 10px;
            color: var(--text-dim);
            font-size: 0.9rem;
            padding: 7px 14px;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        #detect-bpm-btn:active { background: var(--surface2); }
        #detect-bpm-btn.detecting {
            border-color: #FF4757;
            color: #FF4757;
            animation: rec-pulse 0.8s ease-in-out infinite;
        }

        /* ── Beat dot ────────────────────────────────────── */
        #beat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--surface3);
            flex-shrink: 0;
            opacity: 0;
            transition: background 0.06s, box-shadow 0.06s, opacity 0.2s;
        }
        #beat-dot.detecting { opacity: 1; }
        #beat-dot.flash {
            background: #FF4757;
            box-shadow: 0 0 8px #FF4757;
            transition: none; /* instant on */
        }

        /* ── Landscape layout (phones rotated) ───────────── */
        @media (orientation: landscape) and (max-height: 500px) {
            #app {
                flex-direction: row;
                flex-wrap: wrap;
                align-items: flex-start;
                max-width: 100%;
                overflow-y: auto;
            }
            #header { width: 100%; }
            #sample-row {
                flex-direction: column;
                width: clamp(80px, 18vw, 110px);
                flex-shrink: 0;
            }
            .sample-btn { padding: 4px 3px; }
            #sequencer-wrap {
                width: min(46vw, 280px);
                flex-shrink: 0;
            }
            .slider-row, #pitch-row {
                width: clamp(100px, 22vw, 160px);
                flex-shrink: 0;
            }
            .slider-label, #pitch-label { min-width: 28px; }
        }
    </style>
</head>
<body>
<div id="app">

    <!-- Header -->
    <div id="header">
        <h1>Drum Machine</h1>
        <span id="tempo-display">♩ 140 · swing 15%</span>
        <button id="sync-beat-btn" title="Tap on the downbeat to sync">SYNC</button>
        <button id="detect-bpm-btn" title="Detect BPM from mic">🎙</button>
        <span id="beat-dot"></span>
    </div>

    <!-- Sample selectors -->
    <div id="sample-row">
        <button class="sample-btn" data-voice="0">
            <span class="sample-voice">K</span>
            <span class="sample-name" id="sample-name-0">KICK</span>
            <span class="sample-hint">tap to swap</span>
        </button>
        <button class="sample-btn" data-voice="1">
            <span class="sample-voice">S</span>
            <span class="sample-name" id="sample-name-1">SNARE</span>
            <span class="sample-hint">tap to swap</span>
        </button>
        <button class="sample-btn" data-voice="2">
            <span class="sample-voice">H</span>
            <span class="sample-name" id="sample-name-2">CHH</span>
            <span class="sample-hint">tap to swap</span>
        </button>
        <button class="sample-btn" data-voice="3">
            <span class="sample-voice">C</span>
            <span class="sample-name" id="sample-name-3">CLAP</span>
            <span class="sample-hint">tap to swap</span>
        </button>
    </div>

    <!-- Clap recording row -->
    <div id="clap-record-row">
        <button id="rec-btn"><span id="rec-dot"></span><span id="rec-label">● REC CLAP</span></button>
        <button id="rec-clear-btn" style="display:none">✕ clear</button>
    </div>

    <!-- Circular Sequencer -->
    <div id="sequencer-wrap">
        <svg id="sequencer-svg" viewBox="0 0 460 380" xmlns="http://www.w3.org/2000/svg" oncontextmenu="return false">
            <defs>
                <radialGradient id="bg-gradient" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#1c1c1c"/>
                    <stop offset="100%" stop-color="#0a0a0a"/>
                </radialGradient>
            </defs>

            <!-- Ring track -->
            <ellipse cx="230" cy="190" rx="185" ry="160" fill="none" stroke="#181818" stroke-width="24"/>

            <!-- Voice arc backgrounds (dim colour segments on the ring) -->
            <!-- Kick  top:    -125° → -55° -->
            <path d="M 124 59 A 185 160 0 0 1 336 59"
                  fill="none" stroke="rgba(255,71,87,0.09)" stroke-width="24"/>
            <!-- Snare right:  -35° → +35° -->
            <path d="M 382 98 A 185 160 0 0 1 382 282"
                  fill="none" stroke="rgba(255,165,2,0.09)" stroke-width="24"/>
            <!-- HiHat bottom: +55° → +125° -->
            <path d="M 336 321 A 185 160 0 0 1 124 321"
                  fill="none" stroke="rgba(46,213,115,0.09)" stroke-width="24"/>
            <!-- Clap  left:  +145° → +215° -->
            <path d="M 78 282 A 185 160 0 0 1 78 98"
                  fill="none" stroke="rgba(162,155,254,0.09)" stroke-width="24"/>

            <!-- Step nodes — built by JS -->
            <g id="steps-group"></g>

            <!-- Playhead rings — built by JS -->
            <g id="playhead-group"></g>

            <!-- Voice labels (inside the ring) -->
            <text x="230" y="137" text-anchor="middle" dominant-baseline="middle"
                  font-size="10" font-weight="800" letter-spacing="0.1em"
                  fill="rgba(255,71,87,0.45)">KICK</text>
            <text x="295" y="191" text-anchor="middle" dominant-baseline="middle"
                  font-size="10" font-weight="800" letter-spacing="0.1em"
                  fill="rgba(255,165,2,0.45)">SN</text>
            <text x="230" y="246" text-anchor="middle" dominant-baseline="middle"
                  font-size="10" font-weight="800" letter-spacing="0.1em"
                  fill="rgba(46,213,115,0.45)">HH</text>
            <text x="165" y="191" text-anchor="middle" dominant-baseline="middle"
                  font-size="10" font-weight="800" letter-spacing="0.1em"
                  fill="rgba(162,155,254,0.45)">CLAP</text>

            <!-- ── Voice pads — diamonds at cardinal positions, moved inward ── -->
            <!-- V0 Kick — top (230, 70) -->
            <g class="voice-pad" data-voice="0">
                <circle cx="230" cy="70" r="30" fill="transparent"/>
                <polygon points="230,54 247,70 230,86 213,70"
                         fill="rgba(255,71,87,0.18)" stroke="#FF4757" stroke-width="1.5"
                         stroke-linejoin="round" id="pad-poly-0"/>
                <text x="230" y="71" text-anchor="middle" dominant-baseline="middle"
                      font-size="11" font-weight="900" fill="#FF4757"
                      pointer-events="none">K</text>
            </g>
            <!-- V1 Snare — right (365, 190) -->
            <g class="voice-pad" data-voice="1">
                <circle cx="365" cy="190" r="30" fill="transparent"/>
                <polygon points="365,173 382,190 365,207 348,190"
                         fill="rgba(255,165,2,0.18)" stroke="#FFA502" stroke-width="1.5"
                         stroke-linejoin="round" id="pad-poly-1"/>
                <text x="365" y="191" text-anchor="middle" dominant-baseline="middle"
                      font-size="11" font-weight="900" fill="#FFA502"
                      pointer-events="none">S</text>
            </g>
            <!-- V2 HiHat — bottom (230, 310) -->
            <g class="voice-pad" data-voice="2">
                <circle cx="230" cy="310" r="30" fill="transparent"/>
                <polygon points="230,293 247,310 230,327 213,310"
                         fill="rgba(46,213,115,0.18)" stroke="#2ED573" stroke-width="1.5"
                         stroke-linejoin="round" id="pad-poly-2"/>
                <text x="230" y="311" text-anchor="middle" dominant-baseline="middle"
                      font-size="11" font-weight="900" fill="#2ED573"
                      pointer-events="none">H</text>
            </g>
            <!-- V3 Clap — left (95, 190) -->
            <g class="voice-pad" data-voice="3">
                <circle cx="95" cy="190" r="30" fill="transparent"/>
                <polygon points="95,173 112,190 95,207 78,190"
                         fill="rgba(162,155,254,0.18)" stroke="#A29BFE" stroke-width="1.5"
                         stroke-linejoin="round" id="pad-poly-3"/>
                <text x="95" y="191" text-anchor="middle" dominant-baseline="middle"
                      font-size="11" font-weight="900" fill="#A29BFE"
                      pointer-events="none">C</text>
            </g>

            <!-- ── Effect buttons — circles at diagonal positions, inside ring ── -->
            <!-- REPEAT — top-right (295, 125) -->
            <g class="effect-btn" data-fx="repeat">
                <circle cx="295" cy="125" r="25" fill="rgba(255,71,87,0.1)"
                        stroke="#FF4757" stroke-width="1.5" id="fx-c-repeat"/>

<script>
(function () {
'use strict';

// ─── Constants ───────────────────────────────────────────────────────────────
const STEPS   = 8;
const VOICES  = 4;
const CX = 230, CY = 190;
const RING_RX = 185, RING_RY = 160;
const COLORS      = ['#FF4757', '#FFA502', '#2ED573', '#A29BFE'];
const COLORS_DIM  = ['rgba(255,71,87,0.15)','rgba(255,165,2,0.15)',
                     'rgba(46,213,115,0.15)','rgba(162,155,254,0.15)'];
const PAD_FILL    = ['rgba(255,71,87,0.18)','rgba(255,165,2,0.18)',
                     'rgba(46,213,115,0.18)','rgba(162,155,254,0.18)'];
const FX_ACTIVE   = { repeat:'rgba(255,71,87,0.55)',    filter:'rgba(46,213,115,0.55)',
                       random:'rgba(255,165,2,0.55)',    distortion:'rgba(91,138,255,0.55)' };
const FX_DIM      = { repeat:'rgba(255,71,87,0.1)',      filter:'rgba(46,213,115,0.1)',
                       random:'rgba(255,165,2,0.1)',      distortion:'rgba(91,138,255,0.1)' };
const NODE_R      = 13;
const LOOKAHEAD   = 25.0;   // ms
const SCHED_AHEAD = 0.1;    // s
const FILTER_LEVELS = [
    { type: 'highpass', freq: 10000 },  // level -4
    { type: 'highpass', freq: 5000  },  // level -3
    { type: 'highpass', freq: 2000  },  // level -2
    { type: 'highpass', freq: 600   },  // level -1
    { type: 'lowpass',  freq: 20000 },  // level  0 (open)
    { type: 'lowpass',  freq: 4000  },  // level  1
    { type: 'lowpass',  freq: 1500  },  // level  2
    { type: 'lowpass',  freq: 600   },  // level  3
    { type: 'lowpass',  freq: 200   },  // level  4
];

// ─── State ────────────────────────────────────────────────────────────────────
let grid           = Array.from({length: VOICES}, () => Array(STEPS).fill(false));
let pitches        = [0, 0, 0, 0];
let selectedSamples = [0, 0, 0, 0];
let bpm            = 140;
let swing          = 0.15;
let isPlaying      = false;
let currentStep    = 0;
let nextStepTime   = 0;
let schedulerTimer = null;
let visualStep     = -1;
let fx = { repeat: false, random: false, filter: false, distortion: false };
let fxToastShown = false;
const FILTER_DRAG_THRESHOLD = 12;
let filterDrag = { active: false, pointerId: null, startY: 0, level: 0 };
let voiceHeld = [false, false, false, false];
let voiceHoldLevel = [-1, -1, -1, -1]; // -2=4th, -1=8th, 0=16th, 1=32nd, 2=64th

// Recording state
let recordedClapBuffer  = null;
let isRecording         = false;
let mediaRecorder       = null;
let recordChunks        = [];
let recCountdownTimer   = null;

// ─── Persistence ──────────────────────────────────────────────────────────────
function saveState() {
    try {
        localStorage.setItem('dm_state', JSON.stringify({ grid, bpm, swing, pitches, selectedSamples }));
    } catch(e) {}
}

// ─── Audio ────────────────────────────────────────────────────────────────────
let audioCtx, masterGain, filterNode, distortionNode;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.8;

    filterNode = audioCtx.createBiquadFilter();
    filterNode.type = 'lowpass';
    filterNode.frequency.value = 20000;
    filterNode.Q.value = 1.2;

    distortionNode = audioCtx.createWaveShaper();
    distortionNode.curve = makeDistCurve(0);
    distortionNode.oversample = '2x';

    masterGain.connect(filterNode);
    filterNode.connect(distortionNode);
    distortionNode.connect(audioCtx.destination);
}

function makeDistCurve(amount) {
    const n = 512, curve = new Float32Array(n), deg = Math.PI / 180;
    for (let i = 0; i < n; i++) {
        const x = (i * 2) / n - 1;
        curve[i] = amount === 0
            ? x
            : ((3 + amount) * x * 20 * deg) / (Math.PI + amount * Math.abs(x));
    }
    return curve;
}

function semitonesToRate(s) { return Math.pow(2, s / 12); }

// ─── Synthesis ────────────────────────────────────────────────────────────────
function playKick(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150 * r, time);
    osc.frequency.exponentialRampToValueAtTime(0.001, time + 0.5);
    g.gain.setValueAtTime(1.0, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.5);
}
function play808(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(80 * r, time);
    osc.frequency.exponentialRampToValueAtTime(20 * r, time + 1.0);
    g.gain.setValueAtTime(1.4, time); g.gain.exponentialRampToValueAtTime(0.001, time + 1.0);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 1.0);
}
function playPunch(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(240 * r, time);
    osc.frequency.exponentialRampToValueAtTime(40 * r, time + 0.15);
    g.gain.setValueAtTime(1.6, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.15);
}
function playSub(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(55 * r, time);
    osc.frequency.exponentialRampToValueAtTime(18 * r, time + 0.9);
    g.gain.setValueAtTime(1.3, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.9);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.9);
}
function playSnare(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.2), ns = audioCtx.createBufferSource(); ns.buffer = nb;
    const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
    bpf.frequency.value = 1000 * r; bpf.Q.value = 0.5;
    const ng = audioCtx.createGain();
    ng.gain.setValueAtTime(1.0, time); ng.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
    ns.connect(bpf); bpf.connect(ng); ng.connect(masterGain); ns.start(time); ns.stop(time + 0.2);
    const osc = audioCtx.createOscillator(); osc.type = 'triangle';
    osc.frequency.value = 185 * r;
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.6, time); og.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    osc.connect(og); og.connect(masterGain); osc.start(time); osc.stop(time + 0.1);
}
function playRim(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.05), src = audioCtx.createBufferSource(); src.buffer = nb;
    const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
    bpf.frequency.value = 2800 * r; bpf.Q.value = 3;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(2.0, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
    src.connect(bpf); bpf.connect(g); g.connect(masterGain); src.start(time); src.stop(time + 0.05);
}
function playTom(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180 * r, time);
    osc.frequency.exponentialRampToValueAtTime(60 * r, time + 0.35);
    g.gain.setValueAtTime(1.1, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.35);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.35);
}
function playStick(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.018), src = audioCtx.createBufferSource(); src.buffer = nb;
    const hpf = audioCtx.createBiquadFilter(); hpf.type = 'highpass';
    hpf.frequency.value = 4500 * r;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(2.2, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.018);
    src.connect(hpf); hpf.connect(g); g.connect(masterGain); src.start(time); src.stop(time + 0.018);
}
function playClosedHH(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.08), src = audioCtx.createBufferSource(); src.buffer = nb;
    const hpf = audioCtx.createBiquadFilter(); hpf.type = 'highpass';
    hpf.frequency.value = 7000 * r;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.6, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.07);
    src.connect(hpf); hpf.connect(g); g.connect(masterGain); src.start(time); src.stop(time + 0.08);
}
function playOpenHH(time, pitch) {
    const r = semitonesToRate(pitch);
    const nb = noiseBuffer(0.5), src = audioCtx.createBufferSource(); src.buffer = nb;
    const hpf = audioCtx.createBiquadFilter(); hpf.type = 'highpass';
    hpf.frequency.value = 6000 * r;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.45, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.45);
    src.connect(hpf); hpf.connect(g); g.connect(masterGain); src.start(time); src.stop(time + 0.5);
}
function playCrash(time, pitch) {
    const r = semitonesToRate(pitch);
    [1, 1.34, 1.78, 2.4, 3.1].forEach((ratio, i) => {
        const nb = noiseBuffer(1.8), src = audioCtx.createBufferSource(); src.buffer = nb;
        const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
        bpf.frequency.value = 3000 * ratio * r; bpf.Q.value = 2.5;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.2 / (i + 1), time);
        g.gain.exponentialRampToValueAtTime(0.001, time + 1.8);
        src.connect(bpf); bpf.connect(g); g.connect(masterGain);
        src.start(time); src.stop(time + 1.8);
    });
}
function playShaker(time, pitch) {
    const r = semitonesToRate(pitch);
    for (let i = 0; i < 10; i++) {
        const t = time + i * 0.009;
        const nb = noiseBuffer(0.009), src = audioCtx.createBufferSource(); src.buffer = nb;
        const hpf = audioCtx.createBiquadFilter(); hpf.type = 'highpass';
        hpf.frequency.value = 9000 * r;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.009);
        src.connect(hpf); hpf.connect(g); g.connect(masterGain);
        src.start(t); src.stop(t + 0.009);
    }
}
function playClap(time, pitch) {
    if (recordedClapBuffer) {
        const src = audioCtx.createBufferSource();
        src.buffer = recordedClapBuffer;
        src.playbackRate.value = semitonesToRate(pitch);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.9, time);
        src.connect(g); g.connect(masterGain);
        src.start(time);
        src.stop(time + recordedClapBuffer.duration + 0.01);
        return;
    }
    const r = semitonesToRate(pitch);
    for (let b = 0; b < 3; b++) {
        const t = time + b * 0.012;
        const nb = noiseBuffer(0.05), src = audioCtx.createBufferSource(); src.buffer = nb;
        const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
        bpf.frequency.value = 1200 * r; bpf.Q.value = 0.8;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(b === 0 ? 0.55 : 0.35, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        src.connect(bpf); bpf.connect(g); g.connect(masterGain); src.start(t); src.stop(t + 0.12);
    }
}
function playCowbell(time, pitch) {
    const r = semitonesToRate(pitch);
    [562, 845].forEach(freq => {
        const osc = audioCtx.createOscillator(); osc.type = 'square';
        osc.frequency.value = freq * r;
        const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
        bpf.frequency.value = freq * r; bpf.Q.value = 6;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.35, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.5);
        osc.connect(bpf); bpf.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.5);
    });
}
function playConga(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(310 * r, time);
    osc.frequency.exponentialRampToValueAtTime(160 * r, time + 0.2);
    g.gain.setValueAtTime(1.1, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.22);
    osc.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.22);
}
function playWoodblock(time, pitch) {
    const r = semitonesToRate(pitch);
    const osc = audioCtx.createOscillator(); osc.type = 'square';
    osc.frequency.value = 820 * r;
    const bpf = audioCtx.createBiquadFilter(); bpf.type = 'bandpass';
    bpf.frequency.value = 820 * r; bpf.Q.value = 10;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.9, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.075);
    osc.connect(bpf); bpf.connect(g); g.connect(masterGain); osc.start(time); osc.stop(time + 0.075);
}

function noiseBuffer(dur) {
    const size = Math.ceil(audioCtx.sampleRate * dur);
    const buf  = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
    return buf;
}

// ─── Sample banks ─────────────────────────────────────────────────────────────
const SAMPLE_BANKS = [
    [{ name:'KICK', play:playKick }, { name:'808',   play:play808   },
     { name:'PUNCH',play:playPunch }, { name:'SUB',  play:playSub   }],
    [{ name:'SNARE',play:playSnare }, { name:'RIM',  play:playRim   },
     { name:'TOM',  play:playTom   }, { name:'STICK',play:playStick }],
    [{ name:'CHH',  play:playClosedHH }, { name:'OHH', play:playOpenHH },
     { name:'CRASH',play:playCrash   }, { name:'SHAKE',play:playShaker }],
    [{ name:'CLAP', play:playClap   }, { name:'COWBL',play:playCowbell },
     { name:'CONGA',play:playConga  }, { name:'WOOD', play:playWoodblock }],
];

function triggerVoice(voice, time) {
    SAMPLE_BANKS[voice][selectedSamples[voice]].play(time, pitches[voice]);
}

// ─── Sequencer ────────────────────────────────────────────────────────────────
function stepDuration() { return (60 / bpm) / 2; }

function swingOffset(step) {
    return (step % 2 === 1) ? stepDuration() * (swing * 0.33) : 0;
}

function scheduleStep(step, baseTime) {
    const time = baseTime + swingOffset(step);
    const dur  = stepDuration();
    for (let v = 0; v < VOICES; v++) {
        if (voiceHeld[v]) {
            const level = voiceHoldLevel[v];
            if (level === -2) {
                if (step % 2 === 0) triggerVoice(v, time);
                continue;
            }
            const mult = Math.pow(2, level + 1); // -1->1, 0->2, 1->4, 2->8
            const subDur = dur / mult;
            for (let i = 0; i < mult; i++) triggerVoice(v, time + i * subDur);
            continue;
        }
        const fire = fx.random ? (Math.random() > 0.5) : grid[v][step];
        if (!fire) continue;
        if (fx.repeat) {
            triggerVoice(v, time);
            triggerVoice(v, time + dur / 2);
        } else {
            triggerVoice(v, time);
        }
    }
}

function scheduler() {
    while (nextStepTime < audioCtx.currentTime + SCHED_AHEAD) {
        const step = currentStep;
        const t    = nextStepTime;
        scheduleStep(step, t);
        nextStepTime += stepDuration();
        currentStep = (currentStep + 1) % STEPS;
        const delay = Math.max(0, (t - audioCtx.currentTime) * 1000);
        setTimeout(() => { visualStep = step; }, delay);
    }
    schedulerTimer = setTimeout(scheduler, LOOKAHEAD);
}

function startPlayback() {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    currentStep  = 0;
    nextStepTime = audioCtx.currentTime + 0.05;
    isPlaying    = true;
    scheduler();
    updatePlayIcon();
}

function stopPlayback() {
    isPlaying = false;
    if (schedulerTimer) clearTimeout(schedulerTimer);
    visualStep = -1;
    renderSteps();
    updatePlayhead();
    updatePlayIcon();
}

function togglePlay() { navigator.vibrate && navigator.vibrate(10); isPlaying ? stopPlayback() : startPlayback(); }

function updatePlayIcon() {
    document.getElementById('play-icon').textContent = isPlaying ? '■' : '▶';
    document.getElementById('play-bg').style.fill = isPlaying ? '#222' : '#141414';
}

// ─── SVG ──────────────────────────────────────────────────────────────────────
function stepPos(voice, step) {
    // Voice centers: V0=top(-90°), V1=right(0°), V2=bottom(90°), V3=left(180°)
    const CENTER = [-Math.PI / 2, 0, Math.PI / 2, Math.PI][voice];
    const angle  = CENTER + (step - 3.5) * (10 * Math.PI / 180); // 10° per step
    return { x: CX + RING_RX * Math.cos(angle), y: CY + RING_RY * Math.sin(angle) };
}

function buildStepsSVG() {
    const g = document.getElementById('steps-group');
    g.innerHTML = '';
    for (let v = 0; v < VOICES; v++) {
        for (let s = 0; s < STEPS; s++) {
            const pos   = stepPos(v, s);
            const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            group.setAttribute('class', 'step-node');
            group.dataset.voice = v;
            group.dataset.step  = s;

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', pos.x);
            circle.setAttribute('cy', pos.y);
            circle.setAttribute('r',  NODE_R);
            circle.setAttribute('fill', COLORS_DIM[v]);
            circle.setAttribute('class', 'step-vis');
            circle.setAttribute('pointer-events', 'none');

            const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            hit.setAttribute('cx', pos.x);
            hit.setAttribute('cy', pos.y);
            hit.setAttribute('r', 24);
            hit.setAttribute('fill', 'transparent');

            group.appendChild(hit);
            group.appendChild(circle);
            g.appendChild(group);

            group.addEventListener('click', () => toggleStep(v, s));
            group.addEventListener('touchend', e => { e.preventDefault(); toggleStep(v, s); });
        }
    }
}

let lastVisualStep = -2;

function renderSteps() {
    document.querySelectorAll('.step-node').forEach(node => {
        const v = +node.dataset.voice;
        const s = +node.dataset.step;
        const c = node.querySelector('.step-vis');
        const active  = grid[v][s];
        const playing = s === visualStep;

        c.setAttribute('fill', active ? COLORS[v] : COLORS_DIM[v]);
        c.setAttribute('opacity', active ? '1' : '0.6');

        if (playing) {
            c.setAttribute('r', NODE_R + 3);
            c.setAttribute('filter', `drop-shadow(0 0 7px ${COLORS[v]})`);
        } else {
            c.setAttribute('r', NODE_R);
            c.setAttribute('filter', 'none');
        }
    });
}

function updatePlayhead() {
    const g = document.getElementById('playhead-group');
    g.innerHTML = '';
    if (!isPlaying || visualStep < 0) return;

    for (let v = 0; v < VOICES; v++) {
        const pos = stepPos(v, visualStep);
        const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        ring.setAttribute('cx', pos.x);
        ring.setAttribute('cy', pos.y);
        ring.setAttribute('r',  NODE_R + 7);
        ring.setAttribute('fill', 'none');
        ring.setAttribute('stroke', COLORS[v]);
        ring.setAttribute('stroke-width', '1.5');
        ring.setAttribute('opacity', '0.45');
        g.appendChild(ring);
    }
}

function animLoop() {
    if (visualStep !== lastVisualStep) {
        lastVisualStep = visualStep;
        renderSteps();
        updatePlayhead();
    }
    requestAnimationFrame(animLoop);
}

// ─── Step toggle ──────────────────────────────────────────────────────────────
function toggleStep(voice, step) {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    grid[voice][step] = !grid[voice][step];
    if (grid[voice][step]) { triggerVoice(voice, audioCtx.currentTime); navigator.vibrate && navigator.vibrate(10); }
    renderSteps();
    saveState();
}

// ─── Effects ──────────────────────────────────────────────────────────────────
function applyEffect(name, on) {
    if (!audioCtx) return;
    if (name === 'filter') {
        if (!on) {
            filterNode.type = 'lowpass';
            filterNode.frequency.setTargetAtTime(20000, audioCtx.currentTime, 0.06);
            filterNode.Q.setTargetAtTime(1.2, audioCtx.currentTime, 0.06);
            return;
        }
        const lvl = FILTER_LEVELS[filterDrag.level + 4];
        filterNode.type = lvl.type;
        filterNode.frequency.setTargetAtTime(lvl.freq, audioCtx.currentTime, 0.06);
        filterNode.Q.setTargetAtTime(lvl.type === 'highpass' ? 0.9 : 1.2, audioCtx.currentTime, 0.06);
    }
    if (name === 'distortion') {
        distortionNode.curve = makeDistCurve(on ? 400 : 0);
    }
}

}
function hideRollIndicator() {
    rollIndicator.classList.remove('visible');
}

document.querySelectorAll('.voice-pad').forEach(pad => {
    const v    = +pad.dataset.voice;
    const poly = document.getElementById(`pad-poly-${v}`);
    let startY = 0;

    pad.addEventListener('pointerdown', e => {
        e.preventDefault();
        navigator.vibrate && navigator.vibrate(10);
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (pad.setPointerCapture) {
            try { pad.setPointerCapture(e.pointerId); } catch (_) {}
        }
        startY = e.clientY;
        voiceHeld[v] = true;
        voiceHoldLevel[v] = -1;
        triggerVoice(v, audioCtx.currentTime);
        poly.setAttribute('fill', COLORS[v]);
        showRollIndicator(-1);
    });

    pad.addEventListener('pointermove', e => {
        if (!voiceHeld[v]) return;
        const dy = startY - e.clientY;
        const newLevel = Math.max(-2, Math.min(2, Math.round(dy / 40) - 1));
        if (newLevel !== voiceHoldLevel[v]) {
            voiceHoldLevel[v] = newLevel;
            showRollIndicator(newLevel);
        }
    });

    function stopRoll(e) {
        if (e && pad.releasePointerCapture) {
            try { pad.releasePointerCapture(e.pointerId); } catch (_) {}
        }
        voiceHeld[v] = false;
        voiceHoldLevel[v] = -1;
        poly.setAttribute('fill', PAD_FILL[v]);
        hideRollIndicator();
    }

    pad.addEventListener('pointerup', stopRoll);
    pad.addEventListener('pointercancel', stopRoll);
    pad.addEventListener('pointerleave', stopRoll);
});

function updateFilterIndicator(level) {
    document.querySelectorAll('.fi-level').forEach(row => {
        row.classList.toggle('active', +row.dataset.level === level);
    });
}
function showFilterIndicator(level) {

    if (el) el.classList.add('visible');
    updateFilterIndicator(level);
}
function hideFilterIndicator() {
    const el = document.getElementById('filter-indicator');
    if (el) el.classList.remove('visible');
}

document.querySelectorAll('.effect-btn').forEach(btn => {
    const name   = btn.dataset.fx;
    const circle = document.getElementById(`fx-c-${name}`);

    function activate(e) {
        e.preventDefault();
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        btn._holdStart = Date.now();
        if (name === 'filter') {
            filterDrag.active = true;
            filterDrag.pointerId = e.pointerId;
            filterDrag.startY = e.clientY;
            filterDrag.level = 0;
            if (btn.setPointerCapture) {
                try { btn.setPointerCapture(e.pointerId); } catch (_) {}
            }
            showFilterIndicator(0);
        }
        fx[name] = true;
        circle.setAttribute('fill', FX_ACTIVE[name]);
        circle.setAttribute('stroke-width', '2.5');
        btn.classList.add('active');
        applyEffect(name, true);
    }
    function handleMove(e) {
        if (name !== 'filter' || !filterDrag.active || !fx.filter) return;
        if (filterDrag.pointerId !== null && e.pointerId !== filterDrag.pointerId) return;
        const dy = e.clientY - filterDrag.startY;
        let newLevel;
        if      (dy < -90) newLevel = 4;
        else if (dy < -60) newLevel = 3;
        else if (dy < -30) newLevel = 2;
        else if (dy < -FILTER_DRAG_THRESHOLD) newLevel = 1;
        else if (dy > 90)  newLevel = -4;
        else if (dy > 60)  newLevel = -3;
        else if (dy > 30)  newLevel = -2;
        else if (dy > FILTER_DRAG_THRESHOLD) newLevel = -1;
        else               newLevel = 0;
        if (newLevel !== filterDrag.level) {
            filterDrag.level = newLevel;
            applyEffect('filter', true);
            updateFilterIndicator(newLevel);
        }
    }
    function deactivate() {
        const holdDuration = Date.now() - (btn._holdStart || Date.now());
        if (name === 'filter' && filterDrag.pointerId !== null && btn.releasePointerCapture) {
            try { btn.releasePointerCapture(filterDrag.pointerId); } catch (_) {}
        }
        fx[name] = false;
        if (name === 'filter') {
            filterDrag.active = false;
            filterDrag.pointerId = null;
            filterDrag.level = 0;
            hideFilterIndicator();
        }
        circle.setAttribute('fill', FX_DIM[name]);
        circle.setAttribute('stroke-width', '1.5');
        btn.classList.remove('active');
        applyEffect(name, false);
        if (!fxToastShown && holdDuration < 300) {
            fxToastShown = true;
            const toast = document.getElementById('fx-toast');
            toast.classList.remove('show');
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2600);
        }
    }

    btn.addEventListener('pointerdown', activate);
    btn.addEventListener('pointermove', handleMove);
    btn.addEventListener('pointerup',   deactivate);
    btn.addEventListener('pointerleave',deactivate);
    btn.addEventListener('pointercancel', deactivate);
});

    tapTimes.push(now);
    if (tapTimes.length >= 2) {
        const intervals = tapTimes.slice(1).map((t, i) => t - tapTimes[i]);
        const avgMs = intervals.reduce((a, b) => a + b) / intervals.length;
        bpm = Math.max(60, Math.min(200, Math.round(60000 / avgMs)));

// ─── Clap recording ───────────────────────────────────────────────────────────
const clapRecordRow = document.getElementById('clap-record-row');
const recBtn        = document.getElementById('rec-btn');
const recLabelEl    = document.getElementById('rec-label');
const recClearBtn   = document.getElementById('rec-clear-btn');

function updateClapRecordUI() {
    const clapSelected = selectedSamples[3] === 0;
    clapRecordRow.classList.toggle('visible', clapSelected);
    if (!clapSelected) return;
    if (isRecording) {
        recBtn.classList.add('recording');
        recLabelEl.textContent = '◼ STOP';
        recClearBtn.style.display = 'none';
    } else if (recordedClapBuffer) {
        recBtn.classList.remove('recording');
        recLabelEl.textContent = '✓ CUSTOM';
        recClearBtn.style.display = '';
    } else {
        recBtn.classList.remove('recording');
        recLabelEl.textContent = '● REC CLAP';
        recClearBtn.style.display = 'none';
    }
}

async function startRecording() {
    if (isRecording) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        isRecording = true;
        recordChunks = [];
        updateClapRecordUI();

        let elapsed = 0;
        recCountdownTimer = setInterval(() => {
            elapsed += 100;
            const rem = ((1500 - elapsed) / 1000).toFixed(1);
            if (elapsed <= 1500) recLabelEl.textContent = `◼ ${rem}s`;
        }, 100);

        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            clearInterval(recCountdownTimer);
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(recordChunks, { type: mediaRecorder.mimeType });
            const arrayBuf = await blob.arrayBuffer();
            initAudio();
            try {
                const decoded = await audioCtx.decodeAudioData(arrayBuf);
                const maxSamples = Math.min(decoded.length, Math.ceil(audioCtx.sampleRate * 1.5));
                recordedClapBuffer = audioCtx.createBuffer(
                    decoded.numberOfChannels, maxSamples, decoded.sampleRate
                );
                for (let ch = 0; ch < decoded.numberOfChannels; ch++) {
                    recordedClapBuffer.getChannelData(ch)
                        .set(decoded.getChannelData(ch).subarray(0, maxSamples));
                }
            } catch (e) { recordedClapBuffer = null; }
            isRecording = false;
            updateClapRecordUI();
        };
        mediaRecorder.start();
        setTimeout(() => { if (isRecording) stopRecording(); }, 1500);
    } catch (e) {
        isRecording = false;
        updateClapRecordUI();
    }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
}

recBtn.addEventListener('click', () => {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (isRecording) stopRecording();
    else startRecording();
});

recClearBtn.addEventListener('click', () => {
    recordedClapBuffer = null;
    updateClapRecordUI();
});

    bpm = 140; swing = 0.15;
    // Kick: beat 1, syncopated "a" of beat 1, beat 2
    grid[0][0] = true; grid[0][3] = true; grid[0][4] = true;
    // Snare: half-time on beat 2 only (punchy, trap feel)
    grid[1][4] = true;
    // HiHat: all 16ths — dense trap hat roll
    grid[2].fill(true);
    // Clap: layers with snare on beat 2, ghost clap on "and" of beat 2
    grid[3][4] = true; grid[3][6] = true;
}

// ─── BPM Detector ────────────────────────────────────────────────────────────
const BPMDetector = (() => {
    let micStream = null;
    let micSource = null;
    let bpmAnalyser = null;
    let detecting = false;
    let rafId = null;
    let detectionInterval = null;

    // Rolling spectral-flux buffer at a true 100 Hz via setInterval
    // (requestAnimationFrame only fires at ~60 Hz, which shifts all lag
    //  calculations and makes common tempos like 120-140 BPM undetectable)
    const SAMPLE_HZ       = 100;
    const BUF_SIZE        = SAMPLE_HZ * 10; // 10 seconds
    const energyBuf       = new Float32Array(BUF_SIZE);
    let   writeIdx        = 0;
    let   filled          = 0;
    let   collectStartTime = 0; // wall-clock time when collection started

    const fftData      = new Float32Array(1024); // half of fftSize 2048
    const prevSpectrum = new Float32Array(1024); // previous frame magnitudes
    const voteBuffer   = [];                     // last 8 BPM candidates

    // Onset detection for beat-dot flash
    let beatDot        = null;
    let fluxEma        = 0;   // exponential moving average of flux
    let lastFlashTime  = 0;   // ms, debounce

    function start() {
        if (detecting) { stop(); return; }
        navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
                initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                micStream   = stream;
                micSource   = audioCtx.createMediaStreamSource(stream);
                bpmAnalyser = audioCtx.createAnalyser();
                bpmAnalyser.fftSize = 2048;
                micSource.connect(bpmAnalyser);
                detecting = true;
                energyBuf.fill(0);
                prevSpectrum.fill(0);
                voteBuffer.length = 0;
                writeIdx = filled = 0;
                collectStartTime = performance.now();
                beatDot = document.getElementById('beat-dot');
                fluxEma = 0;
                lastFlashTime = 0;
                // Use setInterval instead of rAF to guarantee actual 100 Hz.
                // rAF fires at ~60 Hz which makes minLag wrong and misses
                // common tempos (120–140 BPM) entirely.
                rafId = setInterval(collect, 10);
                detectionInterval = setInterval(analyse, 2500);
                renderBtn();
            })
            .catch(() => {});
    }

    function stop() {
        detecting = false;
        clearInterval(rafId);
        clearInterval(detectionInterval);
        if (micSource) { micSource.disconnect(); micSource = null; }
        if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
        bpmAnalyser = null;
        if (beatDot) { beatDot.classList.remove('flash', 'detecting'); }
        renderBtn();
    }

    function collect() {
        if (!bpmAnalyser) return;
        bpmAnalyser.getFloatFrequencyData(fftData);
        // Multi-band spectral flux: low (kick/bass), mid (snare body), high (snare crack/hi-hat).
        // Weighted sum so hi-hat 16th notes don't overwhelm the kick-beat signal.
        const binHz   = audioCtx.sampleRate / 2048;
        const lowBin  = Math.floor(400  / binHz); // ~18
        const midBin  = Math.floor(1600 / binHz); // ~74
        const highBin = Math.floor(5500 / binHz); // ~256
        let flux = 0;
        for (let i = 1; i <= lowBin; i++) {
            const m = Math.pow(10, fftData[i] / 20);
            flux += Math.max(0, m - prevSpectrum[i]) * 1.0;
            prevSpectrum[i] = m;
        }
        for (let i = lowBin + 1; i <= midBin; i++) {
            const m = Math.pow(10, fftData[i] / 20);
            flux += Math.max(0, m - prevSpectrum[i]) * 0.7;
            prevSpectrum[i] = m;
        }
        for (let i = midBin + 1; i <= highBin; i++) {
            const m = Math.pow(10, fftData[i] / 20);
            flux += Math.max(0, m - prevSpectrum[i]) * 0.5;
            prevSpectrum[i] = m;
        }
        energyBuf[writeIdx % BUF_SIZE] = flux;
        writeIdx++;
        filled = Math.min(filled + 1, BUF_SIZE);

        // Beat-dot: flash on onset (flux spike above adaptive threshold)
        fluxEma = 0.85 * fluxEma + 0.15 * flux;
        const now = performance.now();
        const minInterval = bpm > 0 ? (60000 / bpm) * 0.5 : 200;
        if (flux > fluxEma * 2.5 && fluxEma > 1e-8 && (now - lastFlashTime) > minInterval) {
            lastFlashTime = now;
            if (beatDot) {
                beatDot.classList.remove('flash');
                void beatDot.offsetWidth; // force reflow to restart transition
                beatDot.classList.add('flash');
                setTimeout(() => beatDot && beatDot.classList.remove('flash'), 100);
            }
        }
    }

    function analyse() {
        if (filled < SAMPLE_HZ * 4) return; // need ≥4 s of data
        const n = filled;
        const buf = new Float32Array(n);
        const base = writeIdx - n;
        for (let i = 0; i < n; i++) buf[i] = energyBuf[(base + i + BUF_SIZE) % BUF_SIZE];

        let max = 0;
        for (let i = 0; i < n; i++) if (buf[i] > max) max = buf[i];
        if (max < 1e-10) return;
        for (let i = 0; i < n; i++) buf[i] /= max;

        // Measure true collection rate from wall clock to correct for setInterval drift
        const elapsedSec = (performance.now() - collectStartTime) / 1000;
        const actualHz = elapsedSec > 0.5 ? writeIdx / elapsedSec : SAMPLE_HZ;

        // NACF over lags for 60–180 BPM at measured actual rate
        const minLag = Math.floor(actualHz * 60 / 180);
        const maxLag = Math.ceil(actualHz * 60 / 60);
        const corrValues = new Float32Array(maxLag - minLag + 1);

        // Prefix sum of squares for efficient normalized autocorrelation
        const sq = new Float32Array(n + 1);
        for (let i = 0; i < n; i++) sq[i + 1] = sq[i] + buf[i] * buf[i];

        let bestLag = -1, bestCorr = -Infinity;
        for (let lag = minLag; lag <= maxLag; lag++) {
            const m = n - lag;
            let cross = 0;
            for (let i = 0; i < m; i++) cross += buf[i] * buf[i + lag];
            const e1 = sq[m];
            const e2 = sq[n] - sq[lag];
            const denom = Math.sqrt(e1 * e2);
            const corr = denom > 1e-12 ? cross / denom : 0;
            corrValues[lag - minLag] = corr;
            if (corr > bestCorr) { bestCorr = corr; bestLag = lag; }
        }
        if (bestLag < 1) return;

        // Parabolic interpolation for sub-sample lag precision
        let refinedLag = bestLag;
        if (bestLag > minLag && bestLag < maxLag) {
            const y1 = corrValues[bestLag - 1 - minLag];
            const y2 = corrValues[bestLag     - minLag];
            const y3 = corrValues[bestLag + 1 - minLag];
            const d = 2 * (2 * y2 - y1 - y3);
            if (Math.abs(d) > 1e-6) refinedLag = bestLag + (y3 - y1) / d;
        }

        // Octave disambiguation: if half-lag has similar correlation, double the BPM
        const halfLagInt = Math.round(refinedLag / 2);
        if (halfLagInt >= minLag && halfLagInt <= maxLag) {
            const halfCorr = corrValues[halfLagInt - minLag] ?? 0;
            if (bestCorr > 1e-6 && halfCorr / bestCorr > 0.5) {
                refinedLag = refinedLag / 2;
            }
        }

        const candidate = Math.max(60, Math.min(200, Math.round(60 * actualHz / refinedLag)));

        // Vote buffer: 8 readings; apply weighted average of cluster when ≥5 agree within ±4 BPM
        voteBuffer.push(candidate);
        if (voteBuffer.length > 8) voteBuffer.shift();
        if (voteBuffer.length >= 5) {
            const sorted = [...voteBuffer].sort((a, b) => a - b);
            const median = sorted[Math.floor(sorted.length / 2)];
            const cluster = sorted.filter(v => Math.abs(v - median) <= 4);
            if (cluster.length >= 5) {
                // Weight by position in voteBuffer (more recent = higher index = higher weight)
                let weightSum = 0, weightedTotal = 0;
                cluster.forEach(v => {
                    const idx = voteBuffer.indexOf(v) + 1;
                    weightSum += idx;
                    weightedTotal += v * idx;
                });
                applyBpm(Math.round(weightedTotal / weightSum));
            }
        }
    }

    function applyBpm(detected) {
        bpm = detected;
        bpmSlider.value = bpm;
        bpmValueEl.textContent = bpm;
        updateTempoDisplay();
        saveState();
        const btn = document.getElementById('detect-bpm-btn');
        if (btn) {
            btn.textContent = `♩${bpm}`;
            setTimeout(() => { if (btn && detecting) btn.textContent = '⏹'; }, 1200);
        }
    }

    function renderBtn() {
        const btn = document.getElementById('detect-bpm-btn');
        if (!btn) return;
        btn.classList.toggle('detecting', detecting);
        btn.textContent = detecting ? '⏹' : '🎙';
        if (beatDot) beatDot.classList.toggle('detecting', detecting);
    }

    return { start };
})();

document.getElementById('detect-bpm-btn').addEventListener('click', () => BPMDetector.start());

document.getElementById('sync-beat-btn').addEventListener('click', () => {
    initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (!isPlaying) {
        startPlayback();
    } else {
        // Let pre-scheduled audio drain, then restart from step 0
        currentStep  = 0;
        nextStepTime = audioCtx.currentTime + SCHED_AHEAD + 0.01;
    }
    // Brief visual confirmation
    const btn = document.getElementById('sync-beat-btn');
    btn.classList.add('synced');
    setTimeout(() => btn.classList.remove('synced'), 600);
});

// ─── Service Worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
    const SW_VERSION = '2604161237';
    navigator.serviceWorker.register(
        `/drum-machine/sw.js?v=${encodeURIComponent(SW_VERSION)}`,
        { scope: '/drum-machine/' }
    ).then(reg => {
        reg.addEventListener('updatefound', () => {
            const w = reg.installing;
            w.addEventListener('statechange', () => {
                if (w.state === 'installed' && navigator.serviceWorker.controller) {
                    document.getElementById('update-banner').classList.add('show');
                }
            });
        });
    }).catch(() => {});

    document.getElementById('update-btn').addEventListener('click', () => {
        navigator.serviceWorker.getRegistration('/drum-machine/').then(reg => {
            if (reg && reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        });
        window.location.reload();
    });

    navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
}

})();
</script>
